jewish_flavor.1.t코0=유월절 (페사흐)
jewish_flavor.1.d코0=모세가 파라오로 부터 우리 백성들을 해방한지도 오래전 일입니다만, 과거에 주님께서 파라오를 어떻게 처벌하셨는지에 대해 기억해야 합니다. 그분의 명에 따라 문의 인방과 설주에 어린 양의 피로 표시를 해두었고, 죽음의 천사들이 우리의 첫번째 자녀들을 죽이지 못하게 막았습니다. 그 후로 우리는 파라오의 족쇄에서 벗어났지만, 여전히 우리는 이를 마음속 깊이 새기며 기려야 합니다. \n 성경의 중요한 세 절기중 하나로써 유월절을 기념하며, 그것을 항시 염두해 두어야 합니다. 예루살렘 순례에서 희생양을 제공하는게 관례였지만, 이는 제 2 성전이 파괴된 이후로 불가능해졌습니다. 고로, 추가적인 수고를 댓가로 이를 기념하고 기억할 것입니다. 희생에 쓰일 새끼양이 주어질것이고, 이스트를 쓴 빵들은 버리거나 태웁니다. 이렇게, 우린 기억할 것입니다.
jewish_flavor.1.a코0=즐기도록 하지
jewish_flavor.5.t코0=제 3성전
jewish_flavor.8.t코0=메시아
jewish_flavor.8.d코0=우리 백성들은 디아스포라 이후 줄곧 성지로 돌아가기를 갈망했습니다. 비록 아직 여전히 전 세계에 흩어져 있지만, [Root.Monarch.GetName] 이 혹여 오래 고대하던 메시아 일지도 모른다고 작게 속삭이는 자 들이 생겼습니다. 신께서 우리를 성지로 돌려보내주실까요, 아니라면 이 문제를 우리 손으로 직접 해결해야만 할까요?
jewish_flavor.8.a코0=주님께서 유대민족을 돌보시리라. [Root.Monarch.GetName] 은 메시아가 아니다.
jewish_flavor.8.b코0=메시아인 [Root.Monarch.GetName] 께서 시온의 땅으로 보내 주실것이다.
no_messiah_country_modifier코0=통치자는 메시아가 아니다
desc_no_messiah_country_modifier코0=통치자 [Root.Monarch.GetName] 는 우린 성지로 데려가줄 메시아가 아니지만, 신께서 마땅히 그렇게 하시리.

