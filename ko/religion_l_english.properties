snotra코0=스노트라
snotra_desc코0=스노트라는 지혜의 여신이다. 현명한 남자나 여자는 스노트라에 대한 존경심을 담아 스노트르라고 불렸다.
njord코0=뇨르드
njord_desc코0=프레이야의 아버지, 바다의 신, 그리고 그의 신자들의 식탁에 양식을 보장해준다
