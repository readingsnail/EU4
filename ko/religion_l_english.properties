jewish_rebels_demand_desc코0=종교 반군이 믿음을 위해 싸웁니다. 그들은 우리가 이 종교의 우월적 지위를 인정하거나, 적어도 그들을 개종시키려는 우리의 노력을 중지하고 평화롭게 숭배하도록 둘 것을 요구합니다.
