freya코0=프레이야
freya_desc코0=프레이야는 사랑과 아름다움, 다산과 풍요를 약속하는 여신입니다.
tor코0=토르
tor_desc코0=토르는 오딘신의 아들이며 미드가르드(인간세계)에 들어가려는 두려운 존재들에 대항하여 인류를 지키는 신아다.
