custom_monthly_heir_claim_increase_desc코0=젊은 후계자는 귀족들 앞에서 자신을 증명해야 하고, 그들에게 자신이 왕위에 합당한 사람 그 이상이라는 것을 보여주어야 합니다. 따라서, 우리의 후계자는 귀족들과의 유대감을 강화하기 위해 정기적으로 귀족들과 사냥을 나가야합니다.\n바라건대, 가는 길에 사고가 일어나지 않길 바랍니다...
