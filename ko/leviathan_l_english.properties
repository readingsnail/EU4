sons_of_kupe_desc코1=11세기에 일어났다고 추측되는 쿠페의 전설적인 항해 이야기는 모든 Maori족에게 공유되었습니다. Hawaiki에서 온 영웅은 그의 아내 쿠라마로티니와 그녀의 위대한 카누 마타호루아와 함께 항해을 시작했습니다. 위대한 Aotearoa 땅의 발견 전까지 이 전설적인 항해 중에 그들은 셀수 없을 정도의 바다 괴물, 악마 그리고 매서운 날씨를 만났습니다. Hawaiki로 돌아와서 그는 그의 민족들에게 그가 본 위대한 것에 대해 애기하였고, 저 먼 해안에 새로운 삶이 기달리고 있다고 애기했습니다. 여기에 도취된 자들의 후손이 바로 우리입니다. 항해 정신은 우리 민족의 중심에 존재하고 있습니다.
kaitiakitanga_desc코1=Kaikiatitanga는 모든 Maori가 하늘, 바다 그리고 땅에 신세를 지고 있다는 신성한 후견인이다. 이 전통을 따르고 있는 자를 Kaitiaki 혹은 수호자라 칭하고 우리를 감싸고 있지만 스스로를 지키지 못하는 Mana의 무생물 군단을 지키는 신성한 수호자가 됩니다. Maori 사회에선 성지를 훼손하는 것은 살인과 동일한 범죄로 여기고 있고 강을 오염시키거나, 숲을 베거나 또는 과도하게 자연에서 나는 자원을 강탈하는 것은 중죄로 여깁니다. 우리의 자연과 조화롭게 지낼 수 있는 유일한 방법은 우리 스스로가 자연에서 가져가는 것을 제한하는 것이고 이 방법 만이 신들을 기쁘게 하고 Mana와 함께 풍요롭게 살 수 있는 길이다.
#General Polynesian Events
polynesian.14.t코0=떠있는 선물
polynesian.14.d코0=새로운 배가 우리의 통치자에게 선물되었습니다. 배를 건조한 장인은 부자는 아니지만 [Root.Monarch.GetHerHis] 통치를 위해 [Root.Monarch.GetName]에게 멋진 선물을 주고 싶어했습니다. 그들은 전통 명령에 따라 선물을 돌려받을 것입니다.
polynesian.14.a코0=우리의 함대는 강해집니다.
#Fijian Events
#Hawaiian Events
polynesian.23.t코0=특별한 마카히키 축제
polynesian.24.t코0=화산 분화
polynesian.25.d코0=마카히키는 우리 민족의 중요한 절기 중 하나입니다. 마칼리'이 또는 플레이아데스가 지평선 위로 떠오르고 다음 초승달이 도착 할 때 새로운 해가 시작됩니다. 이 기간 동안 마오리 또는 하와이인은 로노에게 그의 축복에 대해 감사하고 기념합니다. 축제가 벌어지는 4개월 동안 전쟁과 노동은 금지 됩니다. 사람들은 게임을 즐기거나, 동물을 희생하는 종교 축제에 참가하고 지도자들은 그들의 가치를 증명합니다. 모든 사회 계급은 개인의 영광 뿐만 아니라 그 들의 혈통을 위해 시험을 치룹니다.
makahiki_mod코0=마카히키(새로운 해)
desc_makahiki_mod코0=우리는 신년 회기에 있습니다
#Maori Events
#Samoan Events
#Tongan Events
#Easter Eggs
polynesian.43.t코0=수상한 조언가
polynesian.43.d코0=오랜 여행이 지나고, 우리의 여왕 모아나는 문신으로 덮힌 키가 큰 근육질의 남자와 함께 우리 해안으로 돌아왔습니다. 이제, 그녀의 곁에 그가 항상 보이며, 그녀는 그의 조언을 듣는 것이 자연스러워 보입니다. 아마 그에 대한 말들을 뒤로하고서라도 그를 궁정에 초대할 때가 된 것 같습니다.
polynesian.43.a코0=그는 마우이인가?
estate_regency_events.1.t코0=계층의 지도력이 도전받다
estate_regency_events.1.d코0=지난 몇 달 동안, 우리 나라의 한 세력이 힘을 얻었고 그들은 자기들이 이 섭정 기간 동안 통치해야 할 지도자라고 보고 있습니다. 그들의 요구는 뜬소문에서 시작되었습니다. 누군가는 이 사람이나 저 사람이 국가의 방향에 대해 만족하지 않는다고 속삭였으며, 다른 사람들은 주도 세력이 이 세력만큼 강하지 않다고 말하거나 그들이 대우받아야 할 만큼 섭정에서 대표되지 않는다고 말합니다. 이 뜬소문들은 몇 주 동안 계속되어 왔고 궁정에서 이 뜬소문의 존재는 완전히 명백해져, 우리 섭정의 권력에 도전하는 이 세력이 크게 목소리 높이고 있을 정도입니다. 섭정은 명백한 이유 때문에 걱정하고 있으며, [Root.Monarch.GetHerHis] 세력의 힘이 반격할 수 있는지에 대한 의구심이 들 정도로 약화됐다고 보고 있습니다. 우리 나라를 변화시킬 결단을 내려야 할 때입니다.
estate_regency_events.1.a코0=지도부가 바뀌는 것을 받아들일 수 밖에 없다.
estate_regency_events.1.b코0=그들은 국가의 이익을 위해 섭정을 지원해야 한다.
estate_displeased_tooltip코0=섭정을 주도하고 있는 계층이 불만을 가지게 될 것입니다.
coup_attempt_starts_tooltip코0=쿠데타가 일어날 것입니다.
estate_regency_events.2.t코0=섭정의 폐단
estate_regency_events.2.d코0=많은 사람들에게, 책임자가 되는 것은 자신들의 이익을 높이기 위한 기회에 지나지 않습니다. 그리고 그것이 바로 우리 나라가 고통받고 있는 상황입니다. 도전받지 않고 권력에 취한, 우리 섭정 뒤에 있는 세력과, 아마도 섭정 자신 역시도, 일부 특권들을 부여받고자 압박하고 있습니다. 우리가 약자의 입장에 있기 때문에, 그들의 요구를 거절하는 것은 위험한 행동일 수 있으며 우리가 스스로 파멸의 길을 선택하는 것일 수도 있습니다. 반면에, 만약 그들이 권력을 굳히는데 성공할 경우, 우리가 적합한 통치자를 갖게 되더라도 그들이 권력에서 물러나기를 거부한다면 제거하기 어려워질지도 모릅니다.
estate_regency_events.2.a코0=우리는 그들의 요구를 받아들일 것이다. 당분간은.
estate_regency_events.2.b코0=그들에게 뇌물을 줘 이 문제를 잊게 만들 수도 있을 것이다.
estate_regency_events.2.c코0=그들은 아무 것도 얻지 못한다. 그들은 자기의 이익이 아닌, 국가를 섬겨야 한다.
estate_regency_events.3.t코0=폭군 섭정
estate_regency_events.3.d코0=피의 복수는 국가를 무너뜨리는 것이지만, 인간만큼이나 오래된 것입니다. 우리의 섭정인, [Root.Monarch.GetName](은)는 집권하는 것이 정적과 반대파들을 제거할 수 있는 절호의 기회라고 생각합니다. [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 섭정 권력을 이용해 [Root.Monarch.GetHerHim]나 [Root.Monarch.GetHerHis] 세력에 반대하는 목소리를 무자비하게 공격하고 있으며, 심지어 그들이 반대하지 않을 때에도 [Root.Monarch.GetSheHe]가 공격할 수 있기 때문에 하고 있습니다. 물론, 다른 세력들은 현재 상황에 대해 특별히 행복하진 않으며 보복하려고 할지도 모릅니다. 우리는 결정의 갈림길에 서 있는데, 우리가 개입해야 할까요?
estate_regency_events.3.a코0=이 모든 것이 좋게 끝나길 바라며, [Root.Monarch.GetName](을)를 믿어야 한다.
estate_regency_events.3.b코0=이것은 폭정이며 이런 일이 일어나도록 내버려두면 우리의 면전에서 폭발할 것이다.
estate_regency_events.4.t코0=섭정이 다른 나라에 왕위를 바치다
estate_regency_events.4.d코0=몇몇 충신들이 믿을 수 없는 소식을 들고 우리에게 찾아왔습니다. 섭정과 [Root.Monarch.GetHerHis] 세력은 우리의 후계자와 [Root.Heir.GetHerHis] 지지자들에게 큰 불만을 가졌으며, 우리 나라의 왕위를 다른 나라에게 바치려는 무모한 조치를 취했습니다! 우리는 적들이 이 기회를 이용하여 우리를 공격해 정당한 후계자로부터 왕위를 빼앗지 않기를 바라며 기다릴 수 밖에 없습니다.
estate_regency_events.4.a코0=반역이다!
estate_regency_events.5.t코0=시민 계층이 문제를 야기하다
estate_regency_events.5.d코0=시민 계층은 돈에만 신경 쓴다고들 합니다. 돈이 풍족한 한, 그들은 행복하며 많은 문제를 일으키지 않을 것입니다. 적어도, 우리가 생각했던 바에 의하면 그렇습니다. [Root.Monarch.GetName] 그리고 [Root.Monarch.GetHerHis] 세력은 권력을 잡고 있는 동안 수상쩍은 사업들을 진행시키는데 자신들의 권력을 사용했습니다. 밀수는 우리에게 새로운 것이 아니며, 우리는 이를 알고 있고 밀수를 외면하는 것이 처음은 아닐 것입니다. 그러나 이번엔 이 불법 행위가 다른 나라를 자극했고 그들은 이 사건을 우리에게 전쟁을 선포하고 보상을 받기 위한 핑계로 사용할 수도 있습니다. 불행하게도, 그들은 협상할 의사가 없습니다.
estate_regency_events.5.a코0=우리는 기다릴 수 밖에 없다.
estate_regency_events.6.t코0=불관용의 증가
estate_regency_events.6.d코0=모든 종교 세력들이 집권했을 때 자신들의 권력을 영속시키거나 나머지에 대한 지배력을 확립하기 위해 항상 노력한다는 것에 누구도 놀라지 않을 것입니다. 그리고 이것이 바로 [Root.TAG.GetName](이)가 처한 상황입니다. 집권한 성직자들은 우리 나라에서 다른 종교의 영향력을 제거하기 위해 권력을 사용하고 있으며 이에 맞서기엔 그들의 권력이 너무 큽니다. 소심한 항의가 우리가 할 수 있는 전부입니다. 우리는 미래에 이 정책을 틀립없이 바꾸겠지만, 지금은 감수할 필요가 있습니다.
estate_regency_events.6.a코0=한 번에 한 문제씩.
estate_regency_events.7.t코0=우리의 섭정은 충신이다
estate_regency_events.7.d코0=우리는 섭정을 맡은 사람들이 왕위와 국가에 충성하기를 항상 기대하지만, 우리는 그들이 지위를 남용하거나 섭정에 오르는 즉시 권력을 잡으려고 하고 직접적으로 불충하지만 않는다면 충분히 행복합니다. [Root.Monarch.GetName](은)는 이 법칙에서 예외입니다. 우리가 [Root.Monarch.GetHerHim]에게서 최고만을 기대한 이후로 [Root.Monarch.GetHerHis] 세력에서 나온 충성스럽고 예의바른 [Root.Monarch.GetHerHis] 제안은 지난 몇 달 중 최고의 소식이었습니다.
estate_regency_events.7.a코0=이번에는 좋은 소식이로군!
loyalist_leader_mod코0=충성스러운 지도자
desc_loyalist_leader_mod코0=섭정은 군주에게 충성합니다.
loyalist_leader_tooltip코0=섭정은 군주에게 충성할 것입니다.
estate_regency_events.8.t코0=움직이는 그림자
estate_regency_events.8.d코0=그 권력에도 불구하고, [Root.Monarch.GetName] 그리고 [Root.Monarch.GetHerHis] 세력은 우리 나라의 후계자와 측근들에 대해 만족하지 않고 있으며 끔찍한 음모를 꾸미고 있다는 얘기가 있습니다. 우리는 [Root.Monarch.GetName]에게 대답을 요구했으며 [Root.Monarch.GetSheHe]는 강하게 혐의를 부인했습니다. 궁궐에는 절대 평화란 없으며 모든 구석마다 음모가 도사리고 있습니다.
estate_regency_events.8.a코0=뭔가 잘못됐다는 예감이 든다.
estate_regency_events.9.t코0=섭정이 좋은 영향을 끼치다
estate_regency_events.9.d코1=선량한 사람들이 자신의 이익보다 국가의 이익에 더 헌신할 때, 아주 좋은 일들이 일어납니다. 몇 달 동안, 섭정은 자신의 지혜를 [Root.Heir.GetName]에게 나눠주는데 많은 시간을 쏟았으며 둘은 이 시간을 매우 즐겼습니다. 통치자가 되기 위한 준비는 결코 쉽지 않지만, [Root.Monarch.GetName](은)는 훌륭한 일을 해냈습니다. 과학, 예절, 역사, 군사 전술에 관한 수업은 섭정과 후계자가 가는 곳마다 따라다니며 궁궐에서 오르내리고 있습니다.
estate_regency_events.9.a코0=[Root.Heir.GetName](은)는 많은 것을 배웠다!
estate_regency_events.10.t코0=배우자 섭정에 대한 쿠데타 시도
estate_regency_events.10.d코0=공공연한 비밀로, 우리 나라의 한 세력이 가진 불만에 관한 목소리가 곳곳에서 높아지고 있습니다. 이 얘기들에 따르면 그들은 지금의 배우자 섭정에게 불만을 가졌으며 [Root.Monarch.GetHerHim]를 권좌에서 몰아내고 자신들 중 한 명을 집권시키기 위한 쿠데타를 계획하고 있습니다. 만약 그들이 승리한다면, 왕조가 멸절될 수 있으니 우리가 이 음모를 종식시키고 모든 음모자들을 투옥할 때까지 배우자 섭정과 왕가는 모두 심각한 위험에 처하게 될 것입니다.
estate_regency_events.10.a코0=우리는 그들이 승리하도록 놔두지 않을 것이다!
coup_in_palace_events.1.t코0=쿠데타 소문
coup_in_palace_events.1.d코0=궁전의 회관들은 그 어느 때보다 더 바쁩니다. 전국 각지에서 모인 사람들이 그 곳에 모여 정보를 교환하고 만남을 축하하거나 단순히 동맹을 맺거나 오래된 분쟁들을 해결하려고 노력합니다. 이것은 이상할 것이 없지만, 매번 [Root.Monarch.GetName](이)가 이 회관들을 통과할 때, 하나의 이유 때문에 침묵이 드리웁니다. 이 침묵은 존경에서 비롯된 흔한 침묵이 아니라, 모든 사람들을 불안하게 만드는 불편한 침묵입니다. 이 이상한 행동에 대한 우리의 관심이 커지면서, 쿠데타가 계획되고 있다는 소문이 우리 귀에 들어왔습니다. 누가 감히 우리를 공격하겠습니까?
coup_in_palace_events.1.a코0=이 문제에 빛이 비칠 수 있도록 조사가 이루어져야 한다.
coup_ended_tooltip코0=음모자들이 발견되고 쿠데타는 무력화될 것입니다.
coup_in_palace_events.1.b코0=그건 아마 헛소문에 불과하겠지만, 만약을 대비해서 준비해야 한다.
gossips_continue_tooltip코0=오히려, 쿠데타에 대한 소문들이 더 흔해질 것입니다. 무슨 일이 일어날 것입니다.
coup_in_palace_events.2.t코0=음모가 발각되다
coup_in_palace_events.2.d코0=수일 간 이곳 저곳에서 이뤄진 수사와 뇌물, 협박 그리고 뜬 눈으로 지새운 많은 밤 끝에, 음모자들이 발견되었고 쿠데타는 무력화되었습니다. 반역자들은 다른 어떤 것도 받을 자격이 없기에, 이 장본인들은 지하감옥으로 보내지고 결국 처형될 것입니다. 많은 경우에서와 같이, 덜 명백했던 적들이 음모의 꼭대기에서 나타났고 실망감에 가슴이 무너집니다. '브루투스, 너마저?'.
coup_in_palace_events.2.a코0=반역자를 처벌하고 이에 종지부를 마련해야 할 때다.
coup_in_palace_events.3.t코0=음모가 계속되다
coup_in_palace_events.3.d코0=지난 몇 주 동안 뜬소문들이 꽤 분명했었다면, 지난 며칠 동안은 이 뜬소문들이 귀가 멀게 만들 지경에 이르렀습니다. 어떤 사람들은 더 이상 말하는 것을 숨기지 않고 심지어 우리가 있는 곳에서도 그것에 대해 계속 떠들고 있습니다. 뭔가 큰 일이 일어나려 하고 있고 우리는 다음 단계로 무엇을 해야 할지 정말로 모릅니다. 나쁜 일이 닥치고 있다는 느낌이 불길처럼 번지면서 나라는 긴장감에 휩싸여 있습니다.
coup_in_palace_events.3.a코0=무슨 일이 일어날 것인가?
coup_fails_tooltip코0=우리는 음모를 무력화하고 음모자들을 찾을 것이다.
coup_succeeds_tooltip코0=음모가 성공하고 피가 흐를 것입니다.
coup_in_palace_events.4.t코0=음모가 실패하다
coup_in_palace_events.4.d코0=이 음모가 우리에게 가르쳐줄 것이 있다면, 우리는 절대로 상황을 당연히 받아들여서는 안 된다는 것입니다. 밤이 가장 어둡고 모든 것을 잃은 것처럼 보였을 때, 우리의 요원들은 바보들이 자신들의 확실한 승리와 왕위 교체를 축하하는 마지막 순간에 현장에서 이 음모자들을 체포하는데 성공했습니다. 그들의 숙취는 눈물과 용서로 뒤틀어질 것입니다.
coup_in_palace_events.4.a코0=우리 나라는 안전하다!
coup_in_palace_events.5.t코0=음모가 성공하다
coup_in_palace_events.5.d코0=적이 내부에 있습니다! 모든 것을 잃었습니다! 우리 요원들은 음모자들을 거의 잡을 뻔했지만, 그들은 우리의 감시를 피하고 음흉한 계획을 추진하는데 성공했습니다. 우리는 사람들을 안전한 곳으로 옮겨야 합니다. 그렇지 않으면 왕위 뒤에 있는 새로운 권력에 대한 위협으로 인식될 경우 모두 살해될 것입니다. 빨리 움직여야 합니다!
coup_in_palace_events.5.a코0=아니, 희망이 없다. 그들이 왕위와 신앙을 가졌다.
coup_in_palace_events.6.t코0=여파
coup_in_palace_events.6.d코0=음모자들은 쿠데타 시도에 성공했고 그들이 정부를 통제하기에 다음에 무슨 일이 일어날지 그들이 지시할 것입니다.
coup_in_palace_events.6.a코0=이제 어쩔 것인가?
