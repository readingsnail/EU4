nw_native_ideas코0=북서 원주민 이념
nw_native_ideas_start코0=북서 아메리카
nw_native_ideas_bonus코0=북서 원주민 야망
raid_warfare_nw코0=약탈 전쟁
raid_warfare_nw_desc코1=우리 부족민들은 항시 전쟁 중 이거나 준비 태세를 하고 있습니다. 이웃 부족을 자주 약탈하여 노예로 부리기위해 포로를 잡습니다. 설령 우리가 얻고자하는 것을 찾아 해안을 위아래로 이동하여 먼 지역으로 이동하는 것을 의미하더라도 말입니다. 우리는 매 순간 어떤 상황이 오더라도 적응할 수 있게 준비해 둬야 합니다.
brother_salmon코0=우리의 형제, 연어
brother_salmon_desc코0=연어란 단순히 풍부한 음식 공급원이 아니고, 어떤 영적 상징이기도 합니다. 유일하지는 않을 수 있지만, 가장 중심에 위치하고 중요한 상징입니다. 연어는 우리를 먹이고, 이끌어주며, 보호해줍니다. 연어가 없으면, 우리는 저 세상과의 연결된 길을 잃을지도 모릅니다.
potlatch코0=선물 주기 전통(Potlatch)
potlatch_desc코1=포틀래치는 우리 공동체에서 사회적으로 가장 중요한 이벤트입니다. 포틀래치는 매우 복잡한 이벤트로 특정 사건을 같이 모여 기립니다. 포틀래치 동안 보통 족장은 방문객들에게 값지고 세세한 선물을 뿌리며 자신의 부를 증명하려 했습니다. 의식이 이뤄지는 동안 끊임없는 향연과 눈을 땔 수 없는 전시물들로 채우는 것은 높은 명예로 여겨 졌습니다.
mother_and_father코0=어머니와 아버지
mother_and_father_desc코1=치누크와 같이  모든 부족이 어머니의 혈통을 따르진 않더라도, 여성들은 사회적으로 중요성을 갖고 어떠한 다른 남성들 만큼이나 사회적으로 참여합니다.
totem_poles_nw코0=토템 폴
totem_poles_nw_desc코1=토템 기둥은 우리 문화의 상징과 특성을 나타내는, 기념을 위한 조각품입니다. 거대한 나무를 깎아 만든 이 기둥은 주로 우리의 조상들이나 문화적 믿음, 혹은 우리의 혈통이나 기억할 만한 사건을 상징하거나 기념합니다. 또한 불명예스러운 사람이나 종족에게 수치심을 주거나, 돌아가신 조상들의 유품을 담는 용기로도 사용됩니다.
canoe_people코0=카누의 사람들
canoe_people_desc코1=우리 부족은 큰 강이나 해안 주변에 살기 때문에 주로 연어, 장어를 비롯한 생선과 해산물, 물개, 심지어 고래까지도 주식으로 섭취합니다. 우리는 물을 도로처럼 이용하여 적들을 약탈하거나 친구들을 방문하기도 합니다. 이런 이유 때문에 카누는 우리 문화의 중요한 부분을 차지하며, 단순한 도구 이상의 역할을 합니다. 카누 덕에 우리는 물처럼 움직일 수 있습니다.
division_as_a_strength_nw코0=나눔으로써 강해지다
division_as_a_strength_nw_desc코0=이 지역에는 여러 부족이 살고 있으며 이들 모두가 같은 언어를 사용하는 것은 아니지만, 그럼에도 불구하고 너무나 많은 특성을 공유하고 있기 때문에 우리 사이에는 일종의 형제애가 생겨났습니다. 비록 우리의 삶이 우리를 섬길 노예들을 잡기 위해 적들을 끊임없이 습격하는 것에 크게 의존하긴 하지만, 우리는 공존하여 살아가고 있습니다.
plains_native_ideas코0=평원 원주민 이념
plains_native_ideas_start코0=대평원
plains_native_ideas_bonus코0=평원 원주민 야망
bison_hunters코0=바이슨 사냥꾼
bison_hunters_desc코1=들소는 우리 민족의 생명과 같습니다. 우리는 이 동물의 희생에 대한 헌사를 바치며 들소의 모든 부위를 사용합니다. 들소의 살은 우리 국민들을 먹이고, 뼈는 도구로 사용됩니다. 들소의 털은 긴 겨울의 추위에 대비하기 위해 옷으로 쓰이거나 우리의 천막을 덮는 데 사용됩니다. 우리는 들소의 혼을 우리의 상징 동물로 여깁니다. 들소는 이렇게나 우리 문화에 중요한 영향력을 가지고 있기에, 들소가 없었다면 우리는 살아갈 길을 찾지 못하였을 것입니다.
bow_archery코0=활의 궁술
bow_archery_desc코0=활은 우리의 많은 도구들 중에서도 가장 중요한 도구 중 하나입니다. 우리는 사냥을 통해 사람들을 먹여살리기 위해서나, 적들과의 전쟁을 위해서 활이 필요합니다. 우리의 활은 강하고 튼튼하지만 우리만큼 유연하기도 합니다. 창백한 얼굴을 한 자들이 오면서 우리는 말 위에서 활을 쏘는 법을 도입했습니다만, 그건 또 별개의 이야기이지요...
dwellers_of_tipis코0=천막의 거주자
dwellers_of_tipis_desc코1=티피는 우리의 전통적인 텐트로, 주로 들소의 가죽으로 만들어졌으며 단단한 나무 기둥으로 지탱되는 천막입니다. 윗부분에는 연막이 있어서 겨울철의 추위와 싸우기 위해 내부에 불을 피울 수 있습니다. 이 텐트는 내구성이 뛰어나고, 겨울에는 따뜻함과 편안함을 제공하며, 더운 여름에는 시원하고, 폭우 때는 건조합니다. 하지만 무엇보다도, 빠르게 분해하고 포장할 수 있기 때문에 주거지를 옮기는 데 아주 좋습니다.
peaceful_people코0=평화로운 사람들
peaceful_people_desc코1=대평원은 비옥하고 넓기에 부족들은 자원을 위해 경쟁할 필요가 없습니다. 이런 상황으로 인해 부족 간의 평화가 유지되어 왔습니다. 우리의 차이점과 간혹 벌어진 전쟁에도 불구하고, 우리 모두는 서로의 의사가 존중받는다는 것을 압니다. 오로지 외부의 위협만이 이 평화를 깨뜨릴 수 있을 것입니다.
sun_dance코0=태양의 춤
sun_dance_desc코1=태양의 춤은 우리에게 가장 중요한 의식 중 하나입니다. 이것은 보통 전 공동체가 함께 치유를 위해 기도하고 단체를 위해 개인적인 희생을 하는 것을 포함합니다. 그러한 희생은 피부에 피어싱을 하는 것이나 신체적인 인내(보통은 날씨와 상관없이 여러 날 동안 하늘 아래 있는 것)를 포함합니다.
plains_sign_language코0=평원의 수화
plains_sign_language_desc코0=평원 사람들이 만든 평원의 수화는 모든 지역에 퍼져 부족간의 무역 거래에 공통어로 자리잡았습니다. 우리는 이 언어의 창조자로서 다른 부족으로부터 명성을 얻었습니다. 우리는 명예에 관심이 없지만, 우리 국민의 독창성을 자랑스럽게 생각합니다.
horse_riders코0=말 기수
horse_riders_desc코1=우리 사람들은 초원을 건너기 위해 전통적으로 튼튼한 발과 유능한 어깨를 사용하거나 우리의 짐을 옮기기 위한 개가 이끄는 썰매를 사용해왔습니다. 창백한 얼굴을 가진 사람들이 우리의 땅에 나타났을때, 그들은 말들을 가져왔습니다. 이 아름다운 동물은 우리의 조상들이 내려준 선물이었습니다. 이제 말들은 부족내에 빼어낼 수 없는 존재가 되었으며 우리의 문화의 일부가 되었습니다.
california_native_ideas코0=캘리포니아 원주민 이념
california_native_ideas_start코0=캘리포니아
california_native_ideas_bonus코0=캘리포니아 원주민 야망
division_as_a_strength_cf코0=나눔으로써 강해지다
division_as_a_strength_cf_desc코1=이 지역에는 여러 부족이 살고 있으며 이들 모두가 같은 언어를 사용하는 것은 아니지만, 그럼에도 불구하고 너무나 많은 특성을 공유하고 있기 때문에 우리 사이에는 일종의 형제애가 생겨났습니다. 이 땅은 풍유롭기에, 우리는 공존하여 살아가고 있습니다.
basketweaving코0=바구니 엮기
basketweaving_desc코1=바구니는 우리 사람들에게 가장 가치있는 물품 중 하나입니다. 이 가치는 꼭 사치품으로서의 가치가 아니라 우리의 일상생활에 유용함에 있습니다. 바구니는 일반적으로 우리 식물을 따와 우리 여성들로부터 만들어집니다. 바구니는 사용 목적에 따라 크기와 만드는 방법등이 달라지고는 합니다.
tribelets코0=소규모 부족
tribelets_desc코1=대륙에 있는 다른 부족들과 비교에서 우리 부족은 큰 인구밀도를 가졌음에도 불구하고 우리 부족은 다소 작습니다. 그렇기에 많은 사람들에게 우리 부족은 작은 마을 정도로 알려져있습니다. 하지만 우리는 이 이름에 부끄럽지 않습니다. 사람들이 가까워질수록 그룹은 더 강해집니다. 그것은 우리가 번창하는데 도움이 되었습니다.
forest_gardening코0=숲 가꾸기
forest_gardening_desc코0=우리 땅은 너무 부유해서 우리 국민들은 농업에 시간을 할애할 필요가 없었습니다. 우리는 매년 숲에서 직접 필요한 것을 취할 수 있습니다. 우리는 자연과 조화롭게 살 수 있는 방법을 터득했습니다.
kuksu_cult코0=쿠크스 신앙
kuksu_cult_desc코0=우리부족의 일부 남성과 여성들은 비밀리에 영혼을 달래고 우리 땅에 축복을 가져다주는 춤을 추고는 했습니다. 그 덕분에 참나무에서 우리의 주식이 되는 도토리가 열렸습니다. 우리 주위의 영혼들은 행복하게 유지하는 한, 우리는 다시는 기근을 겪지 않을 것입니다.
rock_art코0=바위 예술
rock_art_desc코0=재능은 우리 조상들의 선물이며, 그들은 우리 부족원들을 축복했습니다. 이 영감 덕분에 우리의 성지들은 우리의 영, 조상 또는 우리의 땅을 꾸미고 사람을 행복하게 하는 전통을 담은 그림들로 그려져 있습니다.
medicine_men코1=의식의 사람들
medicine_men_desc코1=토템주의 사제들이 대륙 전역에 널리 퍼져 있음에도 불구하고, 그들은 우리에게 집단으로서 매우 중요합니다. 그들은 우리 민족의 건강을 돌보는 사람이며, 우리의 춤을 영과 조상들이 승인하는 방식으로 만들게 하는 사람들입니다.
potlatch_held코0=포틀래치(인디언의 축제) 개최
desc_potlatch_held코0=우리는 최근 포틀래치를 열었습니다.
native_americans.25.t코0=포틀래치 (Potlach)
native_americans.25.d코1=중요한 방문자가 그의 존재로 우리를 영광스럽게 하였다. [Root.Monarch.GetName]은 포틀래치로 손님의 영광을 축하해야 할지 말아야할지 결정해야 한다. 축하할 경우 그들과 우리 민족에게 우리의 부를 자랑할 수 있는 좋은 기회가 될 것이지만 반대로 많은 돈이 소모되기에 추후 회계에 지장이 생길 수 있다.
native_americans.25.a코0=무슨 일이 있더라도, 포틀래치는 항상 개최되어야 한다!
native_americans.25.b코1=우리는 지금 포틀래치를 열지 않는다.
native_americans.26.t코1=상냥한 환영
native_americans.26.d코1=우리가 [From.Monarch.GetName]와 [From.Monarch.GetHerHis] 사람들을 방문 하였을 때 우리의 명예를 위해 포틀래치가 열렸습니다. 이 축제에서 [From.Monarch.GetName]의 부를 증명하고 우리의 방문에 대한 존중의 상징으로 우리에게 엄청난 선물을 제공하였다. 우리는 어떻게 반응해야 할까?
native_americans.26.a코0=포틀래치는 훌륭했으며, 우리는 매우 기뻤다.
native_americans.26.b코0=포틀래치는 괜찮으며, 우리는 감사를 느꼈다.
potlatch_good코0=우리는 포틀래치를 사랑한다
native_americans.26.c코1=포틀래치는 그리 나쁘지 않았다.
potlatch_nice코0=우리는 포틀래치를 즐겼다
native_americans.26.e코0=포틀래치는 부실했다. 우리는 실망했다.
potlatch_bad코0=포틀래치가 그리 즐겁지 않았다
native_americans.27.t코1=차가운 환영
native_americans.27.d코1=우리가 [From.Monarch.GetName]와 [From.Monarch.GetHerHim] 사람들을 방문 하였을 때 우리의 명예를 위해 포틀래치가 열렸습니다. 이 축제에서 [From.Monarch.GetName]의 부를 증명하고 우리의 방문에 대한 존중의 상징으로 우리에게 엄청난 선물을 제공하였다. 우리는 어떻게 반응해야 할까?
native_americans.27.a코0=우리는 이해합니다, 때가 아니었습니다.
native_americans.27.b코0=이건 정말로 모욕적인 일이다.
native_americans.28.t코0=사냥하는 날
native_americans.28.d코1=사냥하기 좋은날인 오늘 [Root.Monarch.GetName]는 이 점을 염두에 두며 잠에서 깼습니다. [Root.Monarch.GetName]는 [Root.Monarch.GetHerHis] 사람들에게 다가가 말하길, [Root.Monarch.GetHerHis] 사냥을 가고 싶다 말합니다.  [Root.Monarch.GetHerHis] 사람들 중 하나가 다가와, [Root.Monarch.GetSheHe]가 어떤 사냥감을 원하는지 [Root.Monarch.GetHerHim]에게 물어봅니다.
native_americans.28.a코0=사슴을 찾아보자.
native_americans.28.b코1=연어잡이가 좋겠군.
native_americans.28.c코0=물개 사냥보다 재밌는건 없지.
native_americans.28.e코0=영양은 항상 도전정신을 불태우지.
native_americans.28.f코0=들소가 가장 훌륭한 사냥감이야.
native_americans.29.t코0=큰 사냥감
native_americans.29.d1코1=[Root.Monarch.GetName]가 [Root.Monarch.GetHerHis] 전사들과 [Root.Monarch.GetHerHis] 부족을 위해 사슴 무리를 포위하려고 할 때 [Root.Monarch.GetHerHis] 전사 한명이 [Root.Monarch.GetHerHim]에게 나와 깊은 숲속에서 아주 큰 사슴을 봤다고 보고했습니다. [Root.Monarch.GetName]는 주저하지 않고 그 남자를 따라 숲속을 지나 [Root.Monarch.GetSheHe]가 [Root.Monarch.GetHerHis] 사냥감을 찾을 때까지 따라갔다. [Root.Monarch.GetSheHe]가 본 사슴 중에 가장 큰 사슴이 빈터의 중앙에서 위풍당당하게 서있었다. [Root.Monarch.GetSheHe]는 숲의 정령에게 [Root.Monarch.GetSheHe]가 놓치지 않을 이 기회에 대해 '감사합니다' 라고 속삭였다. [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 전사들에게 조용히 대기하라 명령하였고 [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 활을 쏘기 가장 좋은 위치로 조용히 이동하였다. 이 활은 동물을 죽이기 위해 화살이 매겨져 있었다. [Root.Monarch.GetName]의 호흡이 조용해졌다. [Root.Monarch.GetHerHis] 손가락이 화살을 놓기 위해 움직이기 시작했다.
native_americans.29.d2코1=[Root.Monarch.GetSheHe]는 언제나처럼 [Root.Monarch.GetHerHis] 부족의 식량을 공급하기 위해 낚시를 하고 있는 중에 [Root.Monarch.GetHerHim] 부족의 여성이 [Root.Monarch.GetHerHim]에게 다가왔다. [Root.Monarch.GetName]는 [Root.Monarch.GetHerHis] 고개를 그녀에게 돌렸고, [Root.Monarch.GetHerHis] 눈과 마주쳤을 때, [Root.Monarch.GetName]는 그녀가 흔치 않는 것을 본 것을 알았다. 그녀는 경건한 눈빛을 보이며 그녀가 본 거대한 연어에 대해 말하는데 마치 우리가 예배하는 강의 정령의 진정한 화신과 같다고 하였다. [Root.Monarch.GetName]는 그녀가 연어를 본 곳으로 그녀를 따라갔고 잠시 후 [Root.Monarch.GetName]는 마침내 그 연어를 보았다. [Root.Monarch.GetName]은 연어를 잡기 위해 [Root.Monarch.GetHerHis] 도구를 준비하였다.
native_americans.29.d3코1=[Root.Monarch.GetName]는 물개 사냥 후 [Root.Monarch.GetHerHis] 카누를 몰고 집으로 귀환하는 길에 [Root.Monarch.GetHerHis] 위치에서 멀지 않는 곳에 마치 신에게 축복을 받은 것 같은 거대한 물개가 바다에서 나오는 것을 [Root.Monarch.GetName]가 보았다. [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 작살을 준비하였고 조용히 접근하였다. [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 카누의 노를 두고, 일어선 다음 작살을 장전하였다. 물개가 모습을 드러냈고 [Root.Monarch.GetName]가 작살을 던진 순간 그들의 눈이 마추쳤다.
native_americans.29.d4코1=사냥꾼 일행이 집으로 귀환 중에 [Root.Monarch.GetSheHe]가 본 것 중 가장 거대한 영양이 있는 가지뿔영양 무리가 [Root.Monarch.GetName]를 지나갔다. 마치 신이 있다면, [Root.Monarch.GetSheHe]는 그 영양 주위로 밝은 오라를 느낄 수 있을 정도였고 [Root.Monarch.GetSheHe]는 곧바로 영양을 사냥해야겠다고 결정했다. [Root.Monarch.GetSheHe]는 일행을 뒤로 남긴채 조용히 영양을 따라갔다. [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 무기를 준비하였고 이 기회를 놓치지 않기를 기대하였다.
native_americans.29.d5코1=[Root.Monarch.GetName](이)가 들소 떼에 가까워질 수록 땅이 요동칩니다. 이 동물들은 뿔로 쉽게 사람을 죽일 수 있지만, 우리 민족에겐 생명줄 같은 존재이기도 합니다. [Root.Monarch.GetName](은)는 불현듯 무리 가운데서 거대한 숫소를 볼 수 있었고, [Root.Monarch.GetSheHe](은)는 그 숫소가 [Root.Monarch.GetHerHis] 사냥감이라는 것을 깨달았습니다. [Root.Monarch.GetSheHe]는 [Root.Monarch.GetHerHis] 조상에게 이 불공평한 싸움을 위한 기도를 빠르게 드리면서 [Root.Monarch.GetHerselfHimself] 싸울 준비를 마쳤습니다. 기회는 [Root.Monarch.GetHerHim]과 [Root.Monarch.GetSheHe]의 시도 바로 앞에 나타났습니다.
native_americans.29.a코1=정령에게 [Root.Monarch.GetName]가 상을 받을 자격이 있는지 결정하게 하자.
unsuccessful_hunt코1=[Root.Monarch.GetName]의 화살은 빗나갈 것이다.
successful_hunt코1=[Root.Monarch.GetName]는 동물을 죽일 것이다.
native_americans.30.t코0=치욕의 기둥
native_americans.30.d코1=메신저가 [Root.Monarch.GetName]에게 와서 [Root.Monarch.GetHerHim]에게 [Root.Monarch.GetHerHis] 빚에 대해 모두가 알게 하기 위해 치욕의 기둥을 세운다고 말하였다. 이는 매우 부끄러운 상황이며 [Root.Monarch.GetName]의 지위를 약화시킬 것입니다. 우리는 어떻게 해야 할까요?
native_americans.30.a코1=좋아, [Root.Monarch.GetName]는 빚을 지불하고 이 험담을 잠식시킬 것이다.
native_americans.30.b코1=우리는 값을 지불하지 않을 것이다.
pay_debt_shame_pole_title코0=빚진자의 치욕의 기둥(Shame Pole)
pay_debt_shame_pole_desc코0=쉐임 폴이라고 부르는 치욕의 기둥이 우리를 조리돌림하기 위해 세워졌습니다. 우리가 빚을 갚게 된다면, 기둥은 치워지고 우리도 체면을 더 잃지 않을 것입니다.
shame_pole코0=치욕의 기둥(Shame Pole)
desc_shame_pole코0=치욕의 기둥(Shame Pole)이 우리의 체면을 떨구고 있습니다.
native_americans.31.t코1=동맹을 위한 명예 토템
native_americans.31.d코1=우리의 동맹은 그들의 가치를 우리에게 보여줬으며, 우리 국민들은 그들에 대한 우리의 감사를 표현하기 위해 명예 토템을 세워줄 것을 요청하였습니다. 그들을 위한 토템을 세워줘야 할까요?
native_americans.31.a코0=그들은 그 토템을 받을 자격이 있다.
native_americans.31.b코0=지금은 아니다.
erect_honour_pole_ally_title코1=동맹을 위한 명예 토템
erect_honour_pole_ally_desc코1=우리는 동맹을 위한 명예 토템을 세웠습니다. 이는 우리의 관계를 더욱 향상시킬 것입니다.
erect_honour_pole_title코1=우리 부족을 위한 명예 토템
erect_honour_pole_desc코1=우리는 중요한 사건 혹은 명예로운 조상 혹은 자격이 있는 사람을 위한 명예로운 기둥을 세워 사람들에게 상기시키고 싶습니다.
native_americans.32.t코1=명예의 기둥
native_americans.32.d코1=마지막 날 당신은 마을에 명예의 기둥을 세울지에 대해 고민하고 있었습니다. 마지막으로 기둥이 세워진 이후 오랜 시간이 지났기에 당신의 국민을 포함하여 다른 이에게 당신의 부족의 평판을 올릴 좋은 기회입니다. 이제 당신은 이 기둥을 당신혹은 타인의 명예를 위함인지 혹은 선조를 기쁘게 할지를 결정해야 합니다.
native_americans.32.a코0=좋은 생각이다.
native_americans.32.b코0=지금은 때가 아니다.
honour_pole코1=명예의 기둥
desc_honour_pole코1=조상, 부족간의 사건 혹은 영원한 우정을 기억하기 위해 우리의 땅에 명예의 기둥이 세워졌습니다.
native_americans.33.t코0=행방불명된 동물들
native_americans.33.d1코1=누군가 개 관리에 소홀하였고, 우리 캠프에서 개들이 사라져 버렸습니다. 우리들의 티피와 소유물들을 개를 빼고는 이동할 수는 없기 때문에, 말들을 찾기까지 우린 발이 묶였습니다.
native_americans.33.d2코1=누군가 말 관리에 소홀하였고, 우리 캠프에서 말들의 일부가 사라져 버렸습니다. 우리들의 티피와 소유물들을 말을 빼고 이동할 수는 없기 때문에, 말들을 찾기까지 우린 발이 묶였습니다.
native_americans.33.a코0=가능한 모든 인원을 보내 찾도록 하라
native_americans.33.b코0=너무 많은 비용이 드는군, 알아서 돌아올 것이다.
travois_no_dogs코1=운송(Travois)에 필요한 개가 없다
desc_travois_no_dogs코0=개들이 돌아오기 까진 우리의 Travois 는 쓸모없다.
travois_no_horses코1=운송(Travois)에 필요한 말이 없다
desc_travois_no_horses코0=말들이 돌아오기 까진 우리의 Travois 는 쓸모없다.
native_americans.34.t코0=독수리의 비행
native_americans.34.d코1=독수리 한마리가 우리 캠프위를 날아갑니다. 아무도 주목하지 않았으나, 제사장이 긴장하기 시작합니다. 사람들이 그를 둘러쌉니다. 심지어 당신도 그 옆으로 홀린듯 딸려갑니다. 제사장의 말은 좋지 않습니다. 아까의 독수리의 비행은 너무 예사롭지 않고, 제사장은 이를 나쁜 징조라고 생각합니다.
native_americans.34.a코0=영들을 달랠만한 희생이 필요하다
native_americans.34.b코0=그냥 독수리잖아
native_americans.35.t코1=바이슨들이 번창하다
native_americans.35.d코1=지난 몇 달동안의 우기 최고의 결과를 낳았습니다. 풀들은 역대로 푸르고 강하게 자랐고, 먹을 것은 아주 풍부해서 바이슨들이 엄청난 수로 번식했습니다. 영들이 우리를 진정으로 축복하는군요
native_americans.35.a코0=올해는 좋은 사냥의 해가 되겠군
native_americans.36.t코0=가죽 위의 그림
native_americans.36.d코1=마지막 사냥은 아주 좋았고, 우린 많은 수의 바이슨 가죽을 챙길 수 있었습니다. 다른 부족에게 가죽 위에 그림그리기는 보통이기는 하나, 그 들은 바이슨에게 직접 접근할 수 없기 때문에, 획득한 많은 가죽들은 좋은 가격으로 교환할 수도 있을 것입니다. 우리의 상인이 방금 돌아왔습니다. 그들은 부를 갖고 옵니다.
native_americans.36.a코0=우리 부족을 위한 좋은 자금이야
native_americans.37.t코0=평원의 평화
native_americans.37.d코0=일부 부족 지도자들이 함께 모여 평원의 평화를 돌려놓자는 우리 권유를 받아드렸습니다. 많은 이들이 효과가 없으리라 생각했고, 그 외의 사람들은 노력을 할만한 가치가 있다고 생각합니다.
native_americans.37.a코0=어떤 선물들은 일을 쉽게 만들지
native_americans.37.b코1=예전의 행동을 그렇게 쉽게 잊을 순 없지
native_americans.38.t코1=부족한 도토리
native_americans.38.d코0=도토리는 우리의 식단에 기본입니다. 우리는 그것들을 우리의 몇몇 요리에 사용하는데 올해, 왠지 모르지만, 도토리가 부족합니다.
native_americans.38.a코0=우리는 다른 것들에 의지해야 한다.
native_americans.39.t코1=생명은 돌아와야 한다
native_americans.39.d코1=우리의 토지를 황폐하게 만든 마지막 화재 후, 사람들은 이 추악한 흉터를 우리를 관대하게 양육한 토지에서 제거할 방법에 대해 생각하기 시작했습니다. 우리의 지도자 [Root.Monarch.GetName]의 기발함은 우리 민족 특히 여성이 자주 사용하였던 씨앗을 특별한 모양의 바구니에 담았던 민족의 전통을 기억했습니다. 사람들이 걷으면, 담았던 씨앗이 땅에 떨어졌고 황폐된 땅을 다시 푸르게 할 것 입니다.
native_americans.39.a코1=우리는 이 고귀한 노력을 위해 다량의 바구니를 만들 자원을 봉납할 것입니다.
native_americans.39.b코0=지금은 때가 아니다.
native_americans.40.t코1=지역 사회를 위한 한증막
native_americans.40.d코1=화재 이후 우리 지역 사회는 오랫동안 한증막이 부족했습니다. 우리가 직면해야 할 더 중요한 문제들이 많아서, 지역사회는 딱히 한증막이 없어도 괜찮았습니다. 이제 부족은 안정되었고 사람들은 제대로된 한증막을 통해 우리의 남자와 아이들이 그들의 몸과 영혼을 정화하는 것을 그리워 하기 시작했습니다. 이제는 몇몇 인력을 투자하여 한증막을 지어 지역 사회가 이득을 볼 수 있게 하는 것이 좋은 생각일 수도 있습니다.
native_americans.40.a코1=우리는 하나를 세울 것이다.
native_americans.40.b코1=우리는 자원을 다른 문제에 사용할 것이다.
native_americans.41.t코0=바구니가 팔렸다
native_americans.41.d코1=다른 부족에서 온 상인은 우리 마을 여성이 짜고 잇던 바구니에 관심을 보였고 구매 의사를 보였습니다. 이는 새로운 무역 기회가 될 것입니다.
native_americans.41.a코0=나는 우리 민족에게 혜택을 줄 새로운 방법이 보였다.
be_the_leader_title코0=지도자가 되라
be_the_leader_desc코0=우리가 여기 지도를 할 것을 모든이에게 보여줘야 한다.
honour_the_ancestors_title코1=조상을 기리다
honour_the_ancestors_desc코0=우리 조상과 그들의 행동을 기리기 위해 토템을 세움으로써, 우리는 존경심을 보여주고 있습니다.
smells_like_teen_spirit_title코0=젊은 영혼과 같은 냄새
smells_like_teen_spirit_desc코0=다른 국가에게 국력을 보여주는 것도 중요하지만, 이는 국민이 이 프로젝트의 일원이 되지 않고는 이룰 수 없습니다. 우리는 그들이 세계를 집어 삼킬 정도의 에너지 가득 찬 젊을 때처럼 생각하기를 원합니다.
celebrate_a_potlatch_title코0=포틀래치를 기념하다
celebrate_a_potlatch_desc코0=동맹국이 우리를 방문하여 그들에게 귀중한 선물을 주도록 합시다. 이들은 우리의 부에 대해 알 것입니다.
show_military_strength_title코0=군사력을 보여주다
show_military_strength_desc코0=다른 부족은 우리의 동맹일지도 모르지만, 그들에게 우리의 힘을 보여주어 누가 규칙을 만드는지 알려줘야 합니다.
bond_to_the_land_title코0=토지에 대한 유대
bond_to_the_land_desc코0=사냥터는 풍푸하지만, 우리의 상품을 둘 장소가 필요합니다.
why_cant_we_be_friends_title코0=왜 우리는 친구가 될 수 없습니까?
why_cant_we_be_friends_desc코0=평원 토착민들은 언제나 평화롭습니다. 이제 모두에게 우리가 이런 식으로 유지하기를 원한 것을 보여줘야 한다.
teach_plains_sign_language_title코0=평원의 수화 가르치기
teach_plains_sign_language_desc코1=우리 조상들은 무역에 쓰이는 공용어 외에 수화도 만들었고, 우리 아이들에게 이를 가르쳐야합니다.
plains_power_title코0=평원의 힘
plains_power_desc코0=우리가 얼마나 발전했는지에 대해 자랑하는 일은, 모두가 우리를 존경하게 만들것입니다.
horse_culture_title코0=말 문화
horse_culture_desc코0=말들은 우리 방식의 삶에 혁명을 안겨 주었습니다. 우리는 새로이 변화한 우리 모습 포용하고 이에 적응해야 할 필요가 있습니다.
such_a_lovely_place_title코0=정말 사랑스러운 곳
such_a_lovely_place_desc코0=우리 사람들의 자원이 풍부한 부유한 우리 땅이기에, 그냥 자원들을 모으고, 사람들의 수가 늘어나는 것을 지켜보기만 하면 됩니다.
lovely_place코0=정말 사랑스러운 곳
desc_lovely_place코0=캘리포니아에 오신 것을 환영합니다\n정말 사랑스러운 곳이야\n정말 사랑스런 얼굴이네요\n캘리포니아엔 자리도 많답니다\n일년중 언제라도\n여기에서 찾을수 있겠지요.
in_harmony_with_nature_title코0=자연과의 조화
in_harmony_with_nature_desc코1=우리 사람들은 자연에서 식량을 모으기만 하면 필요한 모든 것을 얻을 수 있습니다. 자연이 더 많이 생산하도록 돕기 위해서는 약간의 숲 원예가 필요합니다.
basketweaving_trade_title코1=바구니 직조 무역
basketweaving_trade_desc코1=우리 민족 특히 여성들은 지역 사회에 사용하기 위한 바구니를 짜는 것이 전통이었습니다. 우리는 이 전통을 우리 경제의 중심 산업으로 만들어 다른 부족과의 거래를 통해 우리가 얻지 못하는 물건을 얻어야 합니다.
commission_some_rock_art코0=바위 예술품 의뢰
commission_some_rock_art_desc코0=우리의 조상을 기리기 위해 우리는 바위에 그림을 그리는 것을 의뢰할 것이다.
rock_art_dec코0=바위 예술
desc_rock_art_dec코1=우리의 조상을 기리기 위해 우리의 땅에 새로운 바위 그림을 만들도록 의뢰 했습니다.
paint_the_land_title코0=토지에 그리다
paint_the_land_desc코0=우리 민족에게 바위 예술은 소중한 예술이다. 우리는 토지와 결합되어 있고 이 결합을 강화하기 위해선 토지에 다시 한번 그림을 그려야 합니다.
settle_our_tribe_title코0=우리의 부족 정착을 정착시키다
settle_our_tribe_desc코0=여러 겨울 동안 우리 민족은 떠돌아 다녔다. 하지만 이제 우리 민족의 영광을 위해 정착해야 합니다.
colonize_the_continent코0=대륙 개척
colonize_the_continent_dec코1=우리의 해안으로 접근할 새로운 외지인의 물결을 견뎌내고 싶다면 주변의 무수한 주인 없는 땅에 우리 국민의 영유권을 주장해야 합니다.
ne_native_ideas코0=북동부 삼림지대 이념
ne_native_ideas_start코0=북동부 전통
ne_native_ideas_bonus코0=북동부 야망
ne_turtle_clan코0=거북 씨족
ne_turtle_clan_desc코0=거북의 껍데기는 돌처럼 단단합니다. 거북은 동물 중에서 가장 강인하고 장수하는 동물로, 우리는 적들에게서 어떻게 스스로를 지킬지를 그들로부터 배울 수 있을 것입니다.
ne_deer_clan코0=사슴 씨족
ne_deer_clan_desc코0=시인과 이야기꾼은 칭찬과 존경을 받아야 마땅하다. 사슴은 사냥감 중에 가장 중요한 동물입니다. 그들의 위대한 존엄성과 영향력은 우리 예술가의 영감의 근원이 됩니다. 
ne_bear_clan코0=곰 씨족
ne_bear_clan_desc코1=곰은 수호자입니다. 그들은 보호하고 치유하는 법을 알고 있습니다. 이에 기인해 많은 우리의 의식 담당자들이 '곰'을 그들의 이름 중 일부로 채택했으며, 그 영은 그들의 능력을 증가시킬 것입니다.
ne_wolf_clan코0=늑대 씨족
ne_wolf_clan_desc코1=늑대들은 현명하고 지적이며 인내심이 강한 지도자들 입니다. 그러나 충실하고 맹렬한 개와 같이 가족을 포기하지 않는 충성심이 가장 존경 받는 부분입니다.
ne_marten_clan코0=담비 씨족
ne_marten_clan_desc코0=담비는 사냥꾼, 전사입니다. 그들은 항상 전투를 지배하며, 따라서 그들을 가공할 적으로 만듭니다. 그들의 호전적인 정신은 전쟁 시기에 우리 백성에게 영감을 주었습니다.
ne_eagle_clan코0=독수리 씨족
ne_eagle_clan_desc코0=독수리는 고귀하고 존경 받는 동물입니다. 그들은 가족의 상징이 되었으면 친절과 위험 사이의 균형을 나타냅니다. 타부족의 구성원은 그들의 위풍당당한 태도에 영향을 받을 것 입니다.
ne_crane_clan코0=두루미 씨족
ne_crane_clan_desc코0=두루미는 타고난 지도자입니다. 두루미가 가르침을 사사하고 하면 그들의 큰 소리는 먼거리에서도 무시가 불가능 정도입니다.
se_native_ideas코0=남동부 삼림지대 이념
se_native_ideas_start코0=남동부 삼림지대 전통
se_native_ideas_bonus코0=남동부 삼림지대 야망
se_mississippian_legacy코0=미시시피의 유산
se_mississippian_legacy_desc코0=유산은 우리가 거주한 장소, 우리가 사용한 물건, 우리가 살아왔던 방식와 같은 이야기를 통해 만들어집니다. 고대 미시시피인 문화는 강을 따라 종교와 무역 네트워크와 같은 수단을 통해 다른 부족을 연합했습니다.
se_matrilineal_lineage코0=모계 혈통
se_matrilineal_lineage_desc코0=아이들은 그들의 부모 씨족에서 태어나 그들에게 배우고 양육됩니다. 우리 지역의 대부분 부족들은 모계사회를 따라가기에 씨족 어머니는 우리 정부의 중요한 인물입니다.
se_refined_ceramics코0=세련된 도기
se_refined_ceramics_desc코1=우리가 사는 삶 속에 진흙과 돌은 언제나 우리를 따라다닙니다. 우리의 손을 통해 그들은 형태를 받아 단순한 진흙이나 돌이 아니게 됩니다. 수세기 동안, 우리의 도자기 기술은 발전시켰고 그들에게 생명을 부여해 주었습니다.
se_cultivation_of_the_earth코0=대지의 경작
se_cultivation_of_the_earth_desc코0=대지는 생명의 처음과 끝입니다. 그 것은 우리를 풍족하게 하고, 때론 굶주리게 하며 우리의 몸을 썪은 시체로 만들어 우리를 집어 삼킵니다. 우리는 대지에서 먹으며 대지는 우리를 먹습니다. 이제 우리는 농업 기술의 최적화를 통해 가능할 때 이득을 얻을 수 있게 해야합니다.
se_mound_builders코0=무덤 건설자
se_mound_builders_desc코0=죽인 자를 존중하는 것은 말뿐만 아니라 행동으로 보여줘야 합니다. 우리의 조상들은 고인에 대한 경의를 표하기 위해 무덤을 잘 짓는 것으로 알려져 있습니다.
se_exogamous_marriages코0=이족 결혼
se_exogamous_marriages_desc코0=부족 외 사람과의 결혼은 동맹을 견고히 하며 근친에 관련된 여러 질병에 걸리는 것을 예방하게 해줍니다.
se_stomp_dancers코0=발구르기 댄서
se_stomp_dancers_desc코0=뛰어난 발구르기 춤을 추려면, 참가자들은 엄격한 규칙을 지킴에 따라야 하며 이를 통해 축제가 제대로 개최되게 해야 합니다. 이러한 규칙은 몸과 마음 양쪽의 제어가 포함되기에 단식을 통해 각성과 중요한 작업에 도움을 주기 위한 약물이 필요합니다.
sw_native_ideas코1=미국 남서부 이념
sw_native_ideas_start코0=남서부 전통
sw_native_ideas_bonus코0=남서부 야망
sw_the_old_tales코0=오래된 설화
sw_the_old_tales_desc코0=과거의 설화와 이야기를 들으면서 우리는 우리의 미래에 대해 배울 수 있습니다. 우리는 그들의 가르침을 무시해서는 안됩니다.
sw_four_clans코0=네 개의 씨족
sw_four_clans_desc코1=우리 지역의 일부 부족의 경우 모든 아이들은 어머니, 아버지, 할머니 그리고 할아버지 이 네개의 부족으로 태어납니다. 그들은 각자 아이에게 지혜와 힘을 키울 것이고 우리의 전사들이 특별한 회복력을 가지게 할 것입니다.
sw_raiding_nomads코0=약탈 유목민
sw_raiding_nomads_desc코0=사막에 사는 일부 부족은 사납고 경외할만 합니다. 그들이 도착했다는 언급을 들으면 적들도 두려움에 숨을 것입니다.
sw_prosperous_sedentarism코0=번영하는 간단주의
sw_prosperous_sedentarism_desc코0=일부 부족은 스스로 개발에 투자 대신 농촌에 거주하기로 선택하였다.
sw_the_grand_canyon코0=그랜드 캐니언
sw_the_grand_canyon_desc코0=대지의 육체에 날카로운 상처가 있다. 이 것은 그랜드 캐니언 입니다. 단단한 피부에 갈라진 틈. 여기는 위험한 장소이지만, 이 지역을 잘 파악하는 것은 적에 대한 추가적인 이점을 줄 것 입니다.
sw_into_the_desert코0=사막으로
sw_into_the_desert_desc코0=사막은 멈출 수 없습니다. 그 것은 극복할 수 없고, 싸울 수 없습니다. 사막은 오로지 받아들이고 이해해야 합니다. 감사하게도 우리는 이 곳에서의 삶을 배웠지만 우리의 적은 같은 지식이 공유되지 않았습니다.
sw_far_west코0=극서
sw_far_west_desc코0=더 이상 진행이 불가능 하다는 것을 이해한 순간 잠시 멈춤이 있었습니다. 이 국경을 넘어서는 물, 평온과 같은 것은 없습니다. 하지만 비논리적인 자극은 우리를 거기까지 도달하게 만들었습니다.
