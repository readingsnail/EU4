polynesian_tribe_desc코1=폴리네시아 부족은 지도자가 부족이나 부족 집단에 대한 권위를 가지고 있지만 통일된 국가로서의 역할을 하지 않는 정부 형태입니다.
polynesian_kingdom코0=폴리네시아 왕국
polynesian_kingdom_desc코1=폴리네시아 왕국은 폴리네시아 군주가 자신의 통치 하에 자주 경쟁하는 부족들을 통합시켜 통일된 국가로서 행동할 수 있는 정부의 형태입니다.
