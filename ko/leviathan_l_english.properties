CEDE_PROVINCE_DEMAND_TRIBAL코0= 부족 영토
cb_native_american_tribal_feud코0=부족 국경 분쟁
PUSH_BACK_COLONIZERS코0=침략자에 대항한 $ORDER$$FIRST$-$SECOND$ 전쟁
NATIVE_TRIBE_MIGRATORY_DEVELOPMENT_HEADER_TOOLTIP코1=§Y부족 개발도§!\n 매월 우리는 목초지로 부터 §Y100%§! 황폐도 이하의 부족 개발도를 얻습니다. 우리는 목초지가 다른 나라에 속할 경우 추가 부족 개발도를 얻습니다.\n 만일 현재 부족 개발도가 1보다 높을 경우 얻는 부족 개발도의 양은 현재 부족 개발도를 나눈 값이 됩니다.
NATIVE_TRIBE_SETTLED_DEVELOPMENT_HEADER_TOOLTIP코1=§Y부족 개발도§!\n 매월 우리 부족의 수도는 마을의 다양한 건물 덕분에 개발도가 상승합니다.\n 만일 현재 개발도 1보다 높을 경우 얻는 부족 개발도의 양은 현재 부족 개발도를 나눈 값이 됩니다.
