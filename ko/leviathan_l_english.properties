MIGRATE_NOT_MIGRATORY코0=우리는 이주 부족이 아닙니다
REFORM_PROGRESS_HELP_DESC코0=지역 자치도가 낮을수록 정부 개혁 진행도를 빨리 얻습니다.
NATIVE_REFORM_PROGRESS_HELP_DESC코1=우리는 원주민이기 때문에 건물들에서 정부 개혁 진행도를 얻을 수 있습니다.
EMBRACE_INSTITUTIONS_OF_EFFECT코0=$WHO|Y$ 측이 수용한 모든 시대관을 수용합니다.\n
