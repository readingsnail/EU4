CONFIRM_CANCEL_ADD_TRIBAL_LAND_ABANDON_DESC코0=$PROV|Y$ 지역을 우리 부족 영토로 주장하는 것은 $COST|Y$ £adm£ 을 소모합니다.\n\n§R이 지역은 우리의 옛 영토와 연결되어있지 않기 때문에, 이 지역은 버려질 것입니다!§!
