special_regency_events.1.t코0=[Root.Monarch.GetName]의 질병!
special_regency_events.1.d코0=우리 나라의 운명의 날입니다. [Root.Monarch.GetName]의 병은 더 이상 무시할 수 없는 정도며, [Root.Monarch.GetHerHim]가 의무를 수행하지 못하도록 만들었습니다. [Root.Monarch.GetSheHeCap]는 점점 더 많은 정신적 불안의 징후를 보이고 있으며, 우리 나라에 분명히 불리한 결정들을 내려야 한다고 주장하고 있습니다.\n오늘 아침, 의사 17명으로 구성된 위원회에서 [Root.Monarch.GetHerHim]가 우리 왕국을 관리할 수 없으며 [Root.Monarch.GetHerHis] 상황을 개선할 가능성이 전혀 없다고 선언하는 문서에 서명하기로 합의했습니다. 우리의 후계자인 [Root.Heir.GetName](은)는 그들의 결의안을 전달받은 후, 자신이 왕위에 오르게 하는 이 제안에 불만을 표했으며, 그는 여전히 어머니에게 강한 책임감을 느낀다고 주장했습니다.
special_regency_events.1.a코0=말도 안된다! 이것은 그의 의무다.
special_regency_events.1.b코0=우리는 그의 올바른 판단을 믿어야 한다.
special_regency_events.1.tt코0=§Y[Root.Heir.GetName]§!(이)가 왕위에 오를 것입니다.
chateau_de_chenonceau코0=슈농소 성
desc_chateau_de_chenonceau코0=우리는 마침내 국왕의 의존을 회복했습니다.
special_regency_events.2.t코0=슈농소 성
special_regency_events.2.d코0=사랑의 문제는 정치와 절대 엮여서는 안 되는데, 특히 한 나라의 왕과 왕비에 관해서는 더욱 그렇습니다. 프랑스 궁정에서 카트린의 영향력이 증가하고, 그녀의 남편이 디안 드 푸아티에에게 분명히 더 많은 관심을 표현하자, 무언가 조치를 취해야 한다는 것이 불가피해졌습니다.\n카트린은 새로운 지위를 얻은 후 첫 번째 조치 중 하나로, 디안이 위엄넘치는 슈농소 성과 그녀에게 잘못 선물된 고귀한 보석들을 국왕에게 반납할 것을 요청했습니다.
special_regency_events.2.a코0=우리는 카트린의 명예를 보장해야 한다.
sten_sture_opinion코0=스텐 스투레의 섭정
special_regency_events.3.t코0=스텐 스투레의 섭정
special_regency_events.3.d코0=우리 군대가 덴마크의 지배를 물리치는 것을 돕고 스웨덴 봉기에 엄청난 공헌을 하면서, 스텐 구스타프슨은 우리 나라 군대와 정치에서 대체 불가능한 존재가 되었습니다. 이 엄청난 영향력 때문에, 그의 숙부인 국왕 칼 8세 조차도 그를 부재 기간동안의 섭정으로 임명하기로 결정했습니다. 얼마 지나지 않아 이 중대한 결단에 대해 서로 다른 계층들 사이에서 의견의 불일치가 나타났습니다.
special_regency_events.3.a코0=그보다 더 준비된 사람은 없다.
special_regency_events.3.b코0=너무 극적인 결정이다.
special_regency_events.4.t코0=영예의 순간
special_regency_events.4.d코0=[Root.Monarch.GetName]은 우리 나라의 통치를 떠맡아오고 있으며 그녀의 올바른 판단은 우리가 번영과 평화의 시기를 누리도록 했습니다. 그녀는 [Root.GetName]인들 중에서 가장 잘 준비된 조언가들을 주변에 두었습니다. 이런 상황에서, 많은 사람들이 그녀에게 우리 나라의 공식적인 통치권을 부여하자고 말하고 있습니다.
special_regency_events.4.a코0=그녀를 조언가로 유지한다.
special_regency_events.4.b코0=그녀는 왕위에 오를 것이다.
special_regency_events.4.c코0=우리는 상속법을 따라야 한다.
special_regency_events.5.t코0=후계자 교육
special_regency_events.5.d코0=인생에 있어서 유년기에 중요한 지식들을 배우는 것보다 중요한 것은 별로 없습니다. 같은 이유로, [Root.Monarch.GetName]은 [Root.Heir.GetName]에게 가능한 최고의 교육 교사들을 구해주기 위해 큰 노력을 기울였는데, [Root.Heir.GetSheHe]가 국가를 통치할 시간이 많이 남지 않았기 때문입니다.\n오늘 아침 한 남자가 우리 궁정에 찾아왔는데, 그의 떨리는 손은 그가 들고온 서류들을 모두 들기에도 벅찼습니다. 그는 우리 후계자의 이름에 대해 물어보았으며, 자신이 [Root.Heir.GetHerHis] 새로운 후견인이 되겠다고 제안했습니다.
special_regency_events.5.a코0=그는 매우 환영받을 것이다.
special_regency_events.6.t코0=가장 깊은 물건
special_regency_events.6.d코0=왕이 어떤 물건이 가장 깊은가에 관해 묻자, 규수들은 산이 깊다하고, 혹은 물이 깊다하고, 혹은 범의 목구멍이 깊다 하였습니다. 정순왕후는 홀로 사람의 마음이 가장 깊다고 하였습니다.\n그녀의 지혜는 비교할 수 없으며, 그녀에 대한 농민들의 사랑도 전례가 없습니다. 그녀가 익선관에 더 어울린다는 이야기를 하는 목소리가 많으며, 지금 [Root.Monarch.GetTitle] [Root.Monarch.GetName](은)는 중병에 걸린 상태입니다...
special_regency_events.6.a코0=그녀는 우리의 새 섭정이 될 것이다.
special_regency_events.6.b코0=우리는 그녀에게 [Root.GetName]의 통치권을 줄 것이다.
special_regency_events.6.c코0=후계자는 스스로 이를 해낼 수 있다.
special_regency_events.6.tt코0=§Y[Root.Consort.GetName]§!(은)는 여왕 섭정이 될 것입니다.
special_regency_events.7.t코0=신유박해
special_regency_events.7.d코0=사람들은 하나 이상의 천성을 가지고 있으며, 그 모든 천성이 선하지는 않습니다. [Root.Monarch.GetHerHis] 현명한 천성이 아니라도, [Root.Monarch.GetName](은)는 [Root.GetName]에 있는 기독교인들에 대한 종교적 박해를 시작하기로 결정했습니다. 그러나, [Root.Monarch.GetHerHis] 이성은 더 세속적인 문제를 따른 것으로 보였는데, [Root.Monarch.GetHerHis] 정치적 적들 중 대부분이 이 외국의 종교를 매우 선호하는 경향이 있는 것으로 보이기 때문입니다. 우리 나라를 안전히 지키기 위해 [Root.Monarch.GetSheHeCap]는 저들 모두를 처형할 것을 제안했습니다.
special_regency_events.7.a코0=우리는 그들을 처분해야 한다.
special_regency_events.7.b코0=이것은 우리에게 도움이 되지 않을 것이다.
crown_colony_government코0=직할 식민지
crown_colony_government_desc코0=직할 식민지는 수도에서 직접 통치를 받는 식민지 유형입니다.
private_enterprise_colony_government코0=민간 기업 식민지
private_enterprise_colony_government_desc코0=민간 기업으로 운영되는 식민지는 식민지에서 자원을 추출하고 본국으로 가져오는 데 중점을 둡니다.
self_governing_colony_government코0=자치 식민지
self_governing_colony_government_desc코0=자치권이 있는 식민지 유형인, 자치 식민지는 국가 안의 국가 역할을 합니다.
custom_idea_possible_disengagement_chance코0=해군 퇴각 확률
custom_idea_possible_disengagement_chance_desc코0=우리 함선을 훈련함으로써, 우리는 다른 해군과 교전할 때 바다에서 불필요한 손실을 피할 수 있을 것입니다.
custom_idea_yearly_karma_decay코0=카르마 감소 회피
custom_idea_yearly_karma_decay_desc코0=우리는 우리가 일을 하는 방식에 몇 가지 간단한 변화로 카르마를 잃는 것을 피할수 있습니다.
flavor_byz.2.t코0=콘스탄티노플 총대주교가 교회 대분열을 치유하다
flavor_byz.2.d코0=콘스탄티노플 총대주교는 로마와 모스크바에 있는 총대주교의 새로운 꼭두각시 성직자들의 지원을 받아 교회 대분열이 종식되었다고 선언했습니다. 우리가 옛 방식을 고수할 수도 있겠지만, 총대주교의 승리는 하느님이 진정으로 그의 편에 서있을 수도 있다는 것을 암시합니다.
flavor_byz.2.a코0=우리는 정교회 신앙을 받아들일 것이다.
flavor_byz.2.b코0=그들이 정수를 따르는 한, 우리는 가톨릭으로 남을 것이다!
millenarian_theocracy_reform코0=천년왕국 신정
millenarian_theocracy_reform_desc코0=세상은 불로만 정화되는 죄의 왕국이 되었습니다. 우리는 이를 종식시키기 위해 우리 통치자의 판단을 믿어야 합니다. 공화국은 그에게 절대 권력을 부여할 것입니다.
native_federations_event.3.t코0=모두를 위한 하나, 하나를 위한 모두
native_federations_event.3.d코0=늑대가 혼자 방황하는 각기 따로 움직이는 존재가 아니라 하나의 무리이기에 최고의 사냥꾼이라는 것을 모두가 알고 있습니다. 우리는 자연으로 부터 또 늑대로부터 지혜를 배워야 합니다. [Root.Monarch.GetName]이 [Root.Monarch.GetHerHis] 부족과 연맹의 수장인 동안, 사람들은 항상 [Root.Monarch.GetSheHe]가 우리 모두를 단합시키는데 성공했다는 것을 기억할 것입니다.
native_federations_event.3.a코0=함께라면 우린 강해질 것이다.
leadership_pays_off_mod코0=지도력이 결실을 보다
desc_leadership_pays_off_mod코0=연방의 지도자로서의 우리의 역할은 우리에게 새로운 기회를 제공합니다.
guru_teaching코0=구루의 가르침
colonial_nation.182.t코0=부패한 총독
colonial_nation.182.a코0=터무니없군.
colonial_corrupted_governor코0=부패한 총독
desc_colonial_corrupted_governor코0=우리 총독은 부패한 자였습니다.
colonial_nation.183.t코0=새로운 총독
colonial_nation.183.a코0=우리는 그들의 조언을 받아야 한다.
colonial_nation.183.b코0=[Root.Monarch.GetName](이)가 계속 통치할 수 있다.
colonial_nation.184.t코0=빚을 진 [Root.GetName]!
colonial_nation.184.a코0=우리는 이것을 처리하기 위해 우리의 영향력을 사용할 것이다.
colonial_nation.184.b코0=그들은 불평할 것이 없다.
colonial_nation.185.t코0=철회된 칙허장
colonial_nation.185.d코0=최근 우리나라가 겪고 있는 분투와 국민들의 증가하는 불만에 의해, 우리 식민지는 파산할 수밖에 없습니다. 회사의 통치 특권을 유지하기 위한[Root.Monarch.GetName]의 애원에도 불구하고, 정부는 우리에게 부여했던 칙허장을 취소하고, 그들 스스로가 언급했듯이, 이미 너무 늦기 전에 식민지 행정부를 장악하기로 결정했습니다.
colonial_nation.185.a코0=이것은 전례가 없는 일이다!
colonial_nation.187.t코1=[Root.GetBurghersOrFallbackName] 계층 달래기
colonial_nation.187.d코1=[Root.GetBurghersOrFallbackName] 계층 사이에서 우리의 식민지 통치에 관한 우려가 제기되었습니다. 이 우려의 징후는 지난 몇 달 동안 조용히 퍼져 나갔지만, 이제 그들의 불만이 분명하고 걱정스럽다는 것이 여러 면에서 확실해졌습니다.\n그들 중 한 명이 오늘 아침 [Root.Monarch.GetName](이)가 자문회에 참여하기도 전에 [Root.Monarch.GetSheHe]를 알현해, 그들의 의도를 상당히 분명하게 밝혔습니다. "우리는 구세계에서의 악덕 행위와 탐욕으로 [Root.GetName]의 운명에 영향을 미치는 귀족 과두정치에 대해 깊이 우려하고 있습니다."
colonial_nation.187.a코1=우리는 [Root.GetBurghersOrFallbackName] 계층과 함께해야 한다.
colonial_nation.187.b코1=우리는 [Root.GetNobilityOrFallbackName] 계층을 보호해야 한다.
colonial_nation.188.t코0=귀족 계층의 우려
colonial_nation.188.d코1=[Root.GetNobilityOrFallbackName] 계층은 정치적 입장을 숨기는 데 능숙하지 않으며, 이를 그렇게 신경을 쓰는 것 같지도 않습니다. 그들은 연회와 만찬에서, [Root.GetBurghersOrFallbackName] 계층이 잘못 쥐고 있는 권력을 보면 식민지의 운명은 망할 수 밖에 없다고 큰 소리로 말하는 것을 들었습니다.\n그러나 오늘 그들의 의도는 전례 없는 접근으로 이어졌습니다. 그들 중 한 명이 새벽의 첫 한 시간이 지나기도 전에 [Root.Monarch.GetName]의 침실에 찾아와 말했습니다. "[Root.Monarch.GetTitle]이시여, 휴식을 방해해서 죄송합니다만, 즉시 조치를 취하셔야만 하겠습니다. [Root.GetBurghersOrFallbackName] 계층의 오만함과 부덕함이 이 식민지를 바보들의 천국으로 만들고 있습니다. 오늘 자문회가 열리기 전에 이를 멈춰야만 합니다."
colonial_nation.188.a코1=우리는 [Root.GetNobilityOrFallbackName] 계층과 함께해야 한다.
colonial_nation.188.b코1=우리는 [Root.GetBurghersOrFallbackName] 계층을 보호해야 한다.
colonial_nation.189.t코0=불공정한 경쟁
colonial_nation.191.a코0=우리는 일부 순례자들을 유치하는 데 사용할 수 있을 것이다...
colonial_nation.191.b코0=우리는 즉시 교황령에 알려야 한다!
colonial_nation.191.c코0=말도 안된다.
volcano_events.1.t코0=분화의 시작
volcano_events.1.d코0=밤을 집어삼킨 어둠 속에서, 불빛 줄기가 열린 상처처럼 산 아래로 엄청나게 쏟아져 내렸고, 이 줄기의 너무 강렬한 붉은색은 무시할 수 없었습니다. 불타는 듯한 화산재의 산사태가 참을성 없는 사냥꾼처럼 불빛 줄기들을 따라왔고, 그것의 열린 입은 굶주림이 완전히 충족되기 전까지 앞에 있는 모든 것을 집어삼기키려고 열망하고 있습니다.
volcano_events.1.d2코0=밤을 집어삼킨 어둠 속에서, 우레와 같은 소리가 산의 첫 심장 박동 소리처럼 들렸습니다. 살아있는 존재들이 두려워하는 가운데 산의 휴면 중인 분화구에서 화산재와 연기의 기둥이 솟아올랐습니다 - 바로 자연 탄생의 황홀한 폭발입니다. 눈부시게 밝은 돌들이 인근 마을로 날아갔으며, 뒤이어 이글거리는 화산재 산사태가 참을성 없는 사냥꾼처럼 따라왔습니다.
volcano_events.1.a코0=자연이 우리를 벌했다.
monument_events.1.t코0=[monument_province.GetName]의 기념물!
monument_events.1.d코0=[monument_province.GetName]의 기념물 건설이 마침내 완료되었습니다! 우리 나라 전역의 사람들이 당당한 모습의 기념물 앞에 호기심 많은 아이들처럼 모였습니다. 이 경이로움에 놀란 그들은 [Root.GetName]에 소속되어 있다는 것에 크게 기뻐하고 있습니다.
monument_events.1.a코0=오늘은 기념하는 날이다.
monument_events.2.t코0=도움의 손길
monument_events.2.d코0=우리 나라에서 가장 유명하고 존경받는 석공들 중 한 명이 [Root.Monarch.GetName]에게 알현해왔습니다. 그는 [monument_province_2.GetName]의 기념물의 상태에 대해 우려를 전했습니다. "[Root.Monarch.GetTitle]이시여, 그렇게 아름다운 건축물이 시간과 비바람의 위험에 홀로 남겨진 채로 무관심하게 버려졌다는 사실이 제 가슴을 아프게 합니다. 제가 애원하오니, 제발 제가 이 기념물을 복구할 수 있도록 허락해주십시오."
monument_events.2.a코0=우리는 즉시 그를 고용해야 한다.
monument_events.2.b코0=우리는 여기에 투자할 시간이 없다.
monumental_pride코0=기념물에 대한 자부심
desc_monumental_pride코0=우리 나라의 가장 위대한 기념물 중 하나를 건설한 것은 우리 나라에 속해있다는 자부심으로 우리 국민들의 가슴을 채우고 있습니다!
monument_boost코0=기념물 개선
desc_monument_boost코0=우리 나라 최고의 석공들을 고용한 것은 우리의 기념물 건설을 최적화하는 데 도움이 되었습니다.
monument_church_of_the_people코0=민중의 교회
desc_monument_church_of_the_people코0=가장 낮은 소작농들부터 가장 높은 성직자들까지, 우리 [Root.Government.GetName]의 모든 사람들이 성 베드로 대성당을 환영하고 있습니다.
monument_events.3.t코0=하느님의 처소
monument_events.3.d코0=하느님은 사방에 눈을 가지고 계시지만, 그분의 압도적인 존재는 쉴 곳을 찾아야만 합니다. 성 베드로 대성당이 완공되었고 이 하느님의 처소는 이렇게 적합한 휴식처를 제공할 준비가 되었습니다. 그곳에서, [Root.Monarch.GetTitle] [Root.Monarch.GetName]는 하느님의 눈의 일부로써 모든 것을 감독할 수 있습니다. 교회에서 가장 존경받는 신도들은 이 기쁨의 순간을 축하하고 기리기 위해서 큰 미사를 올릴 것을 건의했습니다.
monument_events.3.a코0=우리는 동맹국들을 초청해야 한다!
monument_events.3.b코0=이곳은 민중의 교회다.
monument_events.4.t코0=[pagoda_province.GetName]에 순례자들이 도착하다
monument_events.4.d코0=쉐다곤 파고다의 금빛은 주목을 끌어왔습니다. 완공된 이후로, 불교 세계 전역의 순례자들이 기도를 드리기 위해 [pagoda_province.GetName]에 찾아오기 시작했습니다.
monument_events.4.a코0=순례자들에게서 세금을 거둘 완벽한 시기다.
monument_events.4.b코0=우리는 꽃과 양초를 공물로 기부해야 한다.
monument_events.5.t코0=보로부두르 사원 완공
monument_events.5.d코0=그 개념이 무한한 것들이 많이 있습니다. 신앙 역시 그 중 하나입니다. 우리의 자랑스러운 과거와 밝은 미래를 상징하는 보로부두르 사원이 복구되면서, 우리 나라의 힘을 확실히 보여주게 되었습니다.
monument_events.5.a코0=이것은 [MAJ.GetName]에 대한 우리의 우위를 보여줄 것이다.
monument_events.5.b코0=이것은 [SUN.GetName]에 대한 우리의 우위를 보여줄 것이다.
monument_events.5.c코0=우리 자문회에서 사람을 보내서 처리하도록 해야 한다.
monument_events.5.e코0=이것은 강력한 수도를 만들어 줄 것이다.
