aboriginal_tech코0=어보리진
aboriginal_boomerang코0=부메랑 사냥꾼
aboriginal_boomerangDESCR코0=부메랑은 호주의 사냥꾼과 전사들이 사용하는 전통적인 무기입니다. 창이나 화살만큼 치명적인 것은 아니지만, 부메랑은 믿을 수 있고 재사용 가능한 사냥 도구이자 숙련된 전사의 손 안에서 치명적인 무기입니다. 부메랑의 낮은 사망률은 그것을 전투에서 사상자를 내는 것이 아닌 포로를 만드는 데 이상적인 도구로 만들었습니다.
aboriginal_warrior코0=원주민 창병
aboriginal_warriorDESCR코0=호주 전역에서 창은 치명적이고 다재다능한 무기입니다. 어린 시절부터 소년은 창을 휘두르는 교육을 받았으며 성인이 되었을 때, 그들의 창은 창의 치명적인 것 만큼 큰 동맹이 되었습니다.
aboriginal_ambusher코0=어보리진 매복병
aboriginal_ambusherDESCR코0=우세에 있는 적을 상대하기엔 매복 전술은 중요합니다. 매복 전술을 숙달할 수 있는 전사는 숫자에 겁을 먹어서는 안됩니다. 밤에 공격을 하는 호주 원주민의 매복 전술은 그들의 창이 목표를 만난 순간 그들의 적을 흩트리게 하고 혼란스럽게 하는 등 치명적인 전술임이 증명되었습니다.
aboriginal_infantry코0=의례 전사
aboriginal_infantryDESCR코0=호주에서의 전투는 형식적인 것은 아닙니다. 가끔 전사 무리는 의식 관행을 하고, 이 용감한 종교 전사들은 그들 무기 뒤에 있는 신과 조상의 치명적인 힘을 통해 적을 충격과 공포에 몰아 넣습니다.
aboriginal_reformed_boomerang코0=개량 부메랑 전사
aboriginal_reformed_boomerangDESCR코0=새로운 군사 전술의 진화로 인해 부메랑은 전쟁에서 새로운 목적을 찾았습니다. 전열 창병의 뒤에 부메랑병을 배치함으로 적이 우리를 보기 전에 쓰러트릴 수 있을 것입니다.
aboriginal_outback_warriors코0=오지 전사
aboriginal_outback_warriorsDESCR코0=오지는 모래와 위험한 야생의 고향이지만, 호주 원주민의 전통생활체험은 가장 가혹한 환경에서의 사냥과 전쟁을 훈련하는 것을 필요로 하였습니다.
aboriginal_arquebusier코0=화승총병 매복
aboriginal_arquebusierDESCR코0=개척자와 호주 원주민간의 전쟁은 기울어진 운동장이었다. 개척자들은 고급 총기와 병력으로 호주 원주민과 싸웠습니다. 호주 원주민 전사들이 성취한 승리는 고급 방어 전략을 이용한 방어전에서의 승리 밖에 없습니다.
aboriginal_tasmanian_arquebusier코0=공격적인 화승총병
aboriginal_tasmanian_arquebusierDESCR코0=부메랑과 창 전사들은 종종 중공세전술에 사용하였고 이러한 사냥 배경을 가진 호주 원주민들은 화약을 쓰는 서방의 전사들과 경쟁할 수 있었다. 하지만 화약을 수용함으로써, 호주 원주민 전사들은 외국 군대와 동등한 위치를 가질 수 있게 되었습니다.
aboriginal_riflemen코0=개척자 화승총병
aboriginal_riflemenDESCR코0=개척 전쟁은 호주 원주민과 개척자 간의 지속되는 가혹하고 치명적인 충돌의 연속이었다. 비록 호주 원주민들은 보급과 전략적 우위를 차지한 적과 맞서고 있지만 호주 원주민 전사들의 사냥과 전투 기술은 불공평한 전투에서도 치명적인 힘을 발휘하였습니다.
aboriginal_guerrillas코0=블랙 워 보병
aboriginal_guerrillasDESCR코0=블랙 워는 영국 개척자와 토착 palawa 사이 태즈메이니아 섬에서 발생한 연속된 치명적인 충돌이었다. 우리가 서방과의 치명적인 충돌에서 배운 것은 원주민 전쟁을 영원히 재구성할 것입니다.
aboriginal_horseman코0=호주 원주민 기병
aboriginal_horsemanDESCR코0=호주에 기병이 도착하면서, 호주 원주민 전쟁은 영원히 바뀔 것입니다.
aboriginal_cavalry코0=호주 원주민 기병대
aboriginal_cavalryDESCR코0=해외에서 더 진보된 기병 전쟁 전술을 채택하므로서, 호주 원주민 기병은 전장에서 더 효과적으로 보병을 지원할 수 있게 되었습니다.
aboriginal_hussar코0=호주 원주민 후사르
aboriginal_hussarDESCR코0=치고 빠지는 전술에 특화된 경기병.
aboriginal_swarm_cav코0=호주 원주민 기병무리
aboriginal_swarm_cavDESCR코0=기병무리는 활이나 카빈으로 무장한 산개 기병대이었으며, 돌격 전 교란 사격 전술을 통해 적을 혼란스럽게 하였습니다. 산개로 인해 적에 대한 사격을 더 버틸 수 있게 되었지만, 만일 적이 그들의 교란 전술을 버틴다면 그들은 빠르게 패퇴할 것입니다.
aboriginal_dragoon코0=호주 원주민 용기병
aboriginal_dragoonDESCR코0=전투시에는 하마하고 보병처럼 싸우는 머스킷 기병입니다.
TIW_ideas코0=Tiwi 이념
TIW_ideas_start코0=Tiwi 전통
TIW_ideas_bonus코0=Tiwi 야망
TIW_yiminga코0=이밍가
TIW_yiminga_desc코0=우리의 피부, 즉 “이밍가”는 어머니로부터 그녀의 자식에게 모계로 내려져왔다. 이들은 자녀의 그룹, 생명, 영혼, 호흡 그리고 맥과 같은 우리 자녀의 운명을 결정하는 여성 왕조입니다. 여성은 아이에게 삶과 형태를 가져다주며 남성은 영혼을 찾아 태어나지 않는 아이에게 전해줍니다. 다른 부족들은 여성의 노력을 비하하지만, 우리는 이밍가가 우리의 사회적 지휘와 가족을 정해주기에 이밍가가 그들의 남성과 권력을 공유해야 한다는 것을 알고 있습니다.
TIW_dreaming_totem코0=꿈꾸는 토템
TIW_dreaming_totem_desc코0=티위의 꿈꾸는 토템은 그들의 조상에 의해 정해진 신성한 동물입니다. 토템을 가진 티위는 그들의 영적 동물을 죽이거나 살을 섭취할 경우 영적인 식인이라 생각하여 이를 행하지 않습니다. 이는 티위 개별 정체성에 필수적인 부분이고 춤과 의식 중 정체성의 표시로 사용되었습니다.
TIW_kulama코0=쿨라마
TIW_kulama_desc코0=몽환시에 솔부엉이 남자와 그의 아내 핀토마는 첫 쿨라마 의식을 행했습니다. 이 의식에서는 유독한 쿨라마 참마를 음식으로 준비하고 복잡한 춤과 공연이 포함되었습니다. 지상에 있는 우리 모두는 우리 주변의 신들과 영혼들에게 쿨라마 의식을 행함으로 그들이 우리에게 준 삶을 기념합니다.
TIW_purrukapali코0=푸루카팔리
TIW_purrukapali_desc코0=푸루카팔리의 전설은 태만한 어머니에 의해 갈사한 푸루카팔리 아들의 비극적인 죽음에 대해 애기한다. 푸루카팔리는 그에게 일어난 일에 괴로워하고, 갈사한 아들의 시체를 들고 그의 아들을 살릴 수 있다고 약속한 현명한 자파라에게 찾아갔다. 하지만 푸루카팔리는 괴로움과 조바심에 못이겨 자파라와 대전투를 벌였다. 푸루카팔라는 시체를 바다로 가지고가 모든 생명체게 죽음이 찾아와 그가 격은 고통을 경험할 것이라고 선포하였다. 그가 아들을 데리고간 곳은 큰 소용돌이가 생겨 근처에 있는 모든 것을 익사시켰다. 푸루카팔라의 광기를 멈춘 자파라는 달에서 환생하여 사흘마다 죽음과 환생의 주기에 갇히게 되었다.
TIW_marriage코0=티위 결혼 전통
TIW_marriage_desc코0=결혼은 경제적, 사회적 그리고 정치적 이득을 위해 필수적인 요소이다. 결혼은 우리 생활에 필요한 낚시, 농업 그리고 수렵과 같이 중요한 것이며, 미혼인 티위 여성은 나태하고 호전적입니다. 재혼은 우리 민족에겐 흔한 일이며 가끔 낮은 계급 사냥꾼 같은 낮은 계급의 사람이 더 성공의 남성의 과부와 결혼합니다. 재혼은 신속히 이루어져야 하며 결혼하지 않는 여성은 매일이 수치입니다.
TIW_isolationism코0=티위 고립주의
TIW_isolationism_desc코0=우리 사회는 오랜 가혹한 고립주의의 역사를 가지고 있습니다. 외부인들은 오직 약탈거리를 찾거나 우리의 풍부한 토지에서 이득이 될 것을 찾거나 우리의 문화를 파괴하려고 합니다. 이는 용납되서는 안됩니다. 우리의 언어, 토지 그리고 문화는 보존해야 하며 그것이 외부인과의 관계를 희생해야 한다고 하더라고 반드시 행해야 합니다.
TIW_one_people코0=한 민족
TIW_one_people_desc코0=“티위”는 우리 언어로 “한 민족”을 의미한다. 우리는 하나의 언어, 하나의 종교 그리고 하나의 민족을 가지고 있습니다. 오로지 티위만이 존재하며 우리의 위대한 국가를 이루는 일부가 되는 사람은 티위의 삶의 방식과 티위의 정체성 그리고 그와 관련된 모든 것을 받아드려야 합니다.
generic_aboriginal_ideas코0=호주 원주민 이념
generic_aboriginal_ideas_start코0=호주 원주민 전통
generic_aboriginal_ideas_bonus코0=호주 원주민 야망
aborig_art코0=호주 원주민 예술
aborig_art_desc코0=다른 이들은 그들의 말로써 표현하지만 우리는 우리의 유산과 문화를 우리의 놀라운 시각 예술을 통해 보존합니다. 우리 문화의 보존은 색의 언어, 모양 그리고 영혼 세계에 대한 예술적 해석을 계속 숙달하는 능력에 달려 있습니다.
aborig_walkabout코0=워커바웃
aborig_walkabout_desc코0=호주 원주민의 전통적인 워커바웃은 호주 원주민 보년이 가혹한 호주 야생을 지나 울루루와 같은 성지로 가는 것입니다. 이 여행을 통해 그는 소년에서 남성이 됩니다. 이 여행은 최대 6개월동안 지속 될 수 있으며, 이 기간동안 남성은 누구의 도움 없이 야생에서 살아 남아야 합니다. 이는 지나기 어렵지만, 우리 중 가장 강한 자만이 살아 남는 것을 보장 할 수 있습니다.
aborig_outback코0=오지의 민족
aborig_outback_desc코0=오지는 가혹하고 힘든 장소입니다. 오늘날에도 오지의 많은 영역은 무인 지역이고 오지 탐험은 사형 선고로 간주됩니다. 하지만 호주 원주민들은 이러한 가혹한 조건에서도 살아남는게 가능하고 심지어 거기서 스스로 살아남게 되었습니다.
aborig_sacred코0=신성한 땅
aborig_sacred_desc코0=호주 원주민 종교는 종종 호주 전역에 신성한 의미를 부여합니다. 대륙의 중요한 명소와 특징은 신들의 안식처, 또는 몽환시 당시 벌어진 고대 분쟁의 유물로 묘사됩니다. 종종 창조신으로 여겨지는 무지개 뱀의 경우, 비를 불러온다고 여겨졌으며 무지개가 하늘에 나타났을 때 무지개 뱀이 물웅덩이를 다른 곳으로 이동 시킨다고 여겨졌습니다.
aborig_dreamtime코0=몽환시
aborig_dreamtime_desc코0=몽환시는 우주가 창조되기 전 오로지 영혼과 신들만이 존재한 시대를 나타냅니다. 각 부족마다 꿈의 시대에서 세계가 창조되는 것에 대한 각자 설명이 있지만 호주의 대부분 부족들은 몽환시는 물질이 존재하기 전이라고 믿었다. 명상이나 신들과 조상을 숭배하는 것은 종종 “꿈”으로 표현되며, 꿈의 시대의 지식에 접촉하는 것입니다. 꿈의 시대에서는 조상 전체가 하나로 존재하기에 조상 한명에게 접근이 가능하다면 꿈의 시대의 조상의 지식에 쉽게 접근할 수 있기 때문입니다.
aborig_music코0=음악적 전통
aborig_music_desc코0=호주 원주민 음악은 독특한 구성을 가지고 있습니다. 디저리두는 호주 원주민 음악에 사용되는 전통 악기인데, 개척자가 오기 전 호주는 이 독특한 악기의 톤을 들을 수 있는 유일한 장소였습니다. 1500년전 호주 원주민들이 만든 노래와 악보가 있으며 오늘날에도 여전히 연주되고 있습니다.
aborig_fire_stick_farming코0=화전
aborig_fire_stick_farming_desc코0=호주는 가혹하고 용서가 없는 땅이지만 관목을 최대한 활용하는 법을 익혔습니다. 화전은 호주 원주민들이 숙달한 기술인데 화전을 통해 부시 감자와 같이 식용 식물에 대한 공간을 만들거나 죽은 숲을 이상적인 캥거루 사냥터로 재구성이 가능하다.
EOR_ideas코0=Eora 이념
EOR_ideas_start코0=Eora 전통
EOR_ideas_bonus코0=Eora 야망
EOR_lifestyle코0=Eora의 생활방식
EOR_lifestyle_desc코0=우리는 주로 바다에 마을을 짓고 바다의 위대한 풍족함에서 살아남는 해안 민족입니다. 바다가 우리에게 필요한 모든 것을 제공할 때 우리는 작물을 기르거나 농장을 유지할 필요가 없습니다. 우리는 조국의 작은 해안과 자연 항구를 항해하는 전무가이며, 우리는 이러한 해안 삶의 방식으로 계속 살아남을 것입니다.
EOR_bands코0=스물 아홉 무리
EOR_bands_desc코0=Eora는 29개의 민족의 무리를 의미합니다. 이러한 무리들은 공동 조상과 가족에 의해 연합이 되며 무리끼리의 상호 결혼은 매우 흔한 일이며 이를 통해 이질적인 사람들을 강하고 단합하게 만듭니다. 이렇게 주요 무리들을 관리하고 사람들은 연합시키는 산개 형태의 정부는 더 많은 사람들이 스스로를 Eora라고 부르며 우리 부족을 확장시키는데 도움이 될 것입니다.
EOR_enduring코0=지속적인 문화
EOR_enduring_desc코0=Eora 문화는 그 어떤 지식보다 오래되었으며 전쟁, 정복 그리고 시간이 지남에도 지속되어 왔습니다. Eora 예술과 문화는 가장 작은 마을부터 미래의 광활한 도시까지 존재하고 번창할 수 있었습니다. 시대가 바뀌고 조국으로 오는 사람의 수가 증가하지만, 언제나 한가지는 지속되었습니다. Eora 정신.
EOR_protect코0=선조들의 땅을 지키자
EOR_protect_desc코0=시드니의 호주 원주민들은 고향의 금욕적인 수호자였으며 자신의 이익에 반해서라도 고향을 침략하는 외국 침략자들에 저항합니다. 호주 해안에 있었던 수많은 전쟁과 충돌 속에 Eora의 남성과 여성은 비록 그들을 2등 시민으로 여겨졌던 시절에도 그들의 토지를 지키기 위해 열정적으로 지원하여 싸웠습니다. 새로운 세대가 계속 신성한 땅을 지키고 싸우겠다는 것은 우리의 의지입니다.
EOR_sacred코0=신성한 해안
EOR_sacred_desc코0=우리는 이 신성한 땅의 전통적인 관리인입니다. 다른 부족들이 더 비옥한 땅을 위해 그들의 고향을 버렸을 때, 우리 Eora는 언제나 여기 있었고 여기 있을 것이다. 우리의 29개 나라는 시드니 항구 주변에서 조화롭게 살 것이며, 우리 민족끼리의 협력은 세계가 Eora 땅을 부럽게 만들 것입니다.
EOR_pemulwuy코0=페물우이
EOR_pemulwuy_desc코0=개척자들이 Eora를 방문했을 때, 그들은 빠르게 우리 해안의 물고기를 약탈 하고 야생을 공허로 만들고 쓰레기로 우리의 물을 더럽혔다. 이제 Eora 삶의 방식은 끝이 났다. 하지만 페뮬우이와 같은 용감한 용사들은 외국의 침략자에 대항하고 그들의 파괴 행위를 끝낼 것입니다. 페뮬우이의 흉폭하고 용감함은 모두의 모범이 되었고 Eora 민족들은 불가능한 확률에 맞서 싸울 것이다.
EOR_berewaldal코0=베레왈달
EOR_berewaldal_desc코0=이 사람들은 우리의 영토 심지어 호주 너머에서 왔습니다. 우리는 그들이 Eora가 제공하는 수익성 높은 물건을 부러워 하고 어떤 식이든 그 것을 우리에게 취할 방법을 찾을 것을 알고 있습니다. 폭력적인 방법이 아니라 현명한 단어로 우리는 이 외부인과 협상하여 양측 모두에게 좋은 해결책을 찾을 수 있을 것입니다.
KAU_ideas코0=Kaurna 이념
KAU_ideas_start코0=Kaurna 전통
KAU_ideas_bonus코0=Kaurna 야망
KAU_totemic_matriarchy코0=토템계 모계정치
KAU_totemic_matriarchy_desc코0=kaurna 민족은 어머니를 통해 조상을 추적하고 모든 조상의 선은 몽환시로 거슬러 올라갈 수 있습니다. 모든 남성과 여성은 그들의 피 속에 신성한 흔적이 있으며 우리의 어머니를 통해 꿈에 더 가깝게 성장합니다.
KAU_pangkarra코0=팡카라 제도
KAU_pangkarra_desc코0=우리의 사회는 여러 별개의 무리로 나뉘어 있으며, 각자 독립적으로 운영 되지만 kaurna 정체성에 의해 연합되어 있습니다. 우리 민족은 스스로 자유롭게 구성하게 허가함으로 관리가 쉽습니다.
KAU_coastal_pangkarra코0=해안 팡카라
KAU_coastal_pangkarra_desc코0=자율적이고 최소한의 지배와 덧불어 모든 Pangkarra는 생득권으로 바다에 접근할 수 있어야 합니다. 낚시와 해양 무역은 kaurna삶의 방식의 주요 부분이고 해안에 접근이 불가능한 Pangkarra는 Pangkarra가 아닙니다.
KAU_redgum_shelters코0=레드검 대피소
KAU_redgum_shelters_desc코0=정착하는 다른 사회와 다르게 kaurna 민족들은 계절에 따라 이동합니다. 여름에는 해안에 물고기가 넘치지만 겨울에는 비가 오고 레드검 대피소의 불을 유지하는 것은 우리 생존에 매우 중요합니다.
KAU_communal_ownership코0=공동 소유권
KAU_communal_ownership_desc코0=어느 개인도 kaurna민족이 소유한 것에 대한 소유권을 주장할 수 없습니다. 토지는 지주나 귀족에게 속하지 않고 거주 중인 부족민들에게 속합니다. 이러한 공동 소유권은 어느 남성이나 여성도 뒤쳐지지 않으면 부족을 한몸 같이 번영하거나 고통받게 합니다.
KAU_old_tjilbruke코0=오래된 질부룩
KAU_old_tjilbruke_desc코0=우리 민족들은 몽환시대의 위대한 kaurna 부족의 영웅인 질부룩의 이야기를 공유합니다. 질부룩은 kaurna 민족에게 그의 법과 선언으로 평화를 가져다 주었으며 우리 민족을 안전하게 지켜주었다. 질부룩은 정의에 전념한 나머지 그의 조카마저도 kaurna의신성한 법을 어긴 혐의로 사형을 선고 했습니다.
KAU_south_australia_act코0=남부 호주 법
KAU_south_australia_act_desc코0=다른 호주 원주민과 다르게 해외의 식민지 세력은 우리의 독립과 자치권을 인정하였고 이는 우리의 이름이 그들의 지도에 적히고 우리 영토에 정착을 금지하게 하였습니다.
PLW_ideas코0=Palawa 이념
PLW_ideas_start코0=Palawa 전통
PLW_ideas_bonus코0=Palawa 야망
PLW_oyster코0=오이스터 베이
PLW_oyster_desc코0=위대한 오이스터 베이는 굴, 홍합, 가리비, 성게 및 손쉽게 수확할 수 있는 해양 상품이 풍부한 지역입니다. 심지어 때때로 고래와 물개가 palawa 해안에 나타나 고기, 뼈 그리고 모피를 얻을 수 있게 합니다. 우리의 섬은 진실로 축복받은 땅이고 우리는 오이스터 베이와 같이 풍요로운 지역의 수확과 다른 부족과의 무역에서 큰 이익을 얻는 법에 대해 숙달되어 있습니다.
PLW_dual_identity코0=이중 정체성
PLW_dual_identity_desc코0=palawa 정체성은 두개의 계층으로 나눌 수 있다. 하나는 가정의 단위 그리고 다른 하나는 40-50명 정도의 씨족 단위이다. 두개의 정체성은 부족의 계층 하에 존재할 것이다.
PLW_darwin코0=다윈 유리
PLW_darwin_desc코0=알 수 없는 수세기 전, 우리의 섬의 중심에는 신들이 보낸 큰 기념물에 강타당했다. 이로 인해 대파괴가 발생하였지만 창과 보석으로 제작하는데 이상적인 강력한 건축자재 또한 가져왔습니다. 우리의 섬은 이 귀중한 물질을 가지고 있는 유일한 장소이며, 무역과 전쟁을 통해 이를 자본화해야 합니다.
PLW_parlevar코0=팔레바르
PLW_parlevar_desc코0=태초에 창조자 모이니와 드로메어린은 세계를 창조하는 일에 착수하였다. 모이니는 세계의 건축가로서 우리 섬의 대지와 강을 만들고 방황하는 팔레바르의 영혼을 가지고 그에게 첫 인간의 몸을 주었다. 그 뒤로는 땅에서 모이니가 팔레바르의 모습을 본따 캥거루를 만들었다. 드로메어린은 별의 형태를 취하여 인류의 안내자로 행동하며 이러한 캥거루-인간의 꼬리를 지우고 무릎을 변형시킨 후 사람 형태로 변형시키고 그들은 쉴 수 있었다. 본래 인간은 파라와였으며 palawa정체성에 저항하는 사람은 그들의 조상을 부인하는 것입니다.
PLW_writers코0=최초의 호주 원주민 작가
PLW_writers_desc코0=호주 원주민 문화는 종종 구전 전통과 시각 예술을 통해 나타냈지만, 우리 Palawa는 최초로 글씨를 도입하여 조상의 유산과 지식을 우리 민족에게 공유하고자 한다. 우리의 초기 작품은 Palawa 언어로 섬에 대한 정보, 우리의 역사 그리고 위대한 시를 포함하였다. 글자에 대한 신속한 숙달은 우리 Palawa가 새로운 발상을 받아드리고 시대가 변함에 따라 우리의 옛 전통을 변화시키는데 전문가라는 것을 보여줍니다.
PLW_survivors코0=블랙 워의 생존자들
PLW_survivors_desc코0=개척자들이 우리 섬에 왔을 때, 우리 민족을 근절시키기고 우리의 땅을 빼앗으려고 했습니다. 이 피비릿내 나는 충돌은 우리 섬의 거의 대부분의 생명을 근절 시켰습니다. 총열을 우리의 머리에 겨눔에도 포기하지 않고 우월한 적을 상대로 용감히 싸웠습니다.
PLW_enduring코0=인내하는 민족
PLW_enduring_desc코0=외국 식민지 군대와 피비릿내 나는 충돌 끝에 오직 400명의 palawa만이 살아남았습니다. 수년에 걸쳐 우리 인구는 원래 인구에 도달할 때까지 증가할 것입니다. 우리 민족에게 새겨진 상처는 치유되지 않지만, 가장 피비릿내 나는 일반적인 분쟁임에도 언제나 일어날 것입니다.
LAR_ideas코0=Larrakia 이념
LAR_ideas_start코0=Larrakia 전통
LAR_ideas_bonus코0=Larrakia 야망
LAR_makassar_trade코0=마카사르인 무역
LAR_makassar_trade_desc코0=수세기 동안 Larrakia는 호주 해안 너머로 무역을 종사하는 몇 안되는 민족이었습니다. Makassar의 상인들은 해삼, 옷 그리고 담배와 같은 호주에서 가장 탐나는 물건을 찾으러 옵니다. 다른 이들은 베타적으로 남고 오직 지역민끼리만 무역을 하지만 Larrakia의 상품은 중국의 먼 해안까지 운반됩니다.
LAR_federation코0=Larrakia 연방
LAR_federation_desc코0=Larrakia가 소유한 토지는 외국 상인을 유혹하기에는 부족하다. 따라서 우리 이웃과 긴밀한 관계를 가져야 하며 그만큼 우리의 문화, 노래 그리고 꿈꾸는 이야기를 나누어야 한다.
LAR_dreaming코0=Larrakia 꿈
LAR_dreaming_desc코0=Larrakia의 꿈 이야기는 우리 땅을 우리 민족과 같이 국가의 일부로 만듭니다. 우리가 살고 있는 땅과 바다와의 연결고리는 물리적인 만큼이나 영적인 것이며, 호주 북부 해안 전역에서 우리는 세계를 형성한 꿈의 이야기들을 들려준다.
LAR_dowed코0=다우
LAR_dowed_desc코0=첫 Larrakia 남자 다우는 난간부라에 의해 대지에서 일어났으며 출산, 법 개정 그리고 대화 방법을 교육 받았습니다. 그가 늙었을 때, 많은 이들이 그와 그가 개정한 법을 따르는 것을 거부하였고 그에 대한 처벌로 많은 이들이 죽임을 당했습니다. 다우를 통해서 우리는 법치주의와 자비 사이의 섬세한 균형을 배웁니다.
LAR_ceremonial_scarring코0=의식의 흉터
LAR_ceremonial_scarring_desc코0=Larrakia 사회에서 흉터는 자신의 몸에 자발적으로 행하는 행위였습니다. 결혼, 출산 또는 가족의 죽음을 축하하기 위해 몸이 절단되고 상처를 입었습니다. 흉터가 있다는 것은 기억할 만한 삶을 살았다는 것이고 반대로 상처가 없다는 것은 겁쟁이에 경험이 없는 것으로 간주하고 흉터가 없을 수록 축제나 행사에 참여할 권리가 적었습니다.
LAR_hospitality코0=Larrakia의 환대
LAR_hospitality_desc코0=외부인이 Larrakia 해안에 나타면 그들이 친구든 적이든 그들의 기원이나 의도에 관계없이 환대와 존경을 받습니다. 마카시아인 상인이든 유럽 개척자이든 Larrakia는 언제나 친구로 환영 받을 수있는 안전한 해안을 제공합니다.
LAR_kenbi_land_claim코0=켄비 토지 주장
LAR_kenbi_land_claim_desc코0=식민지인들이 호주의 해안에 와서 불법적으로 Larrakia의 땅을 약탈하고 강탈하였을 때, 그들이 유일하게 이해할 수 있는 언어 법의 언어로 보복했습니다. 우리는 3미터 정도의 서류를 펼치고 식민 회사가 국제 법을 어긴 이유를 정밀히 따졌습니다. 법에 통달한 우리는 식민지인이 되고 싶은 자들의 가공할만한 상대가 되었습니다.
GMI_ideas코0=Kamilaroi 이념
GMI_ideas_start코0=Kamilaroi 전통
GMI_ideas_bonus코0=Kamilaroi 야망
GMI_sacred_caves코0=신성한 동굴
GMI_sacred_caves_desc코0=물과 바람은 돌을 우리 집으로 형성하였고 거기서 우리 조상들은 우리 주변의 대지를 경작하고 형성한 도구를 만들었다. 우리는 땅에서 살고 있으며 땅은 우리가 필요한 모든 것을 제공한다.
GMI_land_of_languages코0=언어의 땅
GMI_land_of_languages_desc코0=Kamilaroi 사회 환경의 특징은 다량의 다른 민족들이 다른 언어와 사투리를 사용함에도 Kamilaroi 민족끼리 만나 무역과 결혼을 한다는 것이다.
GMI_fertile_soils코0=Kamilaroi의 비옥한 토양
GMI_fertile_soils_desc코0=Kamilaroi는 화전에 대한 신중한 태도로 인해 호주에서 가장 비옥한 평원에 살고 있습니다.
GMI_dhulu코0=두루
GMI_dhulu_desc코0=호주는 대륙내에 수많은 민족과 언어가 존재하며 Kamilaroi는 호주의 가장 큰 부족 연합 중 하나입니다. 하위 부족간의 소통은 우리 민족을 단합하게 만드는 중요 요인이며 두루의 형식을 빌려 평원 반대에 있는 우리의 형제에게 메시지를 전발할 방법을 발명하였습니다.
GMI_matrilineal_lineage코0=모계 혈통
GMI_matrilineal_lineage_desc코0=우리는 어머니의 자궁에서 태어났기에 우리의 혈통은 어머니의 피로 추적해야 합니다. 다른 사람들은 아버지의 성을 채택하지만 누가 진정한 어버지인지 확실하지 않습니다. 모계 혈통을 추적하면은 우리는 항상 우리의 핏줄이 어디서 왔는지 알 수 있습니다.
GMI_familial_law코0=가족법
GMI_familial_law_desc코0=친척의 규범은 가족에게 해야할 행동과 의무를 좌우합니다. Kamilaroi 사회에서는 법은 국가, 부족 그리고 가족 단위로 존재하면 각 가족을 구별할 수 있게 합니다. 가장에게는 부족장에게 하는 것 같이 복종해야 합니다.
GMI_red_kangaroo코0=빨간 캥거루
GMI_red_kangaroo_desc코0=감부 가누루는 외국 침략자에 맞서 굳건히 버틴 민족의 위대하고 현명한 지도자였습니다. 그가 죽은 후, 그의 승리를 노래하고 Kamilaroi의 빨간 캥거루로서 그를 찬양합니다.
aboriginal_moluccan_trade_title코0=Makassar 무역에 참여
aboriginal_moluccan_trade_desc코0=몇몇 외부인들은 호주의 부를 이용하기 위해 호주로 항해하는 법을 알고 있다. 하지만 Makassari인들은 우리가 부유하고 무역 항해을 할 자격이다는 것을 알고 있다. Makassar는 외국 신들에 대한 낯선 이야기를 가져오고 우리는 그들의 꿈에 대한 통찰력에서 많은 것을 배웁니다.
dreamtime_conquer_tasmania_title코0=Palawa를 연합하다
dreamtime_conquer_tasmania_desc코0=Palawa는 본토와 다른 꿈 이야기를 가지고 있는 것 같이 대륙의 다른 부분과 고립되고 베타적이었습니다. 그들을 우리의 깃발 아래에 통합시키고 그들의 이야기를 우리의 이야기와 합친다면 우리 민족을 다량의 새로운 꿈 이야기에 접근할 수 있게 합니다!
dreamtime_humiliate_rival_title코0=우리의 적을 모욕
dreamtime_humiliate_rival_desc코0=많은 이야기들은 타이탄간의 위대한 전투이지만, 만일 우리가 스스로 그들의 영웅주의를 예시하지 않는다면 우리는 몽환시에 일어난 전설적인 전투에 대해 공유할 자격이 없다!
dreamtime_spirits_title코0=영혼들
dreamtime_spirits_desc코0=우리 나라에는 꿈 이야기에 대해 믿지 않는 사람들이 있습니다. 이제 어느 때보다 우리 민족의 이야기를 예시하고 이방인들에게 전도를 통해 꿈을 알리는 것이 중요하게 되었습니다.
dreamtime_own_dharma_title코0=다르마
dreamtime_own_dharma_desc코0=다르마 종교의 민족들은 많은 신들을 따르고 여러 형태를 취합니다. 그들에 대해 더 깊게 공부한다면, 우리는 몽환시에 대한 독특한 환상을 가질 것입니다.
dreamtime_christian_title코0=바이아메의 꿈
dreamtime_christian_desc코1=호주의 해안에 이방인들이 십자가와 고대 순교자에 대한 설교를 가지고 도착했습니다. 새로운 신앙을 진심으로 받아드리지 않을 것이지만, 이 새로운 계시는 의심한 여지 없이 꿈 이야기에 대한 풍경을 바꿀 것 입니다.
dreamtime_sulawesi_title코0=Sulawesi의 지배
dreamtime_sulawesi_desc코0=수년동안 Makassar는 호주가 지금까지 알고 있던 유일한 상인이었지만 이제는 아닙니다. Sulawesi섬을 통하바함에 따라 우리는 Makassar 무역을 자유롭게 통제하고 바다를 가로질러 우리의 상품을 중국과 인도네이시아에 운반할 수 있습니다.
dreamtime_boats_title코0=공해에 대한 꿈
dreamtime_boats_desc코0=한때 우리 민족은 대형 대륙간 여행이 가능한 대형선으로 바다의 너비를 건넜지만, 호주의 수많은 해안은 우리를 현실에 안주하게 만들었습니다. 우리는 새로운 밝은 미래를 위해 민족의 항해 정신을 되살려야 합니다.
dreamtime_chinese_emperor_title코0=용에 대한 꿈
dreamtime_chinese_emperor_desc코0=우리 해안 너머로 용제가 존재한다. 이 황제는 분명 와질의 대리인이며 우리는 중국 대중에게 이 게시를 인식시켜야 한다.
dreamtime_rainbow_serpent_title코0=무지개 뱀
dreamtime_rainbow_serpent_desc코0=호주 전역에 있는 꿈 이야기들은 몹시 다양하지만 한가지 확실한 것은 무지개 뱀에 대한 믿음입니다. 꿈의 모든 측면을 연구함으로써 우리는 무지개 뱀의 본질에 대해 진정으로 이해할 수 있을것입니다.
ancestor_story코0=조상
ancestor_story_desc코0=우리는 조상들의 등을 따라 여기에 왔고 모든 조상 중 가장 신성한 자는 꿈으로 승천하여 영적 차원에서 우리와 함께 있을 수 있습니다.
erathipa_story코0=에라티파
erathipa_story_desc코1=에라티파는 바위로 임산부의 형태를 취하는 꿈꾸는 인물입니다. 에라티파는 죽은 아이의 영혼을 그녀의 자궁에 보관하고 에라티파에게 접근하는 모든 여성은 다산의 축복을 받을 것입니다.
crow_story코0=까마귀
crow_story_desc코0=까마귀는 호주 전역에 있는 이야기들의 안에서 꿈속의 인류의 챔피언으로 나타납니다. 까마귀로 인해 인류는 불을 발견할 수 있었기에 대지에서 그의 자녀는 거룩한 생물로 존경 받아야 합니다.
moinee_story코0=모이니
moinee_story_desc코0=첫 Palawa는 캥거루였고 자애로운 창조자 모이니에 의해 남자로 변했습니다. 그는 테즈메이니아를 대륙의 다른 지역과 분리하기 위해 대지를 분리하여 강과 섬을 만들었습니다.
military_story코0=앗노아르티나
military_story_desc코0=Adnoartina는 Marindi의 경쟁자였습니다. 울루루의 기슭에서 벌어진 Adnoartina와 Marindi 간의 전투는 전설적이었고, 그들의 전투는 너무 피투성이라서 Marindi는 도마뱀 그리고 Adnoartina는 개의 형태를 취했습니다. 울루루의 표면위까지 올라가면서 그들의 싸움을 며칠동안 지속되었습니다. 산 정상에 올랐을 때 Adnoartina는 Marindi의 목을 물고 그를 먹었으며 Marindi의 신성한 피가 울루루를 붉게 만들었습니다.
islam_story코0=이슬람의 꿈
islam_story_desc코0=Makassari 상인들은 낯설고 매혹적인 이야기를 가져왔습니다. 결코 이슬람은 꿈을 대체하지 못할 것이지만 Makassari의 믿음이 그 것을 들은 모든 이에게 영향을 미쳤다는 건 의심할 여지가 없습니다.
dharma_story코0=다르마의 꿈
dharma_story_desc코0=우리는 힌두신의 고대 방식을 따릅니다. 그들로 부터 우리는 환생과 카스트 제도를 통해 사회를 효과적으로 조직하는 법을 배웁니다.
baiame_story코0=바이암
baiame_story_desc코0=바이아메는 창조신이며 하늘 아버지입니다. 그는 천국에서 강림하여 세상에 바다, 강 그리고 산을 주었습니다. 그 후 인류에게 돌아가 그들에게 법, 전통, 언어 그리고 노래하는 목소리를 주었습니다.
spirits_story코0=영혼
spirits_story_desc코0=많은 영혼들이 호주 전역의 신성한 장소에 거주하고 있으며 꿈 속에서 그들의 이야기는 세상에 있는 우리에게 영적이나 육체적인 영향을 끼칩니다.
conquest_story코0=루말루마
conquest_story_desc코0=루마루마는 사악한 탐욕과 폭식의 신이며 그가 고래가 될 때까지 시체를 섭취하는 식인 풍습에 종사합니다.
djunkgao_story코0=준크카오 자매
wagyl_story코0=와질
wagyl_story_desc코0=Wagyl은 Nyoongah가 숭배하는 무지개 뱀의 현현이다. 그는 꿈속에서 서부 호주를 가로질러 가면서 강을 형성합니다.
rainbow_story코0=무지개 독사
rainbow_story_desc코0=무지개 뱀은 꿈세계 전역에서 숭배받는 몇 안되는 신입니다. 꿈 속에서의 무지개 뱀에 대한 이야기는 믿음에 따라 격렬하게 다르지만 가끔 그 덕분에 강우나 물이 오기에 모든 사람들에게 자비로운 힘으로 나타납니다.
