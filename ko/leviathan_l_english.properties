dreamtime코0=Alcheringa
dreamtime_religion_desc코0=몽환시는 오스트레일리아 원주민들의 종교적, 문화적 세계관입니다. 몽환시는 물질 세계가 존재하기 전의 시간 그리고 물질 세계와 평행하게 존재하는 별개의 면을 동시에 설명합니다. 무당들은 몽환시와 접촉할 수 있다고 여겨지며, 몽환시의 흔적은 세계 곳곳에서 발견됩니다.
dreamtime_demand코0=$COUNTRYNAME$ 개종
dreamtime_demand_desc코0=이 종교 반군들은 $RELIGION$ 종교를 위해 싸우고 있습니다. 그들은 우리가 자신들 종교의 위대함을 깨닫거나 적어도 우리의 개종에 대한 노력을 중지하여 평화속에서 그들의 신앙을 지킬 수 있도록 할 것을 요구하고 있습니다.
dreamtime_rebels_title코0=종교
dreamtime_rebels_name코0=$RELIGION$ 광신도
dreamtime_rebels_desc코0=종교적 광신도들은 자신들과 다른 신앙의 국가가 지배하는 지역에서 반란을 일으키는 경향이 있습니다. 그들은 자신들의 믿음을 퍼뜨리고 이단들을 모두 처단하려 할 것입니다.
dreamtime_rebels_army코0=$RELIGION$ 군대
