EMBRACEMENT_RATIO_MIGRATORY코0=우리는 이주 부족이므로 수도가 시대관을 수용해야 합니다.
ESTATE_PRIVILEGE_MAX_GRANTED코0=§R계층에게 4개 보다 많은 특권을 부여할 수 없습니다.§!
