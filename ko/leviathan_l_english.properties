HOLY_SITE_421_DESC코1=바쿠 불의 사원은 조로아스터교의 불의 사원들 중 가장 중요한 곳입니다. 사원은 엄밀히 따지면 수라카니에 위치해있지만, 고대부터 바쿠시와 묶여있으며, 바쿠시를 지칭하며 '바구안의 불'이라고도 불렸습니다. 불은 표면에서부터 바로 나오며 그 불길은 맹렬한 힘으로 끊임없이 타오릅니다. 몇몇 '불의 숭배자'들은 여전히 사원 근처에 살고 있다고 합니다.
HOLY_SITE_441_DESC코1=예언자 자라투스트라는 호레즘에서 태어났기에, 호레즘 지역 그리고 특히 그 중심지인 히바는 조로아스터교의 발상지로 신성히 여겨집니다. 이슬람교의 침략은 이 지역의 우리 종교에 심각한 피해를 입혔지만, 신자 집단들은 저항하고 있으며 심지어 이 지역의 이슬람교도들 사이에서도 여러 조로아스터교의 전통들이 존속하고 있습니다.
HOLY_SITE_2223_DESC코2=아타쉬 베람은 아두르 판바그라고 불리는 사제 계급의 불이라고 선언되었으며, 카르얀시와 가까운 라레스탄 지역에서 불타오르고 있습니다. 이 불은 세 개의 승리의 불 중 가장 숭배받는 불이며, 나머지 두 불은 전사들을 위한 아두르 구스나프, 농부들을 위한 아두르 부르젠 미르라고 불립니다.
HOLY_SITE_2235_DESC코1=카슈마르시와 가까운, 호라산의 레반드 산에 위치한, 아두르 부르젠 미르는 세 개의 아타쉬 베람, 즉 승리의 불 중 하나로 농부 계급을 위한 불입니다. 고대에 순례의 중심지였던, 이 불의 중요성은 사라지지 않았습니다.
HOLY_SITE_4430_DESC코1=호레즘이 이슬람교 세력에 넘어갔을 때, 일부 신도들은 성화를 들고 인도로 도망쳐 공동체를 세웠습니다. 이 새로운 공동체와 페르시아에서 피난온 사람들 사이에 실실라 혹은 전통의 연결고리가 현성되었는데, 산잔이란 이름은 여기서 유래했습니다. 1297년 이래로, 이 불은 처음에는 바롯 동굴로 옮겨졌고, 그 다음에는 반스다 마을로, 그리고 마지막으로 나브사리로 옮겨졌습니다.
