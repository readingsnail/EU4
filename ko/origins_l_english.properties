zan_gold_of_sofala코0=소팔라의 금
zan_gold_of_sofala_desc코0=소팔라의 금은 언제나 우리 부의 주된 원천 중 하나였으며, 그 주변의 경제권을 갖는 것은 자연스럽습니다.
zan_trade_center_of_zanzibar코0=잔지바르의 상인
zan_trade_center_of_zanzibar_desc코0=잔지바르는 상인들의 주목을 항상 받아왔고, 그들이 어디서 오든 이곳에서 거래하고자 합니다.
zan_center_of_migration코0=이주의 중심
zan_center_of_migration_desc코0=무역량의 증가로, 사람들의 유입량도 증가하고 있고, 이는 우리 도시들이 더 발전함을 뜻합니다.
zan_kilwa_the_melting_pot코0=문화의 용광로
zan_kilwa_the_melting_pot_desc코0=우리 영토를 흐르는 무역을 통해 아이디어의 교류와 흐름이 늘어났습니다. 이제 우리는 세상 모든 구석구석에대해 배울 수 있습니다.
###MODIFIERS###
hau_hausa_conquest코0=하우사 정복
desc_hau_hausa_conquest코0=이 지역은 하우사에 의해 정보되었습니다. 이 사실을 뒤로 하고도, 지역 주민들은 예상보다 더 자유를 즐기고 있습니다.
desc_eth_blessing_of_kings코0=설명할 수 없는 이유로, 우리 왕조는 행운과 부에 축복이 내려진 것 같습니다.
estate_nobles_neighbor_raids_fort코0=습격된 요새
desc_estate_nobles_neighbor_raids_fort코0=이 요새는 최근 습격당했습니다. 뛰어난 인재나 귀중품이 없기에 두번째 습격을 할 가치가 없어 보입니다.
estate_nobles_cawa_peace_keepers_modifier코0=카와 평화유지군
desc_estate_nobles_cawa_peace_keepers_modifier코0=우리의 카와 병사들은 우리 제국 내의 평화를 유지하고 미래를 위해 힘을 보존하는 데 초점을 맞추고 있습니다.
estate_nobles_cawa_offensive_fighters_modifier코0=카와 정복군
desc_estate_nobles_cawa_offensive_fighters_modifier코0=우리의 카와 병사들은 제국의 국경에서 적들을 밀어내는 데 초점을 맞추고 있습니다. 그들은 모든 힘을 다해 싸우고 적들과 맞설 것입니다.
zan_trade_with_india코0=인도 무역
