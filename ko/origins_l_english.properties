#EAST AFRICAN MISSIONS
east_africa_hear_me_roar_title코0=표효를 들으라
east_africa_hear_me_roar_desc코0=지배적 무역 국가는 주도권을 강화하기 위해 항구와 땅, 두 가지가 필요합니다. 우린 바다와 육지를 모두 손에 넣어야 합니다.
east_africa_international_influence_title코0=국제 영향력
east_africa_international_influence_desc코1=우리의 힘은 분명하지만, 우리의 위대함을 다른 국가가 인식하지 못한다면야 그 가치는 떨어집니다. 다른 강국들에 대사관을 보내 우리가 진정한 강대국임을 인정 받을 것입니다.
international_influence.tooltip코0=적어도 §Y2§!개의 강대국에게:\n§Y[Root.GetName]§!와 동맹을 하십시오.\n§Y[Root.GetName]§!에 대한 최소 §Y150§!의 관계도를 가지십시오
east_africa_lion_king_title코0=라이언 킹
east_africa_lion_king_desc코0=우리 지역을 통제 전에는 무역의 왕이라고 불리울 수 없습니다. 정복으로든 외교적이든 하는 것은 중요치 않습니다. 모든 주변국가는 머리를 조아리던지 사라질 것입니다.
#EAST AFRICAN MODIFIERS
desc_east_africa_modern_army코0=우리 군대를 땅과 바다에서 규율과 근대적 전술에 대해 모두 가르쳤습니다. 이런 가르침들 체득한 우리 군대를 우리의 적들이 오랫동안 두려워하게 할 것입니다.
desc_east_africa_modern_nation코0=기조가 바뀌었습니다. 과거 우리는 다른 이들을 경외심을 갖고 보았지만, 이제 우리가 바로 그 따라가야할 지표가 되었습니다. 세상 모든 곳에서 사절을 보내 우리의 방식을 배우고자 합니다.
###CENTRAL AFRICAN GENERIC MISSIONS
c_a_prepare_for_war_mission_title코0=전쟁을 준비하라
c_a_prepare_for_war_mission_desc코0=우리는 언제든지 잠재적인 적이 될 수 있는 많은 나라로 둘러싸여 있습니다. 그에 대한 대비를 해야 합니다.
c_a_war_mission_title코0=전쟁으로부터의 이익
c_a_train_army_mission_title코0=군대를 훈련시켜라
c_a_humiliate_rival_mission_desc코0=우리 적들은 너무 오랜 기간동안 눈엣가시였고, 이를 끝낼 시간이 왔습니다. 우린 그들에게 결정적인 한방을 주어, 감히 우리의 길을 막아 설수 없게 해야 합니다.
c_a_get_cults_mission_title코0=전통에서 배워라
c_a_contact_muslims_mission_title코0=무슬림들과 접촉하라
c_a_improve_infrastructure_title코0=기반시설을 개선하라
###CENTRAL AFRICAN GENERIC MISSIONS MODIFIERS
desc_c_a_preparing_for_war코0=군대을 조직하였고, 이제 이를 사용할 때 입니다.
###GENERIC HORN OF AFRICA MISSIONS###
gen_hoa_building_religious_alliances_title코0=종교적 동맹들
gen_hoa_subjugate_heathens_title코0=이교도들을 복속시켜라
gen_hoa_prepare_for_war_title코0=전쟁을 준비하라
gen_hoa_attack_the_heathens_title코0=이교도들을 공격하라
gen_hoa_expand_borders_title코0=우리 국경을 확장하라
gen_hoa_unify_the_horn_of_africa_title코0=아프리카의 뿔을 통합하라
gen_hoa_unify_the_horn_of_africa_desc코0=뿔 지역의 사람들 사이의 불만과 전쟁의 시대가 거의 끝이 났습니다. 우리는 우리 기치 아래 모든 부족과 사람들을 통합하고, 그들에게 번영과 평화의 미래를 주어야 합니다.
gen_hoa_favor_church_title코1=[Root.GetChurchOrFallbackName] 지지
gen_hoa_favor_church_desc코1=우리 지역은 거짓 숭배에 항상 분열되고 속아 왔습니다. [Root.GetChurchOrFallbackName]의 선교를 도와 모든 이교도에게 그들 방식의 오류를 보여주어 이를 끝내고 그들을 끌어안아야 합니다.
gen_hoa_stabilize_economy_mission_desc코0=우리 지역의 불안정성은 그것을 이용해 먹을 정도로 용감한 자들에게 좋은 기회입니다. 어떠한 수단을 강구해서라도 나라의 수입을 증대하고 다가올 문제로 가득찬 때에 대비해야 합니다.
gen_hoa_build_trade_navy_desc코0=위대한 상업 전통을 갖고 있만, 우리 해안으로 온 외국인들과 무역을 했고, 이제 위대한 상업적 해군을 조직하여, 먼 땅들로 떠나고 최고의 부를 가져다줄 수 있게해야 합니다.
###WEST AFRICA MISSIONS###
west_africa_greater_than_mali_desc코0=우리 지역을 통합한 뒤, 우리 전사들의 손에 쥐여진 새로운 무기들로써, 우리는 사하라 사막과 기니만의 모든 땅을 정복했습니다. 말리 제국의 쇠퇴로 인해서 열강이 될 수 있는 아니, 더 그보다 더 위대해 질 수도 있는 기회를 헛되이 해선 안됩니다.
west_africa_embracing_old_traditions_title코0=오래된 전통의 수용
west_africa_brothers_in_tradition_fetishist_title코0=믿음의 형제들
west_africa_sankore_university_fetishist_title코0=산코레 대학
west_africa_embracing_new_traditions_title코0=새로운 전통의 수용
west_africa_brothers_in_faith_sunni_title코0=믿음의 형제들
west_africa_marabouts_desc코0=이슬람 수도사, 마라부트는 기본 의례인 이슬람의 다섯기둥을 여러 세대를 통해 지역에 전파했습니다. 이제 이들의 노고에 지원하여, 그들의 말을 더 널리 퍼뜨리게 해야 합니다.
west_africa_sankore_university_sunni_title코0=산코레 대학
west_africa_sankore_university_sunni_desc코0=팀북투에 위치한 상코레 마드라사는 수십년동안 사하라 이남의 지식의 가장 중요한 중심지 였습니다. 이제 이 도시를 손에 넣어, 거기에 보관된 원고들을 우리 이익을 위해 써야 합니다.
west_africa_salt_cloth_shells_desc코0=새로운 외국 상인들이 우리 도시들에 등장하여 새로운 상품들을 거래하면서 사하라 회랑과 기니 만을 아우르는 무역이 한동안 증가하고 있습니다. 이제 우리 이익을 위해 수익성이 풍부한 무역로를 통제해야합니다.
###MORE MISSIONS###
eth_secure_religious_unity_title코0=종교적 통일성을 확보하라
msi_balance_of_power_title코0=힘의 균형
msi_integrate_the_muslims_title코0=무슬림들을 통합하라
msi_invade_the_west_title코0=서쪽을 침공하라
msi_unite_the_kingdoms_title코0=왕국을 통합하라
msi_unite_the_kingdoms_desc코0=옌네가 공주부터 그의 아들인 웨드라오고와 그들의 자식들과 자손들의 시절 부터 우리 민족은 여러 나라로 나뉘어져 있었습니다. 하나되면 우리는 강할 것이고, 흩어지면, 각개격파 당할 것입니다. 우린 모든 모시인 들의 땅을 하나의 깃발아래 취합할 것입니다.
msi_invade_the_north_title코0=북쪽을 침공하라
msi_ruler_of_the_river_title코0=강의 지배자
msi_hegemony_of_west_africa_title코0=서 아프리카의 헤게모니
msi_hegemony_of_west_africa_desc코0=수 세대에 걸쳐, 말리는 서아프리카 대다수를 철권으로 통제해왔습니다. 그들의 세력은 사라지고 있습니다만, 우리의 힘은 날로 강해졌습니다. 이 지역에 대한 패권을 주장하기 위해, 우리는 이 지역을 정복하고 말리를 부수거나, 정복해야 합니다.
msi_invade_the_south_title코0=남쪽을 침공하라
ada_the_sahel_corridor_title코0=사하라를 따라
ada_somali_empire_title코0=아달 제국 설립
ada_somali_empire_desc코0=이 뿔지역의 유일한 제국이 그 불경한 에티오피아정부인지 아주 긴 세월입니다. 그러나 이는 변화하였습니다. 에티오피아 인들을 물리쳐 아프리카 뿔지역은 [Root.GetAdjective]법아래 통합되어, 종교적 갈등이 마침내 해소되었습니다! 지금 이 시점부터 우리는 동아프리카의 새로운 제국으로 알려질 것입니다!
###EVENTS###
muslim_school_events.24.t코0=[Root.GetName]로 들어오는 외국 학자들
muslim_school_events.24.d코0=외국 학파의 학자들의 거주권을 승인하기로 결정했습니다. 그러나 어떤 학파의 학자 [Root.GetName]의 안전한 울타리 안에서 살아갈 특권을 받게 될지는 결정하지 않았습니다.
muslim_school_events.24.a코0=하나피 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.b코0=한발리 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.c코0=말리키 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.e코0=샤피 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.f코0=이스마일리 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.g코0=자파리 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.h코0=자이디  학파의 학자에게 특권을 승인한다.
flavor_eth.39.b.tt코0=§Y악숨(Aksum)§! 형성 결정을 내릴 수 있습니다.
fetishist_flavor.603.d코0=퀘지 숭배를 선택한다
flavor_msi.1.d코0=모시인들의 왕국들은 이제 많은 세대 중 처음으로 통합되었지만, 언제나 그런 것은 아니었습니다. 우리 장로들이 이야기를 들려 주었는데, 감바가의 도시 맘프루시에서 이 땅으로 도망온 예네가 공주와 도시 텐코도고를 세운 그의 아들인 웨드라오고에 관한 것입니다. 그는 이후, 3명의 아들을 보았습니다. 장남 디아바 또한, 도시 파바 은 고우르마의 설립자이었습니다. 차남 라와는 존도마 왕국을 세웠습니다. 막내 아들, 주웅그라나는 텐코도고의 통치자가 되었고, 그 또한 오우브리 라는 이름의 아들이 하나 있었습니다. 그리고 오우브리는 와가두구의 설립자가 되었습니다. 이 모두가 모시인 들의 기원이고, 그 결과, 우리, 모시인들은, 여러 독립된 나라로 구성되었습니다. 그러나 이제 하나의 정부를 갖어야 할 때가 왔습니다, 우리가 우리의 기원과 각 모시인 왕국들의 차이점을 존중하더라도 말입니다.
flavor_msi.3.d코0=우리의 전설에 따르면 우리 왕국은 부산시, 다고바, 니니시 인들의 내부 결혼으로 태어났다고 합니다. 여러 세대에 걸쳐 조상들의 관습을 따랐고 모시의 왕자와 공주 사이의 결혼은 흔합니다. 이제 우리는 우리와 함께 모시 연맹을 다스릴 반려자가 필요합니다.
flavor_oyo.3.t코0=[From.GetName]의 말
flavor_oyo.3.d코0=[From.GetName]에 보낸 우리 상인이 기쁜 소식을 들고 돌아왔습니다. 말을 살 수 있는 협상에 성공해, 우리 나라로 군마들과 함께 되돌아왔습니다. 이제 우리는 기병 연대를 따라할 수 있을 것입니다.
flavor_oyo.3.a코0=훌륭해
flavor_oyo.4.t코0=오요 메시가 통치자를 강제 폐위하다
flavor_oyo.4.d코0=오요 메시는 항상 우리 정부의 중요한 부분이었습니다. 그들은 새 통치자의 즉위를 승인하고, 폭군으로 간주하면 다시 강탈할 수 있는 의무를 가진 이들입니다. 불행하게도, [Root.Monarch.GetTitle] [Root.Monarch.GetName]에게 그들의 결정이 내려졌고, [Root.Monarch.GetSheHe]는 전통 박을 통해 [Root.Monarch.GetSheHe]가 의식을 포함하는 방식의 자살로 퇴위되었다는 전갈을 보내왔습니다.\n그들에 맞서기엔 그들은 너무나 강력하고 영향력이 세기 때문에, 우리의 [Root.Monarch.GetTitle]는 그들의 명에 복종할 수 밖에 없습니다.
flavor_oyo.4.a코0=어쩔 도리가 없군
flavor_jol.1.t코0=유럽인들과 무역 거래
flavor_jol.1.d코0=우리 배들과 탐험가들이 많은 우리 지식을 뛰어 넘는 땅들을 발견들을 하기위해 멀리 또 널리 항해하였습니다. 이런 땅들 중 북쪽에 위치한 전 대륙을 유럽이라 부르는 곳이 있어, 많은 다양한 나라와 사람들의 고향이 되었습니다. 이 국가들 중 우리와의 무역 관계을 형성하는데 관심이 있는 하나에 접근 할 수 있었습니다. 이 무역 협정을 통해 의심할 여지 없이 막대한 이익을 얻을 것입니다.
flavor_jol.1.a코0=좋은 생각이다
flavor_jol.1.b코0=그런 거래를 할 필요 없다.
flavor_jol.2.t코0=[From.GetName]로 부터의 무역 거래
flavor_jol.2.d코0=최근 우리 영향권에 들어온, 남쪽에 위치한 [From.GetName]로 부터 온 상인과 외교관 들에게 접촉해 들어왔습니다. 그들은 양국의 증대된 무역거래가 모두에게 큰 이익을 안겨 줄 것이라고 주장하며 무역 협정을 수립하자고 제안해왔습니다. 그들의 주장은 건전하며, 좀 더 이국적인 상품에 대한 접근을 조달할 방법이 될 수 있습니다.
flavor_jol.2.a코0=거래하자
flavor_jol.2.b코0=그런 거래를 할 필요 없다
flavor_jol.3.t코0=거래 승인
flavor_jol.3.d코0=[From.GetName]로 보낸 상인들과 외교관들이 엄청난 소식을 들고 돌아왔습니다. [From.Monarch.GetTitle] [From.Monarch.GetName]가 양국 간의 공식적인 관계를 수립하고 무역을 위한 항구와 시장을 여는 것에 동의했습니다. 이것은 반드시 우리 나라의 무역흐름을 증가시키고 거기에 따른 부도 흘러 들어오게 될 것입니다.
flavor_jol.3.a코0=좋아
flavor_jol.4.t코0=거래 거부
flavor_jol.4.d코0=[From.GetName]로 보낸 상인들과 외교관들이 끔찍한 소식을 들고 돌아왔습니다. [From.Monarch.GetTitle] [From.Monarch.GetName]가 어리석게도 양국의 무역흐름을 늘리는 어떠한 조건이든 다하리라는 조건의 무역협정을 조인하는 것을 거부했습니다. 우리 무역상들과 상인들은 우리쪽에만 머물러, 지역 상품에 만족해야 할것입니다.
flavor_jol.4.a코0=그러시던가.
flavor_jol.5.t코0=상아 수요 증가로 인한 무역 결과
flavor_jol.5.d코0=최근 서아프리카에서 찾아온 외교관들과의 거래는 예상치 못한 결과를 낳았습니다. 이국적인 산물에 좀 더 많이 접근할 수 있게된건 사실이지만, 우리 귀족과 상인들이 이런 상품들, 특히 상아에, 너무 익숙해져서, 그들 입맛에 맞추어 수입량을 얼마나 늘리든 그들은 절대 그 양에 만족하지 않을 것입니다.
flavor_jol.5.a코0=더 많은 상아가 필요하다.
