fetishist_flavor.601.desc코1=[Root.GovernmentName]의 주술사는 다른 숭배를 가졌거나 다른 종교를 가졌다고 알려진 나라와의 접촉을 요청했습니다. 앞으로 만날 숭배가 어떤 종류일지에 대해 별로 까다롭지 않으며 위대한 [Root.Monarch.GetTitle]가 그를 올바른 길로 이끌 것입니다.
