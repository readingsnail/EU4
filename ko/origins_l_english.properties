ada_the_sahel_corridor_title코0=사하라를 따라
ada_somali_empire_title코0=아달 제국 설립
ada_somali_empire_desc코0=이 뿔지역의 유일한 제국이 그 불경한 에티오피아정부인지 아주 긴 세월입니다. 그러나 이는 변화하였습니다. 에티오피아 인들을 물리쳐 아프리카 뿔지역은 [Root.GetAdjective]법아래 통합되어, 종교적 갈등이 마침내 해소되었습니다! 지금 이 시점부터 우리는 동아프리카의 새로운 제국으로 알려질 것입니다!
