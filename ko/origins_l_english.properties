kon_south_african_hegemony_province코1=남부 아프리카의 패자
desc_kon_south_african_hegemony_province코1=이 지방을 소유권을 갖고 있는 자가 '남부 아프리카의 패자'를 자처했습니다. 이 지역의 사람들은 혹여 그들의 문화가 이것을 공식적으로 받아들여지진 않더라도 따로이 그들의 지배자에 대한 권위에 의문을 제시하지 않을 것입니다.
