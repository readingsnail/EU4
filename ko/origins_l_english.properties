flavor_mal.9.t코0=[Root.GetName]의 쇠퇴
flavor_mal.9.d코1=그 위대한 만사 Musa의 형제였던 만사 Suleyman Keita의 죽음 후, [Root.GetName]의 제국은 수십 년 동안 권력, 영향력과 부에 부문에서 끊임없는 쇠퇴기를 보였다. 내전과 왕좌를 위한 투쟁, 무능한 만사들은 [Root.GetName]의 안정성을 약화시켰습니다. 예전 속국이었던 Songhai나 Timbuktu는 제국으로부터 독립을 선언했고, 이제 더 우리 지배는 조금씩 조금씩 더 무능에 잠기고 있습니다.
flavor_mal.9.a코0=암울한 시간이로다...
flavor_mal.10.t코0=[Root.GetName]의 옛 영광으로의 복귀
flavor_mal.10.d코1=기적처럼  [Root.GetName]의 [Root.GovernmentName]는 권력쟁취를 위한 내부 투쟁에서 살아남았고, 신민들에게 왕인 만사와 규합된 왕가에 충성할 것을 서약받았습니다. 이에 더해, [Root.GetName] [Root.GovernmentName]의 서아프리카에 있었던 영향력과 같이 옛 국경은 복원되었습니다. \n 이제 만사 무사를 뛰어넘어 국력을 신장하고 [Root.GetName]의 영향력을 확보할지는 [Root.Monarch.GetTitle] [Root.Monarch.GetName]에 달렸습니다.
flavor_mal.10.a코0=[Root.GetName]의 새로운 여명이 밝았노라!
flavor_mal.11.t코0=[Root.mal_pretender.GetName]가 [Root.Monarch.GetName]에 도전하다!
flavor_mal.11.d코0=Suleyman의 죽음 이후로, [Root.GetName]에서 왕좌를 차지하기 위한 전투는 흔한 광경이 되버렸습니다. 이에, 야심친 장군 [Root.mal_pretender.GetName]이 [Root.Monarch.GetTitle] [Root.Monarch.GetName]를 전복시키려고 움직이는 것은 놀랍지도 않을 것입니다. 그는 군대를 소집했고, 이제 [mal_pretender_province.GetName]를 공성중입니다.
flavor_mal.11.a코1=네 감히 나에게 도전을 해?
flavor_mal.14.t코0=[mal_disaster_estate_province.GetName]에서의 [Root.GetDhimmiName] 반란!
flavor_mal.14.d코1=[Root.GetDhimmiName] 은 무슬림들의 사회 계층 구별에 불만을 표시하며 지역 페티시즘 신봉자들에게 더 많은 권리를 요구합니다. 이제 그들은 [mal_disaster_estate_province.GetName]에서 반역을 시작하여 [Root.GetName]를 차지하려고 합니다!
