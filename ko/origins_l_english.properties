fetishist_flavor.602.desc코0=[Root.GetClergyName]들이 [Root.GetName] 궁정에 모였습니다. 너무 많은 수의 숭배가 [Root.GovernmentName]에서의 영향력을 강화하려고 한다고 걱정을 제기하고, 우선시 되는 숭배대상을 신앙을 독려하여, 더 유일신 같은 접근법 따르자 조언합니다. 그 숭배 대상은, 현명하신 [Root.GetName]의 [Root.Monarch.GetTitle]께서 항상 따르시던 바로 그것입니다.
