negusa_nagast코0=느구서 너거스트 군주정
negusa_nagast_legacy코0=느구서 너거스트 군주정
negusa_nagast_legacy_desc코0=에티오피아는 제국이지만, 느구서 너거스트(황제)의 권위를 집행할 수 있는 적절한 수단들이 부족합니다. 느구서 너거스트 군주정은 에티오피아가 될 제국의 초기 형태의 국가이며, 이 정부 개혁은 장점보다는 더 많은 문제들을 일으키는 종교적 분열, 중앙 권력의 부족 그리고 이동하는 수도가 특징입니다.
negusa_nagast_desc코0=에티오피아는 제국이지만, 느구서 너거스트(황제)의 권위를 집행할 수 있는 적절한 수단들이 부족합니다. 느구서 너거스트 군주정은 에티오피아가 될 제국의 초기 형태의 국가이며, 이 정부 개혁은 장점보다는 더 많은 문제들을 일으키는 종교적 분열, 중앙 권력의 부족 그리고 이동하는 수도가 특징입니다.
mechanic_has_itinerant_capital_yes코0=이동하는 수도를 가짐
solomonic_empire코0=솔로몬 제국
solomonic_empire_legacy코0=솔로몬 제국
solomonic_empire_legacy_desc코0=솔로몬 제국은 국가가 통합된 후의 에티오피아의 정부 개혁입니다. 종교적 논쟁은 더 이상 관심사가 아니며 제국은 이제 외부로 지배력을 행사하고 있습니다.
solomonic_empire_desc코1=솔로몬 제국은 국가가 통합된 후의 에티오피아의 정부 개혁입니다. 종교적 논쟁은 더 이상 관심사가 아니며 제국은 이제 외부로 지배력을 행사하고 있습니다.
sacred_kingdom코0=신성 왕국
sacred_kingdom_legacy코0=신성 왕국
sacred_kingdom_desc코0=통치자가 국가의 수장의 지위에 더불어 종교의 수장과 백성들의 신으로 신격화되는 절대 군주제.
sacred_kingdom_legacy_desc코0=통치자가 국가의 수장의 지위에 더불어 종교의 수장과 백성들의 신으로 신격화되는 절대 군주제.
sacred_kingdom_tt코0=[Root.GetName]의 백성들은 왕조를 신격화해 왔습니다.
tribal_confederacy코0=부족 연합
tribal_confederacy_legacy코0=부족 연합
tribal_confederacy_desc코0=여러 족장들과 소 왕들이 중앙의 권위에 복종하지만 내부적으로 일정 수준의 자율성을 유지하는 정부 형태.
tribal_confederacy_legacy_desc코0=여러 족장들과 소 왕들이 중앙의 권위에 복종하지만 내부적으로 일정 수준의 자율성을 유지하는 정부 형태.
tribe_remain_tribal_reform코0=발전된 부족 구성
tribe_remain_tribal_reform_desc코0=세력의 통합을 통해 우리 부족은 더 효율적인 정부로 나아갈 수 있었고, 이는 만족할만한 인구들을 유지하고, 통치자가 권력을 유지할 수 있게합니다.
mechanic_has_internal_tribes_yes코0=내부 부족을 가짐.
mechanic_has_locked_government_yes코0=개혁을 통해 정부를 변경할 수 없습니다.
mossi_federal_kingdom코0=모시 연합 왕국
mossi_federal_kingdom_legacy코0=모시 연합 왕국
mossi_federal_kingdom_desc코0=모시 왕국은 하나의 왕국이 아니라 더 작은 여러 모시인 왕국들의 연맹체이며, 동류 의식과 군사적 요소, 그리고 의식적인 유대를 상호 간에 공유합니다.
mossi_federal_kingdom_legacy_desc코0=모시 왕국은 하나의 왕국이 아니라 더 작은 여러 모시인 왕국들의 연맹체이며, 동류 의식과 군사적 요소, 그리고 의식적인 유대를 상호 간에 공유합니다.
shaka_regime코0=줄루 부족
shaka_regime_legacy코0=줄루 부족
shaka_regime_desc코0=부족 왕정, 다른 부족에대한 군사적 지배와 군사국가화에 중점을 둡니다.
shaka_regime_legacy_desc코0=부족 왕정, 다른 부족에대한 군사적 지배와 군사국가화에 중점을 둡니다.
mechanic_has_federal_kingdoms_yes코0=연합 왕국을 가짐
tribe_tribal_unity코0=부족의 통합
tribe_tribal_unity_desc코0=사막에서의 부족적 생활은 우리가 태어나면서 받은 유산이고 후대에게 물려줄 모습이기도 합니다. 우리는 큰 하나의 가족으로써 단합되어 있습니다. 
matrilineal_system코0=결혼 제도
matrilineal_system_legacy코0=결혼 제도
matrilineal_system_desc코0=국가의 진정한 힘이 통치자의 딸들에게 계승되는 상속의 특별한 형태입니다.
matrilineal_system_legacy_desc코0=국가의 진정한 힘이 통치자의 딸들에게 계승되는 상속의 특별한 형태입니다.
musa_rule코0=무사 통치
musa_rule_legacy코0=무사 통치
musa_rule_desc코0=말리 제국의 정부는 다른 군주정과 매우 유사하지만, 무사의 법은 결혼 상속을 허용하기 때문에 특별한 점이 있습니다. 또한, 좋지 못한 계승자의 통치 기간 동안 국가 문제를 자신들의 선에서 다룰 궁중 관리들을 지원합니다.
musa_rule_legacy_desc코0=말리 제국의 정부는 다른 군주정과 매우 유사하지만, 무사의 법은 결혼 상속을 허용하기 때문에 특별한 점이 있습니다. 또한, 좋지 못한 계승자의 통치 기간 동안 국가 문제를 자신들의 선에서 다룰 궁중 관리들을 지원합니다.
mechanic_has_tributaries_yes코0=조공국을 가질 수 있음
feudal_tribe코0=봉건제 부족
feudal_tribe_legacy코0=봉건 부족
feudal_tribe_desc코0=
feudal_tribe_legacy_desc코0=고전적인 봉건 군주제와 매우 유사한 부족 체제입니다. 속국들은 군주나 그들 휘하의 귀족의 소유 하에 있는 대신 그들의 지도자에게 공물을 바칩니다.
great_man코0=위인
great_man_legacy코0=위인
great_man_desc코0=밀림에서 평야에 이르기까지의 개척 과정을 지휘하며 부족의 전사들을 이끄는 부족 지도자들이 통치하는 체제입니다.
great_man_legacy_desc코0=밀림에서 평야에 이르기까지의 개척 과정을 지휘하며 부족의 전사들을 이끄는 부족 지도자들이 통치하는 체제입니다.
###ESTATE PRIVILEGES###
estate_church_yakobs_churches코0=성서적 안식일 개혁
estate_church_yakobs_churches_desc코1=느구서 너거스트 자라 야콥은 한 때 분열되었던 콥트 교회를 주말에 대한 다른 견해들에 대한 타협안을 찾아서 단결시켰습니다. 그의 행동 덕분에, 성직자 계급은 다른 독실한 신자들에게 야콥의 가르침을 보다 쉽게 가르칠 수 있는 개혁을 도입했습니다.
estate_burghers_control_over_the_mint코0=통제된 금 채굴
estate_burghers_control_over_the_mint_desc코1=금을 채굴하는 일은 수익성이 아주 높을 수 있습니다만, 통제가 없이 파낸다면 그들의 경제에 재앙과 같은 결과를 안겨줄 수 있습니다. [Root.GetBurghersName]에게 직접적인 채굴과 공정에 대한 통제권을 주어 일시에 너무 많은 금들이 국고로 쏟아지는 것을 막을 수 있습니다.
estate_burghers_control_over_the_mint_gt코0=모든 보유된 §YGold§! 생산 지역은§R-15.0%§!의 상품 생산 변동치를 받을 것입니다.
estate_burghers_control_over_the_mint_rt코0=소유 중인 모든 §Y금§! 프로빈스에서의 상품 생산 변동치 패널티를 제거합니다.
estate_church_one_faith_one_culture코0=종교적 문화
estate_church_one_faith_one_culture_desc코0=사회의 단합은 [Root.GetClergyName] 계층이 영적인 문제만을 다루는 것이 아니라 국가의 문화적, 사회적 문제에 있어 더 중요한 역할을 담당함으로써 비로소 이루어질 수 있습니다.
estate_church_one_faith_one_culture_gta코0=§Y[Root.Religion.GetName]§! 종교를 가진 모든 지역이, §Y[Root.Culture.GetGroupName]§!문화권에 속하거나 §Y수용문화§!라면, '§Y종교 사회§!'를 얻고 다음과 같은 효과를 받습니다:\n지역 불만도: §G-1.00§!\n지역 조세 변동치: §G+10.0%§!\n지역 생산 효율성: §G+10.0%§!\n지역 인력 변동치: §G+10.0%§!
estate_church_one_faith_one_culture_gtb코2=§Y[Root.Culture.GetGroupName]§! 문화권에 속하지 않고 §Y수용 문화§!가 아닌 모든 소유 프로빈스는 '§Y이단 문화§!' 변동치를 얻으며, 이는 다음과 같은 효과를 제공합니다:\n지역 불만도: §R+3.00§!\n지역 문화 변환 비용: §G-10.0%§!
estate_church_one_faith_one_culture_rta코0='§Y종교 사회§!' 변동치는 문화가 §Y수용 문화§!이거나 §Y[Root.Culture.GetGroupName]§! 문화권인 모든 §Y[Root.Religion.GetName]§! 지역에서 제거됩니다.
estate_church_one_faith_one_culture_rtb코0=§Y수용 문화§!와 §Y[Root.Culture.GetGroupName]§! 문화권이 아닌 모든 프로빈스에서 '§Y이단 문화§!' 변동치가 제거됩니다.
estate_dhimmi_guarantee_of_traditions코0=전통 보장
estate_dhimmi_guarantee_of_traditions_desc코1=우리 [Root.GovernmentName] 내에서의 신앙은 항상 [Root.Religion.GetName] 신도들인 상류층과 페티시즘 신도들인 하류층의 혼합으로 이루어져 있었습니다. 이런 전통을 행사하는 자유를 보장하고 그들의 믿음에 대한 정부의 간섭을 철회하여 시골 사람들의 만족을 보장해줄 수 있습니다.
MONOPOLY_INCOME_IVORY_DESC코0=상아 생산에서
MONOPOLY_INCOME_GOLD_DESC코0=금 생산에서
estate_nobles_better_integration코0=[Root.GetNobilityOrFallbackName] 통합 정책
estate_nobles_better_integration_desc코1=중앙집권과 속국을 합병하는 것은 우리 행정 관리와 외교관들이 통합 절차를 위해 바빠지기에 쉬운 작업은 아닙니다. [Root.GetNobilityOrFallbackName]에게 통합 정책에 대한 통제권을 갖게 함으로써 이를 피할 수 있습니다.
estate_church_religious_diplomats코0=종교적인 외교관
estate_church_religious_diplomats_desc코1=좋은 외교는 달성하기 어렵습니다. 소수의 단순한 오해로 두 국가간의 관계가 땅에 떨어집니다.\n우리의 믿음의 형제들에게 아주 종교적인 외교관을 파견하여 적어도 이런 일이 발생하는것을 막을 수 있습니다.
estate_church_heir_shrine코0=후계자를 위한 사원 건설
estate_burghers_hydraulic_rights코0=수자원 권리
estate_burghers_hydraulic_rights_desc코0=물의 분배는 언제나 외딴마을의 걱정하는 주제였습니다. [Root.GetBurghersName]들이 좀 더 직접적인 수자원의 권리에 대한 직접적인 통제권을 가짐으로써 수자원에 대한 공정하고 효율적인 분배를 할 수 있습니다.
estate_burghers_enslaving_rights_gt코0=소유한 모든 §Y사막§!, §Y해안 사막§!, §Y스텝§!, §Y사바나§! 지역에서 지형으로 인한 개발도 비용 증가를 §G50.0%§! 감소시킵니다.
estate_burghers_enslaving_rights_rt코0=소유한 모든 §Y사막§!, §Y해안 사막§!, §Y스텝§!, §Y사바나§! 지역에서 개발도 비용 감소를 제거합니다.
estate_nobles_cawa_peace_keepers코1=카와 평화유지군 배치
estate_nobles_cawa_peace_keepers_desc코0=카와는 에티오피아의 정예 병력이자 귀족 전사 계층입니다. 그들에게 특정 특권들을 부여해 우리는 그들이 우리의 외딴 지역들에서 평화를 유지하기 위해 자신의 능력을 사용할 수 있도록 할 수 있습니다.
estate_nobles_cawa_offensive_fighters코0=카와 정복군 배치
estate_nobles_cawa_offensive_fighters_desc코0=카와는 에티오피아의 정예 병력이자 귀족 전사 계층입니다. 그들에게 특정 특권들을 부여해 우리는 그들이 우리의 적들의 요새를 부수는 것에 자신의 능력을 사용할 수 있도록 할 수 있습니다.
eth_estate_did_not_have_cawa_privilege_for_five_years코1=우리는 지난 §Y5년§! 동안 카와 배치 특권을 선택하지 않았습니다.
estate_church_embrace_singluar_cult코0=단일 숭배 대상 수용
estate_church_embrace_singluar_cult_desc코0=우리 종교는 여러 다른 숭배를 존중합니다. 그러나 이 중 하나만이 다른 것들보다 훨씬 중요합니다. 우린 이 단 하나의 숭배를 받아들이고 숭상된 신격 존재를 주 숭배대상으로 삼아야 합니다.
estate_church_flexible_cults코0=유연한 숭배 대상
estate_church_scholar_connections코0=종교 학교 설립
estate_church_scholar_connections_desc코0=다른 학파의 학자를 초청하는 것은 행정력의 투자를 필요로합니다. [Root.GetClergyName]들이 종교 학파를 세우게 해서 우리 나라 안의 많은 학자들을 통합할 수 있습니다.
estate_church_integrated_school코0=학자들에게 영주권 승인
estate_church_integrated_school_desc코0=외국 학자의 우리 국경 안에서의 영주권을 허락함으로써, 불필요한 정치적 행동 없이 그들의 지식에 대한 확실한 접근이 가능합니다.
estate_nobles_neighbor_raids코0=이웃 습격
estate_nobles_neighbor_raids_desc코0=인력은 어느 국가에서도 제대로 보장되지 않습니다. [Root.GetNobilityOrFallbackName]에게 예속된 세력을 통제할 수 있는 힘을 부여함으로써, 우리는 [Root.GovernmentName]에 필요한 새로운 인력을 확보할 수 있습니다.
estate_nobles_decentralized_tribe코0=분권화된 연합
estate_nobles_tribe_unification코0=부족 특권 폐지
estate_nobles_tribe_centralization코0=부족 중앙집권화
estate_nobles_tribe_centralization_desc코0=부족 연합체를 해체하고 권력의 중앙집권화를 이룰 때가 왔습니다!
can_not_have_tributaries코0=§Y조공국§!을 설립할 수 없습니다.
estate_nobles_grant_power_to_the_bashorun코0=바쇼룬에게 권력 부여
estate_nobles_grant_power_to_the_bashorun_desc코0=바쇼룬은 [Root.GetNobilityOrFallbackName]의 지도자이고, [Root.Monarch.GetTitle]의 권력을 견제합니다. 통치와 조직에 대한 추가적인 권력을 바쇼룬에게 부여함으로써 부적격한 지배자의 통치기간에도 [Root.GetName]의 안정성을 확보할 수 있습니다.
###TRADE MODIFIER###
ETH_CONTROL_OVER_GATE_OF_TEARS코0=바브엘만데브 해협 통제
MALI_IVORY코0=말리 상아
###SCRIPTED EFFECTS AND TRIGGERS###
unlock_privilege_estate_burghers_control_over_the_mint_tt코0=[Root.GetBurghersName] 계층 특권인 '§Y통제된 금 채굴§!'을 사용할 수 있습니다.
unlock_privilege_estate_nobles_cawa_peace_keepers_tt코1=[Root.GetNobilityOrFallbackName] 계층 특권 '§Y카와 평화유지군 배치§!'를 사용할 수 있게 해줍니다.
unlock_privilege_estate_nobles_cawa_offensive_fighters_tt코0=[Root.GetNobilityOrFallbackName] 계층 특권 '§Y카와 정복군 배치§!'를 사용할 수 있게 해줍니다.
mal_add_disaster_stability_tt코1=§Y말리의 쇠퇴§! 재앙이 활성화 상태라면, §G1§! 안정도 (이미 안정도가 3이라면 §G50§! 행정력을) 얻습니다.
set_prestige_to_zero_tt코0=[This.GetName]의 위신을 §Y0§!으로 설정합니다.
unlock_cult_through_selection_tt코0=당신의 선택에 따른 §Y숭배§!를 잠금해제 합니다.\n다른 종교에 대한 숭배를 위해선 우선 그들의 존재를 우선 알아야만 합니다.
enable_development_on_buildings_built_tt코0=방어 건물을 제외한 건물들을 건설하는 것은 지역의 개발도를 §Y증가§!시킬 것입니다.\n이 효과가 활성화된 상태에서 건설 되었던 건물이 파괴되었을 경우에는, 그 개발도를 제거합니다.
enable_primary_cult_tt코1=§Y주 숭배대상§!의 사용이 가능해지고, 이것은 숭배의 강도를 증가시키고 군주의 사망시 안정도 감소를 받지 않게 해줍니다, 하지만 다른 숭배를 불가능하게 만듭니다..\n주 숭배대상은 매 §Y50§! 년마다 교체될 수 있습니다.
disable_primary_cult_tt코0=§Y주 숭배대상§!의 사용이 불가능해졌습니다. 더불어 다른 대상에 대한 숭배가 가능해졌습니다.
select_primary_cult_yemoja_cult_tt코0=§Y예모자§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 예모자 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_roog_cult_tt코0=§Y오그(roog)§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 오그(roog) 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_nyame_cult_tt코0=§Y은야메§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 은야메 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_cwezi_cult_tt코0=§Y퀘지(Cwezi)§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 퀘지(Cwezi) 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_central_african_ancestor_cult_tt코0=§Y므리바§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 므리바 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_mwari_cult_tt코0=§Y음와리§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 음와리 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_enkai_cult_tt코0=§Y엔카이§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 엔카이 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_waaq_cult_tt코0=§Y와크§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 와크 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_zanahary_cult_tt코0=§Y자나할§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 자나할 신앙의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_christianity_cult_tt코0=§Y기독교§!는 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 기독교의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
select_primary_cult_islam_cult_tt코0=§Y이슬람§!은 우리의 §Y주 숭배대상§!이 됩니다.\n다른 숭배들은 이제 사용이 불가능 하지만, [Root.Monarch.GetTitle]의 죽음으로 인한 안정도 감소를 겪지 않을 것입니다. 추가적으로 이슬람의 변동치가 강화됩니다.[Root.GetHeirPrimaryCultFeature]
