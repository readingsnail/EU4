flavor_mal.41.advisor.mashriq코0=아나톨리아 횡단 후, 세 순례자들은 이제 그들이 마쉬릭의 사막에 있음을 깨달았습니다. 이집트로 가는 길에 유대인과 기독교인 그리고 무슬림 모두 다에게 엄청난 종교적 중요성의 중심이 되는 예루살렘의 성스러운 도시지역에 도착했고 수시간동안 기도하는데 썼습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.egypt코0=[Root.GetName]의 [Root.Monarch.GetTitle]께 이집트는 그렇게 색다른 곳은 아닙니다. 많은 우리 조상들이 쿠푸의 대 피라미드를 바라보았습니다. 그러므로 피라미드를 세 탐험가들 역시 방문하는 것은 당연합니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.arabia코0=수 년의 여행이 지나고, 세 현자들이 마침내 모든 도시중 성스럽기로는 제일가는 도시, [385.GetName]에 도착했습니다! 도시의 거주민들은 [Root.GetAdjective] 지난 순례를 기억하며 따라서 팔을 넓게 벌리며 반깁니다.\n2주의 시간이 기도와 지난 순례길에 대한 경험에 대한 문서 작업으로 흘렀습니다. 떠나기전 그들은 [385.GetName]의 사람들에게 작별선물을 남기기로 결정하셨습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.horn_of_africa코1=우리 집단에게 집으로 돌아가는 길이 잘 알려져 있지만 그들은 새로운 길을 통해 고향으로 돌아가도록 결정했습니다. [1330.GetName]의 해협을 여행하며 셋은 "프레스터 존"의 고향이라 불리는 땅을 발견했습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.home코0=5년도 전, 위대하신 [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName]의 위대한 세 조언가들이 [Root.Monarch.GetTitle]를 대신하여 [385.GetName]로 향하는 순례길에 오르기 시작했습니다. 그러나 가장 빠른 길보다도 유럽을 가로지르는 길을 택한 담대한 결정이 내려져 [Root.Monarch.GetSheHe]께서는 보지 못하셨을 것들을 보고 관찰할 수 있었습니다.\n그 오랜 시간이 지나 그들은 마침내 [Root.Capital.GetName]로 돌아왔습니다! 조언가로써 순례길에 올라 그들의 역할을 다하지 못했을지언정, 그들의 지혜는 이제  [Root.Monarch.GetName]를 깨우치게 될 것입니다.
