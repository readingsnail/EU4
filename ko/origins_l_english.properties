eth_legacy_of_alexandria코0=알렉산드리아의 유산
eth_coptic_offense코0=콥트교의 공격
eth_conversion_focus코0=콥트교의 귀환
eth_blessing_of_kings코0=주님의 축복
eth_restoration_of_antioch코0=안티오크의 회복
desc_eth_obelisk_of_axum코0=악숨의 오벨리스크는 악숨 제국의 고대 유적으로 5세기에 세워졌습니다. 많은 순례자들이 과거와 현재를 기리기 위해 이 오벨리스크를 보러 여행옵니다.
eth_surpassed_aksumite_empire코0=악숨의 유산
desc_eth_surpassed_aksumite_empire코0=우리의 영토는 악숨 제국을 능가했습니다. 우리는 고대 악숨의 유산을 주장했습니다!
desc_eth_negusa_nagast_issues코0=에티오피아에는 중앙집권화가 거의 없습니다. 통제해야 할 지역으로 수도를 옮겨다니는, 느구서 너거스트의 존재만이 권위를 발휘할 수 있는 유일한 가능성입니다.
