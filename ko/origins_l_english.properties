flavor_mal.43.desc.a코0=[From.GetName]의 [From.Monarch.GetTitle](이)가 [Root.Capital.GetName]에 도착했습니다. 이 현명한 [From.Monarch.GetTitle]은 [385.GetName]로 향하는 순례길이고, 우리 마을과 도시를 방문해왔습니다. [From.Monarch.GetSheHe]은(는) 우리의 환대에 감동을 한 것으로보이며, 우리에게 [Root.mal_money_to_give_tt.GetValue]두캇의 기부금을 제안합니다. 그 순금의 양이란 우리가 본 적 없는 정도이고, 기부금을 받음으로써 우리 경제에 피해를 줄수도 있습니다만, 우리 기반시설을 크게 개선시킬 수 있게 해 줄 것으로 보입니다.
