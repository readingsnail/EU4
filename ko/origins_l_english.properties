flavor_ada.4.d코0=우리 외교관이 우울한 소식을 들고 왔습니다: 우리에게 쓰는 그들의 시간이 아깝다고 생각하기에, 유망해 보이던 [From.GetAdjective] 동맹이란 발상을 거절했습니다. 물론, 웃기는 생각입니다. 그러나 우리의 최선의 외교적 입장이라곤 보기 힘듭니다.
flavor_ada.4.a코0=빌어먹을!
flavor_ada.5.d코0=우리 외교관이 고향으로 돌아왔습니다. 패배감에 지쳐 보이고 심지어 충격에 휩싸인 듯이 보입니다. 아나톨리아에는 우리를 기꺼이 도와줄 위대한 제국이 남아있지 않습니다. 이교도와 이단들이 아나톨리아와 유망한 동맹이던 투르크인들을 정복해버리고 이제 적대적인 세력의 속국이 되었습니다.
