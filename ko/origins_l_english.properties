ada_war_against_ethiopia코0=아달-에티오피아 전쟁
desc_ada_war_against_ethiopia코0=이제 다시한번 우리의 숙적 에티오피아와 아프리까 뿔 지역의 주도권을 두고 싸우게 되었습니다! 우리 군대는 그리스도교인들의 대다수를 죽여 수십년에 이를 우리를 향한 위협을 잠재울 것입니다.
