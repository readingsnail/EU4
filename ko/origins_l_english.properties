mal_purchase_trade_colony_desc코0=유럽인들이 우리같은 이들을 신뢰하진 않지만, 금으로 어떻게든 그들의 지역 중 한 곳을 팔게끔 설득할 수 있었습니다.\n대상국과 우리 관계가 좋은 쪽인지 따져봐야합니다.
mal_purchase_trade_colony_tt코1=§Y5개의 선택된 지역의 소유주에게 그들로 부터 구매가 가능한지 여부에 관해 물어 볼 수 있습니다.\n우리에게 지역을 판매할 확률은 우리에 대한 그들의 의견에 달려있습니다. 낮을 의견을 가질 수록, 희망하는 지역을 우리에게 팔 확률이 낮아집니다.§!
