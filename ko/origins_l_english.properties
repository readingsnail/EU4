flavor_aju.5.b코0=쫓아내라.
flavor_aju.6.t코0=천자에게 기린을
flavor_aju.6.d코0=먼 곳에 위치한 나라 [From.GetName]에서 사절을 우리의 영광스러운 [Root.Monarch.GetName]께 보내왔습니다. 그들의 국내 소식과 값비싼 선물들을 가지고 왔고 유독 하나가 [Root.Monarch.GetTitle]의 눈을 사로잡습니다. 기린이란 동물로, 우리나라에선 신화나 전설 속에서나 친숙한 동물입니다. 이 동물을 그들의 통치자 [From.Monarch.GetTitle]의 친선의 표시로 선물로 보내왔습니다.
flavor_aju.6.a코0=이건...이건...아름답구나!
flavor_aju.6.b코0=고맙소, 하지만 우리는 진정 기린이 필요하진 않소만.
flavor_aju.2.t코0=그들이 우리의 거래를 수락했습니다
flavor_aju.2.d코0=[From.GetName]의 통치자는 우리의 거래를 정중히 받아들였습니다. 확실히 양국 상호간의 이익을 발생시킬것이며, 우리의 실질적 경제에 날개를 달아줄 것입니다.
flavor_aju.2.a코0=좋군.
flavor_aju.3.t코0=그들이 우리 거래를 거부했습니다.
flavor_aju.3.d코0=[From.GetName]의 바보들은 감히 관대한 우리의 거래를 거절했습니다. 이는 오롯이 그들의 손실이며 우리는 후일 그들에게 베풀지 아니 할 것입니다.
flavor_aju.3.a코0=이를 우린 기억할 것이다.
flavor_aju.4.t코0=화폐 생산
flavor_aju.4.d코0=금광에 접근이 가능해진 후, 동전들을 찍고 만드는것에 통제 상황이 더 좋아져 우리나라의 부를 증대 시키는 결과를 낳았습니다. 안정되고 제대로 된 화폐 생산 산업은 반드시 우리 경제력을 증대시킬것입니다.
flavor_aju.4.a코0=좋아.
flavor_aju.4.a.tt코0=당신의 속국이 보유한 금 프로빈스의 금 생산량 §G4년§!치에 해당하는 양의 가치를 얻습니다.
flavor_aju.7.t코0=황제가 기린을 사랑하다
flavor_aju.7.d코0=[From.GetName]에 보낸 사절이 마침내 돌아왔습니다. 분명,[From.Monarch.GetTitle] [From.Monarch.GetName]은 우리의 선물에 기뻐하고 우리가 제공한 기린을 정중히 받아들였습니다. 양국의 관계는 밝을 것입니다.
flavor_aju.7.a코0=맘에 든다니 좋군.
flavor_aju.8.t코0=별로라더군.
flavor_aju.8.d코0=[From.GetName]에 보낸 사절이 마침내 돌아왔습니다. 분명,[From.Monarch.GetTitle] [From.Monarch.GetName]은 선물에 별 감흥없고 우리가 제공한 기린을 거절했습니다. 사절은 다시 기린을 가지고 돌아가라 강요당했고, 이 불쌍한 동물은 돌아오는 여행길을 버티지 못했습니다. 이 불경함을 쉬이 잊지는 못할것입니다.
flavor_aju.8.a코0=너도 별로야...
flavor_aju.9.t코0=왕조 통합
flavor_aju.9.d코1=우리 군도는 과거에 [From.GetName]의 식민지였습니다. 몰디브를 통치하는 것은 너무나 어려운 일이었지만 결국 우리는 자유를 얻었습니다 - 지금까지는 말입니다. [From.GetAdjective] 대사가 본토에서 우리에게 와서 이 상황을 종식시켜 달라고 요청했습니다. 그들은 같은 가문의 통치를 받으면서 두 개의 다른 나라로 보이는 것은 말이 되지 않는 일이며, 우리가 형제들과 재결합하면 둘 다 이득을 볼 것이라고 주장하고 있습니다.
flavor_aju.9.a코0=돌아온 것을 축하합니다
flavor_aju.9.b코2=우리는 [From.GetName]에게 복종하지 않을 것이다!
flavor_aju.10.t코0=왕조 통합 - 그들의 수락!
flavor_aju.10.d코0=[From.GetName]로 보낸 우리의 사절이 엄청난 소식을 들고 돌아왔습니다! [From.GetName]의 [From.Monarch.GetTitle]이 하나의 기치아래 통합한다면 우리 모두에게 이익이라는 것에 동의 했습니다.
flavor_aju.10.a코0=잘 돌아왔다
flavor_aju.11.t코0=왕조 통합 - 그들의 거절!
flavor_aju.11.d코1=[From.GetName]로 보낸 우리의 사절이 급박한 소식을 들고 돌아왔습니다! [From.GetName]의 [From.Monarch.GetTitle]이 양국을 통합하자는 재통합하기를 거부했습니다. 그 멍청이는 [From.Monarch.GetHerselfHimself] 자신이 우리보다 낫다고 생각하고 있음이 분명합니다. [From.Monarch.GetSheHe]가 깨닫지 못하는게 하나 있다면, 우리의 전갈은 단지 형식적이었고, 그들 맘에 들든 말든 그들은 우리 나라의 한 부분이며, 우리는 그것을 반드시 보여줄 것입니다.
flavor_aju.11.a코0=그들의 땅은 무슨 수를 써서든 우리의 것이 될 것이다!
flavor_aju.12.t코0=[Root.GetName]의 [From.GetName] 상인
flavor_aju.12.d코0=[From.GetName]에서 보낸 상인들은 분명 우리에게 큰 이익을 가져다 줄 것입니다. 그렇게 먼 지역과의 교역은 엄청난 부를 끌어오고 사람들은 [613.GetName] 지역을 번화한 시장으로 바꿔놓을 것입니다.
flavor_aju.12.a코0=좋아
