flavor_zim.2.t코1=짐바브웨를 능가하다
flavor_zim.2.a코1=물론이지! 이제부턴 우린 짐바브웨로 불릴것이다.
flavor_zim.2.b코0=조상이란 것은 과거의 산물이다. [Root.GetName]은 미래고!
flavor_zim.2.b.tt코0=§Y짐바브웨§!형성 결단을 내릴 수 있습니다.
flavor_zim.5.t코0=상인들 간의 종교적 갈등
flavor_zim.5.desc코1=[Root.GetName]은 전 세계 모든 상인들에게 금과 상아에 대한 접근성으로 매력적인 곳입니다. 이러한 매력은 엄청난 번영을 가져다 주기도 하지만, 상인들간에 종교적 분쟁이라는 부작용을 내포하고 있습니다. [Root.Capital.GetName]내의 기독교와 이슬람 상인 간의 다툼으로, 서로 우리 궁정과 시장에 경쟁적으로 꺾으려 합니다.\n완전한 평화를 가져오기 위해선 이런 상호공격적인적인 상인들의 태도에 어떤 식으로 대할지 [Root.Monarch.GetName]가 선택해야 합니다.
flavor_zim.5.a코0=기독교 상인 들의 편에 선다.
flavor_zim.5.a.tt코0=§Y종교적 필연§!이라는 결과가 나중에 있을 수 있지만, [Root.Monarch.GetName]은 기독교 상인편에 섭니다...
flavor_zim.5.b코0=무슬림 상인 들의 편에 선다.
flavor_zim.5.b.tt코0=§Y종교적 필연§!이라는 결과가 나중에 있을 수 있지만, [Root.Monarch.GetName]은 무슬림 상인편에 섭니다...
flavor_zim.5.c코1=분쟁 사이에서 이득을 취해야 한다.
flavor_zim.5.d코0=두 상인 집단 모두 도시 밖으로 쫓아낸다.
flavor_zim.6.t코0=[Root.Monarch.GetName]의 개종
flavor_zim.6.d.a코0=무슬림 상인들은 우리 도시에서 추방당했으며, 그리스도교 상인들은 경쟁없는 환경을 즐겼습니다. 시간이 지남에 따라 [Root.Monarch.GetTitle]께서는 그리스도인들을 매우 좋아하게 되었습니다. 어느 날 [Root.Monarch.GetName]께서는 상인으로 위장한 선교사들의 방문을 받았고 [Root.Monarch.GetSheHe]는 별 생각없이 기독교로 개종했습니다. 이제 [Root.GetName]의 통치자의 자리엔 그리스도교도인 [Root.Monarch.GetTitle]가 있습니다!
flavor_zim.6.d.b코1=기독교 상인들은 우리 도시에서 추방당했으며, 무슬림 상인들은 경쟁없는 환경을 즐겼습니다. 시간이 지남에 따라 우리의 [Root.Monarch.GetTitle] 무슬림을 아주 좋게 되었습니다. 어느 날 [Root.Monarch.GetName]은 상인으로 위장한 선교사들의 방문을 받았고 [Root.Monarch.GetSheHe]는 별 생각없이 이슬람으로 개종했습니다. 이제 [Root.GetName]의 통치자의 자리엔 무슬림 [Root.Monarch.GetTitle]가 있습니다!
flavor_zim.6.a코0=이제 우린 모두 그리스도인이야!
flavor_zim.6.b코0=이제 우린 모두 무슬림이야!
flavor_zim.6.d코0=별로 [Root.GetAdjective]와는 관계 없어.
flavor_zim.7.t코0=소팔라의 지도
flavor_zim.7.d코0=소팔라의 정복으로, [Root.GovernmentName]는 이 부유한 무역도시의 지도를 열어 볼 수 있었습니다. 거기엔 서 인도양의 매우 중요한 해안도시에 더해 무슬림 신앙에 중요한 위치를 차지하는 다른 도시들 또한 드러내고 있었습니다.
flavor_zim.7.a코0=이 지도들은 아주 유용하겠어.
flavor_zim.7.a.tt코0=§Y아프리카의 뿔§!, §Y이집트§!, §Y아라비아§!, §Y마쉬릭§ 지역 발견! 추가로 §Y서 인도양§! 까지.
flavor_zim.8.t코0=아시아 무역의 고대 지도
flavor_zim.8.d코1=새로운 무역 선단의 창설은 새로운 기회를 찾는 많은 상인들을 끌여들었습니다. 이런 상인들 중 하나에게 짐바브웨가 중국과 계약했던 시절의 옛 지도를 갖게되는 기회가 생겼고, [Root.Monarch.GetTitle]께 기부한 일은 아주 좋은 일이었습니다.
flavor_zim.8.a코0=무척 고맙구나.
flavor_zim.8.a.tt코0=Y[1816.GetName]§!에 대한 해양 무역로를 발견합니다.
flavor_zim.9.t코0=[1184.GetName]를 잃다!
flavor_zim.9.d코0=[1184.GetName]의 대도시는 [Root.GetName]의 적들의 손에 떨어졌습니다. 우리 백성들은 신성한 [Root.Monarch.GetTitle]에 대해 의심하며, 혼란에 빠졌습니다.
flavor_zim.9.a코0=좋지 않아.
flavor_zim.10.t코0=[1184.GetName]는 다시금 [Root.GetAdjective] 손에 들어왔습니다.
flavor_zim.10.d코0=대도시 [1184.GetName]는 다시금 우리 손에 들어왔습니다! 우리 백성은 마침내 다시 안정을 되찾았습니다!
flavor_zim.10.a코0=좋아.
