###ETH FLAVOR EVENTS###
flavor_eth.29.t코0=[Root.GetName]의 떠돌이 수도
flavor_eth.29.desc코1=[Root.GetName]의 느구서 너거스트(황제)들은 그들이 필요하다고 보는 지역들로 궁정을 옮겨다녔기 때문에 [Root.GetName]의 수도는 결코 고정되지 않았습니다. 이 제도는 새로운 수도의 주변 지방이 솔로몬 왕조의 손아귀 아래에 있도록 보장했지만, 나머지 [Root.GetName]의 지역들은 대부분이 자치적이었으며, 그 결과 이 지역들에 대한 통제권을 상실했습니다.
flavor_eth.29.a코0=알겠다.
flavor_eth.30.t코0=영구적인 수도 확립
flavor_eth.30.desc코0=[Root.Monarch.GetTitle] [Root.Monarch.GetName](은)는 [Root.GetName] 국가를 근대화시켰으며, [GetYear]년 [Root.Capital.GetName]에 첫 번째 수도를 설립했습니다. 또한, [Root.Monarch.GetSheHe]는 중요한 결정들을 오래 끌어온 종교적 논쟁들을 해결했고, 정부를 중앙집권화 했습니다. [Root.Monarch.GetHerHisCap] 업적들은 [Root.GetAdjective]의 역사에서 영원히 기억될 것입니다.
flavor_eth.30.a코0=마침내. 더 이상 이동하는 수도는 없다.
flavor_eth.30.b코0=나는 이동하는 수도가 좋다.
flavor_eth.33.t코0=언약궤 개방
flavor_eth.33.desc코1=수 천년 동안 아무도 언약궤를 열지 않았습니다. 그래서 그 내용물은 평범한 신자들에게 신비였으며 심지어 성직자에게도 이 사건은 신비스러운 것 중 하나입니다. 국내의 잠재적인 공황 상태를 줄이기 위해, [Root.Monarch.GetName](은)는 호기심이 강한 대중들의 눈에서 멀리 떨어진 궁전에서 이 전설적인 유물을 열기로 결정했습니다.\n 우리의 품위있는 [Root.Monarch.GetTitle] 그리고 [Root.Monarch.GetHerHis] 측근들이 도금된 나무 상자를 열었을 때, 그들은 약속된 것을 발견했습니다. 바로 두 개의 십계명 돌판과 아론의 지팡이 그리고 만나의 항아리가 있었습니다. 이것은 가장 화려한 사건은 아니었지만, 가장 종교적인 사건 중 하나였습니다. 이 유물의 진위를 확인한 후, 성직자 계층은 유물들을 다시 상자에 넣고 다시 언약궤를 숨겼습니다.\n\n이 사건 후 며칠이 지났고, 우리의 [Root.Monarch.GetTitle]에게 많은 활동들이… 더 쉽게 느껴졌습니다. 마치 하느님께서 직접 우리의 영광스러운 왕조와 우리 나라의 운을 축복하신 것처럼 말입니다!
flavor_eth.33.a코0=하느님 아버지께서 우리를 축복하시고, 그리스도께서 우리를 보살피시기를!
flavor_eth.35.t코0=[Root.GetName]의 속국들
flavor_eth.35.desc코1=다모트와 하디야는 100년 넘게 영광스러운 우리 [Root.GovernmentName]의 종속국이었습니다. 그들은 조공을 바쳐 우리를 잘 섬겨왔지만, [Root.Monarch.GetName] 궁정의 많은 사람들은 그들을 [Root.GetName]에 완전히 합병될 때가 되었다고 주장합니다. 결국, 이 두 국가를 어떻게 할 것인지는 선량한 우리 [Root.Monarch.GetTitle]에게 달렸습니다.
flavor_eth.35.a코0=그들은 우리 나라의 일부가 될 것이다!
flavor_eth.35.b코0=그들은 종속국으로 더 유용하다.
flavor_eth.37.t코0=수아킨에서의 기독교 복원
flavor_eth.37.desc코0=수아킨이 1317년에 맘루크에게 넘어갔음에도 불구하고, 많은 사람들은 이 도시가 아직 기독교의 중심으로 남아있다고 믿었습니다. 그러나 이 도시에 점점 더 많은 무슬림 이민자들이 정착하자 상황은 달라졌습니다. 시간이 지나며 신앙의 형제인 이 도시의 마지막 남은 한 줌의 기독교인들은 음지로 숨어야만 했습니다. 하지만 수아킨이 다시 진실된 하나님의 종인 [Root.GovernmentName]의 보살핌 아래에 들어오면서 이런 믿음적 날들은 끝났습니다! 다시금 숨어있던 콥트교도들이 주의 밝은 빛 아래로 돌아왔습니다!
flavor_eth.37.a코0=이 영혼들이 축복받기를!
flavor_eth.38.t코0=악숨의 주요 항구, 아둘리스
flavor_eth.38.desc코1=사암으로 만든 벽과 텅 비어버린, 관리되지 않은 거리들은 고대 제국의 보석이라고 불리던 도시의 유적을 장식하고 있습니다. 우리 조상들에게 슬픈 모습으로 남아있었지도 모릅니다. - 그러나 만약 지금 조상들이 [Root.GetName]의 자랑스럽고 부지런한 우리 노동자가 만든 것을 본다면! 놀랍게도 짧은 시간 내에, 우리의 건설자와 시공자들은 옛 아름다움을 이 항구 도시에 되돌려주었고 우리의 사람들의 많은이 도시에 정착하기 시작했다!
flavor_eth.38.a코0=그리고 이번에, 아둘리스는 훨씬 더 오래 살아남을 것이다!
flavor_eth.39.t코0=악숨의 영토 능가
flavor_eth.39.desc코1=원래, 악숨 제국은 누비아와 북부 에티오피아 지방 그리고 아라비아 남부 해안만 소유했었습니다. 악숨의 영토는 우리의 상대가 되지 않습니다! [Root.Monarch.GetName](은)는 우리 [Root.GovernmentName]을 많은 성공적인 전투들과 군사 원정들로 이끌었으며 이제 우리는 400년 이전에 멸망한 제국을 재건했을 뿐만 아니라 능가했습니다!\n이 대규모 정복 원정들에 따라서, 많은 우리 귀족들은 고대 제국을 부활시킨 우리의 힘을 세계에 과시하기 위해 "악숨 제국"이라는 이름을 공식적으로 다시 쓰기를 간청하고 있습니다. 다른 한편으로는, [Root.Monarch.GetName]의 조언가들은 미래를 바라보기 시작하는 것을 추천하고 있습니다. 우리의 사랑받는 [Root.Monarch.GetTitle](은)는 어떤 결정을 내려야하겠습니까?
flavor_eth.39.a코0=우리는 악숨 제국의 역할을 맡아야 한다!
flavor_eth.39.b코0=조언가들이 옳다. 우리는 이 세상에 우리만의 발자취를 남겨야 한다!
flavor_eth.40.t코0=세미엔 왕국
flavor_eth.40.desc코2=악숨제국이 이 땅을 다스리던 시절, 참된 신앙을 따르기를 거부한 유대인들이 있었다. 그들은 악숨의 황제 Ezana의 종교적 선언에 저항하고 정당한 황제에 대한 반란을 조직했다. 수세기가 지나 유대인 여왕 Gudit가 군대를 소집해 악숨 제국을 완전하게 파괴했다.\n이 모두 아주 먼 역사이지만, 하지만 베타 이스라엘은 성가신 그룹으로 남았고, 심지어 [Root.GetName]에게도 마찬가지입니다. 베타 이스라엘의 강한 저항에 부딪히더라도 우리는 [Root.Religion.GetName]로 개종시킬 수도 있습니다.
flavor_eth.40.a코1=그들에게 [Root.Religion.GetName] 신앙의 길을 보여라.
flavor_eth.40.b코1=우리 백성 사이에 골을 만들면 안될 것이다.
flavor_eth.41.t코1=나일 강의 여행
flavor_eth.41.desc코1=보통 대부분의 외교관들은 이집트까지 걸어가서 유럽으로 가는 좋은 배를 타게 됩니다. 그러나 때로는, 인간은 대담해져서 목적지까지 가기 위해 다른 방법을 시도하곤 합니다. 현재 우리 대사가 그런 이로, 우리 위대한 함대 소속의 몇척의 갤리를 가지고 나일강을 통해 여행했습니다. 대사에겐 다행히도 주님께서 그를 대하와 북부의 불신자로부터 보호하고, 그를 지중해로 인도하셨습니다.
flavor_eth.41.a코0=그럴거라곤 생각지 못했는걸.
flavor_eth.42.t코0=그리스도인들과 접촉!
flavor_eth.42.desc코1=추가적인 50 일 간의 여행 후, 일전의 대사는 목표에 도달했습니다: 유럽의 기독교인들과 접촉하라! 그들의 견해는 매우 이단적이지만, 우리의 외교관들은 다시 한번 외부 세계와 접촉하게 되어 기쁩니다. 또한, 이 '가톨릭 신자들'은 이슬람 위협에 대한 십자군에 대한 우리의 야망을 공유하며 잠재적 동맹으로 만들것입니다.
flavor_eth.42.a코0=신께서 새로이 찾은 우리의 동맹과 이 대사에게 축복을 내리시길!
flavor_eth.43.t코0=수상한 사절
flavor_eth.43.desc코1=경비병들은 오늘 아침 로마를 향해 직선으로 향하는 세 갤리의 이상한 무리를 발견했습니다. 갤리에 있던 자들에게 그들이 공격적인 의도가 없음을 확인한 후, 요격 함대는 그들을 통과시켰습니다.  분명히, 이 자들은 동료 기독교인이며, 위대한 나일 강을 통해 에티오피아에서 먼 길을 항해했다고 주장하는 수상한 대사를 지키고있다.\n 대사는 [From.GetName]과 로마 제국 사이의 오래된 연락을 복원하기 위해 여기에 온것이다!
flavor_eth.43.a코1=에티오피아라고? 잠깐만... 프레스터 존의 종복인가?!
flavor_eth.43.a.tt코0=§Y[From.GetName]§!의 모든 지역을 발견합니다.
flavor_eth.44.t코0=포르투갈과의 동맹?
flavor_eth.44.desc코1=[Root.GetName]은 이전에 포르투갈인들과 접촉했지만, 우리는 그들과의 동맹을 원하지 않았습니다. 그러나 이교도가 우리의 목을 졸라 숨조차 쉬기 어려워진 형국과 가톨릭 교황의 미온적인 대처로, 우리의 외교관들은 대신 포르투갈인들과 동맹하는 것이 좋다고 판단했습니다. 대사가 [Root.Monarch.GetName]의 명을 기다립니다!
flavor_eth.44.a코0=항해하라, 내 아들아, 그리고 그들에게 우리의 동맹을 제공하라!
flavor_eth.44.b코0=다시 생각해보건데 ... [Root.GetName]은 그들이 없는 편이 더 이로울 것이다.
flavor_eth.45.t코0=[From.GetName]의 동맹 요청
flavor_eth.45.desc코1=이국 땅의 젊은 외교관은 [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.GetName] 궁정에 도착해 듣기를 간청합니다! 보이기를, 그 자는 [From.GetName]의 고대 땅에서 오고 있습니다. 동료 그리스도인으로서, 우리와 동맹을 제안하도록 파견되었습니다.\n 유럽 내에서 유익한 도움을 받기에는 너무 멀리 떨어져 있지만 [From.GetName]은 여전히 인도양에서 우리의 야망에 유용한 동맹국이 될 수 있습니다.
flavor_eth.45.a코0=그들의 제안을 수락해야한다.
flavor_eth.45.a.at코0=§Y[From.GetName]§!가 [ADA.GetName]과 전쟁 중이고 [ADA.GetName]이 오스만의 지원을 받았을 경우 §Y포르투갈 머스킷병§! 용병대를 사용할 수 있게 됩니다.
flavor_eth.45.b코0=유용하겠구나, 그래, 하지만 [From.GetName]보다는 나은 동맹국들이 있다.
flavor_eth.46.t코0=[From.GetName]이 동맹을 수락하다
flavor_eth.46.desc코0=우리의 외교관이 돌아왔습니다! 그는 자신의 첫 임무를 성공적으로 완수했다는 눈빛으로 포르투칼인들이 제안을 받아들이고 우리의 동맹이 되기를 바란다고 전했습니다!
flavor_eth.46.a코1=정말 좋은 소식이군!
flavor_eth.46.a.at코0=§Y[From.GetName]§!은 우리가 [ADA.GetName]과 전쟁 중이고 [ADA.GetName]이 오스만의 지원을 받았을 경우 우리를 지원할 것입니다.
flavor_eth.47.t코0=[From.GetName]이 동맹을 거부하다
flavor_eth.47.desc코1=우리의 외교관이 돌아왔습니다! 청년의 표정은 실망으로 가득차있습니다. 그는 포르투갈인들이 [Root.GetName]와의 동맹에 관심이 없으며 우리 외교관을 쫓아냈다고 보고했습니다!
flavor_eth.47.a코1=걱정하지 마라. 너는 최선을 다했다. 이것은 우리가 아닌 그들의 손실이다.
flavor_eth.48.t코0=육군 근대화
flavor_eth.48.desc코0=[Root.Monarch.GetTitle] [Root.Monarch.GetName]의 노력 덕분에 육군을 근대화 할 수 있었습니다. 우리 군대는 완전히 서구화된 전투 기술을 받아드렸습니다!\n 프랑스 대 육군의 전략을 배웠습니다.\n 프로이센의 훈련을 견뎌냈습니다.\n 스위스의 총을 받았드렸습니다.\n 그리고 지금 그들은 [Root.GetName]의 영광을 위해 싸울 준비가되어 있습니다!
flavor_eth.48.a코0=[Root.GetName]에게 영광을!
flavor_eth.49.t코0=오스만의 지원
flavor_eth.49.desc코0=1529년, 에티오피아와 아달 사이의 전쟁에서, 오스만은 에티오피아 제국을 무찔러 아프리카의 뿔에 마지막으로 남은 기독교 보루를 소멸시키기 위해 아달 술탄국과 동맹을 맺었습니다. 오스만인들에게 이 전쟁은 전면전은 아니었지만, 그들은 튀르크 부대들을 여럿 보내 아달을 지원했습니다.
flavor_eth.49.ada.desc코0=[Root.GetName]과 [ETH.GetName] 사이의 전쟁이 맹렬히 계속되고 있습니다. 어느쪽도 확실한 승자가 될 것 같지 않으며 일부 전선들에서는 [Root.GetAdjective]의 병력들이 다시 밀려나고 있습니다. 다행히도, 우리는 이 날을 위해 준비해온 것이 있습니다. 아나톨리아에서 온 튀르크인 정예병들이 기독교의 위협에 맞서 같이 싸우기 위해서 [Root.GetName]에 왔습니다!
flavor_eth.49.a코0=도움을 준 오스만인들이 축복받기를!
flavor_eth.49.a.tt코0=§Y오스만 예니체리§! 용병대를 사용할 수 있습니다.
flavor_eth.50.t코0=포르투갈인들의 지원
flavor_eth.50.desc코1=에티오피아-아달 전쟁은 에티오피아에게 재앙이었습니다. 많은 마을들이 파괴되었고, 수도는 아달과 오스만 제국의 연합군에게 포위당했으며 남은 에티오피아군은 산으로 후퇴해야 했습니다. 이슬람교인들은 에티오피아가 멸망하는 것은 이제 시간 문제라고 생각했습니다.\n그리고 포르투갈인들이 도착했습니다. 1541년, 포르투갈인들은 오스만 제국에 맞서 싸우고 에티오피아를 돕기 위해 사령관 크리스토방 다 가마와 포르투갈인 병사들로 이뤄진 부대를 보냈습니다. 이 새로운 병사들은 에티오피아가 상황을 반전시키고 훨씬 더 많은 이슬람 군대를 물리칠 수 있게 해줬고, 이를 통해 1543년 무조건 평화를 이끌어냈습니다.
flavor_eth.50.a코0=포르투갈인들이 온 것에 하느님께 감사드린다!
flavor_eth.50.a.tt코0=§Y포르투갈 머스킷병§! 용병대를 사용할 수 있습니다.
flavor_eth.51.t코0=오스만-포르투갈 분쟁의 끝
flavor_eth.51.desc코1=오스만 제국이 실크로드에서 유럽으로의 무역을 차단한 이래, 포르투갈과 오스만제국은 오랜 경쟁의 역사를 가지고 있습니다. 그러나 실질적인 첫 싸움은 오스만이 1538년 디우 포위 공격에서 구자라트의 술탄을 도왔을 때 시작되었습니다. 그 이후, 이 두 강대국은 에티오피아-아달 전쟁으로 가장 유명한 대리전을 포함해 서로 여러 차례 전쟁을 벌였습니다.\n 에티오피아의 작은 승리 후에야 포르투갈은 오스만 제국을 상대로 승리를 지속했습니다. 1559년, 쉴레이만 1세는 포르투갈을 상대로 결정적인 승리를 거둔다라는 것이 쓸모없는 계획이라는 것을 인식해야 했습니다. 이로 인해 두 강대국의 군사적 행동은 아프리카의 뿔 지역에서 크게 줄어들었다.
flavor_eth.51.a코0=그렇군
flavor_eth.51.a.tt코0=§Y오스만 예니체리§! 와 §Y포르투갈 머스킷병§! 용병대는 더 이상 사용할 수 없습니다.
flavor_eth.52.t코0=[Root.GetName]에서의 예수회 활동
flavor_eth.52.desc코1=1555년과 1557년에, 첫 포루투갈 예수회가 에티오피아에 도착했습니다. 처음엔 1543년 이래로 성장하고 있던 포르투갈 소규모 공동체를 대변하려 했었습니다. 그러나, 에티오피아 궁정에서의 그들의 영향력은 증대되었습니다. 가톨릭 교회의 콥틱 교회에 대한 실질적인 위협을 주는 지경에 다달았고, 이제 그들은 가톨릭 개종에대해 [Root.Monarch.GetName]에게 대화를 청하고 있습니다. 이 외국 선교사들을 어떻게 대해야 할런지요?
flavor_eth.52.a코0=기생충을 제거해야만 한다!
flavor_eth.52.b코0=그들은 경고받아야 마땅하다.
flavor_eth.52.c코1=아마도 옳은 말이지도. 카톨릭으로 개종해야 한다.
###MAL FLAVOR EVENTS###
west_african.19.b코1=있잖아, [ASH.GetName]의 왕좌는 우리것 보다도 좋아 보여...
flavor_mal.2.b코0=저기, 잠깐만! 날 데려가!
flavor_mal.6.a.tt코0=이 선택지는 [Root.GetName]에게 §Y종교 임무§!를 해제해줄 것입니다.
flavor_mal.6.b.tt코0=이 선택지는 [Root.GetName]에게 §Y관용 임무§!를 해제해줄 것입니다.
flavor_mal.9.t코0=[Root.GetName]의 쇠퇴
flavor_mal.9.d코1=그 위대한 만사 무사의 형제였던 만사 술레이만 케이타의 죽음 후, [Root.GetName]의 제국은 수십 년 동안 권력, 영향력과 부에 부문에서 끊임없는 쇠퇴기를 보였다. 내전과 왕좌를 위한 투쟁, 무능한 만사들은 [Root.GetName]의 안정성을 약화시켰습니다. 예전 속국이었던 송가이나 팀북투는 제국으로부터 독립을 선언했고, 이제 더 우리 지배는 조금씩 조금씩 더 무능에 잠기고 있습니다.
flavor_mal.9.a코0=암울한 시간이로다...
flavor_mal.10.t코0=[Root.GetName]의 옛 영광으로의 복귀
flavor_mal.10.d코1=기적처럼 [Root.GetName]의 [Root.GovernmentName](은)는 권력쟁취를 위한 내부 투쟁에서 살아남았고, 신민들에게 왕인 만사와 규합된 왕가에 충성할 것을 서약받았습니다. 이에 더해, [Root.GetName] [Root.GovernmentName]의 서아프리카에 있었던 영향력과 같이 옛 국경은 복원되었습니다.\n이제 만사 무사를 뛰어넘어 국력을 신장하고 [Root.GetName]의 영향력을 확보할지는 [Root.Monarch.GetTitle] [Root.Monarch.GetName]에 달렸습니다.
flavor_mal.10.a코0=[Root.GetName]의 새로운 여명이 밝았노라!
flavor_mal.11.t코0=[Root.mal_pretender.GetName]가 [Root.Monarch.GetName]에 도전하다!
flavor_mal.11.d코0=Suleyman의 죽음 이후로, [Root.GetName]에서 왕좌를 차지하기 위한 전투는 흔한 광경이 되버렸습니다. 이에, 야심친 장군 [Root.mal_pretender.GetName]이 [Root.Monarch.GetTitle] [Root.Monarch.GetName]를 전복시키려고 움직이는 것은 놀랍지도 않을 것입니다. 그는 군대를 소집했고, 이제 [mal_pretender_province.GetName]를 공성중입니다.
flavor_mal.11.a코1=네 감히 나에게 도전을 해?
flavor_mal.12.t코0=[Root.GetNobilityOrFallbackName]에서 [Root.GetNobilityOrFallbackName] 반란!
flavor_mal.12.d코0=우리의 쇠퇴 이후, [Root.GetNobilityOrFallBackName]는 과도한 야심을 드러내며 그들의 입맛에 맞춰 [mal_disaster_estate_province.GetName] 통제하려고 시도했습니다. 
flavor_mal.12.a코0=그들을 쳐 부술것이다!
flavor_mal.12.b코0=[mal_disaster_estate_province.GetName]는 그럴 가치가 없다
flavor_mal.13.t코0=[mal_disaster_estate_province.GetName]에서의 [Root.GetClergyName] 반란!
flavor_mal.13.d코1=[Root.GetClergyName]은 낙후된 페티시즘 신자들을 개종시키는 과정과 궁정에서 자비의 부족함에 불만을 표시했습니다. 이제 그들은 [Root.GetName]을 전복이라는 희망을 품고 [mal_disaster_estate_province.GetName]에서 반란을 시작했습니다!
flavor_mal.13.a코0=그들을 쳐 부술것이다!
flavor_mal.13.b코0=그들의 소리에 귀기울여야 할지도 모른다.
flavor_mal.14.t코0=[mal_disaster_estate_province.GetName]에서의 [Root.GetDhimmiName] 반란!
flavor_mal.14.d코1=[Root.GetDhimmiName] 은 무슬림들의 사회 계층 구별에 불만을 표시하며 지역 페티시즘 신봉자들에게 더 많은 권리를 요구합니다. 이제 그들은 [mal_disaster_estate_province.GetName]에서 반역을 시작하여 [Root.GetName]를 차지하려고 합니다!
flavor_mal.14.a코0=찍어 눌러 주마!
flavor_mal.14.b코0=그들의 소리에 귀기울여야 할지도 모른다.
flavor_mal.15.t코0=[mal_disaster_estate_province.GetName]에서의 [Root.GetBurghersOrFallbackName] 반란!
flavor_mal.15.d코0=쇠퇴기 이후, [Root.GetBurghersOrFallbackName]는 과도한 그 야심을 드러내며 그들의 필요에 맞게 [mal_disaster_estate_province.GetName]를 부리려고 합니다.
flavor_mal.15.a코0=그들을 쳐 부술것이다!
flavor_mal.15.b코0=[mal_disaster_estate_province.GetName]은 노력할 가치가 없다
flavor_mal.16.t코0=[mal_disaster_independent_province.GetName]이 독립을 요구합니다!
flavor_mal.16.d코1=[mal_disaster_independent_province. GetName] 지방은 공식적으로 [Root.Monarch.GetName]의 권위를 인정하지 않고 [mal_original_owner. GetName]의 복귀를 요구했습니다!
flavor_mal.16.a코0=내 시체를 넘는다면 말이지!
flavor_mal.16.b코0=물론이지. 이제 썩 꺼지거라.
flavor_mal.17.t코0=Kaabu가 독립을 요구합니다!
flavor_mal.17.d코0=Kaabu 사람들은 [Root.Monarch.GetTitle]에 대한 아주 강한 거부감을 드러내고, 그들 스스로의 정부를 수립하고자 합니다.  [Root.Monarch.GetTitle]의 궁정에선 Kaabu의 사신이  [Root.Monarch.GetTitle]에 대한 최후통첩을 가져왔습니다: 우린 Kaabu 를 놔주던가 아니라면 그들은 자유를 위해 싸울 것입니다.
flavor_mal.17.a코1=그럼 넌 네 독립을 위해 죽을것이다!
flavor_mal.17.b코0=원래 Kaabu는 필요 없었어.
flavor_mal.18.t코0=Jolof 가 독립을 요구합니다!
flavor_mal.18.d코0=Jolof의 정복은 쇠망하는 국가에게 쉬운 업적은 아니었습니다. Jolof 인들을 억제하는것은 다른 차원의 문제였습니다. 우리의 가파른 몰락과 함께 Jolof 민족주의자들은 스스로 무장하고 즉각적인 해방을 통한 독립요구합니다!
flavor_mal.18.a코1=그럼 넌 네 독립을 위해 죽을것이다!
flavor_mal.18.b코0=원래 Jolof 는 필요 없었어.
flavor_mal.19.t코0=Jenné 가 독립을 요구합니다!
flavor_mal.19.d코1=젠네는 한때 [Root.GetName] 제국의 속국이었습니다. 그러나, 우리의 쇠퇴는 독립이라는 결과로 나타났고 무역 도시의 시민들은 그것에 익숙해졌다. 당연하게도, 그들의 도시에 대한 우리의 정당한 재정복에 주민들은 기뻐하지 않았습니다. 그들은 완전 무장하고 다시 자신에게 독립을 돌려주길 요구합니다!
flavor_mal.19.a코1=그럼 넌 네 독립을 위해 죽을것이다!
flavor_mal.19.b코0=어쨋든 이 도시는 필요가 없다..
flavor_mal.20.t코0=Kong 이 독립을 요구합니다!
flavor_mal.20.d코0=Kong의 정복은 쇠망하는 국가에게 쉬운 업적은 아니었습니다. Kong 인들을 억제하는것은 다른 차원의 문제였습니다. 우리의 가파른 몰락과 함께 Kong 민족주의자들은 스스로 무장하고 즉각적인 해방을 통한 독립요구합니다!
flavor_mal.20.a코1=그럼 넌 네 독립을 위해 죽을것이다!
flavor_mal.20.b코0=원래 Kong 은 필요 없었어.
flavor_mal.21.t코0=속국들이 [Root.Monarch.GetTitle]를 거부하다!
flavor_mal.21.d코0=꾸준한 우리의 쇠퇴기는 속국들이 안정도에 대한 신뢰를 조금 파괴했다. 이제 그들은 [Root.Monarch.GetTitle]에 거스르고 공격의 때를 기다립니다 ...
flavor_mal.21.a코0=반역자들!
flavor_mal.22.t코0=[mal_disaster_peasant_province.GetName]에서의 [Root.GetAdjective] 농민 봉기가 발생하다!
flavor_mal.22.d코1=[mal_disaster_peasant_province.GetName]의 농민들이 불안정한 시간들을 충분히 보냈다며 부족한 지원을 한 [Root.Monarch.GetTitle]에게 반란을 일으켰습니다!
flavor_mal.22.a코0=멍청한 놈들! 네 놈들이 바로 그 문제의 일부분이다!
flavor_mal.22.b코0=그냥 약간의 양보를 해주지. 그들이 행복해지도록.
flavor_mal.23.t코0=[Root.GetName]의 스캔들
flavor_mal.23.d코1=[Root.Monarch.GetTitle]에서의 궁정 스캔들에 상위 계층이 이에 대해 분노했습니다. [Root.GetName]의 안정성을 위협합니다!
flavor_mal.23.a코0=적어도 지루하진 않잖아...
flavor_mal.24.t코0=잃어 버린 함대에 대한 퀘스트
flavor_mal.24.desc코1=Ko Mamadi의 전설들은 만사 무사의 이야기일 뿐이지만, 여전히 국가의 젊고 모험적인 많은 선원들의 이에 흥미를 느낍니다. 항해사 하나는 심지어 고 Ko Mamadi 함대의 유적과 예상되는 그의 마지막을 찾기 위해 서쪽으로 위험한 탐험을 이끌기로 승낙했습니다.
flavor_mal.24.a코0=음, 네 무덤으로 향하는 항해를 막지 않으마.
flavor_mal.25.t코0=대륙 발견!
flavor_mal.25.desc코1=[Root.Monarch.GetTitle]에 믿을 수 없는 소식이 들어왔습니다! 탐사 함대는 성공적이었고 진짜로 뭔가를 발견해냈습니다, 그러나 그것은 [Root.GetName]가 상상하던 그 이상의 것이었습니다: 탐험가들이 서아프리카해를 건너 새로운 미지의 땅을 발겼했습니다! 더 심도 있는 조사끝에, 그것은 섬따위가 아닌 거대한 대륙임이 밝혀졌습니다.\n항해사들은 해안에 정착했고 이제"[755.GetName]"라 부르며, 이 땅에서 Ko Mamadi의 발자취 수색에 준비되어 있습니다.
flavor_mal.25.a코0=썩은 나무나 찾고 있었는데...다이아몬드를 발견하다!
flavor_mal.26.t코0=【Root.GetName】에서 고품질 상아
flavor_mal.26.desc코1=[Root.GetName]는 금으로 축척한 부로 항상 유명했지만, 이제 상아 무역과 생산으로도 그 명성을 만들어 내었습니다! 우린 최고등급의 상아를 수출하고, 유럽과 아시아 시장에서 우리 상품에 대한 붐이 일어났습니다!
flavor_mal.26.a코0=아주 좋아!
flavor_mal.27.t코0=[From.GetName] 고품질 아이보리
flavor_mal.27.desc코0=[From.GetName]는 금으로 축척한 부로 항상 유명했지만, 이제 상아 무역과 생산으로도 그 명성을 만들어 내었습니다! 우린 최고등급의 상아를 수출하고, 유럽과 아시아 시장에서 우리 상품에 대한 붐이 일어났습니다!
flavor_mal.27.a코0=알겠다.
flavor_mal.28.t코0=팀북투의 운명
flavor_mal.28.desc코1=팀북투는 서아프리카에서 주된 위치에 있었고, 한때는 유럽과 사헬 지역의 주 연결고리였습니다. 이제 다시 우리 손에 이 도시가 들어왔으니, 우리 수도를 이 중요 무역도시로 이전할지에 대한 논의가 불거지고 있습니다.
flavor_mal.28.a코1=팀북투를 우리의 수도로 하라.
flavor_mal.28.b코0=대신 현재 수도를 개발해야 할 것이다.
can_colonize_the_strait_tt코0=§Y[1127.GetName]§!를 식민화할 결단을 가능하게 합니다.
can_colonize_djado_and_tajarhi_tt코0=§Y[2474.GetName]§! and §Y[2475.GetName]§!를 식민화할 결단을 가능하게 합니다.
flavor_mal.29.t코0=젠네의 대 모스크
flavor_mal.29.desc코1=Djenné의 대 모스크는 종교적 불가사의이며, 우리 상류층들이 기도하기의해 이 성스러운 건물로 순례를 오고있습니다. 그 모스크는 최근 제대로 관리 받지 못하고 있었습니다. 젠네와 그 모스크에게는 다행히, [Root.GetClergyName]은 그들의 자원을 모스크 확장과 지역 주민들을 개종에 투자했습니다.
flavor_mal.29.a코0=[Root.GetClergyName]에게 축복을.
flavor_mal.30.t코0=[Root.GetName] 와 Songhai
flavor_mal.30.desc코1=1430년 이전에는 Songhai는 우리의 속국였습니다. 1430년, [Root.GetName]은 모국의 문제와 투쟁으로 인해 부유한 도시 Gao에 대한 통제력을 잃었고, 도시와 그 주변 영토는 약탈당했습니다. 그 지역은 Sonni 왕조에 의해 점령되었고 우리의 경쟁자로서 자신들의 영역이라 선포했습니다.\n그러나 그것 또한 지금은 과거의 일입니다. Gao는 다시 우리의 통제하에 있으며 자신을 'Songhai'로 정의하는 대다수의 사람들이 다시 한 번 우리의 속국입니다.
flavor_mal.30.a코0=암 그래야지.
flavor_mal.30.a.tt코0=모든 소유한 §YSonghai§!문화 소유지역이 §G-30§! 분리주의를 획득합니다.
flavor_mal.31.t코0=[Root.GetName]와 마그레브인들
flavor_mal.31.desc코1=이베리아인들의 위협으로 인해 마그레브인들의 풍전등화의 위기에 상황이 변화할 수도 있을것으로 보이지만, 마그레브 지역은 [Root.GetName]의 아주 오래된 무역 상대의 고향입니다. 이런 우리 신앙의 형제들이 만사 무사의 멋진 이야기를 들은 것 같았고, 이제 금 혹은 상아의 형태로 우리에게 지원을 요청합니다. 물론 이러한 지원은 고비용이겠지만 북쪽과의 동맹 기회는 그럴가치가있을 수도 있습니다.
flavor_mal.31.a코1=금이란 형태로 지원을 보내라
flavor_mal.31.b코0=상아로 보조금을 주어라
flavor_mal.31.c코0=그냥 금과 상아를 가진다.
flavor_mal.32.t코0=유럽인들의 무역 전초기지에 대한 다양한 선택지
flavor_mal.32.desc코1=유럽은 큰 대륙이며 무역지들에 대한 많은 선택지가 있어왔습니다. 하지만, [Root.Monarch.GetTitle] [Root.Monarch.GetName]의 담당관리의 조언에 따라 다음 5가지로 좁혀졌습니다.
