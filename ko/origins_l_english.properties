flavor_mal.33.t코0=[From.GetName]의 황금 제안
flavor_mal.33.desc코0=[From.GetAdjective] 복식의 한 사절이 [Root.Monarch.GetName]의 궁정에 도착했습니다.! 이것으로도 충분히 눈에 띌 행사지만, 사절은 [Root.Monarch.GetTitle]께 황금으로 가득찬 상자를 내놓았습니다! 더불어 이 엄청난 금액과 [mal_colony_to_buy.GetName]의 교환을 제안합니다. 사절은 또한 만일 우리가 이 황금을 받지 않을 경우, [From.Monarch.GetName]이 "약간 불쾌할수 있다"고 합니다.
flavor_mal.33.a코0=음, 기꺼이 금을 받겠노라. 정말 고맙도다.
flavor_mal.33.b코0=그렇다면 불편하라지! [mal_colony_to_buy.GetName]는 우리 손에 남을것이다.
flavor_mal.34.t코0=[From.GetName]이 거래를 수락했습니다!
flavor_mal.34.desc코1=좋은 소식입니다,  [Root.Monarch.GetTitle]: [From.Monarch.GetTitle] [From.Monarch.GetName]가 우리의 관대한 제안을 수락하고 [mal_colony_to_buy.GetName]를 할양했습니다.
flavor_mal.34.a코0=아주 좋구나.
flavor_mal.35.t코0=[From.GetName]이 거래를 거절했습니다!
flavor_mal.35.desc코0=나쁜 소식입니다, Bad news, my [Root.Monarch.GetTitle]: [From.Monarch.GetTitle] [From.Monarch.GetName]이  우리의 관대한 제안을 거절하고 [From.GetAdjective]가 [mal_colony_to_buy.GetName]에 대한 지배권 아래에 계속 두었습니다.
flavor_mal.35.a코0=음, 황금 말고도 식민지를 얻을 다른 방법들이 있지...
flavor_mal.36.t코0=[Root.GetName]산 금의 유입
flavor_mal.36.desc코0=[Root.GetName]의 유럽내 영향력과 무역이 증가하면서, 금 무더기가 유럽시장에 도달했습니다. 많은 금광들이 채산성으로 인해 문을 닫았고, 두캇 통화량은 새로운 고점에 이르렀습니다.
flavor_mal.36.a코0=내 금을 받아주시게, 내 진심일세!
flavor_mal.36.a.tt코0=§Y유럽§! 국가나 속국이 통치되는 모든 금 생산 지방에서 §Y폐광§!' 를 §Y15§! 년동안 받습니다. 이는 다음과 같은 효과를 줍니다:\n생산효율성: §R-1000.0%§!
flavor_mal.36.a.at코0=모든 유럽 국가에서 §R+1.5§! 의 인플레이션을 받고, 이는 전체 수입과 무역수입의 비에 따릅니다.
flavor_mal.36.a.bt코0=플레이어 국가와 종속국은 §R+0.15§!의 인플레이션만 받게 되며, 이는 전체 수입과 무역수입의 비에 따릅니다.
flavor_mal.37.t코0=[Root.Monarch.GetName]의 관대한 순례
flavor_mal.37.desc코1=[Root.Monarch.GetTitle] [Root.Monarch.GetName]은  [385.GetName]의 대도시로 여행했습니다. 위대한 만사 무사께서 그려셨듯, 전에 비해 적어진 양이라 할지라도, 현재 [Root.Monarch.GetTitle] 또한 [Root.GetName]의 부를 그 도시로 가져왔습니다. [Root.Monarch.GetSheHe]는 결국 믿음의 형제에게 폐가 되는 것을 원치 않았기습니다.\n도시에 도착 후, [Root.GetClergyName]들이 위대한 카바를 칭송할 대 모스크 건설에 금을 기부하는 것을 추천합니다. 다른 한편으론, 좀 더 동정적인 조언가들은 [385.GetName]의 회계실에 투자하여 어려운 이들이 알라의 도움으로 그들의 안 좋은 상황을 넘어 자립할 수 있게하는 걸 제안합니다.
flavor_mal.37.a코0=[385.GetName] 지역은 대 모스크를 가질 것이다!
flavor_mal.37.a.tt코0=[Root.Monarch.GetName](은)는 [385.GetName] 지역에 §Y대 모스크§!의 건설을 위해 [Root.Monarch.GetHerHis] 돈을 투자할 것입니다.
flavor_mal.37.b코0=가난한 사람들은 [Root.GetClergyName]보다 더 많은 도움이 필요하다!
flavor_mal.37.b.tt코0=[Root.Monarch.GetName](은)는 [385.GetName] 지역에 §Y회계실§!의 건설을 위해 [Root.Monarch.GetHerHis] 돈을 투자할 것입니다.
flavor_mal.38.t코0=[From.Monarch.GetName](이)가 대 모스크 건설을 위한 돈을 기부하다!
flavor_mal.38.desc코1=[From.GetName]의 관대한 [From.Monarch.GetTitle] [From.Monarch.GetName](은)는 우리의 거룩한 도시 [385.GetName]에 순례를 하고 신성한 카바 신전에 경의를 표할 새로운 대 모스크 건설을 위해 상상할 수 없을 정도의 황금을 기부하였습니다!
flavor_mal.38.a코0=[From.Monarch.GetHerHis] 지혜에 축복을!
flavor_mal.39.t코0=[From.Monarch.GetName](이)가 회계실 건설을 위한 돈을 기부하다!
flavor_mal.39.desc코0=[From.GetName]의 관대한 [From.Monarch.GetTitle] [From.Monarch.GetName](은)는 우리의 거룩한 도시 [385.GetName]에 순례를 하였고 일자리와 빈민 지원을 위한 회계실 건설에 거액을 기부하였습니다!
flavor_mal.39.a코0=[From.Monarch.GetHerHis] 마음이 축복받기를!
flavor_mal.40.t코0=새로운 순례길
flavor_mal.40.desc코1=과거에 우리 만사들 중 많은 이들이 메카로 여행했습니다. 매번 만사들은 이집트를 거치는 고전적인 길을 통해 아랍 세계에서 보냈습니다. 그것은 가장 안전하고 빠른 방법이었던 반면, 가장 흥미로운 경로는 아니었습니다. 다른 일반적인 순례처럼 말입니다.\n그러나 이번 궁정은 새로운 발상을 내놓았습니다: 그리스도 세상을 가로질러 유럽의 불가사의들을 보며 메카로 가는 엄청난 여행을 말이죠.
flavor_mal.40.a코0=유럽을 둘러보길 고대하고 있다.
flavor_mal.40.a.tt코0=[Root.Monarch.GetName]는 유럽을 통과해 메카로 이동합니다.\n§Y[Root.Monarch.GetName]가 도중에 죽게되면, 순례는 조기종료됩니다.§!
flavor_mal.40.b코0=이정도 규모의 순례라면 내 조언자들이 해야할지도.
flavor_mal.40.b.tt코0=[Root.Monarch.GetName]의 조언자가 대신 유럽을 통과하는 경로를 택할 것입니다.
flavor_mal.40.c코0=난 고전적인 경로를 선호하는데.
flavor_mal.40.c.tt코0=[Root.Monarch.GetName]은 고전적인 경로를 통해 메카로 갑니다.
GREAT_PILGRIMAGE코0=위대한 순례
GREAT_TOUR코0=위대한 여정
flavor_mal.41.t코0=[Root.GetMaliPigrimageTour]
mal_visiting_foreign_regional_power코1=\n\n그 일행은 마침내 [selected_biggest_country_of_region.GetName]의 수도이자 경이로운 도시 [selected_biggest_country_of_region.Capital.GetName]에 도달하였다.[selected_biggest_country_of_region.Culture.GetName]은 여행자 그룹의 이목을 끌었고 그들의 환대는 [Root.Monarch.GetName]의 측근에게 깊은 인상을 주었으며, 그들은 [selected_biggest_country_of_region.GetName]의 [selected_biggest_country_of_region.Monarch.GetTitle]에게 우리의 돈의 일부를 기부할 것을 제안했습니다.
flavor_mal.41.mansa.maghreb코0=뜨거운 사하라를 지나는 여정 후, [Root.Monarch.GetTitle]과 [Root.Monarch.GetHerHis] 가까운 수행원들은 마그레브 지역의 고산지대에 도착했습니다. [Root.Monarch.GetName]는 [Root.Monarch.GetHerHis] 시간을 할애해 뎀나테에 위치한 견고한 방어시설의 아이트 벤 하도우를 방문했습니다. [Root.Monarch.GetSheHeCap]는 위대한 마그레브 문화들로 부터 배웠고, 여러가지 읽을 것들을 구매했습니다 - 그 중 가장 중요 서적은 이븐 사이드 알 마그레비의 저작물이었습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.iberia코1=순례는 계속되고 [Root.Monarch.GetName]의 무리는 쇠락해버린 안달루시아 술탄국이 있던, 이베리아 반도에 도착했습니다. 여행자들은 알함브라의 아름다움을 홀린듯 바라보았습니다. 이베리아의 기독교도들이 아주 종교적이고 우리같은 이들을 신용하지 않지만, [Root.Monarch.GetTitle]께서 그들에게 [Root.Monarch.GetHerHis] 상황을 알리자, 우리의 존재를 용인하였습니다. 물론 우리가 가져온 황금도 도움이 되었지만요....[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.france코1=[Root.Monarch.GetTitle] [Root.Monarch.GetName](과)와 [Root.Monarch.GetHerHis] 수행원들은 프랑스에 도착하였습니다. 이곳은 이슬람 세계에 전쟁을 선포하고자한 많은 십자군들의 고향이기도 합니다. 그러나 오늘은 검이 휘둘러 지는 일은 없을겁니다. 여행중인 [Root.Monarch.GetTitle]께서 [Root.Monarch.GetHerHis] 순례길의 평화적인 의도를 공공연하게 알렸기 때문입니다. 프랑스인들은 현명하신 [Root.Monarch.GetTitle]을 환영했고, 환대의 표시로 [Root.Monarch.GetHerHim]께서 그들의 인상적인 성당인 노트르담에 들어가는 것을 허용했습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.italy코0=[Root.Monarch.GetTitle]의 무리가 마침내 이탈리아에 도착했습니다. [Root.Monarch.GetSheHeCap]과 [Root.Monarch.GetHerHis] 신하들은 기독교의 수장이자 위대한 교황성하가 그들의 말을 방청하길 바랍니다만, [Root.GetAdjective] 황금도 [Root.Monarch.GetName]와 성스러운 자의 만남을 가지는 것을 납득시킬 수 없었습니다. 그럼에도 이탈리아에 머무는 것이 기독교에 대해 [Root.Monarch.GetTitle]께 훌륭한 통찰력을 주었습니다. [Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.south_germany코1=[Root.Monarch.GetName]의 무리는 극단적인 고도와 혹독한 기상 조건을 뚫고, 알프스를 지나 그 악명높은 신성로마제국에 닿았습니다. 이 제국의 상태는 [Root.Monarch.GetTitle]께 [Root.GovernmentName]가 고통받아야만 했던 과거의 일들을 되새기게했습니다. [Root.Monarch.GetSheHeCap]께서는 [Emperor.Monarch.GetTitle]에게 동정심을 갖게 되었고, [Emperor.Monarch.GetHerHis] 앞날이 부디 밝아 앞으로 올 쇠락하는 제국의 내부투쟁을 잘 극복하길 바랐습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.balkans코0=발칸을 지나는 여정은 문화적 다양성 그 자체였다: 남슬라브, 이탈리아, 그리스에 오스만 투르크 문화 까지 - 모두 한 지역의 모습이었다. 궁극적으로, [Root.Monarch.GetName]께서는 [151.GetName]에 있는 위대한 하기아 소피아 앞에 서서 그 웅장함을 지켜보았습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.anatolia코0=오스만 투르크의 고향, 아나톨리아의 아름다운 대지. 이 지역을 들어가며, [Root.Monarch.GetName]의 무리들은 이슬람 세계로 다시 돌아왔고 순례는 그 끝이 다가왔습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.mashriq코0=아나톨리아 횡단 후, [Root.Monarch.GetTitle]께서는 이제 [Root.Monarch.GetHerselfHimself]가 마쉬릭의 사막에 있음을 깨달았습니다. 이집트로 가는 길에 [Root.Monarch.GetName]과 [Root.Monarch.GetHerHis] 추종자들은 유대인과 기독교인 그리고 무슬림 모두 다에게 엄청난 종교적 중요성의 중심이 되는 예루살렘의 성스러운 도시지역에 도착했고 수시간동안 기도하는데 썼습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.egypt코0=[Root.GetName]의 [Root.Monarch.GetTitle]께 이집트는 그렇게 색다른 곳은 아닙니다. 많은 우리 조상들이 쿠푸의 대 피라미드를 바라보았습니다. 그러므로 피라미드를 [Root.Monarch.GetName] 역시 방문하는 것은 당연합니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.arabia코0=수 년의 여행이 지나고, 위대하고 현명하신 [Root.Monarch.GetTitle]와 [Root.Monarch.GetHerHis] 가까운 추종자들이 마침내 모든 도시중 성스럽기로는 제일가는 도시, [385.GetName]에 도착했습니다! 도시의 거주민들은 [Root.GetAdjective] 지난 순례를 기억하며 따라서 [Root.Monarch.GetName]를 팔을 넓게 벌리며 반깁니다.\n그 후 2주간은 성지순례 기간 동안 [Root.Monarch.GetTitle]이 겪은 일들을 기록하고 기도하며 보냈습니다. [Root.Monarch.GetSheHe]는 떠나기전 [385.GetName]의 사람들에게 작별선물을 남기기로 결정하셨습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.horn_of_africa코1=우리 집단에게 집으로 돌아가는 길이 잘 알려져 있지만 [Root.Monarch.GetName]께서는 새로운 길을 통해 고향으로 돌아가도록 결정하셨습니다. [1330.GetName]의 해협을 여행하며 [Root.Monarch.GetSheHe]과 [Root.Monarch.GetHerHis] 수행원은 "프레스터 존"의 고향이라 불리는 땅을 발견했습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.mansa.home코0=5년도 전, 위대하신 [Root.Monarch.GetTitle] [Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName]께서 [385.GetName]로 향하는 순례길에 오르기 시작했습니다. 그러나 가장 빠른 길보다도 유럽을 가로지르는 길을 택한 담대한 결정을 통해 [Root.Monarch.GetTitle]께서는 [Root.Monarch.GetSheHe]께서 보지 못했을지 모르는 것들을 보고 관찰할 수 있었습니다.\n그 오랜 시간이 지나 [Root.Monarch.GetName]께서 마침내 [Root.Capital.GetName]로 돌아오셨습니다!
flavor_mal.41.advisor.maghreb코0=뜨거운 사하라를 지나는 여정 후, 세 조언자들은 마그레브 지역의 고산지대에 도착했습니다. 그들은 시간을 할애해 뎀나테에 위치한 견고한 방어시설의 아이트 벤 하도우를 방문했습니다. 또한 위대한 마그레브 문화들로 부터 배웠고, 여러가지 읽을 것들을 구매했습니다 - 그 중 가장 중요 서적은 이븐 사이드 알 마그레비의 저작물이었습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.iberia코1=순례는 계속되고 조언가 무리는 쇠락해버린 안달루시아 술탄국이 있던, 이베리아 반도에 도착했습니다. 여행자들은 알함브라의 아름다움을 홀린듯 바라보았습니다. 이베리아의 기독교도들이 아주 종교적이고 우리같은 이들을 신용하지 않지만, 우리의 상황을 그들에게 알리자, 우리의 존재를 용인하였습니다. 물론 우리가 가져온 황금도 도움이 되었지만요....[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.france코0=조언가들이 프랑스에 도착하였습니다. 이곳은 이슬람 세계에 전쟁을 선포하고자한 많은 십자군들의 고향이기도 합니다. 그러나 오늘은 검이 휘둘러 지는 일은 없을겁니다. 여행중인 조언가들이 그들이 행하는 순례길의 평화적인 의도를 공공연하게 알렸기 때문입니다.  프랑스인들은 세 학자들을 환영했고, 환대의 표시로 조언가들이 그들의 인상적인 성당인 노트르담에 들어가는 것을 허용했습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.italy코0=행렬이 마침내 이탈리아에 도착했습니다. 조언가들은 기독교의 수장이자 위대한 교황성하가 그들의 말을 방청하길 바랍니다만, [Root.GetAdjective] 황금도 조언가들이 성스러운 자의 만남을 가지는 것을 납득시킬 수 없었습니다. 그럼에도 이탈리아에 머무는 것이 기독교에 대해 그들에게 깊은 통찰력을 주었습니다. [Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.south_germany코1=조언가 무리는 극단적인 고도와 혹독한 기상 조건을 뚫고, 알프스를 지나 그 악명높은 신성로마제국에 닿았습니다. 이 제국의 상태는 그들에게 [Root.GovernmentName]가 고통받아야만 했던 과거의 일들을 되새기게했습니다. [Emperor.Monarch.GetTitle]에게 동정심을 갖게 되었고, [Emperor.Monarch.GetHerHis] 앞날이 부디 밝아 앞으로 올 쇠락하는 제국의 내부투쟁을 잘 극복하길 바랐습니다.[Root.GetMaliRegionalCapital]
flavor_mal.41.advisor.balkans코0=발칸을 지나는 여정은 문화적 다양성 그 자체였다: 남슬라브, 이탈리아, 그리스에 오스만 투르크 문화 까지 - 모두 한 지역의 모습이었다. 궁극적으로, 세 학자들은 [151.GetName]에 있는 위대한 하기아 소피아 앞에 서서 그 웅장함을 지켜보았습니다.[Root.GetMaliRegionalCapital]
