zim_african_great_power코0=아프리카의 열강
###MISSIONS###
eth_cawa_discipline_title코0=카와 훈련
eth_cawa_discipline_desc코1=카와는 우리 나라의 봉건 귀족 계층입니다. 이 전문 병사들은 원래 느구서 너거스트에 의해 임명되었으며, 우리 군대의 중추를 맡고 우리의 외딴 지역들에서 평화를 보장해줍니다.\n여전히, 개선의 여지는 항상 남아있습니다. 우리는 이 맹렬한 전사들을 더 모집해 완벽히 훈련시켜야 합니다.
eth_reform_the_negusa_government_title코0=국가 중앙집권화
eth_reform_the_negusa_government_desc코1=오래된 느구서 너거스트 군주제는 유연성이 없는 체제임이 입증되었습니다. 이동하는 수도의 원칙은 한 지방을 통제하는데 있어서 효과를 보여주었지만, 다른 한편으로 국가가 얼마나 지방분권화되어 있고 얼마나 무력한지를 보여주었습니다. 우리 제국이 살아남기를 원한다면 정부를 개혁하고 권력을 중앙집권화해야만 합니다.
eth_reform_the_negusa_government_ct코0=§Y솔로몬 제국§! 정부 개혁을 해제합니다.
eth_conquest_of_qasr_ibrim_title코0=카스르 이브림 장악
eth_conquest_of_qasr_ibrim_desc코1=콥트교는 전 세계의 여러 성지들과 강한 연결점을 갖고 있습니다. 이 중 하나는 8세기에 그리스도교의 중심지로 있던 고대 도시 Qasr Ibrim입니다. 그러나, 거주민들이 거짓 종교로 전환하며 예전 영광의 순간들은 종점을 맞이하고 말았습니다. 우린 이 도시의 무능력한 지배자를 몰아내고 해방시켜 사람들을 참된 신앙으로 돌아오게 해야 합니다.
eth_conquest_of_alexandria_title코0=알렉산드리아 해방
eth_conquest_of_alexandria_desc코0=알렉산드리아는 콥트 교황과 교황령의 고대 권좌가 있는 고향입니다. 그러나, 교회와 상당한 콥트 공동체의 부분들이 맘루크의 외세와 불신으로 가득찬 법으로 고통받고 있습니다. 우린 무슬림들로부터 이 도시를 반드시 해방하여 아직까지도 숨죽이고 있을 콥트인들을 도와야만 합니다.
eth_conquest_of_antioch_title코0=안티오크 정복
eth_conquest_of_antioch_desc코0=고대 도시 안티오크는 과거 그리스도교의 요람이자 주요 중심지 중 하나였습니다. 십자군과 이슬람의 확산으로 인해, 이는 조금 변해버려, 이제 과거의 그림자만이 남아있습니다. 그리스도교 성직자는 안티오크에서 소멸되었지만, 우리 신앙을 위해 여전히 중요한 성지입니다. 우린 이 고대 위치를 탈환하고 중동에 그리스도교의 권위를 회복해야합니다. 
eth_please_the_vassals_title코0=다모트와 하디야
eth_please_the_vassals_desc코1=우리 속국인 Damot은 한때 Shewa 술탄국을 종속시켰던 나라였습니다. 또다른 종속국인 Hadiya 술탄국은 또 Shewa의 일부였습니다.\n두나라가 이런 역사를 가지고 있던 반면, Zara Amda Seyon가 1309년에 이 문제를 갖고 양국을 속국화 시킨 이래로 그들 모두 단지 속국들에 지나지 않았습니다. 이제 때가 양국 모두 우리의 일부가 될 때가 왔습니다! 그러나 이를 위해 그들의 지도자들을 먼저 설득할 필요가 있을 수 있습니다.
eth_unify_the_kingdoms_title코0=부족 통합
eth_unify_the_kingdoms_desc코0=과거 우리 나라는 동골라의 사막에서 예멘의 모카 해안까지 뻗어있던 위대한 악숨 제국이었습니다. 그러나, 세미엔의 구디트 여왕과 그녀의 전사들이 수도 악숨을 약탈하고 악숨 왕조를 몰살시켰을 때 상황은 바뀌었습니다. 얼마 지나지 않아, 제국은 여러 부족들로 분열되었습니다.\n하지만 이제 새로운 왕조가 왕위에 올랐습니다! '왕중왕'이라는 칭호를 받을 자격이 있는 왕조인 우리는 몰락한 조상들의 영토를 되찾을 것이며, 부족의 통합부터 시작할 것입니다.
eth_retake_suakin_title코0=수아킨 정복
eth_retake_suakin_desc코1=수아킨 항구는 홍해 무역의 중요한 항구임이 밝혀졌습니다. 이 항구가 악숨 제국의 일부였다는 사실은 전혀 언급된 바 없었지만, 도시가 무슬림의 손에 넘어가기 전까지는 많은 [Root.GetAdjective] 기독교인들의 고향이었습니다. 그렇기에 우리는 이 항구를 직접 손에 넣고 여전히 그 곳에 숨어 있는 소수의 기독교인들을 해방시킬 충분한 명분이 있습니다.
eth_develop_the_ancestors_city_title코0=선조들의 수도
eth_develop_the_ancestors_city_desc코0=우리 국가의 훌륭한 역사가 위대하신 왕 메넬리크와 여왕 시바에 기반하지만, 우리는 두 전설들보다 더 깊은 역사를 갖고있습니다. 위대한 우리 나라는 악숨 제국의 일부였습니다. - 그리고 그 제국은 우리 조상의 것이었습니다. 비록 제국의 날들은 무슬림과 여왕 구디트의 침공으로 예전에 지나가 버렸지만, 일전의 수도, 악숨은 살아남았습니다.\n악숨 지역은 오늘날 우리 통치자의 대관식의 장소로 역할하고 있습니다. 그러나, 도시에게 그렇게 호락호락 한 시기가 아니었고 그 흔적을 남겼습니다. 우리의 과거의 모습을 남기기 위해 이 도시를 개축해야만 합니다.
eth_harbor_city_adulis_title코0=아둘리스 탈환
eth_harbor_city_adulis_desc코1=고대 악숨 제국에 항구 도시 아둘리스보다 중요한 항구는 없었습니다. 홍해에서의 고대 무역의 중심 위치였으며, 고대 그리스와 이에 더해 비잔틴 제국과도 가장 가까웠습니다. 이런 지리적 위치 때문에, 악숨이 홍해 안의 주요국이 되었습니다.\n안타깝게도, 그 도시는 약 702년 경에 무슬림이 점령되었고, 악숨제국의 고립과 피할 수 없는 궁극적 최후를 불러왔습니다. 그러나 모두 사라지진 않았습니다! 도시의 기반시설은 여전히 그대로입니다. 우리가 아둘리스를 탈환한다면, 우린 이 항구를 예전 그 위대한 도시의 모습으로 재건할 수 있습니다.
eth_conquer_adal_title코0=아달 정복
eth_conquer_adal_desc코1=[Root.GetName]와(과) 아달 사이의 관계는 언제나 험악했고 이는 종교와 세력의 차이로 발생했습니다, 세력의 차이는 [Root.GovernmentName]가 언제나 아달국의 술탄에게 조공을 요구하는 것을 정당하게 했습니다. 그러나 오스만 제국이 그 나라의 술탄과 접촉을 한 후, 아달 인들은 배상에 완고해졌고, 이제 투르크인들의 도움을 통한 우리의 파괴를 열망하고 있습니다. 우리는 선제 조취를 취해서 그들이 [Root.GetName]에 진정한 위협이 되기 전에 정복해야 합니다.
eth_unify_the_horn_of_africa_title코0=아프리카의 뿔 통합
eth_unify_the_horn_of_africa_desc코1=아프리카의 뿔에는 오래된 많은 왕국들의 키워냈습니다. 수세기동안 많은 왕국들이 일어나고 사라졌지만 아무도 이 땅 전부를 통합해내지 못했습니다. 우리는 우리 손으로 아프리카의 뿔 지역에서 이 끊나지 않는 전쟁문제의 끝을 봐야 할 것입니다.
eth_yemens_coasts_title코0=아라비아의 발판
eth_yemens_coasts_desc코1=악숨 제국은 3세기 무렵 남 아라비아에 영토를 차지했었습니다. 특히 현재의 예멘에 연관된 지역의 해안선쪽으로. 이 고대 제국의 위대한 업적이 모두 그렇듯, 역시나 무슬림 손에 우리의 교두보가 떨어졌습니다. 이제 그들에게서 되찾아 올 때가 되었습니다.
eth_restore_aksumite_empire_title코0=과거 뛰어넘기
eth_restore_aksumite_empire_desc코0=우리 조상의 제국은 무너졌을지라도, 그 유산은 우리에게 남아 살아있습니다. - 이 덕분에, 너무나 오래전에 잃어버린 힘을 되살릴 수 있고, 뿐만 아니라 그걸 능가할 수도 있습니다!
eth_eliminate_the_semien_rebels_title코0=기드온의 반란
eth_eliminate_the_semien_rebels_desc코0=신뢰할 수 없는 왕 기드온 5세는 [Root.Monarch.GetName]에 반하는 반군을 이끌고 있으며, 그의 왕국을 우리 제국으로 부터 갈라놓고자 합니다. 우린 이 반역자에게 한 수 가르쳐주고 그의 추종자들이 짐이나 싸게 만들어야 합니다.
eth_church_reforms_title코0=안식일 문제 해결
eth_church_reforms_desc코0=사소한 문제로 보이지만, 우리 교화가 성서적 안식일을 준수하는 문제로 나뉘어져 있습니다. - 거의 한세기 전부 동안 이러하였습니다. 알렉산드리아교회의 충성주의자들은 일요일을, 에우스타티우스의 추종자들은 주말의 양일 모두 안식일로 지켜야한다고 믿습니다. 종교적 단합을 유지하길 원한다면, 양측을 위한 협상안을 찾아야 할 필요가 있습니다.
eth_church_reforms_ct코1='§Y자라 야콥의 중앙집권화 개혁§!' 이벤트가 발생합니다.
unlock_privilege_estate_church_yakobs_churches_tt코0=[Root.GetClergyName] 특권 '§Y성서적 안식일 개혁§!'를 활성화 합니다.
unlock_privilege_estate_burghers_hydraulic_rights_tt코0=[Root.GetBurghersName] 특권 '§Y수자원 권리 허용§!'의 사용이 가능합니다.
eth_build_an_army_title코0=[Root.GetName]의 군대
eth_build_an_army_desc코0=우리 나라는 [Root.governmentName]의 불신자들과 적들에게 둘러싸여 있습니다. 우리가 살아남고 국가를 확장하기를 원한다면 더 많은 군인과 유능한 장군을 통해 군대를 개선해야 합니다.
eth_conquer_southern_kingdoms_title코0=남부 정복
eth_conquer_southern_kingdoms_desc코1=잠재적 라이벌이 위대한 [Root.GovernmentName] 남쪽 경계에 존재합니다. 카파 왕국은 동료 콥트계 국가일지 모르지만, 그들의 왕들은 우리 [Root.Monarch.GetTitle]와 정당한 몫의 금을 나누는 데에 관심이 없습니다. Ennarea 왕국은 국가라기엔 슬픈 존재고, 아마 그들은 동부의 페티시즘 야만인의 군대로 그 운명이 끝날 수 있습니다.\n우리는 남부 왕국을 정복하고 에티오피아 지역을 통합해야 할 것입니다.
eth_the_riches_of_the_south_title코0=카파의 부
eth_the_riches_of_the_south_desc코0=외국인들에게 주권을 빼앗긴다면 인간은 응당 분노합니다. 그러나 이는 전쟁과 정복이 작동하는 방식이며, 많은 경우 피정복민들은 시간이 흘러 새 주군에게 적응할 것입니다. 그러나 어떤 경우에는 이런 변화가 안정을 위해 반드시 필요할 수 있습니다. 카파가 이런 좋은 예시중 하나입니다. 그들의 금은 나라에 귀중하지만, 지역주민들이 분노할 동안에는 금을 채굴할 수 없습니다. 우린 카파와 다못의 인프라를 개발해서 우리의 자비로움을 보여주어야 할것입니다.
eth_gain_sea_access_title코0=홍해로의 접근
eth_gain_sea_access_desc코0=악숨 제국이 몰락한 이래로 우리 나라는 세상의 다른 기독교인들과 연락할 수 있는 바다에 접근하지 못하였습니다. 우리는 항구를 정복하고 제대로 된 조선소를 건설하여야 합니다! 어쨌든 우리 군대나 외교관들이 물에 닿는다 해서 배로 변하는 것은 아니니까요.
eth_gain_sea_access_tt코0=소유 중인 임의의 항구에 즉시 §Y조선소§!가 건설될 것입니다.
eth_create_a_navy_title코0=[Root.GetAdjective] 해군 창설
eth_create_a_navy_desc코0=이제 우리 나라가 선박을 생산할 수 있는 수단을 보유하였으니 이렇게 하는 것이 당연합니다. 기독교의 형제자매들과 영구적으로 접촉하기 위해서는 제 기능을 하는 함대를 갖추는 것이 필수적입니다.
eth_create_a_navy_tt코1=소규모의 함대가 지중해에 도달하기 위해 거대한 나일강을 항해할 것입니다.
eth_ethiopian_empire_title코0=아프리카의 열강
eth_ethiopian_empire_desc코1=비록 종교적인 연관성 덕분에 유럽인들의 호의를 얻긴 하였지만, 그들은 여전히 우리를 진흙 오두막에 사는 부족으로 볼 뿐입니다. 그들에게 우리가 유럽의 강대국들처럼 무시할 수 없는 힘을 가졌음을 보여줄 것입니다!
eth_find_other_christians_title코0=포르투갈과의 접촉
eth_find_other_christians_desc코0=위대한 느구서 너거스트 다윗 1세(Negusa Nagast Dawit)의 시기부터, [Root.GovernmentName]는 유럽과 접촉해 왔습니다. 그러나 먼 거리와, 맘루크로 인한 복잡함으로 그 어떤 유럽인들도 우리와 영구적으로 접촉을 이어가지 못했습니다. 상황은 포르투갈이 세계를 아우르는 제국의 건설을 시작하고,  그들이 인도양에서 동맹을 찾게되며 바뀌었습니다.\n포르투갈인들과 접촉을 시작해야만 합니다!
eth_find_other_christians_ct코0='페루 다 쿠빌냐웅' 이벤트가 발생합니다.
eth_find_other_christians_tt코0=[Root.GetName] 측은 §Y[POR.GetName]§!이 소유한 모든 프로빈스를 발견하였습니다.
eth_market_of_the_west_title코0=서쪽의 시장
eth_market_of_the_west_desc코1=홍해 무역은 한때 이 세상에서 가장 중요한 무역들 중 하나였습니다. 로마 제국과 인도의 부를 이어 로마인들이 인도의 상품을 페르시아인과의 거래에서 문제가 생기지 않아도 즐길 수 있도록 했습니다. 그러나 이것은 그들의 승계자 비잔틴 제국이 오스만 투르크에 의해 무너지게 되면서 바뀌게 되었습니다. 이후, 홍해는 더이상 예전처럼 수익성이 높지 않았습니다. - 또한 유럽인들의 식민주의로 인해, 다시는 그럴거 같지 않습니다.\n그러나 우리에게 아직 선택지는 남아있습니다. 새로이 유럽인들과 세운 관계 덕분에, 그들의 좀 더 활성화된 무역 노드에 우리가 나타날수 있게 했습니다. 우리가 할 일은, 그들의 부유한 시장에 어떻게든 인접하는 것입니다.
eth_ideas_and_institutions_title코0=서구의 사상
eth_ideas_and_institutions_desc코1=우리 종교와 문화가 우리 문명에 가장 중요한 측면이지만, 기술은 우리에게 그렇게 큰 문젯거리가 되지 않았습니다.\n유럽인들이 할 수 있는 것들을 알 때까지는 말입니다. 특히 그들의 군사기술적 성과에 우리 상인들은 매우 감명 받았고, 우리 나라에 우려하게 했습니다. 이 유럽인들 중 어떤 이들도 우리를 앞서가게 해선 안 될 것입니다!
has_better_tech_than_westerns_tt코0=어떤 §Y서구권§! 국가도 §Y[Root.GetName]§!에 비해 어느 기술도 앞서지 않습니다.
has_more_institutions_than_westerns_tt코1=어떤 §Y서구권§! 국가도 §Y[Root.GetName]§!에 비해 더 많은 시대관을 수용하지 않았습니다.
eth_westernize_the_army_title코0=육군 근대화
eth_westernize_the_army_desc코0=우리 나라는 과거 유럽 육군의 효율성과 잔인함을 볼 수 있었습니다. 특히 아달 술탄국과의 분쟁 속에서, [Root.GetName]은 무기의 기술적 성과를 두 눈으로 확인 했습니다. 우리 육군을 근대화 하고 서구 기술에 우리 육군이 적응하게 해야 하고, 만약 그렇지 않으면 우리 나라가 유능한 유럽 침략자에게 넘어갈 수 있습니다.
eth_blessed_empire_title코0=축복받은 제국
eth_blessed_empire_desc코0=우리 나라는 많은 도전을 했고 이를 완벽하게 마쳤습니다. 유럽의 기독교인들과의 연락을 복원하고, 기술과 사회의 근대화를 해냈습니다! 단순히 옛 제국의 국경을 복원에 그치지 않고 이를 넘어섰습니다! 심지어 주님의 거룩한 빛을 받았습니다! 우린 진정으로 모든 나라 중 축복받은 제국입니다!
###MAL MISSIONS###
mal_pick_religious_direction_title코0=방향을 선택하라
mal_pick_religious_direction_desc코0=우리의 통치 계층은 - 전 왕실과 더불어 귀족을 포함하는 - 헌신적인 무슬림으로 구성되어 있지만, 농민들이나 낮은 상인 계층은 부족적 이교도들 입니다. [Root.GovernmentName]의 종교적 방향성에 대한 질문은 어느 때보다도 중요해졌습니다. 지속된 내부 안정을 보기 위해서, 선택을 내려야만 합니다.
mal_pick_a_religious_direction_tt코0=선택에 따라, [Root.GetName]는 §Y종교 임무§!나 §Y관용 임무§! 중 하나를 개방할 것입니다.
mal_pick_a_religious_direction_ct코1='§Y귀족들의 이슬람화§' 이벤트가 발생했고, 두 선택지 중 하나를 골랐습니다.
mal_create_navy_title코0=무역 함대 구축
mal_create_navy_desc코0=우리의 황금시대 이래로 [Root.GetAdjective] 상인들은 이집트와 아라비아, 혹은 유럽에 도달하기 위해 캐러밴과 육로에 의존하였습니다. 그러나 만사 무사의 죽음 이후 시작된 우리의 쇠퇴는 이런 무역로로는 더 이상 충분하지 않다는 것을 보여주었습니다. \n우리는 대신 수익성 있는 시장에 도달하기 위해 바다에 적응하고 바다를 탐험해야 합니다. 그러나 이를 이루기 위해서는 우선 무역 함대가 필요합니다.
mal_new_world_ambition_title코0=코 마마디의 미스테리
mal_new_world_ambition_desc코0=만사 무사의 전임자는 - 무사 자신의 말에 따르면 - 행적이 묘연한 만사 코 마마디였고, 아랍어인 무하마드 이브 쿠 라고 더 잘 알려져 있습니다. 코 마마디와 그의 수천 척의 배로 구성된 함대가 서쪽으로 항해를 떠나 다시는 돌아오지 못하며 그의 행적은 말리에서 사라졌습니다.\n선한 무사는 독실하고 관대한 사람이었지만, 코 마마디의 이야기에 대한 진실성이란...우리 궁정에 의문점을 남깁니다. 그러나 코 마마디의 비밀은 우리 항해사들과 왕실 사람들을 하나로 뭉치게하고, 서쪽 바다의 보물에 대해 생각해 볼 가치가 있습니다.
mal_discover_the_new_world_title코0=잃어 버린 함대 수색
mal_discover_the_new_world_desc코0=잃어버린 함대를 위한 탐색이 계속 되고 있습니다. 어딘가에 함대와 코 마마디의 존재를 증명할 부서진 뱃조각이 있을 것입니다.
mal_discover_the_new_world_tt코0=적어도 §YSouth America§! 지역에 위치한 하나의 지방 발견하십시오.
mal_abu_bakr_ambition_title코0=코 마마디의 야망
mal_abu_bakr_ambition_desc코0=만사 코 마마디와 그의 함대가 존재했는 지의 여부가 여전히 수수께끼에 빠져있지만, 남 아메리카의 발견은 그의 이야기가 우리에게 흥미를 일으킨 결과물입니다. 마지막으로 그의 전설에 대해 수긍하기 위해, 우리는 그의 야망을 좇고, 이 대륙을 [Root.GetName]의 영광을 위해 식민화 해야 합니다.
mal_conquer_jol_title코0=졸로프를 복속시켜라
mal_conquer_jol_desc코1=졸로프는 그들의 초창기무렵 우리의 속국이었지만, 우리의 내부 투쟁으로 독립을 선언할 수 있었습니다. 백년의 세월 동안의 주권국이었지만, 이젠 우리 보호아래 놓일 때가 왔습니다.
mal_trade_with_maghreb_title코0=마그레브와 연줄
mal_trade_with_maghreb_desc코0=우리 [Root.GovernmentName]은 위대한 만사 무사의 죽음 이래, 다른 무슬림 국가들과 매우 소원해졌습니다. 우린 이를 그냥 둘 수 없고, 마그레브의 우리 믿음의 형제들과의 인연을 다시금 세워야 할것입니다.
mal_trade_with_maghreb_tt코0=§Y유럽§!의 지역을 결단을 통해 한 번에 한해 구매할 수 있습니다.
mal_trade_with_europeans_title코0=유럽에 도달하라
mal_trade_with_europeans_desc코0=사피 무역로가 우리 수입을 강화하고 있지만, 유럽 시장의 잠재적 이익을 유지할 수 없습니다. 당연히도, 우리의 최선의 이익은  그들의 무역로들 중 하나에 접근하는 것이 우리 최대 관심사입니다.
mal_econimical_hegemony_title코0=성지 순례를 준비하라
mal_econimical_hegemony_desc코1=메카 순례는 모든 종교를 따르는 무슬림에게 신성한 의무입니다. 여기에 더해 전통적으로 우리 만사들이 알라의 이름으로 재물을 갖고 메카로 여행을 떠났었기에 우리에겐 더욱 큰 의미가 있습니다. 이번엔 유럽의 불가사의를 지나는 더 큰 순례가 행해져야 합니다. 그러나 이를 위해서는 [Root.Monarch.GetTitle]의 여정의 재정을 뒷받침할 경제력과 그 기간동안 [Root.Monarch.GetHerHis]의무를 대신 맡을 유능한 관리들이 필요합니다.
mal_riches_of_trade_tt코0=아무 §Y유럽§! 무역 노드에서, §Y[Root.GetName]§!가 적어도 §Y50§!의 무역력을 갖고, 가장 강한 §Y무역력§!을 가진 국가가 되십시오.
mal_fighting_musa_title코0=무장한 만사
mal_fighting_musa_desc코0=만사 무사의 한때의 위대한 시절은 끝이났지만, 우리 영토는 절대 그 시절에서 회복할 수 없었습니다.\n반드시 이 상황은 바뀌어야 합니다! 무사 이후 모든 만사들의 정당성에 의문을 제기되었고, 그들 누구도 대중의 지지를 받지 못했습니다. [Root.Monarch.GetSheHe]가 우리 군대를 이끌고 직접 승리로 이끌어 [Root.Monarch.GetName]는 자신의 운명을 알게 것입니다.
mal_subjugate_zaf_title코1=밤바라 달래기
mal_subjugate_zaf_desc코1=마시나 지역의 세구의 밤바라는 큰 불편을 토로했습니다. 그들은 우리로 부터 떨어저 나가길 원합니다. 결과적으로 그들은 우리의 경쟁자인 송가이에게 독립운동에 대한 지원을 얻었습니다.\n우리는 이를 용납할 수 없습니다! 그들을 우리 영역 내에 두기 위해선 최대한 빨리 밤바라를 달래야합니다.
mal_reintegrate_son_title코0=송가이 재통합
mal_reintegrate_son_desc코0=[Root.GetAdjective] 영역 내의 다른 국가는 [SON.GetName]가 있습니다. 그러나 [ZAF.GetName]와는 달리, [SON.GetName]는 우리의 쇠퇴기 초기에 발생했던 서 아프리카의 권력 공백을 채우고 힘을 기르려 하고 있습니다. 우리가 살아남으려면, [SON.GetAdjective]의 위협을 없애고, [SON.GetAdjective]인들을 우리 나라로 편입시켜야 합니다.
mal_restore_the_mali_empire_title코0=제국 복원
mal_restore_the_mali_empire_desc코0=우린 한때 서아프리카의 주요 강대국이자 문화적 중심이었습니다. 좋지 못했던 승계들로 불행하게도 우리 제국은 쇠퇴해왔고, 자칫 완전히 사라질 뻔 했습니다.\n우리는 지속할 수 있었고, 나아가 우리의 운명의 조류를 틀어버렸습니다. 이제 우리의 옛 제국의 국경을 넘어 확장하여 우리의 옛 명칭을 되찾을 시간이 왔습니다.
mal_control_the_niger_river_title코0=강을 통제하라
mal_control_the_niger_river_desc코0=니제르 강은 서아프리카의 상명선이기에 중요도가 높습니다. 이 강을 전부 통제한다면 아주 좋을 것입니다.
mal_control_the_niger_river_ct코0=§Y니제르§!강의 일부가 되는 모든 코어 지역을 갖음
mal_control_the_niger_river_tt코0=§Y니제르§! 강에 속한 모든 소유 프로빈스는 '§Y개간된 강§!' 변동치를 §Y25§!년간 얻으며, 이는 다음과 같은 효과를 제공합니다:\n개발 비용: §G-10.%§!\n지역 생산 효율: §G+10.0%§!\n지역 세금 변동치: §G+10.0%§!
mal_dominate_ivory_coast_and_timbuktu_title코0=서 아프리카 무역을 보호하라
mal_dominate_ivory_coast_and_timbuktu_desc코1=모든 서아프리카의 무역은 우리 감독하에 이루어질 것입니다. 우리 고향 지역의 무역을 좌지우지하려는 길을 모색하는 외국인들과 경재자들을 우리는 허용할 수 없습니다.
mal_dominate_ivory_coast_and_timbuktu_tt코1=어떤 §Y유럽§!의 국가도 §Y20%§!의 무역력을 §YIvory Coast§!, §YTimbuktu§! or §YKatsina§! 노드에서 갖지 않음.
mal_trade_domination코0=보호된 서 아프리카 무역
mal_retake_the_mosque_title코0=젠네를 정복하라
mal_retake_the_mosque_desc코0=국가 젠네는 예전엔 우리의 무역거래 대상이었고, 심지어 한 때 위대한 우리제국의 종속국이기도 했습니다. 우리의 쇠퇴기로, 젠네는 독립을 얻을 수 있었습니다. 이제 그들은 우리 경쟁국과 무역거래를 하며 그들을 지원하고 있습니다. 우리는 이것을 지속하게 하도록 용납치 않을것이며, 그들 나라를 우리 것으로 합병해야 합니다.
mal_conquer_tmb_title코0=팀북투를 탈환하라
mal_conquer_tmb_desc코0=위대한 도시 팀북투는 한 때 우리 제국의 중요한 일부분이었고, 이는 서아프리카와 유럽을 잇는 무역기지이었기 때문이었습니다. 우리의 쇠퇴로 도시는 우리의 손에서 벗어나 자기들만의 통치조직을 세웠습니다. 이 고가치의 도시를 되찾고 [Root.GovernmentName]에 다시 병합할 때가 되었습니다.
mal_absolute_authority_title코0=말리의 권위 회복
mal_absolute_authority_desc코0=많은 이들이 위대한 말리 제국이 다시는 돌아오지 못할 것이라 추측하고 있습니다; 우리가 시간에 묻혀 사라질 것이라고 말입니다.\n하지만 모두 틀렸습니다! 우린 누구도 생각하지 못했던 만큼으로 국경을 확장하고, 내부 위협에 대처하는 것에 성공했습니다. 모두가 말리의 권위가 완전히 회복되었음을 알아야만 합니다.
mal_absolute_authority_ct코0=§Y말리의 쇠퇴§! 재앙이 끝날 것입니다.
mal_west_african_great_power_title코0=서 아프리카 열강
mal_west_african_great_power_desc코1=우리 제국은 완전한 몰락기의 끝에 서 있었습니다만, 어떻게든 살아남아 심지어 더 성장했습니다! 그러나 우리 땅을 지배하는 동안, 이 세계에서 유일한 강대국으로 존재하기엔 거리가 있습니다. 유럽인들 또한, 그들만의 강력한 정부체제를 구축하고 이제 아프리카 사람들에게 그들의 뜻을 강요하려고 합니다.\n우리는 세력을 불려서 이 보잘 것없는 유럽인들 하나하나에게 그들의 야망을 우리에게 강요하지 못한다는 것을 알게 해 줘야합니다.
mal_west_african_great_power_ct코0=어떤 §Y유럽§! 국가도 §Y[Root.GetName]§!보다 높은 총 개발도를 갖지 않음.
mal_brace_for_decline_title코0=계층 호의 확보
mal_brace_for_decline_desc코1=우리 지배가 암흑기에 놓여있다는 것은 비밀이 아닙니다. 다수의 인구가 최악의 상황을 두려하고 있고, 속국들과 경쟁국들은 약화된 상태에서 이점을 찾을 기회를 옅보고 있습니다. 이런 형국에서 우리는 궁정 내의 단결과 통합을 그 어느때보다도 필요로 하고 있습니다. 계층들로 부터 일정한 호의를 얻어내어 그들이 기회를 노려 우리에게 비호의적이게 되지 않게 해야합니다.
mal_brace_for_decline_tt코0=§Y말리의 쇠퇴§! 재앙 동안, 계층들은 [Root.GetName]에게 §Y충성§!스럽게 남을 것입니다.
mal_get_competent_court_title코0=유능한 궁정
mal_get_competent_court_desc코1=1337년 만사 무사의 사망 후, 그의 아들 마간이 왕좌를 차지했습니다 - 그는 우리의 황금기 이후 우리가 견뎌야 했던 많은 암군들중 첫번째입니다. 1341년, 마간은 조카가 행한 많은 재정적인 실수를 되돌렸던 그의 숙부 술레이만에 양위했습니다. 그러나 그가 죽고, 말리는 많아야 몇개월을 다스리거나 폭군으로 볼 수밖에 없는 만사들만이 존재했습니다.\n\n우리의 역사를 마침내 회복하기 원한다면, 유능한 만사가 왕좌에 앉는 것이 필요합니다. - 아니면 적어도 그의 궁정의 유능한 재원을 알만한 만사여야 합니다.
mal_get_competent_court_tt코0=더 이상 §Y말리의 쇠퇴§! 재앙동안 §Y왕위 요구자 반란§!이 새로운 만사가 등극 할 때마다 발생하지 않습니다.
mal_handle_the_kaabu_title코0=카부족 통제
mal_handle_the_kaabu_desc코0=[1114.GetName]는 13세기 이후 줄곧 [Root.GetName]의 일부였습니다. 그러나 100년에 이르는 우리의 꾸준한 쇠퇴로, [1114.GetName]의 사람들이 이를 무시 받았다 여기고 그들만의 국가를 세우기를 욕망했습니다, 우리로부터 완전한 독립을 말이죠.- 특히 그들과 유럽인들 사이에 접촉이 있었던 후에, 그들은 더이상 우리의 중개인이 되려하지 않습니다.\n우리는 그들에게 우리의 따뜻한 마음과 애정을 보여 우리 국가의 일부가 우리의 손가락 사이로 흩어지지 않게 해야 합니다.
mal_handle_the_kaabu_ct코0=§Y말리의 쇠퇴§! 재앙동안 다른 국가의 코어가 존재하는 모든 지역은 [Root.GetName]에게 §Y충성§!스럽게 남을 것입니다.
mal_gold_and_ivory_title코0=금과 상아
mal_gold_and_ivory_desc코1=금은 전통적으로 [Root.GetName]의 좋은 수출품이었으며, 많은 외국인들은 우리의 위대한 [Root.Monarch.GetTitle]께서 소유한 금덩어리를 위해 무엇이든 할 것입니다. 한편으로 우리는 인기가 늘고 있는 또다른 자원:상아에 접근할 수 있습니다.\n우리는 두 상품의 생산을 증대시키고 경제를 개발해야 합니다.
mal_give_gold_away_title코1=관대함을 보여줘라
mal_give_gold_away_desc코0=[Root.GetMaliReligionGenorisityMissionText]
mal_give_gold_away_desc_muslim코1=땅의 부와 재물을 소유하는 것은 대단한 일이지만, 예언자의 비전을 충족할 수는 없습니다. 우리의 부귀에 연연하지 말고 위대한 만사 무사의 발자취를 따라 우리의 금을 신앙의 형제들, 특히 아나톨리아와 이집트, 또한 당연히 메카에 있는 형제들과도 나누어야 합니다.
mal_give_gold_away_desc_fetishist코1=이 세상은 우리에게 값나가는 금속을 비롯한 부를 선물해 주었으며, 우리는 그것을 누리는 방법을 알고 있습니다. 그러나 그것은 우리의 주술사와 믿음의 정신에 있는 것이 아닙니다. 대신 우리는 세상의 다른 위대한 부족들과 우리의 부를 나누어야 합니다!
mal_jihad_upon_own_population_title코0=[Root.GetName] 개종
mal_jihad_upon_own_population_desc코1=귀족층의 이슬람화로, 우리 국민들이 이슬람을 따르게 납득시키록 결정했습니다. 이를 계속 행해야 하고, 또 과거의 이교도적인 관행을 샅샅도록 밝혀야만 하며, 우리에 대한 [Root.GetDhimmiName]들의 세력을 제거해야 합니다.
mal_more_tolerance_to_heathens_title코0=전통에 대한 관용
mal_more_tolerance_to_heathens_desc코0=시골 사람들이 그들의 전통 종교를 지키는 것을 용납하기로 결정했습니다. 그러나 우리 영토의 상위 계층은 이에 그닥 우호적이지 않습니다. 옛 전통에 대한 대중적 관용을 높이고, [Root.GovernmentName] 전반에 대한 [Root.GetClergyName]들의 힘을 줄여야 할 필요가 있습니다.
###SON MISSIONS###
son_build_military_title코0=전쟁 준비
son_build_military_desc코1=우리는 한 때, 말리의 종속국였고 이는 그들이 그들 영토에 대한 통제를 잃어버릴 때까지 지속되었습니다. 우리는 독립하였고 이에 외국의 침략에 대한 방어는 우리 자신의 책무가 되었습니다. 우리 군대를 조성하고 유능한 장군을 고용해야 합니다. 투쟁의 시간이 다가오고 있기 때문입니다.
son_conquer_tmb_title코0=팀북투를 정복하라
son_conquer_tmb_desc코0=팀북투는 우리 문화와 서 아프리카의 핵심부이고, 상인들, 학자, 울레마와 외국인들을 차별 없이 끌어 드립니다. 이 의미있는 도시의 통제권을 되찾는 것이 우리 최우선 관심사입니다.
son_conquer_zaf_title코0=쿰비 살레를 정복하라
son_conquer_zaf_desc코1=약 300년전 현재 말리가 소유한 지역을 위대한 가나 제국이 지배했습니다. 가나 제국은 시간이 흘러 결국 그들의 한 때 인상적인 수도, 쿰비 살레가 버려진 마을이 되어버리면서 휘청거렸습니다.\n그럼에도, 이 폐허 도시에 대한 정복은, 말리의 영토로 가는 더 나은 발판으로 삼을 수 있다는 점에서 유용해 보입니다. 더불어 고서적을 찾을 수도 있습니다. 거기엔 현재 우리에게 도움이 될 내용이 존재 할 수도 있습니다.
son_prepare_troops_title코0=제국이란 이름을 차지하라
son_prepare_troops_desc코1=말리가 자신들의 칭호를 우리에게 줄 때가 왔습니다. 그들은 쇠퇴기로 인해 약해졌고, 과거 한 때 모습의 그림자로 남아있을 뿐입니다. 그러나 서아프리카의 유일 제국이란 칭호를 주장하기 위해선, 우리의 세력이 상상할 수 있는 모든 면에서 그들보다 우위에 있음을 증명할 필요가 있습니다.
son_invade_mali_title코0=말리를 박멸하라
son_invade_mali_desc코0=말리의 수명은 이미 다했습니다. 이 한심해보이는 지배에 미련을 없애주고, 그들의 인구를 우리의 정당한 제국으로 편입 시키는 것이 자비로운 일입니다.
son_west_african_great_power_title코0=서 아프리카를 정복하라
son_west_african_great_power_desc코1=말리의 몰락과 함께 우리의 가장 큰 경쟁자는 사라졌습니다. 우리는 니제르, 사헬, 기니 전역을 자유롭게 점령할 수 있고 마그레브와도 우리 본토에 대한 공격을 걱정할 것 없이 경쟁할 수 있습니다.
son_competence_in_court_title코0=관료제를 발전시켜라
son_competence_in_court_desc코1=관료제는 그다지 흥미로운 논의 사항은 아니지만, 큰 야망을 가진 모든 나라에는 필수적인 요소입니다. 그러나 현재 우리의 관료제 상태는 매우 심각해 보입니다. 확장을 생각하기 전에 행정부터 가다듬어야 합니다.
son_military_expertise_title코0=군대 전문성
son_military_expertise_desc코1=손니 왕조의 많은 통치자들은 농민들에게서 무의미한 전쟁에 소모될 한 명의 잠재적 병사의 모습만 보았습니다. 이러한 태도는 과거에는 더 많은 신병을 모집하는데 도움이 되었지만, 역시나 효율적인 비용은 아니었습니다. 이 태도를 버리고 [Root.Monarch.GetTitle] [Root.Monarch.GetHerselfHimself]께서 직접 이끌 새로운 전문 군대를 설립해야 합니다. 
son_win_battles_title코0=전투의 영광 포용
son_win_battles_desc코0=쓸 곳이 없는 정예군은 그저 장식품일 뿐입니다. 적들을 상대로 우리의 힘을 발휘하고 전투의 영광을 포용해야 합니다!
son_win_battles_bt코0=이 임무의 조건은 '§Y군대 전문성§!' 임무를 완료하면 밝혀집니다.
son_win_battles_ct코0=적어도 §Y30§!번의 전투에서 승리하십시오(현재 §Y[Root.son_fight_counter.GetValue]§!/§Y30§!).\n§Y[Root.Monarch.GetName] [Root.Monarch.Dynasty.GetName]§!의 지휘를 받는 군대의 승리는 2배로 계산됩니다.
son_modernize_army_title코0=육군 개혁
son_modernize_army_desc코0=화약 무기와 개인 화기의 사용이 우리 군대 안에 스며들고 있지만, 여전히 우리 군대에서 일반적이 되는 것은 요원해보입니다. 대다수의 우리 병사가 아직도 창과 활에 의존하고 있고, 마그레브 인들과 유럽인들은 화기를 익히고 있습니다. 우리 이웃들에게 뒤쳐지지 않으려면, 우리 육군을 개혁하고 그들의 무기를 근대화 해야합니다.
son_modernize_army_tt코0=어떤 §Y서구권§! 기술 그룹 국가보다 §Y[Root.GetName]§!의 군사 기술이 높다.
son_westernize_state_title코0=[Root.GetName] 현대화
son_westernize_state_desc코1=우리 육군은 개혁과 근대화를 만끽하고 있지만, [Root.GovernmentName]정부는 여전히 옛날 법률과 규칙을 갖고있고, [Root.Monarch.GetTitle]꼐서는 [Root.GetName]의 절대 군주로써 인식되지 않습니다. 우리는 정부를 재구성하는데 초점을 맞추고 근대 기술의 많은 경이로움을 받아들여야 합니다.
son_stop_the_air_raids_title코0=아이르의 약탈을 멈춰라
son_stop_the_air_raids_desc코0=[Root.GetAdjective] 사람들은 우리의 건국이후,  [AIR.GetName]의 약탈자와 맞서 싸워야 했습니다. 그러나 수세란 해결책이 되지 않습니다; 투아레그는 우리 마을을 그냥 계속 약탈할 것입니다.\n안됩니다. 이 위협을 끝내기 위해 공세로 전환하여 [AIR.GetAdjective]의 위협을 끝내야 합니다.
son_take_djenne_title코0=[1134.GetName]를 정복하라
son_take_djenne_desc코1=[1134.GetName]는 역사적으로 니제르에서 매우 중요한 무역 중심지였습니다. 이를 필두로, 이 도시는 젠네의 대 모스크의 고향이고 한 때 우리의 경쟁국 말리의 일부였지만 이제는 독립한- 그래서 쉬운 - 타겟입니다.\n우리는 이 중요한 도시를 [Root.GetName]의 영광을 위해 차지해야합니다.
son_expand_djenne_mosque_title코0=대 모스크를 개조하라
son_expand_djenne_mosque_desc코0=목표한 도시를 정복함으로 인해서 젠네의 대 모스크가 부수적인 피해를 입고 말았습니다. 우린 모스크를 알라의 이름으로 재건해야 합니다!
son_contact_with_morocco_title코0=마그레브와 접촉하라
son_contact_with_morocco_desc코1=가나 제국 시기 동안, 사헬과 니제르 지역은 아라비아와 마그레브로부터 많은 방문객을 받았습니다. 이는 말리 제국의 수명이 다할 때까지 지속되었습니다만, 현재 이들 지역으로부터의 방문객들과 상인들은 더이상 우리를 찾지 았습니다. 우리 믿음의 형제들과 연결을 복구해야만 합니다. - 적어도 가장 가까이에 있는 마그레브에 위치한 자들에 한해서라도 말입니다.
son_contact_with_morocco_tt코0=§Y마그레브§!의 어떤 지방이라도 발견하십시오.
son_invade_maghreb_title코0=마그레브를 침공하라
son_invade_maghreb_desc코0=우리는 마그레브인들과 개선된 외교관계를 가지려 했지만, 그들은 우리의 금과 소금에만 관심이 있습니다. 설상가상인 점은: 모로코인들은 우리 영토로의 침공을 계획하고 있으며, 이를 통해 자신들을 위해 소금과 금 생산를 휘어잡길 바랍니다! 우리 자신의 안보를 위해, 협상안을 물리고, 공세를 먼저 취해야 합니다!
son_consolidate_maghreb_title코0=마그레브를 통합하라
son_consolidate_maghreb_desc코1=마그레브는 거대한 지역이고 매우 가치있는 자원들을 갖고 있습니다. 이 지역에 대한 영향력을 확장하고, 우리 이익을 위해 남아있는 지역들을 정복해야 합니다.
son_conquer_the_mossi_title코0=모시의 위협을 제거하라
son_conquer_the_mossi_desc코1=남쪽에 있는 모시족은 꽤 오랫동안 우리의 골칫거리였습니다. 그들은 주기적으로 서로 싸우고 있지만, 그들과 투아레그족은 여전히 우리의 마을에 습격해올 수 있습니다. 우리가 이 이교도로부터 어떤 식으로든 평화를 얻기 원한다면 힘을 보여주고 이 부족을 제거해야 합니다.
son_conquer_the_mossi_tt코0=모든 §Y모시§! 프로빈스를 §Y[Root.GetName]§! 혹은 그들의 조공국이 아닌 속국이 소유하고 있습니다.
son_convert_the_mossi_title코0=모시족 개종
son_convert_the_mossi_desc코0=[Root.GetClergyName]들은 모시의 역사와 우리 백성들을 상대로 한 그들의 습격에 대하여 연구하였으며, 모든 모시족을 진정한 믿음으로 개종시키는 것을 해결책으로 제시하였습니다! 이 이교도들은 신의 빛을 목도하여야 합니다!
son_convert_the_mossi_tt코0=모든 §Y모시§! 프로빈스는 §Y[Root.Religion.GetName]§! 신앙을 믿습니다.
son_convert_the_mossi_ct코0=모든 §Y모시§! 프로빈스는 자치도가 §G100§! 감소하며 '§Y헌신적인 추종자들§!' 변동치를 §Y30§!년 동안 얻습니다. 이는 다음과 같은 효과를 줍니다:\n지역 분리주의: §G-10.0§!
son_invite_foreign_scholars_title코0=학자 초청
son_invite_foreign_scholars_desc코0=우리는 아라비아의 형제들과 멀리 떨어져 있으며 우리의 학자들도 마찬가지입니다. 그렇기에 우리의 율법은 그들의 율법과는 독자적인 방향으로 변화했습니다. 우리는 동쪽의 학자들을 초대하여 [Root.Religion.GetName]의 율법에 대한 그들의 새로운 발전상을 경청하여야 합니다.
son_invite_foreign_scholars_ct코0=§Y사헬§!, §Y니제르§! 혹은 §Y기니§! 권역에 수도가 있지 않으며 §Y[Root.Religion.GetName]§! 신앙을 믿고 §Y[Root.GetName]§! 측과 동맹 중인 국가입니다.
son_invite_foreign_scholars_bt코0=[Root.GetName]은(는) 외교적 요구사항에 상관없이 §Y학자§!를 초청할 수 있게 됩니다.\n
son_invite_foreign_scholars_at코0=학파의 유형은 이 임무를 완료할 때 초청받은 학파에 따라 달라집니다.
son_invite_foreign_scholars_tt코0=§Y사헬§!, §Y니제르§! 혹은 §Y기니§! 권역에 수도가 있지 않음\n  §Y[Root.Religion.GetName]§! 신앙을 믿음\n  §Y[Root.GetName]§!에 대한 의견이 적어도 §Y150§! 이상임
son_power_to_the_ulema_title코0=[Root.GetClergyName]에게 더 많은 힘을
son_power_to_the_ulema_desc코1=우리 [Root.GovernmentName]는 종교적 통일과 깨달음의 방향으로 이끌고 있습니다. 하지만 아직 갈 길이 멉니다. [Root.GetClergyName]은 우리 나라를 신성한 법률으로 관리하고 이교도의 개종을 감독하고 있습니다만, 그들은 정부에 의해 제한 받습니다. 그들이 법률 제정 과정을 진행시키도록,우린 그들에게 더 많은 자유와 특권을 주어야만 합니다.
son_convert_west_africa_title코0=서아프리카를 개종하라
son_convert_west_africa_desc코0=서 아프리카는 종교분야에서는 항상 독특했습니다. 이슬람교가 서아프리카에 교두보를 세웠을 때, 상위 엘리트 계층은 참된 신앙으로 개종했지만, 그들의 신민들에게는 강요하지 않았습니다. 심지어 어떤 경우엔, 이교도 농민들의 권리를 허락하고, 그들의 행동을 용납해주었습니다.\n이런 관용의 모습은 이제 사라져 버리고, 이제 이런 이교도들도 또한 옳은 길로 이끌어져야 합니다.
son_convert_west_africa_tt코0=§Y사헬§!, §Y니제르§! 혹은 §Y기니§! 권역의 모든 미개척지가 아닌 프로빈스는 §Y[Root.Religion.GetName]§! 신앙을 믿습니다.
son_build_workshops_title코0=작업장을 건설하라
son_build_workshops_desc코0=우리 상품에 대한 수요가 증가하고 있고 소금 등의 물품을 우리와 거래하기를 원하는 상인들이 늘어나고 있습니다. 생산 효율을 높이기 위해 작업장을 건설해야 합니다.
son_own_develop_clothes_and_salt_title코0=소금과 옷감을 개발해라
son_own_develop_clothes_and_salt_desc코1=금은 세계에서 엄청나게 가치 있는 자원으로 여겨집니다. 그러나 서아프리카에서는 두 번째로 중요한 자원에 불과하며, 이 곳에서 보다 더 중요한 자원은 바로 소금입니다. 금은 우리 국고에 도움이 되지만 먹을 수 없고, 소금은 그런 점으로 인해 이 곳에서 높은 가치를 갖습니다.\n그리고 태양의 열기로부터 몸을 보호하는 데 꼭 필요한 의복도 중요한 자원입니다.\n\n우리는 시장에 상품을 공급하고 사헬과 니제르 너머까지 무역을 확대하기 위해 두 상품의 생산을 발전시켜야 합니다.
son_own_develop_clothes_and_salt_ct코0=[Root.GetName] 측은 '§Y소금과 의복의 주요 생산§!' 변동치를 §Y25년§! 동안 얻으며, 이는 다음과 같은 효과를 줍니다:\n국가 무역력: §G+25.0%§!\n§Y소금§! 혹은 §Y의복§!을 생산하는 모든 프로빈스에서:\n지역 상품 생산: §G+0.50§!
son_gold_of_west_africa_title코0=서 아프리카의 부
son_gold_of_west_africa_desc코0=우리의 고향은 금맥이 풍부한 것으로 알려져 있습니다. 우리는 이 금을 세계 각지에 유통하기 위해 금 채광을 개발하고 시장을 개설해야 합니다.
son_dominate_west_african_trade_title코0=서 아프리카 무역을 보호하라
son_dominate_west_african_trade_desc코1=서아프리카의 모든 무역은 우리의 감독 아래에서 이루어져야 합니다. 우리는 외국인과 경쟁자들이 우리 고향 지역의 무역을 이용하는 방법을 찾는 것을 용납할 수 없습니다.
son_guarantee_the_fetishist_title코0=옛 전통 보장
son_guarantee_the_fetishist_desc코0=아프리카의 다른 나라들과 마찬가지로 [Root.GetName]는 조상들의 오래된 전통과 신앙을 따라 왔습니다. 우리 나라의 상류층은 신의 빛을 받아들였지만, 시골의 사람들은 여전히 이교도의 전통을 따르고 있습니다. 우리의 뿌리를 존중하고 종교의 자유를 보장해야 합니다.
son_guarantee_the_fetishist_ct코0=[Root.GetName]의 이교 관용이 적어도 §Y1§! 이상입니다.
son_fetishist_alliances_title코0=토속 신앙과의 동맹
son_fetishist_alliances_desc코0=우리의 과거와 전통을 좀 더 잘 이해하기 위해, 이교도가 어떻게 행동하는 지 배우는 것은 중요합니다. 우린 이교 동맹이나 속국들을 잘 갈무리해서 그들의 행동을 연구해야 합니다.
son_fetishist_alliances_ct코0=§Y아프리카§!에 수도가 있습니다
son_eliminate_other_muslims_title코0=우리의 유산 보호
son_eliminate_other_muslims_desc코0=페티시즘 종교는 아마 우리 그리고 이슬람교에게 이교적일 수 있지만, 같은 민족이라는 우리의 정체성의 아주 중요한 부분입니다. 따라서 우리는 이를 파괴하기 바라는 종교적 광신자로 부터 이 유산을 지켜야만 합니다. 
son_eliminate_other_muslims_tt코0=§Y사헬§!, §Y니제르§! 혹은 §Y기니§!의 어떤 §Y페티시즘§! 프로빈스도 §Y[Root.GetName]§! 측과 그 종속국을 제외한 비 페티시즘 국가의 소유가 아닙니다.
son_back_to_the_roots_title코0=부족 통합
son_back_to_the_roots_desc코0=옛 방식을 추종하는 다수의 국가들이 부족으로 쪼개져, 서로를 그리고 우리를 적대시하는 전쟁을 부추기고 있고, 이 과정을 통해 옛 방식의 중요성을 잃고 있습니다. 이 부족들의 운명은 우리 관심사가 아니지만, 그들에게 내재된 전통과 역사는 보호와 보존의 가치가 있습니다. 이 개화되지 못한 인원들의 호의를 베풀어 그들을 부족들로 해방시켜야 합니다.
son_back_to_the_roots_ct코0=[Root.GetName]이 적어도 §Y3§!의 이교관용을 갖는다.
son_european_gold_market_title코0=유럽의 시장
son_european_gold_market_desc코1=유럽의 시장에는 기회가 가득하며, 우리의 무역 노드와 금 생산을 발전시키는 것은 재정적으로 도움이 되겠지만 두캇을 더 많이 벌 수 있는 방법은 아직 많이 남아 있습니다.
son_first_branch_mission_title코0=[Root.GetSelectableMissionTitle]
son_first_branch_mission_desc코0=[Root.GetSelectableMissionDescription]
son_second_branch_mission_title코0=[Root.GetSelectableMissionTitle]
son_second_branch_mission_desc코0=[Root.GetSelectableMissionDescription]
son_third_branch_mission_title코0=[Root.GetSelectableMissionTitle]
son_third_branch_mission_desc코0=[Root.GetSelectableMissionDescription]
son_fourth_branch_mission_title코0=[Root.GetSelectableMissionTitle]
son_fourth_branch_mission_desc코0=[Root.GetSelectableMissionDescription]
SELECTABLE_MISSION_TITLE코0=분기점 임무
SELECTABLE_MISSION_DESCRIPTION코0=이 임무는 §Y분기점 임무§!입니다. 이벤트나 다른 임무를 통해서, 이 임무는 새로운, 최종 버전으로 교체될 것입니다.
selectable_mission_trigger_tt코0=§Y분기점 임무§!이기 때문에 이 임무는 완수될 수 없습니다.
son_religious_triggers_tt코0=\n만약 §Y[Root.GetName]§!가 §Y종교§! 경로를 선택했다면, 이 임무를 완료하기 위해서 다음과 같은 트리거가 필요합니다:
son_tolerance_triggers_tt코0=\n만약 §Y[Root.GetName]§!가 §Y관용§! 경로를 선택했다면, 이 임무를 완료하기 위해서 다음과 같은 트리거가 필요합니다:
son_religious_effects_tt코0=\n만약 §Y[Root.GetName]§!가 §Y종교§! 경로를 선택했다면, 다음과 같은 효과가 발생합니다:
son_tolerance_effects_tt코0=\n만약 §Y[Root.GetName]§!가 §Y관용§! 경로를 선택했다면, 다음과 같은 효과가 발생합니다:
###KON MISSIONS###
kon_develop_country_title코0=[Root.GetName] 개발
kon_develop_country_desc코0=우리 [Root.GovernmentName]은 위대한 경지에 다다르기 직전에 있습니다. 하지만 이 경지에 다다르기 위해서는 이를 지원할 더 많은 인력과 기반 시설이 필요합니다. 우리는 [1170.GetCapitalName] 지역과 그 주변을 개발해야 합니다.
kon_colonize_coast_desc코0=전통적으로 조개껍질인, 은짐부는 [Root.GetName]의 통화로써 자리매김했습니다. 은짐부는 상대적으로 부서지기 쉬웠고, 또 지역 내 금에 대한 접근이 흔치 않아 이 조개들로 화폐를 계속 만들었습니다.\n다행히도 이 귀중한 조개가 더 많이 있는 좋은 보고가 있습니다: [1167.GetName] 해안 가 옆에 존재하는 섬으로 조개들에게는 고향이 되는 곳입니다. 영토를 확장하고 이 연안을 확보하여 은짐부에 대한 접근을 용이하게 해야합니다..
kon_protect_trade_title코0=무역의 통제자
kon_protect_trade_desc코0=[Root.GetName]의 경제는 통화 은짐부와 내수 무역에 기반합니다. 그러나 내수 무역으로는 충분히 효율적이지 않고, 따라서, 무역을 확장해야 하고, 이는 콩고의 내부 부족, 대 호수 지역과 상아 해안의 방향입니다.
kon_seize_crown_land_title코0=마니 권력 장악
kon_seize_crown_land_desc코0=[Root.GetName]은 지역 연합이고, 우리 나라의 마니의 관리 아래 놓여있습니다. 마니들은 세금을 개발이 덜된 지역으로부터 모으고, 매해 그들의 수익을 [Root.Monarch.GetTitle]에게 선물합니다. [Root.Monarch.GetTitle]께서 그들에게 만족하신다면, 마니들은 다음 해에 대한 권한을 다시 얻을 수 있습니다.\n이러한 체계가 과거에는 잘 돌아가지 않았고, 매우 구식의 정부 형태였으며, [Root.GovernmentName]이(가) 살아남기 위해선 우리는 마니들의 권력을 장악하고 체제를 중앙집권화할 필요가 있습니다.
kon_seize_crown_land_tt코1=§Y콩고§!와 §Y중앙 아프리카§! 권역에 있는 모든 소유 프로빈스의 자치도가 최소치까지 §G감소§!합니다.
kon_absolute_rule_title코0=절대적인 지배
kon_absolute_rule_desc코1=세상은 변화하고 있으며, 우리의 지역도 마찬가지입니다. 유럽인들은 새로운 사상을 가지고 왔습니다. 그들이 가져온 모든 것이 우리에게 실용적이지는 않겠지만, 절대주의라는 개념은 추구할 가치가 있어 보입니다. 이것은 오래된 전통적인 국정의 방식과 정면으로 충돌하지만, 우리 국민들은 이 지침 아래에서 유럽인들이 이룬 진보를 보았습니다.\n우리는 이 개념을 수용하고 우리 나라 안에서도 절대적인 통치를 시행해야 합니다.
kon_absolute_rule_ct코0=§Y절대주의§!가 활성화되지 않았습니다.\n이 임무의 조건은 §Y절대주의 시대§! 혹은 §Y혁명의 시대§!에 절대주의가 활성화되면 크게 변화할 것입니다.
kon_annex_vassals_title코0=로앙고와 은동고의 운명
kon_annex_vassals_desc코1=은동고와 로앙고 왕국의 역사는 애매모호하며 우리의 역사처럼 전설에 기반하고 있습니다. 그럼에도 불구하고, 이 두 나라는 적어도 명목상으로는 [Root.GetName]의 속국입니다. 이 나라들은 더 이상 그들의 통치자들의 지배를 받기에 적합하지 않으며 대신 우리 [Root.GovernmentName]의 밑으로 통합되어야 합니다.
kon_conquer_ksj_title코0=전사들의 위협
kon_consolidate_central_africa_title코0=콩고 부족 통합
kon_consolidate_central_africa_desc코0=콩고의 많은 부족들은 그들의 이야기가 전해져온 이래로 항상 서로를 증오해 왔습니다.\n이 상황을 이제 끝내야 합니다! 외부의 위협과 개척자들의 압박으로부터 맞서 서로 싸우는 부족들을 하나로 통합해야 합니다!
kon_greatest_power_kongo_title코1=아프리카의 패자
kon_greatest_power_kongo_desc코2=콩고 지역의 안정된 통합으로, 대 호수 그리고 동과 남 아프리카에 대한 접근이 자유로워졌습니다. 남아프리카에서 제국이 일어설 시기이며, 이들 지역을 취하고 유럽인들의 관심으로 부터 보호할 것입니다.- 그리고 이러한 제국은 바로 우리가 될 것입니다!
kon_reform_army_title코0=육군 설립
kon_reform_army_desc코0=[Root.GetName]는 전통적으로 어떤 종류의 군대도 가지고 있지 않았습니다. 그나마 [Root.Monarch.GetTitle]의 안전을 보장하는 왕실 근위대가 있었지만 그 외에는 항상 전문성이 없는 농민 군대에 의존해야 했습니다.\n과거에는 이것만으로도 충분했지만 미래를 생각하면 좋은 전략은 아닙니다. 우리는 영구적인 군대를 창설해야 합니다.
kon_obliterate_great_power_army_title코0=힘의 증명
kon_obliterate_great_power_army_desc코0=열강들이 세상에 나타나 이제 아프리카, 즉 우리의 운명을 좌우하고 있습니다! 우리는 전사의 왕국은 아니지만, 전쟁에서 열강을 물리쳐 우리의 무력을 과시하여야 합니다. 그렇지 못하면 우리는 절대 우리 스스로의 운명의 주인이 되지 못할 것입니다.
kon_obliterate_great_power_army_at코0=어떤 §Y열강§!이든 §Y[Root.GetName]§!를 상대로 한 전쟁에서 §Y50§! 이하의 승점을 기록하고 있습니다.
kon_obliterate_great_power_army_bt코0=[Root.GetName]보다 높은 개발도(종속국 포함)를 가진 어떤 국가든 §Y[Root.GetName]§!를 상대로 한 전쟁에서 §Y50§! 이하의 승점을 기록하고 있습니다.
kon_obliterate_great_power_army_tt코0=§Y[Root.GetName]§!만이 유일한 열강입니다.
kon_anzikus_copper_title코0=마코코의 구리
kon_repel_the_missionaries_title코0=기독교인 격퇴
kon_repel_the_missionaries_desc코0=매우 밝은 피부색을 가진 자들이 우리 해안에 나타나 십자가에 매달린 남자에 대한 사상을 퍼뜨리기 시작했습니다. 그들은 처음엔 친절한 이야기꾼처럼 보였지만, 그 이후로 우리의 오래된 전통을 파괴하려는 사상을 가져왔습니다 - 그리고 그들을 따르는 사람들은 그들의 말을 경청했습니다! 이 선교사들이 그런 짓을 계속하게 내버려둘 수는 없습니다!
kon_repel_the_missionaries_tt코1=§Y[Root.GetName]§! 측은 더 이상 외국 선교사들의 표적이 되지 않을 것입니다.
kon_convert_west_africa_desc코1=아프리카는 무슬림과 기독교도들의 침략을 양쪽 다 보아왔습니다 - 둘 다 우리의 전통과 유산을 뿌리뽑고 그들의 사상으로 완전히 대체하려 하고 있습니다. 그들을 막아야 합니다! 우리는 이 광신자들을 그들의 고향으로 몰아내고 우리의 형제들을 위해 이 대륙을 되찾을 것입니다!
kon_convert_west_africa_bt코1=§Y니제르§!와 §Y기니§! 권역의 모든 정착지 프로빈스의 종교는 §Y페티시즘§!입니다.
kon_convert_west_africa_ct코0=[Root.GetName] 측은 유럽인과 §Y대립§!하기로 결정했습니다.
kon_convert_the_country_title코0=기독교 수용
kon_convert_the_country_desc코0=유럽인들 편에 서기로 이미 결정했지만, 그들은 우리가 주님의 빛을 받아들일 때 까지, 우리를 똑같이 보지 않을 것입니다. 우린 공식적으로 카톨릭이 되어야만 하고, 이런 면에서 왕과 대중이 똑같이 개종해야 합니다.
kon_churches_for_the_pope_title코0=국민들을 위한 교회
kon_churches_for_the_pope_desc코1=자연의 정령이나 조상의 영혼을 숭배하던 원시적인 시간들 동안, 어떤 종류의 숭배를 위한 건물도 있지 않았습니다. 기껏해야, 샤먼이 보존하는 작은 신사정도 였습니다.\n이런 시기는 다행이도 끝이 났고, 우리의 교회 건설을 통해 우리국민의 모든 이들이 주님의 보살핌 속에 있게 하도록 하는것이 우리의 가장 중요한 과제입니다.
kon_gain_cardinal_title코0=[Root.GetName]을 위한 추기경
kon_gain_cardinal_desc코1=우리 국민들은 성서의 기록들과 그리스도의 가르침에 더더욱 친근해 지고 있으며, 또한 중앙 아프리카에서의 카톨릭 영향령도 증가합니다. 이 추세가 계속되길 원한다면, 공식적으로 임명된 추기경이 필요합니다. 교황에게, 아니면 적어도 추기경을 보유한 카톨릭 국가 중 하나에 접촉한다면 도움이 될 것입니다.
kon_gain_cardinal_at코0=§Y교황청§! 혹은 §Y추기경§!이 보유하는 국가가 [Root.GetName]의 §Y동맹§!이거나 [Root.GetName]에 대한 적어도 §Y100§!의 의견을 갖는다.
kon_gain_cardinal_bt코0=§Y교황청§!이 존재하지 않고 어떤 국가도 추기경이 없다.
kon_spread_catholicism_title코0=말씀 전파
kon_spread_catholicism_desc코0=유럽인들이 질병과 불공정한 무역을 우리에게 가져왔지만, 동시에 기술과 진보도 가져왔습니다. 그러나 그들이 가져온 가장 중요한 것은 주님의 빌이었습니다. 이 선물을 받고 가톨릭 교회의 한 부분이 되는 것이 아프리카의 사람들에게 최대의 관심사입니다.
kon_build_navy_title코0=[Root.GetAdjective] 해군
kon_build_navy_desc코1=세상이 바뀌고 있습니다. 창백한 피부를 가지고 전에 보지 못한 갑주를 한 남자들이 우리의 해안을 방문하고 우리 국민에 대한 새로운 생각을 가져왔고, 다른 외국인들은 그들의 물건을 우리와 교환합니다. 그러나 그들의 의도가 우리에대한 호의로 비롯한 것인지 의심쩍고, 따라서 우리는 우리의 고향을 바다에서 온 침략자들로 부터 지켜야만 할 것이고, 우리 만의 함선을 건조해야합니다.
kon_find_europe_title코0=유럽인들 찾기
kon_find_europe_desc코1=아주 멀리서 이들이 - 유럽인들 말입니다 - 우리에게 그들 고향 땅에 대해서 또 그들의 작업에 왜 노예가 필요한지에 대해서 갖가지 종류의 이야기들을 해 주었습니다. 이 이야기들이 얼마나 진실일지에 대해  스스로 알아내야 하며, 이 유럽에 대해 우리의 눈으로 봐야합니다.
kon_find_europe_tt코0=[Root.GetName]이 §Y유럽§!의 아무 지역을 발견함.
kon_find_europe_ct코0=[Root.GetName]이 §Y유럽인들§!과 접촉했음.
kon_face_off_against_europeans_title코0=노예상 격파
kon_face_off_against_europeans_desc코1=유럽의 노예상인들이 점점 더 노예를 찾기위해 터무니 없는 모습을 보였습니다. 더이상 낮은 계층과 마니를 구별짓지 않고, 그들 식민지의 플랜테이션에 아무나 데려갑니다. 공식적으로 그들을 추방시키는 것은 효용이 없었고, 오히려 주민들을 그들이 납치하려는 정황 속에 우리 마을에 대한 습격이 보고되기도 했습니다.\n이를 더이상 그냥 둘 수 없습니다! 이 유럽인들에게 맞서야만 하고 그들의 무모함을 잠재우기 위해 전투에서 싸워 이겨야 합니다.
kon_face_off_against_europeans_bt코0='§Y유럽인들 찾기§!' 임무를 먼저 완료하면 요구 사항이 밝혀집니다.
kon_face_off_against_europeans_ct코1=§Y[Root.GetName]§! 측은 §Y유럽§! 국가의 지배를 받는 모든 §Y북아프리카§!, §Y남아프리카§! 아대륙의 프로빈스에 대한 영구적인 명분을 얻습니다.
kon_banish_the_westerners_from_africa_title코0=유럽인 추방
kon_banish_the_westerners_from_africa_desc코2=유럽인들이 남아프리카의 어느 지역에서든, 어떤 형태로든 영향력을 행사하고 있는 한 우리는 결코 안전하지 못할 것입니다. 우리의 고향에서 이들의 위협을 몰아내고 그들을 추운 북쪽으로 다시 돌려보내야 합니다!
kon_banish_the_westerners_from_africa_tt코0=§Y남아프리카§! 아대륙과 §Y니제르§!, §Y기니§! 권역의 모든 프로빈스는 수도가 §Y유럽§!에 있는 국가의 소유가 아니거나, 혹은 §Y[Root.GetName]§!의 유럽 종속국의 소유입니다.
kon_protector_of_africa_title코0=아프리카의 수호자
kon_protector_of_africa_desc코0=우리는 중앙 아프리카의 [Root.GovernmentName] 이상의 존재가 되었습니다. 우리는 호시탐탐 기회를 엿보는 유럽인들로부터 사람들을 보호하는 아프리카의 수호자가 되기 위해 일어섰습니다!
kon_become_proper_monarchy_title코0=참된 왕국
kon_become_proper_monarchy_desc코1=[Root.Monarch.GetTitle]께서는 이미 우리 사회에서 참된 군주로 인정받고 있습니다. 그러나 저 창백한 사람들의 눈에 우리는 "야만인" 부족일 뿐입니다. 물론 이 사람들은 우리의 문화에 대해 전혀 알지 못하지만, 그들이 우리를 같은 눈높이에서 보아주지 않는 한 우리는 그들의 기술과 생각을 배울 수 없을 것입니다.
kon_accelerate_slave_trade_title코0=노예 무역
kon_accelerate_slave_trade_desc코1=우리 왕국은 상아에서 구리에 이르기까지 유럽인들과 많은 상품을 교환하고 있습니다. 특히 특정한 상품이 유럽인들에게서 많은 인기를 얻고 있습니다. 바로 노예입니다. 유럽인들에게 팔리는 그들은 우리 [Root.GovernmentName]에서 으레 떠올릴 수 있는 범죄를 저지르거나 부채를 진 하층민들입니다.\n노예에 대한 유럽인들의 수요는 급격히 증가하였고 노예 시장을 조직하는 것은 꽤 까다로워졌습니다. 보다 나은 관리를 위해 노예 무역 중심지를 개발하고 더 나은 관리를 위해 지역의 인프라를 개선해야 합니다.
kon_study_european_technology_title코0=[Root.GetName] 현대화
kon_abolish_slavery_title코0=노예상인 추방
kon_abolish_slavery_desc코1=노예 무역은 그 목적을 다했습니다. 이것은 우리 나라를 현대화할 수 있는 기회를 열어주었습니다. 그러나 유럽인들의 노예에 대한 수요가 점점 더 터무니없을 정도로 증가하면서, 사회적 지위와 상관없이 노예 습격을 조직하고 우리 국민들을 사로잡기 시작함에 따라 그 부정적인 영향이 긍정적인 면을 능가하기 시작했습니다. 우리는 노예제를 폐지하고 유럽인들의 뻔뻔한 짓을 막기 위해 아프리카에서 그들을 추방해야 합니다!
kon_abolish_slavery_tt코0=§Y유럽§! 국가가 §Y노예§!를 생산하는 §Y아프리카§! 프로빈스를 소유하고 있지 않습니다.
kon_abolish_slavery_bt코0='§Y[Root.GetName] 현대화§!' 임무를 먼저 완료하면 요구 사항이 밝혀집니다.
kon_amongst_the_great_powers_title코0=열강의 사이에서
kon_amongst_the_great_powers_desc코0=우리는 더 이상 일개 부족이 아니라 세계의 위대한 제국들 중 하나입니다! 우리는 현대화를 통해 위대한 국가가 되었고, 강력한 개척자들을 추방하고 야만스러운 노예제를 폐지하였습니다!
###ZIM MISSIONS###
zim_decline_of_zimbabwe_title코0=짐바브웨의 운명
zim_decline_of_zimbabwe_desc코0=짐바브웨는 한때 대 짐바브웨 제국의 수도였으며 현재는 우리 정부 권력의 중심지 역할을 하고 있습니다. 하지만 자원 부족으로 인해 사람들이 도시에서 몰려나 우리 영토의 몇몇 다른 지방으로 이주하게 되면서 이 도시의 운명은 기로에 놓였습니다.\n이 시기에는 우리 [Root.GovernmentName]을 가능한 안정적으로 유지하는 것이 가장 중요합니다.
zim_decline_of_zimbabwe_tt코0='§Y짐바브웨의 쇠퇴§!' 이벤트가 발생하였습니다.
zim_restore_the_city_title코0=짐바브웨 재건
zim_restore_the_city_desc코1=위대한 도시 짐바브웨는 200년 전에 건설되었으며, 이로 인해 우리 역사에서 중요한 역할을 맡고 있습니다. 우리 민족의 훌륭한 석조 가옥들이 많이 모여 있고, 과거의 많은 이야기들이 담겨 있으며, 우리를 방문한 외국인들의 성서에 황금의 도시로 묘사되기도 했습니다.\n이렇게 한때 위대하던 이 도시는 이제 폐허에 불과하며, 우리 조상들의 영혼조차 머물고 싶어하지 않는 마을로 전락하였습니다. 이 중요한 도시가 폐허가 되게 둘 수는 없습니다!
zim_restore_old_empire_title코0=대 짐바브웨의 퇴색
zim_restore_old_empire_desc코2=무타파가 있기전, 그레이트 짐바브웨 제국은 남아프리카에서 문화, 경제, 군사를 아우르는 분야를 지배했습니다. 그러나 제국은 산산조각나 무너져버렸고, 시간은 흘러 우리 나라가 그 자리에서 일어났습니다. 옛 도시를 재건함으로써 이전의 제국과 같은 눈높이가 되는 것은 우리의 숙명입니다. - 또한 옛 제국의 모습을 동등하게 덮어씌우는 일까지 말입니다.
zim_european_contact_title코0=유럽인과의 접촉
zim_european_contact_desc코1=우리 나라는 항상 멀리 떨어진 곳에서 온 많은 외국인들에게 매력적인 대상이었습니다. 유럽인들은 우리에게 있어 무슬림보다도 훨씬 더 이질적인 이들이지만, 그들에게 예외는 없었고 결국 우리의 땅에까지 도달하였습다. 하지만 그들과의 접촉은 피상적인 수준에 불과했습다. 우리는 유럽인들과 교류하고 그들로부터 배우기 위해 더 나은 방법으로 연락을 취할 수 있어야 합니다.
zim_european_contact_tt코1=어떤 §Y유럽 기독교§! 국가이든 [Root.GetName]에 대한 의견이 §Y75§! 이상이거나, [Root.GetName]의 §Y종속국§! 혹은 §Y종주국§!이거나, §Y[Root.GetName]§!의 독립을 보장하거나 [Root.GetName] 측과 §Y동맹§!이어야 합니다.
zim_conquer_coast_title코0=소팔라 정복
zim_conquer_coast_desc코0=항구도시 소팔라는 주요 무역항으로 수세기 동안 아시아에 우리 상품을 유통했습니다. 하지만 그 곳은 지금까지 우리의 소유가 아니었으며, 우리가 아시아와 다시 연결망을 만들고 싶다면 이 중요한 도시를 정복해야 합니다.
zim_build_navy_title코0=무역 함대 건조
zim_build_navy_desc코1=짐바브웨 제국은 극동의 아시아인들과 활발한 무역을 이루었었습니다. 하지만 그것은 상인들이 우리에게 와야 했기 때문에 매우 일차원적인 무역 관계였습니다.\n그러나 이것은 더 이상 유효한 무역 전략이 아닙니다. 소팔라는 파도를 다스리는 자만이 무역으로 번성할 수 있다는 것을 우리에게 보여주었습니다. 따라서 우리는 이러한 새로운 환경에 적응하고 우리만의 무역 함대를 건조해야 합니다.
zim_build_navy_tt코0=§Y[Root.GetName]§! 측은 §Y아프리카의 뿔§! 권역에 있는 모든 해안 프로빈스에 대한 영구적인 명분을 얻습니다.
zim_dominate_upstream_trade_title코0=아덴의 부
zim_dominate_upstream_trade_desc코1=극동의 아시아 인들과 무역한 역사가 있지만, 이 오랜 관계를 복원시킬지는 요원합니다. 그러나 우리가 불안해 할 이유는 없습니다. 인도를 거쳐 동아시아의 부의 무역이 흘러 들어와 결국 호르무즈 만과 아덴 만에 도착합니다. 호르무즈는 아주 멀리 있는 반면, 아덴 만은 우리 손에 들어올 수 있는 거리에 있습니다. 이를 위해 우리가 해야할 일은...아프리카 뿔의 해안을 해방시키는 것입니다.
zim_dominate_upstream_trade_at코0=§Y아프리카의 뿔§! 권역에 위치한 §Y해안§! 프로빈스입니다.
zim_dominate_upstream_trade_ct코0=§G2년§!치 분량의 무역 수입을 얻습니다. 
zim_dominate_upstream_trade_tt코0=무타파 무역에 대한 영향력
zim_zanzibar_greatest_market_title코0=동아프리카 독점
zim_zanzibar_greatest_market_desc코0=무역이 번창하고 우리 국고가 채워지고 있지만 그것만으로는 부족합니다. 과거의 부는 여전히 우리의 현재의 부와 비교되고 있습니다. 이 상황을 바꾸어야 합니다! 우리는 동아프리카 해안에서 두캇의 흐름을 통제하고, 중요한 무역 중심지를 독점하며, 인도와 아시아에서 우리 시장으로 가능한 한 많은 이국적인 무역 상품이 흘러오게 해야 합니다.
ZIM_TRADE_DOMINANCE코0=무타파 무역 지배
zim_zanzibar_greatest_market_tt코2=부의 흐름을 통제하는 데 성공하여, [Root.GetName] 측은 극동 시장에서의 존재감을 회복하였습니다.\n[Root.GetName] 측은 §Y무타파 무역 지배§!(무역력: §G15.0§!) 변동치를 §Y아덴만§!, §Y잔지바르§!, §Y희망봉§!, §Y구자라트§!, §Y코로만델§!, §Y말라카§, §Y광동§!, §Y항저우§! 그리고 §Y베이징§!에서 게임이 끝날 때까지 획득합니다.
zim_zanzibar_greatest_market_at코0=§Y희망봉§!, §Y잔지바르§! 혹은 §Y아덴만§! 무역 노드 중 하나가 세계에서 가장 가치가 높은 무역 노드이며, §Y[Root.GetName]§! 측은 해당 무역 노드에서 가장 강한 무역력을 행사해야 합니다.
zim_zanzibar_greatest_market_bt코1=§Y[Root.GetName]§! 측은 §Y구자라트§!, §Y코로만델§! 혹은 §Y말라카§!에서 가장 강력한 무역력을 행사하거나 적어도 §Y10%§!의 무역력을 행사해야 합니다.
zim_council_title코0=평의회의 균형
zim_council_desc코1=우리 나라는 [Root.Monarch.GetTitle]의 궁정에서 [Root.Monarch.GetHerHis]의 결정을 조언하는 평의회를 두고 있습니다. 이 소위 말하는 장관들은 사법적인 결정을 내리는 것을 비롯하여 [Root.GovernmentName]의 지역들에 대한 주된 권한을 가지고 있습니다. 또한 그들은 우리와 싸우는 대신 우리와 함께하기로 결정한 옛 부족들의 중요한 일원들입니다. 우리는 궁정에서 그들의 행복을 보장해 주어야 합니다.
zim_reform_army_title코0=군제 개혁
zim_annex_vassals_ct코0=§Y부투아 전사대§!는 [Root.GetName]에서만 고용할 수 있는 고유 용병단이 될 것입니다.
zim_strong_rulership_title코0=강한 통치권
zim_strong_rulership_desc코0=우리의 [Root.Monarch.GetTitle]께서는 국가와 종교의 대표자입니다. [Root.Monarch.GetSheHeCap]는 우리 사회의 핵심이며 그렇기에 [Root.Monarch.GetHerHim]의 주변은 최고의 것들로만 채워져야 합니다.
zim_dominate_south_africa_title코1=남아프리카 통제
zim_dominate_south_africa_desc코0=우리의 남쪽에 펼쳐진 평원에는 논쟁의 여지조차 없이 우리에게 정당한 명분이 있습니다. 우리는 이 명분을 현실로 만들어야 합니다.
zim_amongst_the_great_powers_title코0=아프리카의 열강
zim_amongst_the_great_powers_desc코0=북쪽에서 온 외지인들이 전 세계적으로 영향력을 확대하려 하면서 세계는 점점 축소되어가고 있습니다. 우리 나라가 잊혀진 처지로 전락하지 않고 유럽의 다음 목표가 되지 않도록, 우리는 세계의 주연들 중 하나가 되어야 합니다.
zim_amongst_the_great_powers_tt코0=이 세력 투사는 §Y영구적§!입니다.
zim_modernize_state_title코0=국가의 현대화
###AJU MISSIONS###
aju_annex_mogadishu_title코0=모가디슈를 합병하라
aju_annex_mogadishu_desc코0=모가디슈는 아프리카 뿔 지역의 진주입니다. 이 도시는 모든 아랍과 인도의 세계에서 상인을 끌어들이는, 빛나는 무역 센터입니다. 이 아름다운 도시를 통합하고 우리의 이익을 위해 그 영향력을 사용할 때입니다.
aju_the_mamluk_soldiers_tt코0=[Root.GetName] 측은 §Y맘루크 군인§! 용병 회사를 고용하였습니다.
aju_invent_istunka_tt코0=적어도 §Y20기의 보병§! 연대가 §Y[2776.GetName]§! 프로빈스에 주둔하고 있어야 합니다.
AJU_INDIAN_MERCHANTS코0=인도의 아주란 상인들
AJU_JAVA_MERCHANTS코0=자바의 아주란 상인들
aju_invent_istunka_ct코0=[2776.GetName] 프로빈스는 §Y이스툰카의 고향§! 변동치를 게임이 끝날 때까지 얻으며, 이는 다음과 같은 효과를 줍니다:\n국가 불만도: §G-1.00§!\n지역 개발 비용: §G-5.0%§!
aju_indian_trade_title코0=인도와 교역하라
aju_indian_trade_desc코0=인도 지역에는 우리의 이웃들이 손대지 않은 부가 가득합니다. 그곳에 교역소를 세우면 상상조차 하지 못할 수준의 이익을 얻을 수 있을 것입니다.
aju_chinese_trade_company_title코0=용과 무역하라
aju_chinese_trade_company_desc코0=인도 시장 다음은 중국 시장에 진입하는 것이 논리적인 수순입니다. 그 곳에서 우리는 기존보다 훨씬 더 이국적이고 수익서어 있는 부와 재화를 얻을 수 있을 것입니다. 또한 우리는 그 곳에서 우리의 입지를 다져야 합니다.
aju_castle_builders_title코0=[Root.Capital.GetName]를 요새화하라
aju_castle_builders_desc코0=우리의 수도는 우리 권력의 중심이며 우리 나라의 가장 중요한 부분입니다. 우리는 방어를 강화하여 반드시 요새화 해서 수도가 적의 손에 떨어지지 않도록 해야합니다.
aju_hydraulic_expertise_title코0=수력 전문가
aju_hydraulic_expertise_desc코1=음식과 물은 인구 부양을 위해 가장 중요한 것들이고, 그러므로 국가의 근간이 됩니다. 우리는 관개 기반시설을 개발하고 확장해야만 하고 이를 통해 둘 모두를 통제시킬 수 있어야하고 그 양을 늘려야합니다.
aju_maldives_dynasty_title코0=몰디브를 탈환하라
aju_maldives_dynasty_desc코0=우리는 몰디브에 우리의 입지를 다졌었지만, 가문의 일부 배신자들이 우리 곁을 떠난 이후로 우리는 그 지역에 대한 통제력을 잃었습니다. 이제 되찾을 때가 되었습니다.
aju_invent_istunka_title코0=이스툰카 개발
aju_invent_istunka_desc코0=우리 전사들은 항상 강한 자부심을 가져 왔으며, 우리도 그래야만 합니다. 그들이 전투에서 기량을 발휘할 수 있는 축제를 마련한다면 우리 국민 모두가 그들을 자랑스럽게 여길 것입니다.
aju_merchants_in_dai_viet_title코0=베트남 무역
aju_merchants_in_dai_viet_desc코0=인도 다음으로는 베트남과 인도차이나로 뻗어나가는 것이 논리적인 귀결입니다. 우리는 그곳에서 훨씬 더 많은 부를 얻을 수 있을 뿐만 아니라, 중국과 그 너머에서 오는 무역도 통제할 수 있게 될 것입니다.
aju_markets_of_ajuuran_title코0=시장 확장
aju_markets_of_ajuuran_desc코0=우리의 수도는 항상 상업의 중심지였습니다. 우리는 시장을 확장하여 상업을 더욱 장려하고 시장으로 흘러들어오는 부를 늘려야 합니다.
aju_sofaala_claims_title코0=[1186.GetName]를 탈환하라
aju_sofaala_claims_desc코0=소팔라는 한때 우리가 남쪽의 시장에 접근하는 것을 허락하였지만 우리에게서 그 권리를 빼앗았습니다. 우리가 다시 남쪽으로 교역을 확장하기 위해서는 다시 그 시장을 손에 넣어야 합니다.
aju_trade_on_java_title코0=자바와 무역하라
aju_trade_on_java_desc코0=인도 다음으로, 우리는 자바의 시장으로 범위를 넓혀야 합니다. 이는 향료 제도에서 오는 무역을 통제할 수 있게 해 줄 것이며, 그로 인한 혜택은 헤아릴 수 없을 것입니다.
aju_protect_trade_aden_title코0=아덴 만을 지배하라
aju_ally_the_ottomans_title코0=오스만 동맹
aju_the_mamluk_soldiers_title코0=맘루크를 모집하라
aju_the_tip_of_the_horn_title코0=뿔을 정복하라
aju_liberate_sheik_hussein_title코0=셰이크 후세인 해방
aju_liberate_sheik_hussein_desc코0=셰이크 후세인 지역은 더러운 콥틱 놈들의 손에 너무 오래 있었습니다. 이제 우리가 이슬람의 영광을 위해 다시 수복할 때입니다.
aju_consolidate_the_horn_desc코0=뿔 지역에 우리 존재감이 늘고 있습니다만, 우리 손에 있지 않은 지역이 몇 있습니다. 모든 적들을 몰살하여, 전체 지역의 복종에 대한 권리 주장을 할 수 있게해야 합니다.
###ZAN MISSIONS###
zan_annex_sofala_desc코0=[SFA.GetName]가 우리 영향권 내에 있은 지도 오래입니다만, 이제 우리가 직접 통제 할 때입니다. 우리 영토가 되야 할 터입니다.
zan_mutapan_gold_desc코0=짐바브웨의 땅은 황금으로 부유합니다. 우린 그 부를 얻기위해 그 곳을 정복해야만 합니다. 그러고 나서야, 더 확장할 수 있는 충분한 경제력을 얻을 수 있을 것입니다.
zan_discover_the_cape_desc코0=남쪽 땅들은 언제나 미스테리에 휩싸여 있고, 얼마나 생각지도 못할 부들이 혹시 거기 잠들어 있을지 알겠습니까? 그 부를 우리 것으로 만들기 위해선 이 땅들을 탐험해야 합니다.
zan_colonize_the_cape_title코0=케이프 식민화
zan_colonize_the_cape_desc코0=이 대륙의 남쪽 끝은 목숨이 걸린 정도로 중요합니다. 만약 우리가 서 쪽으로 가는 무역 흐름을 손에 쥐려 한다면 말입니다. 우린 영구적인 존재감을 그 곳에 보여야하며, 거기는 모든 무역을 조종할 수 있는 위치입니다.
zan_settle_trade_posts_title코0=아프리카의 무역기지
zan_settle_trade_posts_desc코0=북과 서에 무역흐름이 눈여겨 볼 만큼 대단한 곳이 여러군데 있습니다. 이 곳들을 차지하고, 이 무역을 우리 손에 쥐어야 합니다.
zan_establish_contact_with_persia_title코0=페르시아와 재연결
zan_establish_contact_with_persia_desc코0=우리 조상 알리 이븐 알 핫산 쉬라지는 페르시아에 위치한 쉬라즈 지역의 에미르였다 알려져있습니다. 우리의 조상의 기원에 해당되는 이 지역과 다시 연결고리를 만들어야 합니다.
zan_build_workshops_title코0=상아 증산
zan_build_workshops_desc코0=상아는 항상 우리 주요 수입원이었습니다. 생산량을 늘리기 위해선 할 수 있는 최선의 노력을 해야합니다.
zan_expand_the_capital_title코0=[1196.GetName] 확장
zan_expand_the_capital_desc코0=우리 수도는 나라를 대표하는 상징이고, 부의 다수가 위치해있습니다. 우린 이를 넘어서, 도시를 개선하고 개발하여, 이 세계에서 가장 부유한 도시로 탈바꿈하도록 해야합니다.
zan_build_manufactories_desc코0=더 많이 생산하면 더 많은 부를, 우리가 가질 것이라는 사실에 이견의 여지는 없습니다. 그러한 방향성으로, 우리는 생산시설을 늘리고, 우리가 생산을 더 할 수 있도록 해야합니다.
zan_dominate_gulf_of_aden_title코0=아덴 만
zan_conquer_madagascar_desc코0=우리 육군과 함대가 준비 상태이므로, 우리가 행동에 나서 불경한 자들의 섬을 정화하고 손에 넣어 섬의 부를 우리 것으로 해야 합니다.
zan_trade_with_china_desc코1=극동은 전설에 존재하는 헤아릴 수 없는 부의 보고입니다. 우리가 그 부의 일부를 얻고자 한다면 강한 무역력이 거기 있게 해야합니다.
zan_explore_the_malacca_trade_title코0=인도양 탐험
zan_explore_the_malacca_trade_desc코1=인도는 부의 훌륭한 원천이라는 것이 입증되었습니다. 대양건너 어떤 다른 땅이 있어, 부가 쥐어짜내 지길 기다리고 있을지 혹시 모릅니다. 혹여 있을지도 모르는 더 많은 부의 원천을 찾는 데 대양을 탐험할 노력해야 합니다.
zan_dominate_moluccas_title코0=말라카 인들과의 무역
zan_dominate_moluccas_desc코0=우리가 말라카 해협의 무역을 통제하게 되었으니, 한 발 더 나아가, 향신료 제도 자체까지 나아가야할 때가 되었습니다. 오직 그것만이 무역흐름과 부를 통째로 손에 쥐게 될 수 있습니다.
zan_colonize_australia_title코0=호주 식민화
zan_colonize_australia_desc코0=우린 그 전엔 상상조차 못할 먼 거리와 땅으로 확장했습니다. 우리 손에 닿을 수 있는 거리에 있다는 소리가 들리는 미지의 남쪽 땅들로 우린 더 멀리 가야만 합니다.
###AJU MODIFIERS###
desc_aju_merchants_in_india코0=우리 상인이 인도에서 활동을 시작했고 우리의 이익을 위해 그 곳의 사람들과 무역합니다.
desc_aju_exotic_zoo코1=아프리카에서 온 상인이 놀랍고도 이상한 생물을 황제폐하께 진상했습니다. 이 생물을 기르기 위해서, 백성들이 자금성 옆에 동물원을 건설했습니다.
desc_ajuuran_place_of_istunka코0=이 지역은 이스툰카(Istunka)라고 불리는 신년축제의 원조로, 모든 아주란의 백성들이 이 축제를 기념합니다.
desc_aju_ajuuran_sofala코1=소팔라는 한 때 아주란의 식민지였습니다. 아주란이 이 지역을 되찾았을때, 많은 스와힐리인들이 추방당했고, 아주란에 충성하는 씨족 인사로 채워졌습니다.
desc_aju_fleet_investment코0=아덴만의 무역에 대한 우리의 지배가 거대한 무역 함대를 설립할 수 있도록 투자할 자원을 제공합니다.
desc_aju_united_somali_clans코0=이 지역의 소말리아 인들은 그들의 지배자 아래 단결했습니다.
desc_aju_mogadishu_currency코0=아주란 상인들에게 우리 나라에 남고 우리 상품에 투자하도록 결정했습니다.
###ZAN MISSIONS###
###ETHIOPIA MISSION REWARDS###
eth_legacy_of_alexandria코0=알렉산드리아의 유산
eth_coptic_offense코0=콥트교의 공격
eth_conversion_focus코0=콥트교의 귀환
desc_eth_conversion_focus코0=이교도의 손으로 부터, 많은 주요 성지가 해방되었습니다. 이제 이들 지역의 사람들이 주님의 자비로 되돌아 올 때가 왔습니다.
eth_blessing_of_kings코0=주님의 축복
eth_restoration_of_antioch코0=안티오크의 회복
desc_eth_obelisk_of_axum코0=악숨의 오벨리스크는 악숨 제국의 고대 유적으로 5세기에 세워졌습니다. 많은 순례자들이 과거와 현재를 기리기 위해 이 오벨리스크를 보러 여행옵니다.
eth_lord_of_the_horn코0=아프리카의 뿔의 군주
desc_eth_lord_of_the_horn코1=수 세기간의 내전과 전쟁이 마침내 끝났습니다. 아프리카의 뿔은 하나의 깃발 아래에 통합되었으니, 바로 [Root.GetAdjective]의 깃발입니다!
eth_restoration_of_ancient_borders코0=제국들 중의 제국
desc_eth_restoration_of_ancient_borders코0=우리 나라는 역사 속의 고대 강대국을 되살렸을 뿐만 아니라, 훨씬 능가했습니다! 우리 제국은 다른 모든 제국들이 왜소해보이게 만드는, 단 하나의 제국이 될 것입니다!
eth_new_christians코0=팔라시 무라
desc_eth_new_christians코0=팔라시 무라는 강제로 개종된 유대인들입니다. 비록 모든 사람들이 그들의 새로운 운명에 만족하는 것은 아니지만, 팔라시 무라의 대다수는 에티오피아 내에서 상당한 혜택을 누리고 있으며, 이것은 그들이 개종을 훨씬 더 참을 수 있게 만듭니다.
desc_eth_united_church코1=콥틱 교회는 언제 쉬어야 하는지에 관한 성서적 안식일의 문제로 분열되어 있었습니다. 비교적으로 사소한 문제로 보이지만, 에티오피아의 교회에겐 중요한 문제 중 하나였습니다. 1442년 느구서 너거스트 자라 야콥 스스로가 이 문제에 뛰어들고 나서야 해결 방법을 찾을 수 있었습니다. 교회는 이제 역사상 가장 통합되었습니다.
eth_active_missionaries코0=활동 중인 선교사들
desc_eth_active_missionaries코1=에티오피아의 정복 이후, 이 지역은 현재 느구서 너거스트에 의해 파견되어 활동 중인 선교사들이 있습니다. 지역 주민들이 다시 올바른 길을 찾도록 해야 합니다.
eth_merchants_in_europe코0=유럽의 우리 상인들
desc_eth_merchants_in_europe코0=우리 상인들은 유럽 시장에서 그들의 행운을 찾았습니다. 그들은 유럽에서 [Root.GetName](으)로 부를 가져오며, 우리의 많은 상품을 그곳에서 판매해 무역에서 상당한 이익을 얻습니다.
eth_blessed_empire코0=축복받은 제국
desc_eth_blessed_empire코0=우리 나라는 과거를 뛰어넘어, 미래를 보장하고 주님의 자비를 쟁취했습니다. 우린 진정으로 축복받은 제국입니다!
eth_surpassed_aksumite_empire코0=악숨의 유산
desc_eth_surpassed_aksumite_empire코0=우리의 영토는 악숨 제국을 능가했습니다. 우리는 고대 악숨의 유산을 주장했습니다!
desc_eth_negusa_nagast_issues코0=에티오피아에는 중앙집권화가 거의 없습니다. 통제해야 할 지역으로 수도를 옮겨다니는, 느구서 너거스트의 존재만이 권위를 발휘할 수 있는 유일한 가능성입니다.
###OPINION MODIFIERS###
mal_gold_of_mali코0=말리의 금
mal_ivory_of_mali코0=말리의 상아
mal_invested_into_mecca코0=메카로 투자
###MALI MISSION MODIFIERS###
desc_mal_colonial_enthusiasm코0=코 마마디의 신화는 많은 우리 젊은이들을 그들의 운명을 걸고 그와 그의 선원들의 흔적을 찾을 수 있다는 희망으로 남아메리카에서의 새로운 삶의 시작하는 것에 관심이 가게 했습니다.
desc_mal_controller_of_the_market코1=금에 대한 접근을 통해, 우리 영향권을 상당히 멀리 벗어난 시장들에도 막대한 영향력을 확보했습니다.
desc_mal_economic_oppression코1=세계에서 가장 부유한 시장에 금이 넘쳐서 그 가치가 절대적인 저점을 찍었습니다. 이 결과로, 그 누구도 우리와 가격경쟁을 하지 못했고, 다수의 국가가 그들의 통화를 개혁할 때까지는 우리가 전세계의 시장의 부를 쓸어 담을 수 있었습니다.
mal_closed_gold_mine코0=폐광
desc_mal_closed_gold_mine코1=이 지역은 더이상 금 시장이 안정될 때까지 더 이상 금을 생산하지 않습니다.
mal_protected_economy코0=보호 경제
desc_mal_protected_economy코0=우리 무역의 강한 보호를 통해 경제가 새로운 차원으로 성장했습니다.
mal_a_new_golden_age코0=두 번째 황금기
desc_mal_a_new_golden_age코0=우리 제국은 운명의 흐름을 틀었습니다! 우리가 한때 실패하고 힘들었던 영토는 이제 그 어느 때보다도 강하고 패권을 가진 새 말리제국이 되었습니다. 
mal_great_imperial_power코0=아프리카의 후원자
desc_mal_great_imperial_power코0=우리의 힘은 겁이 날 정도로 성장했고 그 유럽인들 조차도 감히 우리의 위협이 될 수 없습니다.
mal_river_cultivation코0=강 유역 경작
desc_mal_river_cultivation코0=이 지방의 강은 엄청난 경제적이고 농업적인 경작을 통해, 토지가 더욱 비옥하게 하고 있습니다.
mal_generous_realm코0=관대한 영토
desc_mal_generous_realm코1=우리 신앙의 형제들에게 준 선물이 우리와 그들에게 금을 가져다준 사절을 꽤 인기있게 만들었습니다.
mal_fan_of_the_ulema코0=울레마의 전폭적 지원
desc_mal_fan_of_the_ulema코1=참된 신앙을 전파하고 이교도들을 개종시키기로한 우리의 결정은 울레마들을 고취시켰습니다. 그들은 최대의 지지를 우리에게 보냅니다.
mal_fan_of_the_dhimmi코0=딤미들의 전폭적 지원
desc_mal_fan_of_the_dhimmi코1=이교도를 용인하고 더 많은 권리를 주기로한 우리의 결정은 딤미들을 고취시켰습니다. 그들은 최대의 지지를 우리에게 보냅니다.
great_mosque_djenne_modifier코0=젠네의 대 모스크
desc_great_mosque_djenne_modifier코1=이 지방은 젠네의 모스크가 있습니다. 이 지방의 울레마는 거대한 시간과 자원을 투자하여 모스크를 개축하여 서아프리카의 보석으로 거듭나게 했습니다.
mal_mansas_journey코0=만사의 순례
desc_mal_mansas_journey코0=현재 우리 통치자는 기독교 세계를 가로지르는 경롤르 통해 메카로 향하는 중입니다. 도중에 그들은 유럽의 불가사이를 볼 것입니다.
mal_advisors_journey코0=조언가들의 순례
desc_mal_advisors_journey코0=현재 우리 조언가들은 기독교 세계를 가로지르는 경로를 통해 메카로 향하는 중입니다.
mal_pilgrimage_desc코0=순례가 끝날때까지
mal_the_pilgrim코0=경건한 규칙
desc_mal_the_pilgrim코0=메카로 향하는 많은 순례는 우리의 영토를 경건하고 정당하게 만들었습니다.
###MALI EVENT MODIFIERS###
mal_nobles_take_over코0=귀족들의 점령
desc_mal_nobles_take_over코1=지역 주민을 볼모로 삼아 제국 내에서 그들의 힘을 늘리려는 말리 귀족에 의해 이 지역은 점령되었습니다.
mal_burghers_take_over코0=시민들의 점령
desc_mal_burghers_take_over코1=지역 주민을 볼모로 삼아 제국 내에서 그들의 힘을 늘리려는 말리 시민에 의해 이 지역은 점령되었습니다.
mal_radical_clergy코0=급진적 울레마
desc_mal_radical_clergy코0=말리 내 다수의 지역을 울레마들이 관장하며, 말리에서의 딤미와 이교도들의 영향령을 깎아내려합니다.
mal_radical_dhimmi코0=급진적 딤미
desc_mal_radical_dhimmi코0=말리 내 다수의 지역을 딤미들이 관장하며, 말리에서 울레마와 무슬림의 영향력을 깎아내려합니다.
mal_the_declining_authority_of_mali코0=권위의 감소
desc_mal_the_declining_authority_of_mali코1=말리의 속국들은 만사의 힘을 더이상 심각하게 받아들이지 않습니다. 그들의 충성심을 유지하는 것은 이 기간동안  더 힘들것입니다.
mal_investment_of_the_mansa코0=말리로부터의 기부금
desc_mal_investment_of_the_mansa코0=말리 순례자들이 우리 지역에 수 톤의 금을 남겼습니다. 경제적인 피해를 입혔지만, 그들이 남기고간 금은 우리의 기반 시설 건설 가격을 낮춥니다.
