eth_cawa_discipline_title코0=카와 훈련
eth_cawa_discipline_desc코1=카와는 우리 나라의 봉건 귀족 계층입니다. 이 전문 병사들은 원래 느구서 너거스트에 의해 임명되었으며, 우리 군대의 중추를 맡고 우리의 외딴 지역들에서 평화를 보장해줍니다.\n여전히, 개선의 여지는 항상 남아있습니다. 우리는 이 맹렬한 전사들을 더 모집해 완벽히 훈련시켜야 합니다.
eth_reform_the_negusa_government_title코0=국가 중앙집권화
eth_reform_the_negusa_government_desc코1=오래된 느구서 너거스트 군주제는 유연성이 없는 체제임이 입증되었습니다. 이동하는 수도의 원칙은 한 지방을 통제하는데 있어서 효과를 보여주었지만, 다른 한편으로 국가가 얼마나 지방분권화되어 있고 얼마나 무력한지를 보여주었습니다. 우리 제국이 살아남기를 원한다면 정부를 개혁하고 권력을 중앙집권화해야만 합니다.
eth_reform_the_negusa_government_ct코0=§Y솔로몬 제국§! 정부 개혁을 해제합니다.
eth_conquest_of_qasr_ibrim_title코0=카스르 이브림 장악
eth_conquest_of_qasr_ibrim_desc코1=콥트교는 전 세계의 여러 성지들과 강한 연결점을 갖고 있습니다. 이 중 하나는 8세기에 그리스도교의 중심지로 있던 고대 도시 Qasr Ibrim입니다. 그러나, 거주민들이 거짓 종교로 전환하며 예전 영광의 순간들은 종점을 맞이하고 말았습니다. 우린 이 도시의 무능력한 지배자를 몰아내고 해방시켜 사람들을 참된 신앙으로 돌아오게 해야 합니다.
eth_conquest_of_alexandria_title코0=알렉산드리아 해방
eth_conquest_of_alexandria_desc코0=알렉산드리아는 콥트 교황과 교황령의 고대 권좌가 있는 고향입니다. 그러나, 교회와 상당한 콥트 공동체의 부분들이 맘루크의 외세와 불신으로 가득찬 법으로 고통받고 있습니다. 우린 무슬림들로부터 이 도시를 반드시 해방하여 아직까지도 숨죽이고 있을 콥트인들을 도와야만 합니다.
eth_conquest_of_antioch_title코0=안티오크 정복
eth_conquest_of_antioch_desc코0=고대 도시 안티오크는 과거 그리스도교의 요람이자 주요 중심지 중 하나였습니다. 십자군과 이슬람의 확산으로 인해, 이는 조금 변해버려, 이제 과거의 그림자만이 남아있습니다. 그리스도교 성직자는 안티오크에서 소멸되었지만, 우리 신앙을 위해 여전히 중요한 성지입니다. 우린 이 고대 위치를 탈환하고 중동에 그리스도교의 권위를 회복해야합니다. 
eth_please_the_vassals_title코0=다모트와 하디야
eth_please_the_vassals_desc코1=우리 속국인 Damot은 한때 Shewa 술탄국을 종속시켰던 나라였습니다. 또다른 종속국인 Hadiya 술탄국은 또 Shewa의 일부였습니다.\n두나라가 이런 역사를 가지고 있던 반면, Zara Amda Seyon가 1309년에 이 문제를 갖고 양국을 속국화 시킨 이래로 그들 모두 단지 속국들에 지나지 않았습니다. 이제 때가 양국 모두 우리의 일부가 될 때가 왔습니다! 그러나 이를 위해 그들의 지도자들을 먼저 설득할 필요가 있을 수 있습니다.
eth_unify_the_kingdoms_title코0=부족 통합
eth_unify_the_kingdoms_desc코0=과거 우리 나라는 동골라의 사막에서 예멘의 모카 해안까지 뻗어있던 위대한 악숨 제국이었습니다. 그러나, 세미엔의 구디트 여왕과 그녀의 전사들이 수도 악숨을 약탈하고 악숨 왕조를 몰살시켰을 때 상황은 바뀌었습니다. 얼마 지나지 않아, 제국은 여러 부족들로 분열되었습니다.\n하지만 이제 새로운 왕조가 왕위에 올랐습니다! '왕중왕'이라는 칭호를 받을 자격이 있는 왕조인 우리는 몰락한 조상들의 영토를 되찾을 것이며, 부족의 통합부터 시작할 것입니다.
eth_retake_suakin_title코0=수아킨 정복
eth_develop_the_ancestors_city_title코0=선조들의 수도
eth_harbor_city_adulis_title코0=아둘리스 탈환
eth_conquer_adal_title코0=아달 정복
eth_unify_the_horn_of_africa_title코0=아프리카의 뿔 통합
eth_unify_the_horn_of_africa_desc코1=아프리카의 뿔에는 오래된 많은 왕국들의 키워냈습니다. 수세기동안 많은 왕국들이 일어나고 사라졌지만 아무도 이 땅 전부를 통합해내지 못했습니다. 우리는 우리 손으로 아프리카의 뿔 지역에서 이 끊나지 않는 전쟁문제의 끝을 봐야 할 것입니다.
eth_yemens_coasts_title코0=아라비아의 발판
eth_yemens_coasts_desc코1=악숨 제국은 3세기 무렵 남 아라비아에 영토를 차지했었습니다. 특히 현재의 예멘에 연관된 지역의 해안선쪽으로. 이 고대 제국의 위대한 업적이 모두 그렇듯, 역시나 무슬림 손에 우리의 교두보가 떨어졌습니다. 이제 그들에게서 되찾아 올 때가 되었습니다.
eth_restore_aksumite_empire_title코0=과거 뛰어넘기
eth_eliminate_the_semien_rebels_title코0=기드온의 반란
eth_church_reforms_title코0=안식일 문제 해결
eth_church_reforms_ct코1='§Y자라 야콥의 중앙집권화 개혁§!' 이벤트가 발생합니다.
eth_build_an_army_title코0=[Root.GetName]의 군대
eth_conquer_southern_kingdoms_title코0=남부 정복
eth_conquer_southern_kingdoms_desc코1=잠재적 라이벌이 위대한 [Root.GovernmentName] 남쪽 경계에 존재합니다. 카파 왕국은 동료 콥트계 국가일지 모르지만, 그들의 왕들은 우리 [Root.Monarch.GetTitle]와 정당한 몫의 금을 나누는 데에 관심이 없습니다. Ennarea 왕국은 국가라기엔 슬픈 존재고, 아마 그들은 동부의 페티시즘 야만인의 군대로 그 운명이 끝날 수 있습니다.\n우리는 남부 왕국을 정복하고 에티오피아 지역을 통합해야 할 것입니다.
eth_the_riches_of_the_south_title코0=카파의 부
eth_the_riches_of_the_south_desc코0=외국인들에게 주권을 빼앗긴다면 인간은 응당 분노합니다. 그러나 이는 전쟁과 정복이 작동하는 방식이며, 많은 경우 피정복민들은 시간이 흘러 새 주군에게 적응할 것입니다. 그러나 어떤 경우에는 이런 변화가 안정을 위해 반드시 필요할 수 있습니다. 카파가 이런 좋은 예시중 하나입니다. 그들의 금은 나라에 귀중하지만, 지역주민들이 분노할 동안에는 금을 채굴할 수 없습니다. 우린 카파와 다못의 인프라를 개발해서 우리의 자비로움을 보여주어야 할것입니다.
eth_gain_sea_access_title코0=홍해로의 접근
eth_create_a_navy_title코0=[Root.GetAdjective] 해군 창설
eth_ethiopian_empire_title코0=아프리카의 열강
eth_find_other_christians_title코0=포르투갈과의 접촉
eth_find_other_christians_ct코0='페루 다 쿠빌냐웅' 이벤트가 발생합니다.
eth_market_of_the_west_title코0=서쪽의 시장
eth_ideas_and_institutions_title코0=서구의 사상
has_better_tech_than_westerns_tt코0=어떤 §Y서구권§! 국가도 §Y[Root.GetName]§!에 비해 어느 기술도 앞서지 않습니다.
has_more_institutions_than_westerns_tt코1=어떤 §Y서구권§! 국가도 §Y[Root.GetName]§!에 비해 더 많은 시대관을 수용하지 않았습니다.
eth_westernize_the_army_title코0=육군 근대화
eth_blessed_empire_title코0=축복받은 제국
###MAL MISSIONS###
mal_pick_religious_direction_title코0=방향을 선택하라
mal_pick_a_religious_direction_tt코0=선택에 따라, [Root.GetName]는 §Y종교 임무§!나 §Y관용 임무§! 중 하나를 개방할 것입니다.
mal_conquer_jol_title코0=졸로프를 복속시켜라
mal_conquer_jol_desc코1=졸로프는 그들의 초창기무렵 우리의 속국이었지만, 우리의 내부 투쟁으로 독립을 선언할 수 있었습니다. 백년의 세월 동안의 주권국이었지만, 이젠 우리 보호아래 놓일 때가 왔습니다.
mal_trade_with_maghreb_title코0=마그레브와 연줄
mal_trade_with_maghreb_desc코0=우리 [Root.GovernmentName]은 위대한 만사 무사의 죽음 이래, 다른 무슬림 국가들과 매우 소원해졌습니다. 우린 이를 그냥 둘 수 없고, 마그레브의 우리 믿음의 형제들과의 인연을 다시금 세워야 할것입니다.
mal_trade_with_maghreb_tt코0=§Y유럽§!의 지역을 결단을 통해 한 번에 한해 구매할 수 있습니다.
mal_trade_with_europeans_title코0=유럽에 도달하라
mal_trade_with_europeans_desc코0=사피 무역로가 우리 수입을 강화하고 있지만, 유럽 시장의 잠재적 이익을 유지할 수 없습니다. 당연히도, 우리의 최선의 이익은  그들의 무역로들 중 하나에 접근하는 것이 우리 최대 관심사입니다.
mal_econimical_hegemony_title코0=성지 순례를 준비하라
mal_econimical_hegemony_desc코1=메카 순례는 모든 종교를 따르는 무슬림에게 신성한 의무입니다. 여기에 더해 전통적으로 우리 만사들이 알라의 이름으로 재물을 갖고 메카로 여행을 떠났었기에 우리에겐 더욱 큰 의미가 있습니다. 이번엔 유럽의 불가사의를 지나는 더 큰 순례가 행해져야 합니다. 그러나 이를 위해서는 [Root.Monarch.GetTitle]의 여정의 재정을 뒷받침할 경제력과 그 기간동안 [Root.Monarch.GetHerHis]의무를 대신 맡을 유능한 관리들이 필요합니다.
mal_riches_of_trade_tt코0=아무 §Y유럽§! 무역 노드에서, §Y[Root.GetName]§!가 적어도 §Y50§!의 무역력을 갖고, 가장 강한 §Y무역력§!을 가진 국가가 되십시오.
mal_fighting_musa_title코0=무장한 만사
mal_fighting_musa_desc코0=만사 무사의 한때의 위대한 시절은 끝이났지만, 우리 영토는 절대 그 시절에서 회복할 수 없었습니다.\n반드시 이 상황은 바뀌어야 합니다! 무사 이후 모든 만사들의 정당성에 의문을 제기되었고, 그들 누구도 대중의 지지를 받지 못했습니다. [Root.Monarch.GetSheHe]가 우리 군대를 이끌고 직접 승리로 이끌어 [Root.Monarch.GetName]는 자신의 운명을 알게 것입니다.
mal_subjugate_zaf_title코1=밤바라 달래기
mal_subjugate_zaf_desc코1=마시나 지역의 세구의 밤바라는 큰 불편을 토로했습니다. 그들은 우리로 부터 떨어저 나가길 원합니다. 결과적으로 그들은 우리의 경쟁자인 송가이에게 독립운동에 대한 지원을 얻었습니다.\n우리는 이를 용납할 수 없습니다! 그들을 우리 영역 내에 두기 위해선 최대한 빨리 밤바라를 달래야합니다.
mal_reintegrate_son_title코0=송가이 재통합
mal_reintegrate_son_desc코0=[Root.GetAdjective] 영역 내의 다른 국가는 [SON.GetName]가 있습니다. 그러나 [ZAF.GetName]와는 달리, [SON.GetName]는 우리의 쇠퇴기 초기에 발생했던 서 아프리카의 권력 공백을 채우고 힘을 기르려 하고 있습니다. 우리가 살아남으려면, [SON.GetAdjective]의 위협을 없애고, [SON.GetAdjective]인들을 우리 나라로 편입시켜야 합니다.
mal_restore_the_mali_empire_title코0=제국 복원
mal_restore_the_mali_empire_desc코0=우린 한때 서아프리카의 주요 강대국이자 문화적 중심이었습니다. 좋지 못했던 승계들로 불행하게도 우리 제국은 쇠퇴해왔고, 자칫 완전히 사라질 뻔 했습니다.\n우리는 지속할 수 있었고, 나아가 우리의 운명의 조류를 틀어버렸습니다. 이제 우리의 옛 제국의 국경을 넘어 확장하여 우리의 옛 명칭을 되찾을 시간이 왔습니다.
mal_dominate_ivory_coast_and_timbuktu_title코0=서 아프리카 무역을 보호하라
mal_trade_domination코0=보호된 서 아프리카 무역
mal_retake_the_mosque_title코0=젠네를 정복하라
mal_conquer_tmb_title코0=팀북투를 탈환하라
mal_west_african_great_power_title코0=서 아프리카 열강
mal_get_competent_court_desc코1=1337년 만사 무사의 사망 후, 그의 아들 마간이 왕좌를 차지했습니다 - 그는 우리의 황금기 이후 우리가 견뎌야 했던 많은 암군들중 첫번째입니다. 1341년, 마간은 조카가 행한 많은 재정적인 실수를 되돌렸던 그의 숙부 술레이만에 양위했습니다. 그러나 그가 죽고, 말리는 많아야 몇개월을 다스리거나 폭군으로 볼 수밖에 없는 만사들만이 존재했습니다.\n\n우리의 역사를 마침내 회복하기 원한다면, 유능한 만사가 왕좌에 앉는 것이 필요합니다. - 아니면 적어도 그의 궁정의 유능한 재원을 알만한 만사여야 합니다.
mal_gold_and_ivory_title코0=금과 상아
mal_give_gold_away_title코1=관대함을 보여줘라
