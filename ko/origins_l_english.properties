flavor_aju.13.d코0=[From.GetName]에서 보내진 상인이 막대한 이익을 가져다 줄 것입니다. 그렇게 먼 땅과 교역이 가능해지면 엄청난 부의 유입과 우리 시장에 있는 상품들을 늘릴 사람들을 불러올 것입니다.
flavor_aju.13.a코0=좋아
flavor_aju.14.t코0=군대의 현대화
flavor_aju.14.d코0=오스만의 지도아래 우리는 근대적인 당당한 육군을 얻을 수 있었습니다. 우리 육군을 급격하게 변화시키기 위해 교육을 당하는 인원 중 일부를 고용할 수 있어, 비싼 값을 치루겠지만, 효율적인 방법이 될 수 있습니다. 다르게는, 그들 소유의 여유분의 총을 구입하는 선택지가 있고, 이는 좀 더 나은 장비를 얻을 수 있겠지만, 사용을 위한 전문 교육이 없을 수 있어서 우리 스스로 얻어가야 할 것입니다.
flavor_aju.14.a코0=그들의 지도를 요청해야한다
flavor_aju.14.b코0=우리는 새로운 장비를 구입할 것이다
flavor_aju.14.c코0=그럴 가치는 없어 보인다
###ADA FLAVOR EVENTS###
flavor_ada.2.t코0=[From.GetAdjective] 연대가 [Root.Capital.GetName]에 도착하다
flavor_ada.2.d코0=외국의 손님들 - 외교관 한 명과 그를 호위하는 1개 연대 - 가 오늘 [Root.GetAdjective] 궁정을 방문하였습니다. 들어보니 그들은 [Root.Monarch.GetTitle] [Root.Monarch.GetName]에 대한 접견을 희망하며 [From.Capital.GetName]에서 [Root.Capital.GetName]까지 먼 길을 여행했다고 합니다. 외교관은 신앙의 형제들에 대한 [ETH.GetAdjective]의 위협을 막기 위해 [From.GetName] 측과 동맹을 맺어줄 것을 요청하고 있습니다.
flavor_ada.2.a코0=우리는 [From.GetName] 측을 지원할 것이다!
flavor_ada.2.a.tt코0=§Y[From.GetName]§! 측은 [ETH.GetName] 측과 전쟁에 돌입할 경우 §Y예니체리§! 용병 회사를 고용할 수 있게 될 것입니다.
flavor_ada.2.b코0=이것은 우리의 전쟁이 아니다.
flavor_ada.3.t코0=[From.GetAdjective] 측이 동맹을 받아들이다!
flavor_ada.3.d코0=우리 외교관이 [Root.Capital.GetName]으로 안전하게 돌아왔습니다.- 그리고 엄청난 소식을 들고 왔습니다! 현명한 [From.Monarch.GetTitle]은 동맹을 받아드리고 우리가 에티오피아를 칠 때, 군사적 원조를 보장했습니다!
flavor_ada.3.a코0=훌륭해!
flavor_ada.3.a.tt코0=우리는 [ETH.GetName]와의 다음 전쟁 때, §Y[From.GetName]§!(으)로부터의 원조를 받을 것입니다!
ada_discover_anatolia코0=모든 §YAnatolia§! 지역 발견!
flavor_ada.4.t코0=[From.GetAdjective] 동맹 거부!
flavor_ada.4.d코0=우리 외교관이 우울한 소식을 들고 왔습니다: 우리에게 쓰는 그들의 시간이 아깝다고 생각하기에, 유망해 보이던 [From.GetAdjective] 동맹이란 발상을 거절했습니다. 물론, 웃기는 생각입니다. 그러나 우리의 최선의 외교적 입장이라곤 보기 힘듭니다.
flavor_ada.4.a코0=빌어먹을!
flavor_ada.5.t코0=아나톨리아에 제국 없음
flavor_ada.5.d코0=우리 외교관이 고향으로 돌아왔습니다. 패배감에 지쳐 보이고 심지어 충격에 휩싸인 듯이 보입니다. 아나톨리아에는 우리를 기꺼이 도와줄 위대한 제국이 남아있지 않습니다. 이교도와 이단들이 아나톨리아와 유망한 동맹이던 투르크인들을 정복해버리고 이제 적대적인 세력의 속국이 되었습니다.
flavor_ada.5.a코0=다른 도리가 없다. 결국 맘루크에게 요청하는 수밖에 없겠다.
flavor_ada.5.b코0=좋지 않아...
flavor_ada.6.a.tt코0=§Y[From.GetName]§! 측은 게임이 끝날 때까지 §Y맘루크 군인§! 용병단을 고용할 수 있게 됩니다.
flavor_ada.7.t코0=맘루크가 [Root.GetName]를 지원하다
flavor_ada.7.d코0=비록 맘루크인들은 우리의 동맹으로써 첫번째 선택지는 아니었더라도, 그들은 에티오피아인들을 위협이라 인식하고, 우리를 Mamluk Soldiers의 작은 용병단을 통해 도우기로 결정했습니다.
flavor_ada.7.a코0=뭐, 없는 것보다 낫지.
