flavor_mal.41.a.tt코1=[Root.GetName]은 [selected_biggest_country_of_region.GetName]에 금을 기부할것입니다.\n그 내용은 §R[Root.mal_money_to_give_tt.GetValue]§! 두캇을 [selected_biggest_country_of_region.GetName]에 주는 것입니다. 만약 그들이 승낙한다면,  [selected_biggest_country_of_region.GetName]의 인플레이션은 §R[Root.trade_income_variable_tt.GetValue]§!만큼 상승하지만, 그들의 건물, 대규모 계획, 육군 및 해군의 지출은 §Y5 years§!동안 §G25.0%§!이 감소합니다.\n\n[Root.GetAdjective] 황금의 유입으로, 수도가 [selected_biggest_country_of_region.Capital.GetRegionName]에 위치한 모든 국가들은 '§Y말리의 금§!' 변동치를 §Y5 years§!간 얻고, 이는 다음과 같은 효과를 갖습니다:\n연간 인플레이션 감소: §R-1.00§!
