flavor_mal.32.f코0=구매를 위해 더 낳은 때를 기다려야한다.
flavor_mal.32.f.tt코1=아무도 제안을 받지못했다. 나중에 유럽 무역 식민지를 구입할 수 있을것이다.
flavor_mal.32.g코0=구입이라고? 이미 다 우리 것인데!
