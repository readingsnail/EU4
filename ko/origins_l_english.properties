muslim_school_events.24.t코0=[Root.GetName]로 들어오는 외국 학자들
muslim_school_events.24.d코0=외국 학파의 학자들의 거주권을 승인하기로 결정했습니다. 그러나 어떤 학파의 학자 [Root.GetName]의 안전한 울타리 안에서 살아갈 특권을 받게 될지는 결정하지 않았습니다.
muslim_school_events.24.a코0=하나피 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.b코0=한발리 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.c코0=말리키 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.e코0=샤피 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.f코0=이스마일리 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.g코0=자파리 학파의 학자에게 특권을 승인한다.
muslim_school_events.24.h코0=자이디  학파의 학자에게 특권을 승인한다.
flavor_eth.39.b.tt코0=§Y악숨(Aksum)§! 형성 결정을 내릴 수 있습니다.
flavor_oyo.3.t코0=[From.GetName]의 말
flavor_oyo.3.d코0=[From.GetName]에 보낸 우리 상인이 기쁜 소식을 들고 돌아왔습니다. 말을 살 수 있는 협상에 성공해, 우리 나라로 군마들과 함께 되돌아왔습니다. 이제 우리는 기병 연대를 따라할 수 있을 것입니다.
flavor_oyo.3.a코0=훌륭해
flavor_oyo.4.t코0=오요 메시가 통치자를 강제 폐위하다
flavor_oyo.4.d코0=오요 메시는 항상 우리 정부의 중요한 부분이었습니다. 그들은 새 통치자의 즉위를 승인하고, 폭군으로 간주하면 다시 강탈할 수 있는 의무를 가진 이들입니다. 불행하게도, [Root.Monarch.GetTitle] [Root.Monarch.GetName]에게 그들의 결정이 내려졌고, [Root.Monarch.GetSheHe]는 전통 박을 통해 [Root.Monarch.GetSheHe]가 의식을 포함하는 방식의 자살로 퇴위되었다는 전갈을 보내왔습니다.\n그들에 맞서기엔 그들은 너무나 강력하고 영향력이 세기 때문에, 우리의 [Root.Monarch.GetTitle]는 그들의 명에 복종할 수 밖에 없습니다.
flavor_oyo.4.a코0=어쩔 도리가 없군
flavor_jol.1.t코0=유럽인들과 무역 거래
flavor_jol.1.d코0=우리 배들과 탐험가들이 많은 우리 지식을 뛰어 넘는 땅들을 발견들을 하기위해 멀리 또 널리 항해하였습니다. 이런 땅들 중 북쪽에 위치한 전 대륙을 유럽이라 부르는 곳이 있어, 많은 다양한 나라와 사람들의 고향이 되었습니다. 이 국가들 중 우리와의 무역 관계을 형성하는데 관심이 있는 하나에 접근 할 수 있었습니다. 이 무역 협정을 통해 의심할 여지 없이 막대한 이익을 얻을 것입니다.
flavor_jol.1.a코0=좋은 생각이다
flavor_jol.1.b코0=그런 거래를 할 필요 없다.
flavor_jol.2.t코0=[From.GetName]로 부터의 무역 거래
flavor_jol.2.d코0=최근 우리 영향권에 들어온, 남쪽에 위치한 [From.GetName]로 부터 온 상인과 외교관 들에게 접촉해 들어왔습니다. 그들은 양국의 증대된 무역거래가 모두에게 큰 이익을 안겨 줄 것이라고 주장하며 무역 협정을 수립하자고 제안해왔습니다. 그들의 주장은 건전하며, 좀 더 이국적인 상품에 대한 접근을 조달할 방법이 될 수 있습니다.
flavor_jol.2.a코0=거래하자
flavor_jol.2.b코0=그런 거래를 할 필요 없다
flavor_jol.3.t코0=거래 승인
flavor_jol.3.d코0=[From.GetName]로 보낸 상인들과 외교관들이 엄청난 소식을 들고 돌아왔습니다. [From.Monarch.GetTitle] [From.Monarch.GetName]가 양국 간의 공식적인 관계를 수립하고 무역을 위한 항구와 시장을 여는 것에 동의했습니다. 이것은 반드시 우리 나라의 무역흐름을 증가시키고 거기에 따른 부도 흘러 들어오게 될 것입니다.
flavor_jol.3.a코0=좋아
flavor_jol.4.t코0=거래 거부
flavor_jol.4.d코0=[From.GetName]로 보낸 상인들과 외교관들이 끔찍한 소식을 들고 돌아왔습니다. [From.Monarch.GetTitle] [From.Monarch.GetName]가 어리석게도 양국의 무역흐름을 늘리는 어떠한 조건이든 다하리라는 조건의 무역협정을 조인하는 것을 거부했습니다. 우리 무역상들과 상인들은 우리쪽에만 머물러, 지역 상품에 만족해야 할것입니다.
flavor_jol.4.a코0=그러시던가.
flavor_jol.5.t코0=상아 수요 증가로 인한 무역 결과
flavor_jol.5.d코0=최근 서아프리카에서 찾아온 외교관들과의 거래는 예상치 못한 결과를 낳았습니다. 이국적인 산물에 좀 더 많이 접근할 수 있게된건 사실이지만, 우리 귀족과 상인들이 이런 상품들, 특히 상아에, 너무 익숙해져서, 그들 입맛에 맞추어 수입량을 얼마나 늘리든 그들은 절대 그 양에 만족하지 않을 것입니다.
flavor_jol.5.a코0=더 많은 상아가 필요하다.
