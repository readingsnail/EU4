###JEWISH MECHANICS###
JUDAISM_HAS_ADM_ASPECT코0=아무 £adm£ §Y특성§!을 활성화했습니다.
judaism_rosh_hashanah_aspect코0=나팔절 축제
desc_judaism_rosh_hashanah_aspect코0=£adm£ §Y특성§!\n§Y축제 축하§!는 우리에게 안정도 §G+1§!을 제공합니다.\n\n비록 우리 민족은 파라오의 압제 아래 오랜 세월을 살았지만, 그들은 결코 자기 자신이나 하느님을 믿는 믿음을 잃지 않았고, 이집트를 떠나자마자 다시 하나의 국가로 자리 잡았습니다.
judaism_simchat_torah_aspect코0=심치 토라 축제
desc_judaism_simchat_torah_aspect코1=£adm£ §Y특성§!\n§Y축제 축하§!는 우리에게 정부 개혁 진행도 §G+20§!과 정통성 §G+5§!(다른 정부일 경우 정통성에 상당하는 효과), 그리고 후계자의 계승권 §G+5§!를 제공합니다.\n\n토라는 유대교의 신성한 문서로 히브리 성경의 첫 다섯 권의 책을 포함합니다. 또한 토라는 우리의 가장 신성한 법과 전통을 위한 원천이고 우리에게 큰 가치가 있는 지식을 가지고 있습니다.
judaism_sukkot_aspect코0=초막절 축제
desc_judaism_sukkot_aspect코2=£adm£ §Y특성§!\n§Y축제 축하§!는 우리에게 년 수입의 §G0.3§!을 제공하고 인플레이션을 §G-1§! 감소시킵니다.\n\n초막절은 수확의 상징일 뿐만 아니라 신의 의지에 대한 우리 의무의 상징이기 때문에 매우 중요한 유대교의 축제입니다. 이 기간 동안, 일은 금지되거나 매우 제한됩니다.
judaism_communities_aspect코0=유대교 공동체
desc_judaism_communities_aspect코1=£dip£ §Y특성§!\n소유한 §Y유대교§! 지역들은 이 특성이 활성화된 동안 §Y수용되지 않은 문화§!와 §Y같은 문화권§! 불이익을 받지 않습니다.\n\n유대인들은 수세기 동안 많은 지역과 국가에서 소수민족이었습니다. 이러한 지위가 삶을 불필요하게 더 가혹히 만들었지만, 적어도 유대교 내에서 엄청난 공동체 의식을 형성하는데 기여했고, 심지어 다른 종교들이 직면할 문화적 차이를 극복하는데 기여했습니다.
desc_jewish_abrahamic_aspect코0=£dip£ §Y특성§!\n소유한 모든 §Y기독교§!, §Y이슬람교§! 지역들은 더 이상 잘못된 종교로 인한 불이익을 받지 않으며 해당 지역의 종교 통합도 기여도를 §G-100.0%§! 그리고 해당 지역의 선교력을 §R-100.0%§! 감소시킵니다.\n\n유대인들, 기독교인들, 그리고 이슬람교인들 사이에 차이점이 있을 수 있지만, 결국에는 우리의 모든 종교들이 위대한 아브라함과 다시 연결될 수 있습니다. 그렇기 때문에 우리 나라의 기독교인들과 이슬람교인들은 비록 가는 길이 우리와 다르더라도 동포로 대우받고 있습니다.
judaism_diplomatic_rabbi_aspect코0=유대인들의 집
desc_judaism_diplomatic_rabbi_aspect코0=£dip£ §Y특성§!\n신정이 아닌 모든 §Y기독교§!, §Y이슬람교§! 국가들은 우리에게 §G+35§!의 관계도를 얻습니다.\n\n우리는 우리 민족의 등불이며, 그렇기 때문에 외국의 많은 유대인들을 우리나라로 끌어들이고 있습니다. 그 부작용으로, 기독교인들과 이슬람교인들은 그들의 "원하지 않는 사람들"이 우리 집에 있다는 것에 기뻐하고 있습니다.
judaism_yom_kippur_aspect코0=대속죄일
desc_judaism_yom_kippur_aspect코2=£mil£ §Y특성§!\n전쟁 중에, 우리 나라는 인력 회복 속도 §G+10.0%§! 그리고 신앙력 §G+5.0%§!을 얻습니다. 이 효과는 우리가 §Y방어§! 전쟁 중일 경우 두 배가 됩니다.\n\n가장 신성한 날인, 대속죄일은 우리의 죄악에 대한 속죄와 우리의 죄에 대한 회개의 날입니다. 대속죄일 기간 동안, 모든 유대인들은 종종 회당에서 봉사하며, 금식하고, 고백하고, 기도해야 합니다.
judaism_remember_passover_aspect코0=유월절 기억
desc_judaism_remember_passover_aspect코2=£mil£ §Y특성§!\n함락된 우리 요새들을 공성할 경우 공성 진행도 §G+2§를 얻습니다. 적의 요새를 공성하는데 성공할 경우 신앙력 §G+5§!를 얻습니다.\n\n유월절은 유대교에서 중요한 기념일로, 우리 민족이 이집트인들에게 지배받던 시기 그리고 그들로부터의 해방을 상기시켜 줍니다. 모든 사람은 과거 우리 민족이 보여주었던 인내심을 기억할 것이며, 모든 승리는 축하받을 만하다는 것을 기억할 것입니다.
judaism_purim_teachings_aspect코0=퓨림의 가르침
desc_judaism_purim_teachings_aspect코1=£mil£ §Y특성§!\n전투에서 승리할 때마다 전쟁 피로도가 §G-0.05§! 감소합니다. 전쟁에서 승리할 때마다 신앙력 §G+10§!을 얻습니다.\n\n퓨림은 유대인의 기념일로 아케메네스 왕조 페르시아 제국의 하만으로부터 우리 민족을 구한 것을 기념하는 날입니다. 이와 같이 우리는 어려운 시기에 우리 민족의 인내를 기억하고 존중하며, 그들의 모범을 따라 살아갑니다.
