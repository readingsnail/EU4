fetishist_flavor.600.desc코0=전통적으로 [Root.Monarch.GetTitle]은 [Root.GetName]가 누구를 숭배할 지에 대한 인도자역할을 했습니다. 그러나 전통이라고 해야 그렇게 엄격하지 않고 시대에 따라 변할 수 있고, 때문에 우리 후계자에게 이 숭배 문제에 대한 결정은 중요한 질문이 되었습니다.
