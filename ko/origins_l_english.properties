###SON FLAVOR EVENTS###
flavor_son.6.t코0=위대한 정복자, Alî Ber
flavor_son.6.d코1=Alî Sonni 는 15세기 Sonni왕가의 통치자이자 송가이의 첫번째의 적법한 왕으로 역사에 남았다. 통치기간 중 젠나나 팀북투등 많은 도시와 송가이 군대의 손에 들어왔고 왕국은 번영하여 서아프리카의 헤게모니를 쥐게 되어 말리를 대체하는 유일한 제국이 되었다. 그는 무슬림이었지만, 팀북투 학자들에 대한 억압정책을 폈으며 전통 종교에 대한 관용을 베풀어 그를 잘 쳐줘야 외관만 무슬림이라 불러지게 만들었다.
flavor_son.6.a코0=Alî Ber가 우리를 승리로 이끌지니!
flavor_son.6.b코0=진정 위대한 정복자 중 하나였지.
flavor_son.7.t코0=[From.GetName]의 위급
flavor_son.7.d코0=동쪽의 [From.GetName]는 말리 제국이 감당하기 벅찬 크기로 성장했습니다. 우리가 내부 갈등으로 투쟁하고 있을 때, 그들은 제국의 칭호를 걸고 새로운 서아프리카의 지역 강국이 되어 [From.GetAdjective]의 군대가 우리 눈 앞에 기다리고 있습니다!
flavor_son.7.a코1=참으로 나쁜 소식이군.
flavor_son.10.a코0=이 관대한 제안을 기꺼이 받겠노라.
flavor_son.11.t코0=젠네의 대 모스크
flavor_son.11.d코1=한때 술탄 Kunburu의 궁전이었던 [1134.GetName]의 모스크는 공성 중에 많은 부수적 피해를 입었고 이에 재보수가 필요했습니다. [Root.GetAdjective]의 노동자들의 수고로 한가지만 빼고 예전의 영광의 모습을 한 모스크로 복원할 수 있었습니다: 그것은 바로 모스크의 원래 설계에선 많은 궁전으로 세워질 당시로부터 전해진 고가의 내부 장식을 포함하고 있었으나, 이 장식들이 전쟁통에 파괴된 것입니다.\n[Root.GetClergyName]들은 알라께 헌신함을 증명하기 위해 이 장식들이 복원이 되어야 한다 주장했습니다. 그러나 [Root.GetDhimmiName]들이 다른 종교의 교회나 사원들이 장식 등의 면에서 동등한 대우를 받지 못하고 있음을 강조하였고, 이에 대 모스크도 다른 동일한 대우를 받게 해달라고 주장합니다.
flavor_son.11.a코0=[Root.GetClergyName]편에 선다.
flavor_son.11.b코0=[Root.GetDhimmiName]편에 선다.
flavor_son.12.t코0=[Root.GetName]의 뿌리
flavor_son.12.d코0=서아프리카의 이슬람화 전, 송가이 인들은 그들의 모두 전통 민속 종교의 일원이었습니다. 지배계급이 이를 고려하기 힘들 것으로 보였지만, 우린 옛 방식에 대한 관용적 태도를 지켰고 원주민들이 오히려 무슬림 개종에 대해 회의적이게 만들었습니다. 보통 이런 일은 씻을 수 없는 죄가 되겠지만, [Root.Monarch.GetName]조차도 [Root.GetName]의 종교적 원류로 돌아가는 것을 고려하려 합니다.
flavor_son.12.a코0=그런 이단 행위에 대한 생각조차 하면 안될 것이다. 다만, 우리의 신앙을 조금 조정할 수는 있겠지.
flavor_son.12.b코0=옛 방식으로 돌아갈 때이다!
flavor_son.12.b.tt코0=소유된 §Y수니파§! 인 지역의 종교는 §Y페티시즘§!으로 바뀌었습니다.
flavor_son.13.t코0=[Root.Monarch.GetName]의 몰락과 [Root.Capital.GetName]의 시가지
flavor_son.13.d코1=[From.GetAdjective]병사들이 우리가 아끼는 수도를 공성한지도 수 개월입니다. 우리 수비대의 최선의 노력에도 [From.GetAdjective]군 침입을 막을 수 없었습니다. 우리의 죽음을 각오한 노력에 [Root.Monarch.GetHerselfHimself][Root.Monarch.GetTitle]께서 친히 [Root.Capital.GetName]의 도시 성벽에서 싸우셨지만, 전투중 [Root.Monarch.GetSheHe]께서 [Root.Monarch.GetHerHis] 마지막을 가졌습니다.\n그러나 모두 잃은 것은 아닐터입니다. 몰락해버린 [Root.Monarch.GetTitle]의 배우자께서 마지막 묘수를 가지고 있습니다:'이 전쟁이 내가 [From.Monarch.GetName]과의 결혼으로써 끝날수 있다면 그리 하겠다.'
flavor_son.13.a코0=유일한 옳은 선택이다.
