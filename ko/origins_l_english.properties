flavor_kon.4.a.tt코2=[Root.GetName]의 백성들은 [Root.Monarch.GetTitle]의 배신감을 느끼고, §R3§!만큼의 안정도를 잃습니다.\n[Root.GetName]은 '페티시즘'과 '유럽과의 싸움'을 '§Y카톨릭§!'으로 대체합니다.\n§Y선택은 되돌릴 수 없습니다.§!
flavor_kon.4.b.tt코2=[Root.GetName]의 [Root.GetNobilityOrFallbackName]은 [Root.GetAdjective] 폭도에 배신감을 느끼고, §R3§!만큼의 안정도를 잃습니다.\n[Root.GetName]은 '카톨릭'을 '§Y페티시즘§!' 미션으로 대체합니다.\n§Y선택은 되돌릴 수 없습니다.§!
flavor_kon.7.t코0=외국인들이 [Root.GetName]에 도착하다!
flavor_kon.7.desc.ib코0=은빛 갑주와 긴 갈색의 로브를 입은 수상해 보이는 창백한 사람들이 우리 해안가에 포착되었습니다. 첫 접촉을 통해, 이 사람들이 이베리아라고 부르는 먼 곳으로부터 왔음이 자명해졌습니다. [Root.Monarch.GetName]께서 이 수상한 자들의 말을 들을 자리가 차려졌고, 그들은 우리에게 그들의 의중을 털어놓습니다: 이 포르투갈인들과 카스티야 인들은 세계를 발견하고 그들이 그리스도라고 부르는 자의 이름을 널리 알리기 위해 여기에 온 것입니다. 그들의 기술은 [Root.GetName]에서 봐 왔던 거보다 더 앞서있고, [Root.Monarch.GetTitle]과 [Root.GetNobilityOrFallbackName] 모두가 이 수상한 자들에게 끌립니다.
flavor_kon.7.desc.pap코0=한 무리의 나이든 자들이 우리 해안 가에 도착했습니다. 이들은 모두 길고 하얀 로브와 우스꽝스러운 모자를 입고 있습니다. 그들의 '교황'의 이름으로 여기에 와서 [Root.Monarch.GetTitle]께서 그들의 이야기를 들어 주시길 바랍니다. 그들은 '[PAP.GetName]'이라 불리는 나라의 주교로 보이며 여기에 '그리스도'의 말을 전파하기 위해 왔습니다. 우리 중 누구도 정말로 그들이 무슨 소릴하는 지 이해하지 못했지만, 그들의 기술은 우리를 한참 앞서며, 그들의 믿음은 [Root.Monarch.GetName]과 [Root.GetNobilityOrFallbackName]에게 모두 흥미를 느끼게끔 합니다.
flavor_kon.7.desc.catholic코1=긴 갈색의 로브를 입고 이상한 금 십자가들을 든 사람들이 우리 해안선에 도착했습니다. '우리에게 옳은 길을 주고자' 여기에 왔다고 주장했고,[Root.Monarch.GetName]께서 그들의 이야기를 들어 주시길 바랍니다. 그들은 스스로 '로마 가톨릭 교회의 선교단'에서 왔다고 밝혔습니다. 우리 중 누구도 정말로 그게 뭘 의미하는 지 이해하지 못했지만, 그들의 기술은 우리의 관심을 끌어냈습니다.
flavor_kon.7.desc.christian코1=작은 배가 우리 해안가에 좌초되었습니다. 소수의 우리 전사들이 조심스럽게 접근했고, 그들은 갈색 로브를 입은 완전히 지친 5명의 사람들을 발견했습니다. 그들의 복장을 고려하건대, 그들은 타 죽으려고 작정을 했고, 간신히 심각한 신체적 부상을 입지 않고 탈출했던 것 같습니다. 그들은 [Root.Monarch.GetName]께 보내져 사람들의 이목이 이 창백한 자들의 발견에 집중됩니다. 이 '선교사들'은 '개신교' 이단의 공격으로 박해받은 자들로 보입니다. 그들은 우리에게 그들의 기술과 종교에 대해 말하고 상위 계층의 관심을 얻습니다.
flavor_kon.7.desc.others코1=심하게 손상된 로브를 입고 중상을 입은 세 명의 사람들이 우리 해안으로 밀려왔습니다! 우리 시민 몇명이 즉시 그들을 데리고 와, 상처를 돌보았습니다. 몇 주가 지나, 그 자들은 다시 일어설 수 있게 되었고, 우리에게 그들의 고향에 대한 이야기를 해 주었습니다. - 거기에 부정한 세력이 그 곳을 어떻게 파괴되었는지까지 말입니다. 그들은 또한 그들의 종교, '카톨릭'에 대한 이야기를 들려주며, 얼마나 쉽게 거기에 가입할 수 있는지 말해 주었습니다. 그들 종교와 기술에 관한 이야기에 [Root.Monarch.GetName]의 눈썹이 올라갔으나, 최종적으로 [Root.Monarch.GetHerHis] 관심을 얻었습니다.
flavor_kon.7.a코0=이 외국인들에게 잠시 지내도록 초대한다
flavor_kon.7.a.tt코1=유럽인들 편에 서게됩니다.\n[Root.GetName]은(는) '페티시즘'미션을 '§Y카톨릭§!'미션으로 대체합니다.
flavor_kon.7.b코0=그들의 의도가 좋을리 없다. 그들을 우리 고향 땅에서 즉시 추방하라!
flavor_kon.7.b.tt코0=유럽인들의 반대편에 섭니다.\n[Root.GetName]은(는) 현재 미션 들을 §Y유지§! 합니다.
flavor_kon.8.t코0=[Root.GetName]와 유럽인들
flavor_kon.8.d코1=[Root.GetName]에 창백한 다수가 도착했는데, 이들은 빛나는 갑주를 입고 이상한 십자가를 목에 두르고 있었습니다. 이 소위 유럽인들은 과거에 우리 백성들에게 영향을 끼치려 했습니다.\n[Root.GetName]이 복원된 이후, 유럽인들을 어떻게 다룰 것인지에 대한 의문이 다시 부상했습니다.
flavor_kon.8.a코0=그들의 호의를 얻기 위해 노력해야 한다.
flavor_kon.8.a.tt코2=유럽인들 편에 서게됩니다.\n[Root.GetName]은(는) '페티시즘'미션을 '§Y카톨릭§!'미션으로 대체합니다.\n§Y선택은 되돌릴 수 없습니다.§!
flavor_kon.8.b코0=그들은 나쁜 징조이며 그들을 반대하기 위해 수단을 가리지 말아야 한다!
flavor_kon.8.b.tt코1=유럽인들의 반대편에 섭니다.\n[Root.GetName]은(는) 현재 미션 들을 §Y유지§! 합니다.\n§Y선택은 되돌릴 수 없습니다.§!
flavor_kon.9.t코0=[Root.GetName] 개종!
flavor_kon.9.d코1=몇 달에 외국 선교사들의 걸친 노력과 그들 방식으로의 개종 준비가 마침내 완료 되었습니다: [Root.Monarch.GetName]는 카톨릭 세상에 합류했습다.
flavor_kon.9.a코0=아멘!
flavor_kon.10.t코1=[kon_converted_province.GetName]가 가톨릭으로 개종합니다!
flavor_kon.10.d코0=[kon_converted_province.GetName] 지역 사람들은 우리 옛 전통을 버리고 가톨릭 교회로 개종을 하기 시작했습니다! 우리가 개입하지 않는다면, 지역 전체가 개종할 것입니다. 그러나 만약, 그들의 새로 믿게된 종교를 억압하기로 결정한다면, 이 가톨릭 신자들을 전장에서 마주할 것입니다.
flavor_kon.10.a코0=십자가를 믿게 두어라.
flavor_kon.10.a.tt코0=[Root.GetClergyName]는 이를 배반 행위로 보고 역으로 가톨릭 침공에 대한 봉기를 시작한다.
flavor_kon.10.b코0=그렇게 되게 내버려 둘 수는 없지!
flavor_kon.10.b.tt코1=[Root.GetNobilityOrFallbackName] 이를 자원 낭비라 보고 있고, 우리 정부를 방해하려 합니다.
flavor_kon.11.t코0=유럽의로의 여정
flavor_kon.11.d코1=[kon_port.GetName]의 선착장에 세 척의 배가 준비 되었습니다. 우리 종교인과 외교관들을 위한 선박으로, 성좌와 그들의 동맹들의 [Root.GetName]에대한 호의를 얻기 위한 유럽으로 여행을 떠나기 위한 인원들로 선정되었습니다.\n시간이 좀 걸리겠지만, 주님의 은총으로 이 용감한 자들이 그 목적지에 도착할 것입니다.
flavor_kon.11.a코0=교황이 이 관대한 제안을 받아들이길 빌자.
flavor_kon.11.a.tt코0=[Root.GetName] 측은 사절과 종교인들을 유럽으로 보내 교황에게 §Y보장받는 추기경§!을 댓가로 500 $COST|Y$¤ 을 지불하는 제안을 할 것입니다.
flavor_kon.11.b코0=우리 동맹이 이 제안을 마음에 들어한다면 좋겠는걸.
flavor_kon.11.b.tt코0=[Root.GetName] 측은 사절과 종교인들을 유럽으로 보내 동맹에게 §Y보장받는 추기경§!을 댓가로 500 $COST|Y$¤ 을 지불하는 제안을 할 것입니다.
flavor_kon.11.c코0=로마의 주인이 이 제안을 맘에 들어한다면 좋으련만...
flavor_kon.11.c.tt코0=[Root.GetName] 측은 사절과 종교인들을 유럽으로 보내 신성한 도시 로마의 소유자에게 §Y보장받는 추기경§!을 댓가로 1000 $COST|Y$¤ 을 지불하는 제안을 할 것입니다.
flavor_kon.12.t코0=[From.GetName]에서 온 관대한 제안!
flavor_kon.12.d코0=이번 달 유럽에 세 척의 외국 선박이 아프리카 국가인 [From.GetName]로부터 외교관과 사제들과 함께 도착했습니다. 그들은 아주 좋은 거래를 제시했습니다: 500 두캇의 관대한 선물과 추기경 교구에 대한 보장을 교환하는 거래를 요청합니다.
flavor_kon.12.a코0=교구? 그래, 자리야 많이 있다.
flavor_kon.13.t코0=[From.GetName]에서 온 관대한 제안!
flavor_kon.13.d코0=이번 달 유럽에 세 척의 외국 선박이 아프리카 국가인 [From.GetName]로부터 외교관과 사제들과 함께 도착했습니다. 그들은 아주 좋은 거래를 제시했습니다: 500 두캇의 관대한 선물과 우리 추기경 교구중에 하나와 교환하는 거래를 요청합니다.
flavor_kon.13.a코0=돈을 받겠다, 고맙구나!
flavor_kon.14.t코0=[From.GetName]로 부터의 관대한 제안
flavor_kon.14.d코1=이번 달 유럽에 세 척의 외국 선박이 아프리카 국가인 [From.GetName]로부터 외교관과 사제들과 함께 도착했습니다. 그들은 아주 좋은 거래를 제시했습니다: 1000 두캇과 로마 내의 추기경 자리를 교환하는 거래를 요청합니다.
flavor_kon.14.a코0=합당해 보이는데.
flavor_kon.15.t코0=[Root.GetName]을(를) 위한 추기경
flavor_kon.15.d코0=[From.GetName]과의 거래는 완전히 성공적이었고, [Root.GetName]은 이제 교황청에 보장된 추기경 자리를 갖습니다!
flavor_kon.15.a코0=신은 선하시다!
flavor_kon.15.a.tt코1=§Y[This.GetName]§!은 '§Y아프리카의 추기경§!' 한정 작동 조건을 갖고, 활성화 동안 다음과 같은 효과를 얻습니다:\n지역 조세 변동치: §G+25.0%§!\n참된 신앙에 대한 관용도: §G+1.00§!\n연간 교황청 영향력: §G+1.00§!\n[Root.GetClergyName] 충성도 평형치: §G+10.0%§!\n\n추가적으로, [Root.GetName]이 [This.GetName]에 대한 통제권을 갖고 있고, [Root.GetName]과 [This.GetName]지역은 §YCatholic§! 신앙의 독실한 추종자여야 한다는 조건 하에 이 지역은 항상 §Y추기경§!을 보유합니다.
###MUTAPA FLAVOR EVENTS###
flavor_zim.1.t코0=짐바브웨의 쇠퇴
flavor_zim.1.d코2=짐바브웨는 한 때 수세기전 내전으로 산산조각이 난 짐바브웨 제국의 위대한 수도였습니다. 이 후로, 많은 돌로 된 집으로 구성되어 멋진 수도로써 기능하고 있습니다.\n그러나 그런 날들은 이제 며칠 남지 않았습니다. 이 위대한 도시의 생계를 보장하던 작물들이 실패하고, 도시 경제를 오랜 기간 유지했던 자원들이 고갈되었고, 같은 지역 내의 불안정성은 많은 주민들을 [Root.GetName]의 다른 지역으로 내쫓았습니다.
flavor_zim.1.a코1=짐바브웨의 암흑기로다...
flavor_zim.1.a.tt코0=[Root.GetName]의 다른 지방으로 짐바브웨의 거주자들이 이동할 것입니다.
flavor_zim.1.a.at코2=[Root.GetName]가 짐바브웨에 대한 통제권을 상실한다면, [Root.GetName] 통치자의 권위에 대해 국민들이 문제시 할 것이며, '§Y훼손된 왕국§!'변동치를 갖고, 다음과 같은 효과를 줍니다.:\n정통성: §R-1.00§!\n참된 신앙에 대한 관용도: §R-3.00§!
flavor_zim.2.t코1=짐바브웨를 능가하다
flavor_zim.2.d코2=한때 위대했던 짐바브웨는 남부 아프리카 지역을 지배했으며 문화와 상업의 중심지였습니다. 그들은 위대한 기념물을 세우고 또 우리 문명의 기틀이 되었습니다.\n이제 우리는 그들의 전성기를 넘어 완전히 넘어서기에 이르렀습니다. [Root.GovernmentName][Root.GetName]는 우리 조상이 꿈꿔왔던 권력의 크기에 다다랐습니다. 축제일 동안, [Root.GetClergyName]들은 [Root.Monarch.GetTitle]를 알현하고 이 성공에 대한 축하의 인사를 건냈습니다. 음와리 숭배와 조상들을 기려 우리 영토를 아우르는 새 이름으로 그레이트 짐바브웨 를 추천합니다.
flavor_zim.2.a코1=물론이지! 이제부턴 우린 짐바브웨로 불릴것이다.
flavor_zim.2.b코0=조상이란 것은 과거의 산물이다. [Root.GetName]은 미래고!
flavor_zim.2.b.tt코0=§Y짐바브웨§!형성 결단을 내릴 수 있습니다.
flavor_zim.5.t코0=상인들 간의 종교적 갈등
flavor_zim.5.desc코1=[Root.GetName]은 전 세계 모든 상인들에게 금과 상아에 대한 접근성으로 매력적인 곳입니다. 이러한 매력은 엄청난 번영을 가져다 주기도 하지만, 상인들간에 종교적 분쟁이라는 부작용을 내포하고 있습니다. [Root.Capital.GetName]내의 기독교와 이슬람 상인 간의 다툼으로, 서로 우리 궁정과 시장에 경쟁적으로 꺾으려 합니다.\n완전한 평화를 가져오기 위해선 이런 상호공격적인적인 상인들의 태도에 어떤 식으로 대할지 [Root.Monarch.GetName]가 선택해야 합니다.
flavor_zim.5.a코0=기독교 상인 들의 편에 선다.
flavor_zim.5.a.tt코0=§Y종교적 필연§!이라는 결과가 나중에 있을 수 있지만, [Root.Monarch.GetName]은 기독교 상인편에 섭니다...
flavor_zim.5.b코0=무슬림 상인 들의 편에 선다.
flavor_zim.5.b.tt코0=§Y종교적 필연§!이라는 결과가 나중에 있을 수 있지만, [Root.Monarch.GetName]은 무슬림 상인편에 섭니다...
flavor_zim.5.c코1=분쟁 사이에서 이득을 취해야 한다.
flavor_zim.5.d코0=두 상인 집단 모두 도시 밖으로 쫓아낸다.
flavor_zim.6.t코0=[Root.Monarch.GetName]의 개종
flavor_zim.6.d.a코0=무슬림 상인들은 우리 도시에서 추방당했으며, 그리스도교 상인들은 경쟁없는 환경을 즐겼습니다. 시간이 지남에 따라 [Root.Monarch.GetTitle]께서는 그리스도인들을 매우 좋아하게 되었습니다. 어느 날 [Root.Monarch.GetName]께서는 상인으로 위장한 선교사들의 방문을 받았고 [Root.Monarch.GetSheHe]는 별 생각없이 기독교로 개종했습니다. 이제 [Root.GetName]의 통치자의 자리엔 그리스도교도인 [Root.Monarch.GetTitle]가 있습니다!
flavor_zim.6.d.b코1=기독교 상인들은 우리 도시에서 추방당했으며, 무슬림 상인들은 경쟁없는 환경을 즐겼습니다. 시간이 지남에 따라 우리의 [Root.Monarch.GetTitle] 무슬림을 아주 좋게 되었습니다. 어느 날 [Root.Monarch.GetName]은 상인으로 위장한 선교사들의 방문을 받았고 [Root.Monarch.GetSheHe]는 별 생각없이 이슬람으로 개종했습니다. 이제 [Root.GetName]의 통치자의 자리엔 무슬림 [Root.Monarch.GetTitle]가 있습니다!
flavor_zim.6.a코0=이제 우린 모두 그리스도인이야!
flavor_zim.6.b코0=이제 우린 모두 무슬림이야!
flavor_zim.6.c코0=[Root.Monarch.GetHerHis] 앞에 고개 숙여라!
flavor_zim.6.d코0=별로 [Root.GetAdjective]와는 관계 없어.
flavor_zim.7.t코0=소팔라의 지도
flavor_zim.7.d코0=소팔라의 정복으로, [Root.GovernmentName]는 이 부유한 무역도시의 지도를 열어 볼 수 있었습니다. 거기엔 서 인도양의 매우 중요한 해안도시에 더해 무슬림 신앙에 중요한 위치를 차지하는 다른 도시들 또한 드러내고 있었습니다.
flavor_zim.7.a코0=이 지도들은 아주 유용하겠어.
flavor_zim.7.a.tt코0=§Y아프리카의 뿔§!, §Y이집트§!, §Y아라비아§!, §Y마쉬릭§ 지역 발견! 추가로 §Y서 인도양§! 까지.
flavor_zim.8.t코0=아시아 무역의 고대 지도
flavor_zim.8.d코1=새로운 무역 선단의 창설은 새로운 기회를 찾는 많은 상인들을 끌여들었습니다. 이런 상인들 중 하나에게 짐바브웨가 중국과 계약했던 시절의 옛 지도를 갖게되는 기회가 생겼고, [Root.Monarch.GetTitle]께 기부한 일은 아주 좋은 일이었습니다.
flavor_zim.8.a코0=무척 고맙구나.
flavor_zim.8.a.tt코0=Y[1816.GetName]§!에 대한 해양 무역로를 발견합니다.
flavor_zim.9.t코0=[1184.GetName]를 잃다!
flavor_zim.9.d코0=[1184.GetName]의 대도시는 [Root.GetName]의 적들의 손에 떨어졌습니다. 우리 백성들은 신성한 [Root.Monarch.GetTitle]에 대해 의심하며, 혼란에 빠졌습니다.
flavor_zim.9.a코0=좋지 않아.
flavor_zim.10.t코0=[1184.GetName]는 다시금 [Root.GetAdjective] 손에 들어왔습니다.
flavor_zim.10.d코0=대도시 [1184.GetName]는 다시금 우리 손에 들어왔습니다! 우리 백성은 마침내 다시 안정을 되찾았습니다!
flavor_zim.10.a코0=좋아.
###AJUURAN FLAVOR EVENTS###
flavor_aju.1.t코0=[From.GetName]와의 금 거래
