flavor_aju.5.t코0=[From.GetName]의 상인들
flavor_aju.5.d코1=[From.GetName]에서 온 상인들을 인도에서 보는 것은 최근 흔한 일이 되었습니다. 그들은 공정한 무역인들이고 양질의 상품을 들여옵니다. 주목할 점은 현지 생산 단계에 대한 참여와 그들이 우리에게 제공할 통화량입니다. 이 상인들은 우리의 다양한 상품들의 생산 개선하기에 유용할 수도 있겠지만, 이 외국인에게 너무 의존하게 될 수도 있습니다.
