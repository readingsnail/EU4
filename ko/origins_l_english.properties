eth_unify_the_horn_of_africa_desc코1=아프리카의 뿔에는 오래된 많은 왕국들의 키워냈습니다. 수세기동안 많은 왕국들이 일어나고 사라졌지만 아무도 이 땅 전부를 통합해내지 못했습니다. 우리는 우리 손으로 아프리카의 뿔 지역에서 이 끊나지 않는 전쟁문제의 끝을 봐야 할 것입니다.
