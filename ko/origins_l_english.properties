hau_military_support코0=군사적 원조를 제공하다
hau_refused_to_help코0=원조를 거절하다
zan_has_embassy코0=우리의 대사관이 있음
zan_declined_embassy코0=우리의 대사관을 거부함
msi_accepts_muslims코0=신앙의 형제 특권을 부여하다
###DECISIONS###
kongo_nation_title코0=콩고 왕국 복원하기
kongo_nation_desc코1=콩고의 부족왕국은 한때 주요 지역 강국이자 콩고라는 지역의 이름의 주인이었습니다. 몰락이후 누구도 그들을 대체할 자가 되지 못했고, 콩고 지역엔 폐허만이 남아 이제 유럽인들과 다른 외국인들의 착취를 유발하고 있다. 이제 이 황폐한 공허함을 채워 왕국의 유산을 이어나갈 때가 왔다!
ethiopia_nation_title코0=솔로몬 왕조의 유산 복원
ethiopia_nation_desc코1=에티오피아 제국은 악숨 제국의 정신적인 계승자이며, 전설적인 솔로몬 왕과 시바 여왕의 자손들의 집이자, 콥트교 신앙의 수호자입니다. 에티오피아의 멸망은 에티오피아 콥트교 신앙의 비극이었지만, 에티오피아의 정신은 계속 살아남아 있으며, 우리와 같은 자격있는 후계자에 의해 부활되기를 기다리고 있습니다!
set_focus_on_professional_army_title코0=정예군에 집중
set_focus_on_professional_army_desc코0=[Root.Monarch.GetName]의 즉위와 더불어, 군부는 더 효과적이면서도 더 작은 규모의 군대에 집중하기 위해 필요한 자원을 기대하고 있습니다.
set_focus_on_professional_army_ct코1=§Y[Root.Monarch.GetName]§!의 생애 안에서 지난 §Y20년§! 동안 군사 집중을 받지 못했습니다.
switch_active_cult_decision_desc코0=[Root.Religion.GetName]의 신앙은 유일한 하나의 신만이 존재한 경직된 것이 아닙니다. 우리는 여러 신적 존재와 숭상하는 자가 신적 존재라 일컫는 숭배의 집합체에 믿음이 있습니다. 때때로 통치자가 나라를 위해 숭상의 초점을 바꿀 필요가 있습니다. 우리 [Root.GetClergyName]들의 도움으로 우리는 아주 간단히 초점을 전환 할 수 있습니다.
switch_permanent_scholar_desc코0=때로는 특정 학파의 가르침은 더 이상 우리 나라에게 가치가 없습니다. 그런 일을 대비해 외국 학자들을 추방하고 그 자리에 더 가치가 있는 학파의 학자로 대체하는 것이 추천됩니다.\n그리고 우리의 [Root.GetClergyName]의 연줄 덕분에 심지어 외교관계에 어떠한 제약도 받지 않을 것입니다.
invest_into_the_seven_cities_desc코0=하우사의 일곱 도시는 우리 문화사에 중요합니다. 이 도시들의 번영을 위해 투자하여 우리 나라에 대한 그들의 지역적 문화적 중요성을 되살릴 수 있습니다.
aksumite_nation_title코0=악숨 복원
aksumite_nation_desc코0=나이 깨나 먹은 이들은 고대시절과 강한 힘을 가진 악숨왕국과 성인 엘레스반이라고도 알려진 홍해에서 대적할 자 없는 위대한 왕 Kaleb의 이야기에 대해 말해왔습니다. 이제 우리는 마침내 우리 아버지의 아버지들의 기반을 찾고 그들의 옛 영광을 주장해, 역사의 새로운 장을 쓸 준비가 되었습니다.
great_zimbabwe_nation_title코0=짐바브웨 복원
great_zimbabwe_nation_desc코0=기뻐하십시오! 위대한 석조 도시는 사람들로 하여금 다시 채워지고, 건물들은 재건되여 힘을 되찾았습니다! 이제 우리가 기를 높히 잡고 세상에게 위대한 짐바브웨가 다시 아프리카의 보석으로써 예전처럼 다시 빛날 것임을 알릴 때 입니다.
hausa_nation_title코0=하우사 통합
hausa_nation_desc코0=수년 동안 불화와 전쟁이 이 땅을 조각내버린후, 옛 경쟁자들은 마침내 담금질을 끝내고 평화가 도래했습니다. Bawo의 아들들은 이제 다시 같은 깃발 아래 하나되었습니다. 이제 하우사가 하나로 다시 일어설 때입니다.
israel_nation_title코0=이스라엘 재건
israel_nation_desc코0=약속되었듯, 이스라엘의 땅은 비유대인의 압제로 부터 다시 한번 자유를 되찾았고, 다윗의 주권이 다시 성립했고, 성스러운 도시 예루살렘은 재건되었습니다. 주님께서 시온의 땅으로 그 자비로써 돌아오셨음에, 마을들은 다시 영광이 넘쳐 흐릅니다.
federal_celebrate_rituals_together_desc코0=특별한 시기에, 우리를 하나로 묶는게 무엇인지 기억하고 우리 국민의 축제를 기념하는 것은 중요합니다.
kitara_nation_title코0=키타라 제국의 작위 주장
kitara_nation_desc코0=많은 투쟁과 고난을 겪고 난 후, 우리는 이 큰 호수의 사람들은 통합하고, 우리를 갈라 놓았던 분열을 치료했습니다. 한 때 잃어버린 단결심을 다시 세워 키타라의 깃발 아래 다시 일어서, 모두가 하나된 우리를 보게 할 것입니다.
macina_nation_desc코0=우리 민족은 옛 주군들의 끔찍한 불의와 폭정을 견뎠야 했습니다만, 마침내 우리 스스로 그들의 멍에로 부터 자유를 찾았고 이제 우리 자신의 길을 개척할 준비가 되었습니다. 새로운 우리의 기치를 세워 우리의 자유와 감히 우리를 위협할 자들에게 경고할 상징이 되게 합시다.
mali_nation_title코0=말리의 지위 획득
mali_nation_desc코0=강력하고 번창하던 말리 제국이 수 년전 질투하는 이웃 트집잡기 좋아하는 족장들로 인해 무너졌습니다. 그럼에도, 말리의 정신은 파괴될 수 없고, 언제나 백성들 속에서 살아있을 것입니다. 이제 만딩 주변 땅이 하나 되었고, 새로운 만사가 일어서서 제국을 그 영광을 위해 되찾을 때가 되었습니다.
mossi_nation_title코0=모시 왕국 통합
mossi_nation_desc코0=옌네가 공주의 아들들은 너무 많은 세월동안 서로 싸워왔습니다. 그러나 이제 끊임없는 경쟁과 서로간의 대립은 해소되었고, 예전에 잃어버린 듯 했던 형제들은 이제 서로의 곁에서 말을 타고 있습니다. 우리의 눈을 세상으로 돌리고 그들에게 모시가 하나되었음을 알릴 시간이 왔습니다.
nubian_nation_title코0=누비아인 통합
nubian_nation_desc코0=고대부터 누비아의 왕국들은 북과 남쪽으로 우리 백성과 부를 차지하려는 이교도의 위협에 시달려왔습니다. 우리 사이의 차이는 잠시 제쳐두고 신 아래 하나의 누비아인 국가로 단결할 때입니다.
rozwi_nation_title코0=로즈위 건국
rozwi_nation_desc코0=우리는 전사들입니다. 우리는 외국의 위협을 내쫓고, 짐바브웨의 땅을 평화롭게 하고, 석조 도시들을 짓고, 땅 깊은 곳에서 금을 채굴하고, 사나로운 짐승들을 사냥했으며 무역을 지키고 사람들을 단결시켰습니다. 우리는 로즈비입니다!
somalia_nation_title코0=소말리아 씨족 통합
somalia_nation_desc코0=고대부터 소말리인들은 아프리카의 뿔 지역에 거주했습니다만, 항상 분열되고 무역에서나 전장에서나 서로 싸웠습니다. 사람들이 경쟁을 뒤로 한채 마침내 같은 깃발 아래서 서서 통합되어 이제 모든 것이 바뀝니다.
###ZIM MODIFIERS###
zim_declining_city코0=버려진 유적
desc_zim_declining_city코1=이 지역은 자원도 없이 버려진 도시이고, 지역의 행정을 위한 한 줌의 인력만이 남았습니다. 이 도시를 위해 사람들을 다시 불러오고자 하는 일은 어려울 것입니다.
zim_restored_capital코0=복구된 수도
desc_zim_restored_capital코0=집중된 노력과 헌실을 통해 도시 짐바브웨는 복원되어 옛 영광의 모습으로 복원되었고, 왕국 궁중의 권좌의 위치라는 역할을 수행합니다.
zim_desecrated_kingdom코0=훼손된 왕국
desc_zim_desecrated_kingdom코0=짐바브웨는 우리 조상의 자리입니다. 이 지역을 우리 영역의 적에게 내준다는 것은 신성한 왕이 약점을 드러내고, 통치에 부적합하다는 것을 나타냅니다.
zim_desecrated_kingdom_tt코0=짐바브웨가 [Root.GetName]의 통치 아래 다시 놓일 때까지 지속됩니다.
###ADAL MODIFIERS###
ada_preperation_for_war코0=아달 전쟁 준비
desc_ada_preperation_for_war코0=아달 사회 곧곧에 전쟁이 나타납니다. 모두 그 날을 기다리며 준비합니다. 우리가 에티오피아인들을 칠, 바로 그날 말입니다...\n\n'§Y아달-에티오피아 전쟁§!' 변동치를 개발도가 우리와 같거나 높은 §Y[ETH.GetName]§!과의 전쟁중이라면 얻고, 다음과 같은 효과를 줍니다:\n육군 사기:§G+5.0%§!\n인력 보충 속도:§G+10.0%§!\n매달 신앙심:§Y+0.01§!\n
ada_war_against_ethiopia코0=아달-에티오피아 전쟁
desc_ada_war_against_ethiopia코0=이제 다시한번 우리의 숙적 에티오피아와 아프리까 뿔 지역의 주도권을 두고 싸우게 되었습니다! 우리 군대는 그리스도교인들의 대다수를 죽여 수십년에 이를 우리를 향한 위협을 잠재울 것입니다.
ada_expelling_of_the_christians코0=아달의 개종 노력
desc_ada_expelling_of_the_christians코0=우리민족의 확장 시도는 아프리카 뿔 지역의 기독교인들에게 비참함과 고통을 발생시켰습니다. 우리는 평화를 유지하기 위해 이들을 참된 신앙으로 개종시켜야만 합니다.
ada_professional_army코0=현대화된 육군
desc_ada_professional_army코0=[Root.GetName]의 군대는 질과 훈련에서 큰 발전을 이룩했습니다.
ada_religious_unity_in_the_horn코0=종교적으로 통합된 아프리카의 뿔
desc_ada_religious_unity_in_the_horn코0=우리는 아프리카의 뿔을 통일하고 호전적인 이단과 이교도들을 우리의 고향에서 추방하였습니다. [Root.Religion.GetName]의 권위에 아무도 의문을 갖지 못합니다!
ada_imperial_adal_sultanate코0=아달 제국
desc_ada_imperial_adal_sultanate코0=우리는 소말리아 부족들 사이의 투쟁을 극복하고, 에티오피아인의 위협을 근절하였으며, 아프리카의 뿔 전역을 통합하였으며 아라비아까지 확장을 이루었습니다. 진정으로, 우리는 그 자체만으로 제국의 자격이 있으며 아프리카의 열강 중 하나로 부상하였습니다.
###CATHOLICISM###
