west_africa_salt_cloth_shells_desc코0=새로운 외국 상인들이 우리 도시들에 등장하여 새로운 상품들을 거래하면서 사하라 회랑과 기니 만을 아우르는 무역이 한동안 증가하고 있습니다. 이제 우리 이익을 위해 수익성이 풍부한 무역로를 통제해야합니다.
