###ETH FLAVOR EVENTS###
flavor_eth.29.t코0=[Root.GetName]의 이동하는 수도
flavor_eth.29.desc코1=[Root.GetName]의 느구서 너거스트(황제)들은 그들이 필요하다고 보는 지역들로 궁정을 옮겨다녔기 때문에 [Root.GetName]의 수도는 결코 고정되지 않았습니다. 이 제도는 새로운 수도의 주변 지방이 솔로몬 왕조의 손아귀 아래에 있도록 보장했지만, 나머지 [Root.GetName]의 지역들은 대부분이 자치적이었으며, 그 결과 이 지역들에 대한 통제권을 상실했습니다.
flavor_eth.29.a코0=알겠다.
flavor_eth.30.t코0=영구적인 수도 확립
flavor_eth.30.desc코0=[Root.Monarch.GetTitle] [Root.Monarch.GetName](은)는 [Root.GetName] 국가를 근대화시켰으며, [GetYear]년 [Root.Capital.GetName]에 첫 번째 수도를 설립했습니다. 또한, [Root.Monarch.GetSheHe]는 중요한 결정들을 오래 끌어온 종교적 논쟁들을 해결했고, 정부를 중앙집권화 했습니다. [Root.Monarch.GetHerHisCap] 업적들은 [Root.GetAdjective]의 역사에서 영원히 기억될 것입니다.
flavor_eth.30.a코0=마침내. 더 이상 이동하는 수도는 없다.
flavor_eth.30.b코0=나는 이동하는 수도가 좋다.
flavor_eth.33.t코0=언약궤 개방
flavor_eth.33.desc코1=수 천년 동안 아무도 언약궤를 열지 않았습니다. 그래서 그 내용물은 평범한 신자들에게 신비였으며 심지어 성직자에게도 이 사건은 신비스러운 것 중 하나입니다. 국내의 잠재적인 공황 상태를 줄이기 위해, [Root.Monarch.GetName](은)는 호기심이 강한 대중들의 눈에서 멀리 떨어진 궁전에서 이 전설적인 유물을 열기로 결정했습니다.\n 우리의 품위있는 [Root.Monarch.GetTitle] 그리고 [Root.Monarch.GetHerHis] 측근들이 도금된 나무 상자를 열었을 때, 그들은 약속된 것을 발견했습니다. 바로 두 개의 십계명 돌판과 아론의 지팡이 그리고 만나의 항아리가 있었습니다. 이것은 가장 화려한 사건은 아니었지만, 가장 종교적인 사건 중 하나였습니다. 이 유물의 진위를 확인한 후, 성직자 계층은 유물들을 다시 상자에 넣고 다시 언약궤를 숨겼습니다.\n\n이 사건 후 며칠이 지났고, 우리의 [Root.Monarch.GetTitle]에게 많은 활동들이… 더 쉽게 느껴졌습니다. 마치 하느님께서 직접 우리의 영광스러운 왕조와 우리 나라의 운을 축복하신 것처럼 말입니다!
flavor_eth.33.a코0=하느님 아버지께서 우리를 축복하시고, 그리스도께서 우리를 보살피시기를!
flavor_eth.35.t코0=[Root.GetName]의 속국들
flavor_eth.35.desc코1=다모트와 하디야는 100년 넘게 영광스러운 우리 [Root.GovernmentName]의 종속국이었습니다. 그들은 조공을 바쳐 우리를 잘 섬겨왔지만, [Root.Monarch.GetName] 궁정의 많은 사람들은 그들을 [Root.GetName]에 완전히 합병될 때가 되었다고 주장합니다. 결국, 이 두 국가를 어떻게 할 것인지는 선량한 우리 [Root.Monarch.GetTitle]에게 달렸습니다.
flavor_eth.35.a코0=그들은 우리 나라의 일부가 될 것이다!
flavor_eth.35.b코0=그들은 종속국으로 더 유용하다.
flavor_eth.37.t코0=수아킨에서의 기독교 복원
flavor_eth.37.a코0=이 영혼들이 축복받기를!
flavor_eth.38.t코0=악숨의 주요 항구, 아둘리스
flavor_eth.38.a코0=그리고 이번에, 아둘리스는 훨씬 더 오래 살아남을 것이다!
flavor_eth.39.t코0=악숨의 영토 능가
flavor_eth.39.desc코1=원래, 악숨 제국은 누비아와 북부 에티오피아 지방 그리고 아라비아 남부 해안만 소유했었습니다. 악숨의 영토는 우리의 상대가 되지 않습니다! [Root.Monarch.GetName](은)는 우리 [Root.GovernmentName]을 많은 성공적인 전투들과 군사 원정들로 이끌었으며 이제 우리는 400년 이전에 멸망한 제국을 재건했을 뿐만 아니라 능가했습니다!\n이 대규모 정복 원정들에 따라서, 많은 우리 귀족들은 고대 제국을 부활시킨 우리의 힘을 세계에 과시하기 위해 "악숨 제국"이라는 이름을 공식적으로 다시 쓰기를 간청하고 있습니다. 다른 한편으로는, [Root.Monarch.GetName]의 조언가들은 미래를 바라보기 시작하는 것을 추천하고 있습니다. 우리의 사랑받는 [Root.Monarch.GetTitle](은)는 어떤 결정을 내려야하겠습니까?
flavor_eth.39.a코0=우리는 악숨 제국의 역할을 맡아야 한다!
flavor_eth.39.b코0=조언가들이 옳다. 우리는 이 세상에 우리만의 발자취를 남겨야 한다!
flavor_eth.40.t코0=세미엔 왕국
flavor_eth.43.a코1=에티오피아라고? 잠깐만... 프레스터 존의 종복인가?!
flavor_eth.44.t코0=포르투갈과의 동맹?
flavor_eth.49.t코0=오스만의 지원
flavor_eth.49.desc코0=1529년, 에티오피아와 아달 사이의 전쟁에서, 오스만은 에티오피아 제국을 무찔러 아프리카의 뿔에 마지막으로 남은 기독교 보루를 소멸시키기 위해 아달 술탄국과 동맹을 맺었습니다. 오스만인들에게 이 전쟁은 전면전은 아니었지만, 그들은 튀르크 부대들을 여럿 보내 아달을 지원했습니다.
flavor_eth.49.ada.desc코0=[Root.GetName]과 [ETH.GetName] 사이의 전쟁이 맹렬히 계속되고 있습니다. 어느쪽도 확실한 승자가 될 것 같지 않으며 일부 전선들에서는 [Root.GetAdjective]의 병력들이 다시 밀려나고 있습니다. 다행히도, 우리는 이 날을 위해 준비해온 것이 있습니다. 아나톨리아에서 온 튀르크인 정예병들이 기독교의 위협에 맞서 같이 싸우기 위해서 [Root.GetName]에 왔습니다!
flavor_eth.49.a코0=도움을 준 오스만인들이 축복받기를!
flavor_eth.49.a.tt코0=§Y오스만 예니체리§! 용병대를 사용할 수 있습니다.
flavor_eth.50.t코0=포르투갈인들의 지원
flavor_eth.50.desc코1=에티오피아-아달 전쟁은 에티오피아에게 재앙이었습니다. 많은 마을들이 파괴되었고, 수도는 아달과 오스만 제국의 연합군에게 포위당했으며 남은 에티오피아군은 산으로 후퇴해야 했습니다. 이슬람교인들은 에티오피아가 멸망하는 것은 이제 시간 문제라고 생각했습니다.\n그리고 포르투갈인들이 도착했습니다. 1541년, 포르투갈인들은 오스만 제국에 맞서 싸우고 에티오피아를 돕기 위해 사령관 크리스토방 다 가마와 포르투갈인 병사들로 이뤄진 부대를 보냈습니다. 이 새로운 병사들은 에티오피아가 상황을 반전시키고 훨씬 더 많은 이슬람 군대를 물리칠 수 있게 해줬고, 이를 통해 1543년 무조건 평화를 이끌어냈습니다.
flavor_eth.50.a코0=포르투갈인들이 온 것에 하느님께 감사드린다!
flavor_eth.50.a.tt코0=§Y포르투갈 머스킷병§! 용병대를 사용할 수 있습니다.
flavor_eth.52.t코0=[Root.GetName]에서의 예수회 활동
flavor_eth.52.desc코1=1555년과 1557년에, 첫 포루투갈 예수회가 에티오피아에 도착했습니다. 처음엔 1543년 이래로 성장하고 있던 포르투갈 소규모 공동체를 대변하려 했었습니다. 그러나, 에티오피아 궁정에서의 그들의 영향력은 증대되었습니다. 가톨릭 교회의 콥틱 교회에 대한 실질적인 위협을 주는 지경에 다달았고, 이제 그들은 가톨릭 개종에대해 [Root.Monarch.GetName]에게 대화를 청하고 있습니다. 이 외국 선교사들을 어떻게 대해야 할런지요?
flavor_eth.52.a코0=기생충을 제거해야만 한다!
flavor_eth.52.b코0=그들은 경고받아야 마땅하다.
flavor_eth.52.c코1=아마도 옳은 말이지도. 카톨릭으로 개종해야 한다.
###MAL FLAVOR EVENTS###
west_african.19.b코1=있잖아, [ASH.GetName]의 왕좌는 우리것 보다도 좋아 보여...
flavor_mal.2.b코0=저기, 잠깐만! 날 데려가!
flavor_mal.6.a.tt코0=이 선택지는 [Root.GetName]에게 §Y종교 임무§!를 해제해줄 것입니다.
flavor_mal.6.b.tt코0=이 선택지는 [Root.GetName]에게 §Y관용 임무§!를 해제해줄 것입니다.
flavor_mal.9.t코0=[Root.GetName]의 쇠퇴
flavor_mal.9.d코1=그 위대한 만사 Musa의 형제였던 만사 Suleyman Keita의 죽음 후, [Root.GetName]의 제국은 수십 년 동안 권력, 영향력과 부에 부문에서 끊임없는 쇠퇴기를 보였다. 내전과 왕좌를 위한 투쟁, 무능한 만사들은 [Root.GetName]의 안정성을 약화시켰습니다. 예전 속국이었던 Songhai나 Timbuktu는 제국으로부터 독립을 선언했고, 이제 더 우리 지배는 조금씩 조금씩 더 무능에 잠기고 있습니다.
flavor_mal.9.a코0=암울한 시간이로다...
flavor_mal.10.t코0=[Root.GetName]의 옛 영광으로의 복귀
flavor_mal.10.d코1=기적처럼  [Root.GetName]의 [Root.GovernmentName]는 권력쟁취를 위한 내부 투쟁에서 살아남았고, 신민들에게 왕인 만사와 규합된 왕가에 충성할 것을 서약받았습니다. 이에 더해, [Root.GetName] [Root.GovernmentName]의 서아프리카에 있었던 영향력과 같이 옛 국경은 복원되었습니다. \n 이제 만사 무사를 뛰어넘어 국력을 신장하고 [Root.GetName]의 영향력을 확보할지는 [Root.Monarch.GetTitle] [Root.Monarch.GetName]에 달렸습니다.
flavor_mal.10.a코0=[Root.GetName]의 새로운 여명이 밝았노라!
flavor_mal.11.t코0=[Root.mal_pretender.GetName]가 [Root.Monarch.GetName]에 도전하다!
flavor_mal.11.d코0=Suleyman의 죽음 이후로, [Root.GetName]에서 왕좌를 차지하기 위한 전투는 흔한 광경이 되버렸습니다. 이에, 야심친 장군 [Root.mal_pretender.GetName]이 [Root.Monarch.GetTitle] [Root.Monarch.GetName]를 전복시키려고 움직이는 것은 놀랍지도 않을 것입니다. 그는 군대를 소집했고, 이제 [mal_pretender_province.GetName]를 공성중입니다.
flavor_mal.11.a코1=네 감히 나에게 도전을 해?
flavor_mal.14.t코0=[mal_disaster_estate_province.GetName]에서의 [Root.GetDhimmiName] 반란!
flavor_mal.14.d코1=[Root.GetDhimmiName] 은 무슬림들의 사회 계층 구별에 불만을 표시하며 지역 페티시즘 신봉자들에게 더 많은 권리를 요구합니다. 이제 그들은 [mal_disaster_estate_province.GetName]에서 반역을 시작하여 [Root.GetName]를 차지하려고 합니다!
flavor_mal.14.a코0=찍어 눌러 주마!
flavor_mal.14.b코0=그들의 소리에 귀기울여야 할지도 모른다.
flavor_mal.36.t코0=[Root.GetName]산 금의 유입
flavor_mal.36.desc코0=[Root.GetName]의 유럽내 영향력과 무역이 증가하면서, 금 무더기가 유럽시장에 도달했습니다. 많은 금광들이 채산성으로 인해 문을 닫았고, 두캇 통화량은 새로운 고점에 이르렀습니다.
flavor_mal.36.a코0=내 금을 받아주시게, 진심일세!
flavor_mal.36.a.tt코0=§YEuropean§! 국가나 속국이 통치되는 모든 금 생산 지방에서 §YClosed Mine§!' 를 §Y15§! 년동안 받습니다. 이는 다음과 같은 효과를 줍니다:\n생산효율성: §R-1000.0%§!
flavor_mal.36.a.at코0=모든 유럽 국가에서 §R+1.5§! 의 인플레이션을 받고, 이는 전체 수입과 무역수입의 비에 따릅니다.
flavor_mal.36.a.bt코0=플레이어 국가와 종속국은  §R+0.15§! 만 받게 되며, 이는 전체 수입과 무역수입의 비에 따릅니다.
