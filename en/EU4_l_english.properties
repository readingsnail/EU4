native_adm_ideasņĮö0=Native Admin Ideas
native_dip_ideasņĮö0=Native Diplomatic Ideas
native_mil_ideasņĮö0=Native Military Ideas
migrative_traditionsņĮö0=Migrative Traditions
migrative_traditions_descņĮö0=Our tradition of relocating villages when soils grow poor has led us to improve our construction methods. By harnessing those new methods and spreading them, we can greatly benefit.
clan_societiesņĮö0=Clan Societies
clan_societies_descņĮö0=If the clans within our society were each to take up a distinct role in ceremonies and everyday life, we could ensure far greater efficiency in the governing of our nation.
wampum_beltsņĮö0=Wampum Belts
wampum_belts_descņĮö0=By using images, wampum belts and art to represent our sacred rites and ceremonies, and the great events of our history, we can ensure the continuance and stability of our society.
law_of_peaceņĮö0=Law of Peace
law_of_peace_descņĮö0=By establishing rules that govern the ways of our people, and determine how conflicts between the clans are to be resolved, we can achieve more lasting peace amongst our people.
tribal_constitutionņĮö0=Tribal Constitution
tribal_constitution_descņĮö0=By developing the roles and powers of the people who govern our nation, we can greatly enhance our ability to rule ourselves.
travoisņĮö0=Travois
travois_descņĮö0=By latching pieces of wood to a platform dragged by a dog or a larger animal, we make it much easier to carry heavy burdens across great distances, even on rough and uneven terrain.
smoke_ceremoniesņĮö0=Smoke Ceremonies
smoke_ceremonies_descņĮö0=The ceremonial use of pipes and tobacco among our people is an ancient art. By using those smoke ceremonies to seal peaces and covenants, we can lend greater authority to our agreements and deals.
trade_diplomacyņĮö0=Trade Diplomacy
trade_diplomacy_descņĮö0=In our dealings with other people, we have found one constant: the language of gifts and trade is universal. Leveraging trade to make ourselves invaluable to neighbors will greatly assist our relations.
clan_migrationsņĮö0=Clan Migrations
clan_migrations_descņĮö0=The regions around us are often inhabited by disorganized and isolated tribes. By having individual clans within our greater people settle in those regions, we can expand our influence to new borders.
talking_leavesņĮö0=Talking Leaves
talking_leaves_descņĮö0=If we could develop a way to record our dealings in permanent form by use of symbols to represent sounds as others do, we could greatly develop our abilities to conduct trade and diplomacy.
warrior_societiesņĮö0=Warrior Societies
warrior_societies_descņĮö0=The establishment of prestigious societies of warriors will encourage our young men to show greater bravery on the field of battle.
raid_warfareņĮö0=Raid Warfare
raid_warfare_descņĮö0=By using swift and stealthy strikes, we can catch our enemies unguarded, and kill many of them before they have the chance to turn on us.
tribal_adoptionsņĮö0=Tribal Adoptions
tribal_adoptions_descņĮö0=To help increase our numbers, we should take captives from other tribes where we can, and then adopt them among our own numbers.
trail_networksņĮö0=Trail Networks
trail_networks_descņĮö0=By studying the lay of the land, we can know which trails our troops can safely follow and which trails they should seek to avoid, allowing us to minimize our losses.
flexible_warfareņĮö0=Flexible Warfare
flexible_warfare_descņĮö0=As we encounter new tactics and weapons among our enemies and others we encounter, we must always remain flexible so that we can integrate those in our strategies.
la_plata_nation_titleņĮö0=Form La Platan Nation
la_plata_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
haiti_nation_titleņĮö0=Form Haitian Nation
haiti_nation_descņĮö0=It is not enough to have expelled the barbarians who have bloodied our land. We must forever assure liberty in the country of our birth and take any hope of re-enslaving us away from the inhuman government that for so long kept us oppressed. In the end we must live independent or die.
colombia_nation_titleņĮö0=Form Colombian Nation
colombia_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
chile_nation_titleņĮö0=Form Chilean Nation
chile_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
canada_nation_titleņĮö0=Form Canadian Nation
canada_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
venezuela_nation_titleņĮö0=Form Venezuelan Nation
venezuela_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
usa_nation_titleņĮö0=Form American Nation
usa_nation_descņĮö0=Long have these proud colonies been subject to the greed and oppression of the European powers, but no more! The surge of liberty in the colonies has granted us an opportunity of forming a proud federation of independent states free from tyranny. The United States of America!
upca_nation_titleņĮö0=Form Central American Nation
upca_nation_descņĮö0=Our people have endured years of foreign meddling, subjugation, incursions, and our lands divided... Enough! The time has come to liberate and unite our people under one banner, and write our own destiny. We will form a liberal nation enriched by the trade passing between the Atlantic and the Pacific oceans.
quebec_nation_titleņĮö0=Form Quebecian Nation
quebec_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
peru_nation_titleņĮö0=Form Peruvian Nation
peru_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
paraguay_nation_titleņĮö0=Form Paraguayan Nation
paraguay_nation_descņĮö0=The time has come to shake off the last remains of our colonial past. We must form a proper nation and solidify our claims to this region.
mexico_nation_titleņĮö0=Form Mexican Nation
mexico_nation_descņĮö0=We must leave the last of our colonial heritage behind and reform into a proper independent state. The nation of Mexico will become the protector of all of Mesoamerica!
louisiana_nation_titleņĮö0=Form Louisianan Nation
louisiana_nation_descņĮö0=Our people have had to adopt a hardened frontier lifestyle in this great wilderness. We are now simply a different people than Europeans: a coarser, tougher breed of men, wilder, intermarrying with the Indian. Let us build on the trade and soil of these rich riverlands, and amaze the world with our rugged prowess.
brazil_nation_titleņĮö0=Form Brazilian Nation
brazil_nation_descņĮö0=The colonial masters who wished to enslave us are gone. It is time to form a truly independent country of our own. From this day forth the watchword of Brazil will be 'Independence or Death!'
heretic_toleranceņĮö0=Heretic Tolerance
desc_heretic_toleranceņĮö0=Heretic believers have been able to demand large concessions through the use of military force.
visit_of_the_four_kingsņĮö0=Visit of the Four Kings
random_event.EVTNAME20ņĮö0=The Four Kings
random_event.EVTDESC20ņĮö0=A delegation from the Five Nations of the Iroquois has made the arduous oversea journey and arrived in [Root.Capital.GetCapitalName] intending to form an alliance with us, and have unintentionally become a sensation. Our commoners wave and cheer as they ride our streets in royal carriages and our nobles compete for the privilege of entertaining these 'Four Kings' of the Mohawks.\n\nThey cast an imposing figure, much taller than our average man and they wear black breeches, vests, and stockings and over this they all wear scarlet cloaks trimmed with gold. They have dark skin, dark eyes and fantastic tattoos like we've never seen before. They do not speak our tongue, but after an exchange of gifts they had a speech read on their behalf, asking for better relations and help against our common enemies, telling us of their plight and bringing some members of our court to tears. They have made quite an impression.
random_event.EVTOPTA20ņĮö0=Give them a chain of steel representing our unbreakable bond
random_event.EVTOPTB20ņĮö0=Give them gifts but make no promises
random_event.EVTOPTC20ņĮö0=Give them nothing, these men are savages, not royalty
random_event.EVTNAME21ņĮö0=Bible Translated
random_event.EVTDESC21ņĮö0=A priest in [Root.GetCapitalName] has translated the Bible into our language, and has started to distribute copies of it to nearby villages throughout [Root.GetName].
random_event.EVTOPTA21ņĮö0=Heresy! Burn the priest and his books!
random_event.EVTOPTB21ņĮö0=Great news! Spread these Bibles far and wide
random_event.EVTNAME22ņĮö0=Establish Penal Colony in [Root.GetName]
random_event.EVTDESC22ņĮö0=Our colony in [Root.GetName] has not been progressing as quickly as we would like. One of your advisors has, however, come up with a plan to speed up growth. They are proposing that we send thieves, debtors and other criminals to [Root.GetName] and have them pay their debts to society by working to develop the colony and eventually become settlers once their sentence is done. While this plan might seem good on paper there is a chance a rebellion may occur due to having all these dangerous individuals in a single location.
random_event.EVTOPTA22ņĮö0=Sounds good, set it up
random_event.EVTOPTB22ņĮö0=We can't trust these people! Keep them in prison over here
penal_colonyņĮö0=Penal Colony
desc_penal_colonyņĮö0=In order to help the colony grown, thieves, debtors and other criminals have been sent here to pay their debts to society by working to develop it.
random_event.EVTNAME23ņĮö0=Influenza!
random_event.EVTDESC23ņĮö1=Rumors say that sailors came back from a trip sick like hell, and the ones who didn't die onboard infested the whole of [Root.GetCapitalName] with their disease. It is time to act before the whole country dies from coughing and cold sweat.
random_event.EVTOPTA23ņĮö0=Quarantine the port and let them die!
random_event.EVTOPTB23ņĮö0=This is not the first flu in our country, I don't care!
influenza_spreadsņĮö0=The influenza will eventually spread to a neighboring province...
quarantined_influenzaņĮö0=Quarantined Influenza
desc_quarantined_influenzaņĮö0=The province has been quarantined in order to stop the influenza from spreading. But the lack of help has been devastating for the province.
influenzaņĮö0=Influenza
desc_influenzaņĮö0=The province has been devastated by influenza, but efforts to ease the suffering have been made.
random_event.EVTNAME24ņĮö0=Influenza Spreads
random_event.EVTDESC24ņĮö0=Influenza has spread to [Root.GetName]! How should we handle this growing epidemic?
random_event.EVTOPTA24ņĮö0=Quarantine the province!
random_event.EVTOPTB24ņĮö0=It will soon go away
random_event.EVTNAME25ņĮö0=Iconoclastic Fury
random_event.EVTDESC25ņĮö0=During the reformation outbreaks of destruction of Catholic religious art occurred in various European countries. The most notorious example is "Beeldenstorm" in the Low Countries, but similar attacks occurred in Germany, Switzerland, England, Scotland, France and Livonia. The majority of attacks were carried out by spontaneous mobs, but in some countries the government took a leading role.
random_event.EVTOPTA25ņĮö0=Send guards to stop these vandals!
random_event.EVTOPTB25ņĮö0=We can't do anything except weather the storm!
random_event.EVTOPTC25ņĮö0=Time to take the lead and break Papal stranglehold!
stopped_iconoclastic_furyņĮö0=Stopped Iconoclastic Fury
allowed_iconoclastic_furyņĮö0=Allowed Iconoclastic Fury
iconoclastic_furyņĮö0=Iconoclastic Fury
desc_iconoclastic_furyņĮö0=The outbreaks of destruction of Catholic religious art across the country have caused many people to flee their homes and disrupted production and trade.
colonial_nation.EVTNAME300ņĮö0=Ban Fur Trade
colonial_nation.EVTDESC300ņĮö0=The people in [Root.GetName] are too friendly with the Indians. A proposal has been put forward for a ban on all private trading with Indians, including the death penalty for anyone caught teaching an Indian how to fire a gun. This new law will injure the local economy of both the Indians and the local population but will ensure our security from armed Indian raids.
colonial_nation.EVTOPTA300ņĮö0=Approve the law
colonial_nation.EVTOPTB300ņĮö0=Ignore the issue
colonial_nation.EVTNAME301ņĮö0=The Harvest of [GetYear]
colonial_nation.EVTDESC301ņĮö0=The crop harvest in [Root.GetName] has been very poor this year and the shortage of food is already felt across the colony. The prices are soaring and some predict a harsh winter might be coming. The nearby Indians have found out about our difficult situation and have volunteered some of their food supplies. What they brought isn't nearly enough to sustain us through the winter, but there must be more corn where the gift came from. Some propose that we send soldiers to the Indian villages and seize their food.
colonial_nation.EVTOPTA301ņĮö0=Take what we need
colonial_nation.EVTOPTB301ņĮö0=We will solve this ourselves
colonial_nation.EVTNAME302ņĮö0=Wage Laws for Builders
colonial_nation.EVTDESC302ņĮö0=The prices of construction are going up because skilled labor is in shortage as new colonists flowing into the colony greatly demand their services. A proposal has been put forth that a maximum wage should be set across [Root.GetName] for all carpenters, sawyers, masons and bricklayers. The price will be set at fair levels, and everyone demanding higher payment or offering to pay more for construction work would be subject to a penalty. How do we vote?
colonial_nation.EVTOPTA302ņĮö0=Vote yes, it's a sound idea
colonial_nation.EVTOPTB302ņĮö0=We don't need to regulate that
colonial_nation.EVTNAME303ņĮö0=Iron Discovered
colonial_nation.EVTDESC303ņĮö0=To sustain ourselves, [Root.Owner.GetName] must seek new sources of revenue and reduce our dependence on imports. A great opportunity has presented itself though, as bog iron ore has been discovered in [Root.GetName]! The proposition is to mandate the owner to construct a furnace and a forge and immediately begin production. In exchange the owner will be guaranteed a 10-year-long tax break to subsidize the initial cost.
colonial_nation.EVTOPTA303ņĮö0=Sounds like a good opportunity
colonial_nation.EVTOPTB303ņĮö0=No, thanks
colonial_nation.EVTNAME304ņĮö0=Domestic Wool Industry
colonial_nation.EVTDESC304ņĮö0=The dwindling profits of the colonial trade and our reliance on imported goods are starting to hurt [Root.Owner.GetName]. We must seek economic independence from imports and for that end a new proposal has been presented. By outlawing exports of sheep and ordering more wool to be produced locally we'll ensure enough warm clothes are being offered to the colonists. For this a Textile Manufactory should be started in [Root.GetName].
colonial_nation.EVTOPTA304ņĮö0=Sounds like a good opportunity
colonial_nation.EVTOPTB304ņĮö0=No, thanks
colonial_nation.EVTNAME305ņĮö0=A Wharf Needed
colonial_nation.EVTDESC305ņĮö0=If [Root.Owner.GetName] wants to become less dependent on [Root.Owner.ColonialParent.GetName] and move towards self-sufficiency, we need to be able to secure enough salt and naval supplies. A prominent citizen living in [Root.GetCapitalName] has assured us that with a little help he could construct a new Wharf in [Root.GetName]. In exchange for his investment he asks for 10 years of subsidies.
colonial_nation.EVTOPTA305ņĮö0=Sounds like a good opportunity
colonial_nation.EVTOPTB305ņĮö0=No, thanks
colonial_nation.EVTNAME306ņĮö0=Cash Crop Ban
colonial_nation.EVTDESC306ņĮö0=Unlike the founders of [Root.Owner.GetName], new settlers tend to be short-sighted and put profits ahead of securing the future existence of themselves and their families. They ignore the necessity to produce food for the colony and go straight for cash crop believing that they will be able to sell it and purchase food from other farmers. If this continues, our colony will eventually face famine and disorder. To prevent this, a law enforcing that new farmers produce food in at least a part of their fields has been suggested.
colonial_nation.EVTOPTA306ņĮö0=A law seems necessary
colonial_nation.EVTOPTB306ņĮö0=It's none of our business
colonial_nation.EVTNAME307ņĮö0=Banned Tobacco Planting
colonial_nation.EVTDESC307ņĮö0=When we first arrived here the prices of Tobacco were soaring, and the profits were immense. Now, as more farmers arrive and start their own plantations, the supply of Tobacco has quickly risen and caused the prices in Europe to drop year after year. A proposal has been made by established planters to ban the planting of Tobacco for one year, so prices have time to recover. New farmers are obviously opposing this proposal but we must do what we must do to protect our livelihoods.
colonial_nation.EVTOPTA307ņĮö0=Enforce it
colonial_nation.EVTOPTB307ņĮö0=Reject their proposal
colonial_nation.EVTNAME310ņĮö0=Colonial Border Conflict
colonial_nation.EVTDESC310ņĮö0=Settlers from another of [Root.Owner.ColonialParent.GetName]'s colonies have breached our borders! In search of resources they have expanded into land part of [Root.GetName] and gotten into conflict with the local population. This cannot be tolerated!
colonial_nation.EVTOPTA310ņĮö0=Send the local militia to drive them out!
colonial_nation.EVTOPTB310ņĮö0=Let the situation resolve itself
colonial_nation.EVTDESC311ņĮö0=In search of new land and resources, settlers from [Root.GetName] have ventured across the border into [From.GetName] which has caused conflicts with the local population there. [From.Owner.GetName] then sent their militia to drive them out, but their militia seems to have gone too far and their mission degenerated into a vengeful raid into [Root.GetName]. This cannot be tolerated!
colonial_nation.EVTOPTA311ņĮö0=Send in our local militia as well!
colonial_nation.EVTOPTB311ņĮö0=Let the situation resolve itself
colonial_nation.EVTDESC312ņĮö0=Sending our militia to drive out the competing settlers from [From.From.GetName] might have been a mistake. Encouraged by their easy success, our troops got carried away and continued into [From.GetName], raiding the border villages there. This has greatly upset [From.Owner.GetName] and they in turn sent their militia into [From.From.GetName]...
colonial_nation.EVTOPTA312ņĮö0=Damn them!
colonial_nation.EVTDESC313ņĮö0=Sigh... where to begin? It seems that settlers from [From.Owner.GetName] has ventured into [From.From.GetName] - a province of [From.From.Owner.GetName] - in search of new land and resources. [From.From.Owner.GetName] then sent their militia to drive them out, but they got overzealous and pursued the settlers back into [From.GetName], raiding and burning. The conflict then escalated when [From.Owner.GetName] sent their militia to drive out the [From.From.Owner.GetAdjective] militia and carry out raids of their own into [From.From.GetName]...\n\nThe [From.From.Owner.Monarch.GetTitle] of [From.From.Owner.GetName], [From.From.Owner.Monarch.GetName], is blaming the [From.Owner.Monarch.GetTitle] of [From.Owner.GetName], [From.Owner.Monarch.GetName], and vice versa. How do we solve this without losing face?
colonial_nation.EVTOPTA313ņĮö0=Let them sort it out themselves
colonial_nation.EVTOPTB313ņĮö0=Remove [From.From.Owner.Monarch.GetTitle] [From.From.Owner.Monarch.GetName]
colonial_nation.EVTOPTC313ņĮö0=Remove [From.Owner.Monarch.GetTitle] [From.Owner.Monarch.GetName]
colonial_nation.EVTOPTD313ņĮö0=Sort out their differences
colonial_nation.EVTDESC314ņĮö0=In the recent conflict along the border between [From.From.From.GetName] and [From.From.GetName], [From.GetName] has taken the side of [From.From.Owner.GetName]! [From.Monarch.GetTitle] [From.Monarch.GetName] has decided to blame [Root.Monarch.GetTitle] [Root.Monarch.GetName] for the incident and has dismissed [Root.Monarch.GetHerHim].
colonial_nation.EVTOPTA314ņĮö0=Who does that '[From.Monarch.GetTitle]' think [From.Monarch.GetSheHe] is?!
colonial_nation.EVTDESC315ņĮö0=In the recent conflict along the border between [From.From.From.GetName] and [From.From.GetName], [From.GetName] has taken our side! [From.Monarch.GetTitle] [From.Monarch.GetName] has decided to blame [From.From.Owner.Monarch.GetTitle] [From.From.Owner.Monarch.GetName] for the incident and has dismissed [From.From.Owner.Monarch.GetHerHim].
colonial_nation.EVTOPTA315ņĮö0=Well done!
colonial_nation.EVTDESC316ņĮö0=In the recent conflict along the border between [From.From.From.GetName] and [From.From.GetName], [From.GetName] has taken the side of [From.From.From.Owner.GetName]! [From.Monarch.GetTitle] [From.Monarch.GetName] has decided to blame [Root.Monarch.GetTitle] [Root.Monarch.GetName] for the incident and has dismissed [Root.Monarch.GetHerHim].
colonial_nation.EVTDESC317ņĮö0=In the recent conflict along the border between [From.From.From.GetName] and [From.From.GetName], [From.GetName] has taken our side! [From.Monarch.GetTitle] [From.Monarch.GetName] has decided to blame [From.From.From.Owner.Monarch.GetTitle] [From.From.From.Owner.Monarch.GetName] for the incident and has dismissed [From.From.From.Owner.Monarch.GetHerHim].
colonial_nation.EVTNAME318ņĮö0=Enhanced Colonial Militia
colonial_nation.EVTDESC318ņĮö0=The assembly has proposed that we set aside substantial resources to enhance our militia. The colony needs better protection from native attacks and raids from other colonies. It will also strengthen us if we at some point should find ourselves at war with [Root.ColonialParent.GetName].
colonial_nation.EVTOPTA318ņĮö0=Establish it
colonial_nation.EVTOPTB318ņĮö0=Don't establish it
colonial_nation.EVTNAME319ņĮö0=Purchase of Land
colonial_nation.EVTDESC319ņĮö0=Settlers in [Root.GetName] are complaining that there are still natives living in parts of the province. This land could be used more effectively if settled and cultivated. They suggest we purchase this land from the local natives.
colonial_nation.EVTOPTA319ņĮö0=Good idea
colonial_nation.EVTOPTB319ņĮö0=It's too costly
colonial_nation.EVTDESC320ņĮö0=To be able to compete with other colonies we must sustain the growth of [Root.GetName]. The natives in a neighboring province have proved willing to sell their lands to us. This seems like an ideal solution.
colonial_nation.EVTNAME321ņĮö0=Last of the Mahican
colonial_nation.EVTDESC321ņĮö0=A small group of Natives, long since pacified and now decimated by warfare and disease, are seeking to live under the protection of our colony. Though they are few, they can still be of some assistance to us with their knowledge of local ways, and are willing to help us in return for our protection of their village in [Root.GetName]. But their native enemies would look poorly on us...
colonial_nation.EVTOPTA321ņĮö0=Offer them protection
colonial_nation.EVTOPTB321ņĮö0=Deny them
colonial_nation.EVTNAME322ņĮö0=The [Root.GetName] Boys
colonial_nation.EVTDESC322ņĮö0=News of native assaults on our people along the frontiers have spread across the colony. Reasoning that all natives are somehow allied and cannot in any event be trusted, an angry armed mob has descended on the peaceful remnant of the Mahican living in [Root.GetName]. Only a handful, the very last of their people, remains, and the mob, against whom no one will testify, remains at large...
colonial_nation.EVTOPTA322ņĮö0=Protect the remnant at all cost
colonial_nation.EVTOPTB322ņĮö0=We cannot save them...
colonial_nation.EVTNAME323ņĮö0=The Last to Die
colonial_nation.EVTDESC323ņĮö0=Years ago, we granted our protection to the last remnant of the Mahican tribe. In the years since, disease and war have made further ravages, until at last only one remained - the last of his people. He was a faithful ally, guiding our people in battle and helping our colonists, but the laws of life are harsh, and now he too, has passed on. With him die not only a man, but a people and a way of life.
colonial_nation.EVTOPTA323ņĮö0=We can only mourn...
last_of_the_mahicanņĮö0=Last of the Mahican
desc_last_of_the_mahicanņĮö0=The last remnants of the Mahican tribe have found refuge in our province.
