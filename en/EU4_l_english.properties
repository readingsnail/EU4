elections.EVTNAME708ņĮö0=[Root.Monarch.GetTitle] Dies!
elections.EVTDESC708ņĮö0=The unfortunate passing of [Root.Monarch.GetName] has forced a premature election of a new [Root.Monarch.GetTitle]. Three primary candidates have been nominated...
elections.EVTNAME709ņĮö0=[Root.Monarch.GetTitle] Dies!
elections.EVTDESC709ņĮö0=Let us hope that [Root.ColonialParent.GetName] send us a good replacement...
elections.EVTOPTB709ņĮö0=Let us pray
elections.EVTNAME710ņĮö0=[From.Monarch.GetTitle] Dies!
elections.EVTDESC710ņĮö0=The [From.Monarch.GetTitle] of [From.GetName] has suddenly died. Who should we send to replace [From.Monarch.GetHerHim]?
elections.EVTNAME711ņĮö0=Colonial Assembly
elections.EVTDESC711ņĮö0=Our colony [From.GetName] has decided to form their own assembly in order to take control of tax legislation and budgets. They claim that these matters are better handled locally, but it seems suspiciously like a first step towards independence...
elections.EVTOPTB711ņĮö0=Suspicious indeed...
elections.EVTNAME712ņĮö0=Winds of Liberty
elections.EVTDESC712ņĮö0=The winds of liberty blow strong in [From.GetName]. The locally elected assembly have decided to elect their own [From.Monarch.GetTitle] from now on. Fortunately this seems to have dampened their desire for liberty. At least for the moment...
elections.EVTOPTB712ņĮö0=Most worrisome...
elections.700.dņĮö0=With $MONARCH$ being forced out of office by the revolting factions, a new [Root.Monarch.GetTitle] will have to be elected. As the votes are tallied there is an unusual excitement in the air. The three primary candidates are all acutely aware of the events that have transpired these last few days...
