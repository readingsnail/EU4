cossack_rebels_demand_descņĮö0=The Cossacks demand the right of recognition and to be able to rule themselves according to their own traditions.
particularist_rebels_demandņĮö0=Increased Autonomy
particularist_rebels_demand_descņĮö0=The Particularists are tired of being governed from a far away capital, insensitive to the local needs. They demand that we let the regions govern themselves.
nationalist_rebels_demandņĮö0=Independence for $INDEPENDENCE_COUNTRY$
nationalist_rebels_demand_descņĮö0=The Separatists demand Independence for $INDEPENDENCE_COUNTRY$. They feel that their ruler should be of $CULTURE$ culture.
