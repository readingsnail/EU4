RISE_OF_THE_OTTOMANS_DESCņĮö0=Rumors of Ottoman weakness caused Pope Eugene IV to call for a crusade against them in 1443. With the West still embroiled in the Hundred Years War, the King of Hungary and Poland, Wladyslav III, took on the cause to finally expel the scourge of Christendom from Europe. Led by general John Hunyadi, The White Knight, the Hungarian army saw some initial success, but was ultimately defeated. The abdicated Sultan Murad II came back to aid his son and led the Ottoman army to victory at the battle of Varna where King Wladyslav was killed. Peace was eventually signed but the way for further Ottoman expansion into Eastern Europe now lay open...
