ban_fur_tradeņĮö0=Ban Fur Trade
desc_ban_fur_tradeņĮö0=This law hurts the local economy of both the Indians and the whites but will ensure our security from armed Indian raids.
construction_wagesņĮö0=Construction Wages
desc_construction_wagesņĮö0=To keep escalating prices down, a maximum wage for construction has been put into place.
tax_break_oreņĮö0=Tax Break
