elections.EVTOPTB702ņĮö0=Ask them to send a new [Root.Monarch.GetTitle]
elections.EVTNAME703ņĮö0=New [From.Monarch.GetTitle] in [From.GetName]?
elections.EVTDESC703ņĮö0=The term is up for [From.Monarch.GetTitle] [From.Monarch.GetName]. Should we trust him with another term as [From.Monarch.GetTitle] in [From.GetName], or should we pick someone else?\n\nRepresentatives from [From.GetName] have asked us to keep [From.Monarch.GetName].
