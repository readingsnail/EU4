demand_governor_election_titleņĮö0=Demand [Root.Monarch.GetTitle] Election
demand_governor_election_descņĮö0=Demand the right for the locally elected assembly to elect their own [Root.Monarch.GetTitle].
form_colonial_assembly_titleņĮö0=Form Colonial Assembly
form_colonial_assembly_descņĮö0=It is time to move the control and responsibility for taxes and government budgets from the Old World into the colonies. Members will be elected annually and all propertied citizens will be eligible.
colonial_assemblyņĮö0=Colonial Assembly
desc_colonial_assemblyņĮö0=Much of the legislative power over taxes and governmental budgets has been moved into the colonies.
