north_american_descņĮö0=With the North American technology group, technology levels are 250% more expensive (350%).
mesoamerican_descņĮö0=With the Mesoamerican technology group, technology levels are 150% more expensive (250%).
south_american_descņĮö0=With the South American technology group, technology levels are 250% more expensive (350%).
mesoamerican_spearmenņĮö0=Mesoamerican Spearmen
mesoamerican_spearmenDESCRņĮö0=The basic unit of armies of Mesoamerica. They were usually a peasant levy led by aristocratic officers and armed with spear and shield. This unit formed the backbone of the armies of states like the Aztec Empire.
south_american_forest_warfareņĮö0=South American Forest Warriors
south_american_forest_warfareDESCRņĮö0=The forest warrior continued to improve as new technologies and tactics became available. Retaining its balance between attack and defense it continued to improve in both areas.
incan_slingshotsņĮö0=Incan Slingshots
incan_slingshotsDESCRņĮö0=The Incan Slingshots used their deadly missile weapons at relatively close range, where their accuracy and impact could be deadly. The use of a sling or huaraca was common knowledge in large parts of South America as children often spent many hours perfecting their skills killing birds.
incan_axemenņĮö0=Incan Axemen
incan_axemenDESCRņĮö0=The Incan Axemen supplemented the missile troops, using a variety of weapons from small hand axes called champis, to ones with shafts as long as a halberd.
south_american_reformed_gunpowder_warfareņĮö0=Reformed American Musketeers
south_american_reformed_gunpowder_warfareDESCRņĮö0=With the arrival of the Europeans to the Americas, gunpowder weapons came to be known by the local population. The advantages became apparent and it was only a matter of time before units carrying muskets appeared. The Reformed musketeer was an attempt to combine the new technology with the ferocity of ancient tribal warfare. This unit is strongest in offense, but the new gunpowder weapons also give it weight in defense.
south_american_arquebusierņĮö0=South American Arquebusier
south_american_arquebusierDESCRņĮö0=The South American Arquebusier takes advantage of its weapon's lighter weight and increased maneuverability. What it loses in offensive shock it gains in keeping up a steady fire in defensive action.
westernized_incanņĮö0=Westernized Incan Infantry
westernized_incanDESCRņĮö0=The Westernized Incan infantry were the successors of the mountain warriors of earlier eras. Western training and equipment has improved these units in all departments.
reformed_westernized_incanņĮö0=Reformed Westernized Incan Infantry
reformed_westernized_incanDESCRņĮö0=The Reformed Westernized Incan infantry used the new gunpowder technology and training to assume a more defensive role.
incan_guerilla_warfareņĮö0=Incan Guerrilla
incan_guerilla_warfareDESCRņĮö0=The Incan Guerrilla used the terrain to its maximum advantage. Although they do not do a lot of damage to the opposition, it can take a long time to wear down these units.
colonial_governmentņĮö0=Colonial Government
colonial_government_descņĮö0=A provincial government set to handle the affairs of the New World colonies, led by a Governor or Viceroy.
colonial_government_legacyņĮö0=Colonial Government
colonial_government_legacy_descņĮö0=A provincial government set to handle the affairs of the New World colonies, led by a Governor or Viceroy.
