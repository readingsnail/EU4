INFANTRY_DESCņĮö0=The backbone of any army, the humble infantryman has marched since time immemorial. The bedrock of your army that sets the platform for your other arms to fight, and first in the breech when a fortress is stormed.
CAVALRY_DESCņĮö0=With the owning and maintaining of a horse being an expensive undertaking, the mounted warrior is the elite of any army. The speed of the horse gives this soldier greater mobility on the battlefield, while only the most disciplined soldiers can stand in the face of the cavalry charge.
ARTILLERY_DESCņĮö0=Artillery is quite specifically gunpowder cannon, in its primitive form are at their most effective in a siege situation. The evolution of the cannon will see it become a destructive weapon on the battlefield.
TRANSPORT_DESCņĮö0=Everyone knows that soldiers simply cannot magically turn into boats, the transport ship is a vessel specially built to move armies from A to B on the High Seas.
GALLEY_DESCņĮö0=The shallow draft of the Galley gives it poor sea keeping on the high seas, but in enclosed waters the oar powered Galley is the prime warship.
LIGHT_SHIP_DESCņĮö0=Small, fast and maneuverable, the light ship excels in the role of commerce defense. Wherever your light ships go, merchants who fly your flag will feel safe.
HEAVY_SHIP_DESCņĮö0=With the exception of closed waters like the Mediterranean the man 'o war or the ship of the line is the prime combat vessel.
GENERAL_DESCņĮö0=Either through distinguishing himself in combat, proving himself as a leader or simply knowing the right people, this man has proven himself to have what it takes to lead one of your armies into battle.
ADMIRAL_DESCņĮö0=Far away from the land and any other source of authority, this man is almost like a God for his sailors, at least for as long as they are alive. This man commands your fleets to glory.
CONQUISTADOR_DESCņĮö0=A man of adventure, who will lead bands off into the unknown, the Conquistador will lead armies where few dare to venture.
EXPLORER_DESCņĮö0=The vast oceans are daunting to sail at the best of times, but to sail Oceans that are unknown to us takes a special breed of man. The Explorer is such a man, cut from a different cloth. He will sail where none other would go.
