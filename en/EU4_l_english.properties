banned_tobacco_plantingņĮö0=Banned Tobacco Planting
desc_banned_tobacco_plantingņĮö0=The planting of tobacco has been banned for a year in order to enable prices to increase.
reformed_events.EVTNAME1ņĮö0=Reformed Refugees
reformed_events.EVTDESC1ņĮö0=One of our neighbors is ruthlessly oppressing their minority of Reformed followers. These poor souls wish to escape the persecution and settle in our border province [Root.GetName]. Allowing this would benefit our economy but greatly upset our neighbor...
reformed_events.EVTOPTA1ņĮö0=Let them across
reformed_events.EVTOPTB1ņĮö0=We better not
reformed_events.EVTNAME2ņĮö0=Reformed Followers Flee
reformed_events.EVTDESC2ņĮö0=Many Reformed heretics in [Root.GetName] have fled across the border hoping to find a safe haven in [From.GetName]. Allegedly, this was carried out with the tacit sanction of the government of [From.Owner.GetName].
reformed_events.EVTOPTA2ņĮö0=How dare they!
reformed_events.EVTNAME3ņĮö0=Sending Ministers Abroad
reformed_events.EVTDESC3ņĮö0=Many within the church are of the opinion that we, as a leading Reformed nation, should send our ministers abroad to ensure that the true reformation continues to spread.
reformed_events.EVTOPTA3ņĮö0=For the glory of God!
reformed_events.EVTOPTB3ņĮö0=Keep it within our borders
reformed_events.EVTNAME4ņĮö0=Foreign Ministers in [Root.GetName]
reformed_events.EVTDESC4ņĮö0=There are reports of ministers preaching the Reformed faith have turned up in [Root.GetName]. They appear to come from [From.GetName] in order to encourage the local population to resist and fight back against our attempts to root out this heresy.
reformed_events.EVTOPTA4ņĮö0=Outrages!
reformed_events.EVTNAME5ņĮö0=Predestination
reformed_events.EVTDESC5ņĮö0=Reformed theologians believe that only those who are predestined to be saved can be saved. But since it is impossible to know who is predestined, a notion has developed that it might be possible to discern that a person is predestined by observing their way of life. As hard work, frugality, social success and wealth are thought to be important consequences of being predestined, it seems to inspire followers of the Reformed faith to strive for reaching them, as well as attracting those who already possess them - like burghers and merchants.
reformed_events.EVTOPTA5ņĮö0=Encourage these believes
reformed_events.EVTOPTB5ņĮö0=Leave it be
reformed_events.EVTNAME6ņĮö0=Instruments in Church
reformed_events.EVTDESC6ņĮö0=Leading theologists are of the opinion that music shouldn't be used in religious sermons. They believe that it distracts people from the matter of importance - worship and seeking knowledge of God - and thus favor the ban of musical instruments in churches.
reformed_events.EVTOPTA6ņĮö0=Issue a ban
reformed_events.EVTOPTB6ņĮö0=Ignore their opinions
reformed_events.EVTNAME7ņĮö0=Iconoclastic Fury
reformed_events.EVTDESC7ņĮö0=[Root.GetName] has seen outbreaks of religious violence as mobs of Reformed followers vandalize churches and destroy Catholic religious art. The Catholic majority in [Root.GetName] demand that the government immediately take action.
reformed_events.EVTOPTA7ņĮö0=Send troops to stop it!
reformed_events.EVTOPTB7ņĮö0=Encourage it!
religious_persecutionņĮö0=Religious Persecution
desc_religious_persecutionņĮö0=Religious persecution of the Reformed minority has led to many of them fleeing across the border in hope of finding a safe haven.
accepted_reformed_refugeesņĮö0=Accepted Reformed Refugees
foreign_reformed_ministersņĮö0=Foreign Reformed Ministers
desc_foreign_reformed_ministersņĮö0=A neighboring country has sent ministers to the province to ensure that the Reformed faith continues to spread.
sent_reformed_ministersņĮö0=Sent Reformed Ministers
reformed_work_ethicņĮö0=Reformed Work Ethic
desc_reformed_work_ethicņĮö0=Hard work, social success and wealth are considered consequences of being predestined, and so inspire people to reach those goals.
banned_musical_instruments_in_churchņĮö0=Banned Musical Instruments in Church
desc_banned_musical_instruments_in_churchņĮö0=As to not distract people from the matters at hand during sermons, musical instruments have been banned in churches.
