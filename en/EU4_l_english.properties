elections.EVTNAME705ņĮö0=[Root.Monarch.GetTitle] Stays!
elections.EVTDESC705ņĮö0=[From.GetName], in all their wisdom, have chosen to extend the appointment of [Root.Monarch.GetName] as [Root.Monarch.GetTitle] for another term.
elections.EVTOPTA705ņĮö0=Excellent!
elections.EVTOPTB705ņĮö0=Damn them!
elections.EVTNAME706ņĮö0=A New [Root.Monarch.GetTitle] Arrives!
elections.EVTDESC706ņĮö0=[From.GetName], in all their wisdom, have chosen to recall [Root.Monarch.GetName] and appoint a new [Root.Monarch.GetTitle] in [Root.Monarch.GetHerHis] place.
elections.EVTOPTA706ņĮö0=Excellent!
elections.EVTOPTB706ņĮö0=Damn them!
