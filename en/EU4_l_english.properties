patriot_rebels_demand_descņĮö0=The Patriots despise our unjust occupation and yearn to return to their native land of $DEFECT_COUNTRY$
colonial_rebels_demandņĮö0=Independence for $INDEPENDENCE_COUNTRY$
colonial_rebels_demand_descņĮö0=The Colonials resent sending the tea leaves of their labor overseas and demand their independence!
colonial_patriot_rebels_demandņĮö0=Defect to $DEFECT_COUNTRY$
colonial_patriot_rebels_demand_descņĮö0=The Colonials feel they don't get representation for their taxes and demand we let them join $DEFECT_COUNTRY$.
revolutionary_rebels_demandņĮö0=Overthrow the Government
revolutionary_rebels_demand_descņĮö0=The revolutionaries resent our present, in their opinion, oppressive government and demand a $GOVERNMENT$.
noble_rebels_demandņĮö0=Increased Privileges
noble_rebels_demand_descņĮö0=The nobles demand we go back to the old ways, where mounted cavaliers ruled estates of subservient peasants. They demand an end to this country of Merchants and Peasants.
religious_rebels_demandņĮö0=Convert $COUNTRYNAME$
religious_rebels_demand_descņĮö0=The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace.
heretic_rebels_demandņĮö0=Acceptance for $HERETIC_RELIGION$
