arctic_descņĮö0=Arctic terrain represents the snow and ice-covered areas close to the North Pole.
forest_descņĮö0=Forest terrain represents areas of conifer forest with high density of trees and underbrush.
hills_descņĮö0=Hills terrain represents areas dominated by a rolling landscape of shifting elevation that are lower and less steep than mountains. Unlike the highland terrain hills represent areas with a higher density of trees and underbrush.
woods_descņĮö0=Woods terrain represents areas of broadleaf forest with high density of trees and underbrush.
mountain_descņĮö0=Mountain terrain represents areas mainly occupied by rugged mountain ranges and narrow passes, often on high altitude and in cold climate.
desert_mountain_descņĮö0=Desert Mountains terrain represents areas rugged mountain ranges and narrow passes that are surrounded by deserts.
impassable_mountains_descņĮö0=Impassable Mountains terrain represents areas of mountains too inhospitable or too difficult for an army to maneuver in.
grasslands_descņĮö0=Grasslands terrain represents areas of farmland where the vegetation is dominated by grass.
plains_descņĮö0=Plains terrain represents large areas of flat or rolling treeless land.
jungle_descņĮö0=Jungle terrain represents areas overgrown with dense tropical vegetation, difficult for an army to maneuver in.
marsh_descņĮö0=Marsh terrain represents tracts of wetland dominated by grasses or low-growing shrubs.
desert_descņĮö0=Desert terrain represents desolate and arid areas with little or no vegetation, often in a very warm climate.
coastal_desert_descņĮö0=Coastal Desert terrain represents areas where the desert meets the ocean, resulting in a milder and less inhospitable climate.
coastline_descņĮö0=Coastline terrain represents the narrow areas where land and sea meet, comprised of cliffs or sand dunes.
farmlands_descņĮö0=Farmlands terrain represents highly cultivated areas where the landscape is dominated by agriculture and towns or villages.
glacierņĮö0=Glacial
glacier_descņĮö0=The Glacial terrain represents areas with very harsh and cold conditions often with permanent snow coverage and glaciers. Areas with Glacial terrain are very inhospitable for human settlement or military maneuvers.
drylands_descņĮö0=Drylands represents large areas of dry, flat or rolling treeless land.
steppe_descņĮö0=Steppes terrain represents large and continuous open areas covered in grass that are suitable for grazing yet unsuitable for agriculture. 
savannah_descņĮö0=Savanna terrain represents large grass-covered areas with a high degree of trees mixed in.
highlands_descņĮö0=Highlands terrain represents areas dominated by a rolling landscape of shifting elevation that are lower and less steep than mountains. Unlike the hills terrain highlands represent areas with a low density of trees and underbrush.
