elections.EVTNAME702ņĮö0=New [Root.Monarch.GetTitle] in [Root.GetName]?
elections.EVTDESC702ņĮö0=The term is up for [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Should we ask [Root.ColonialParent.GetName] to extend his appointment for another term, or should we ask them to send a new [Root.Monarch.GetTitle]?
