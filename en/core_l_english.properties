MAPMODE_TERRAIN_DESCņĮö0=Displays terrain. This is especially important when deciding where you want to engage in combat. Stripes indicate provinces with a controller that is not the owner.
MAPMODE_POLITICAL_DESCņĮö0=Each nation is colored with its specific nation color. Stripes indicate provinces with a controller that is not the owner.
MAPMODE_RELIGION_DESCņĮö0=Displays the religion groups on the map. Stripes indicate provinces with a different religion than their state religion.
MAPMODE_EMPIRE_DESCņĮö0=Colors the provinces that are part of the Holy Roman Empire.\nPurple belongs to the Emperor, brown belongs to an Elector, and blue belongs to a Free City. Green provinces are simply part of the Empire.\nYellow-striped provinces are part of the Empire, but their Owner is not.\nOrange-striped provinces are part of the Empire, but they are subject of a non-Empire overlord.\n
MAPMODE_TRADE_DESCņĮö0=Colors the provinces according to the trade node they belong to. Checkers indicate provinces which are NOT in trade range.
MAPMODE_DIPLOMACY_DESCņĮö0=Colors the provinces according to their owner's diplomatic relations towards the selected country. Stripes indicate if the selected country has a core on it.
MAPMODE_ECONOMY_DESCņĮö0=Colors the provinces according to development.
MAPMODE_MANPOWER_DESCņĮö0=Colors the provinces according to the amount of manpower. Red indicates little manpower, yellow indicates medium manpower, and green indicates high amounts of manpower.
MAPMODE_FORTLEVEL_DESCņĮö2=Colors the provinces according to diplomatic status with fort owners. Green provinces indicate friendly forts, red provinces indicate enemy forts and purple provinces indicate neutral forts. Higher level forts are darker blue.
MAPMODE_TECH_COST_DESCņĮö0=Colors the provinces according to technology levels. The green provinces indicate a higher level of technology, orange provinces indicate a lower level of technology than yellow provinces. The red provinces indicate the lowest levels of technology.
MAPMODE_TRADE_VALUE_DESCņĮö0=Colors the provinces according to the value of trade. Blue color indicates gold provinces, light red a low trade value, dark red a slightly higher trade value, yellow indicates a high trade value and green indicates a very high trade value.
MAPMODE_SUPPLY_LIMIT_DESCņĮö0=Colors the provinces according to supply limit. \nIf no army is selected, red indicates a low supply limit, yellow indicates medium supply limit and green indicates a high supply limit. \nWhen an army is selected, provinces which cannot support the selected army are red, while those that can are green. A province that can just barely support the selected army is colored yellow.
MAPMODE_BUILDINGS_DESCņĮö0=Colors the provinces according to how many buildings can be built in the provinces. Light green indicates that more buildings can be built, dark green indicates fewer buildings to be built. A province with blue stripes has a unique building.
MAPMODE_MISSIONARY_DESCņĮö0=Colors the provinces according to whether they can be converted into the state religion. Green indicates a province which has another religion than the state religion, blue indicates a province being converted and gray indicates that the province already has the state religion.
MAPMODE_REGION_DESCņĮö0=Colors the provinces according to which region they belong to. Hovering over any province will reveal which area, region and continent it belongs to.
MAPMODE_AREAS_DESCņĮö0=Colors the provinces according to which area they belong to. Hovering over any province will reveal which area, region and continent it belongs to.
MAPMODE_SUPER_REGION_DESCņĮö0=Colors the provinces according to which subcontinent they belong to. Hovering over any province will reveal which area, region, subcontinent and continent it belongs to.
MAPMODE_VICTORYCARDS_DESCņĮö0=Colors the provinces according to which victory card they belong to (if any). Hovering over any province with a card will reveal the score for that card.
MAPMODE_CULTURE_DESCņĮö0=Colors the provinces according to the various cultures and displays the names of those cultures.
MAPMODE_OPINION_DESCņĮö0=Colors the provinces according to their owner's opinion towards the selected country.
MAPMODE_COALITION_DESCņĮö1=Colors the provinces according to their owner's opinion about the selected country's Aggressive Expansion. If their opinion about the selected country's Aggressive Expansion is below -50 and their general opinion is below 0, they are able to join a coalition and their color scale is amber-red. If their opinion about the selected country's Aggressive Expansion is below -50 but their general opinion is above 0, their colour scale is green-amber. Otherwise, their colour scale is grey-green. If the country is red, they are in a coalition against you.
MAPMODE_TRUCE_DESCņĮö1=Colors the provinces according to truces between the owner and the selected country. The scale is between dark red and yellow. If the country is grey, there is no truce. Green stripes indicate that the selected country has a casus belli on it.
MAPMODE_UNREST_DESCņĮö0=Colors the provinces according to unrest. Red indicates provinces with high unrest, yellow indicates medium unrest, and green indicates a low or no unrest. Stripes indicate a province controlled by rebels.
MAPMODE_COLONIAL_DESCņĮö0=Colors the provinces according to colonial range and colonial availability. Green indicates provinces that are not colonized and can be colonized, red indicates provinces which are too far away to colonize, blue indicates provinces being colonized and the darker the blue, the more progress has been made. Gray indicates already colonized provinces or cities.
MAPMODE_RIVALS_DESCņĮö0=Colors the provinces which are owned by countries you have set as rival or that have set you as a rival.
MAPMODE_REBELTYPES_DESCņĮö0=Colors the provinces according to what type of rebel factions there are in your country.
MAPMODE_GOVERNMENT_DESCņĮö0=Colors the provinces so that different types of government show in distinct colors.
MAPMODE_OVERSEAS_DESCņĮö0=Colors the provinces that count as overseas in red, while non-overseas provinces are colored green.
MAPMODE_PLAYERS_DESCņĮö0=Colors the provinces according to the players and shows the players' names above their played countries.
MAPMODE_CLIMATE_DESCņĮö0=Colors the provinces according to their climate, depicting arid, arctic & tropical provinces.
MAPMODE_WEATHER_DESCņĮö0=Colors the provinces according to what type of weather they are usually experiencing.
MAPMODE_TRADE_GOODS_DESCņĮö0=Shows what trade goods are produced in what province.
MAPMODE_FEDERATIONS_DESCņĮö0=Shows the Federations that exist in the world.
MAPMODE_LOCAL_AUTONOMY_DESCņĮö0=The greener the province is, the closer to 0% the Local Autonomy is. The redder the province is, the closer to 100% the Local Autonomy is.
MAPMODE_ACCEPTEDCULTURES_DESCņĮö0=Colors the provinces according to the accepted cultures and displays the names of those cultures. Primary culture is light green, accepted cultures are dark green, cultures in the same group as your primary culture are yellow, and non-accepted cultures are red. If you are converting a non-accepted culture it will show as orange instead of red.
MAPMODE_SIMPLE_TERRAIN_DESCņĮö0=Displays terrain. Each color represents a certain terrain type. A blue border means that armies crossing that border will get a crossing penalty. Stripes indicate provinces with a controller that is not the owner.
MAPMODE_PATRIARCHS_DESCņĮö1=This displays states with Consecrated Metropolitans. Yellow states have a Metropolitan, green states can be assigned one, and red states cannot have a Metropolitan.
MAPMODE_DEVASTATION_DESCņĮö1=Displays how devastated provinces are. The brighter red, the more devastated the province is, while gray has no devastation.
MAPMODE_DYNASTYņĮö0=Dynastic
MAPMODE_DYNASTY_DESCņĮö0=Colors the provinces according to the ruling dynasties and displays the names of those dynasties.
MAPMODE_TRADE_LEAGUESņĮö0=Trade Leagues
MAPMODE_TRADE_LEAGUES_DESCņĮö0=Colors provinces by the Trade League they belong to. If you are a Trade League Leader yourself, it also shows what countries can join your Trade League and whether they would want to.
MAPMODE_GREAT_POWERSņĮö0=Great Powers
MAPMODE_GREAT_POWERS_DESCņĮö0=Colors provinces by the Great Power status they currently have. The Great Powers are colored in their own country colors, while all the other countries are grayed out. Countries who are losing their Great Power status are striped.
MAPMODE_LOOTņĮö0=Loot
MAPMODE_LOOT_DESCņĮö0=Colors provinces belonging to countries that you are at war with, according to how much loot is remaining.
MAPMODE_STATES_TERRITORIESņĮö0=States and Territories
MAPMODE_STATES_TERRITORIES_DESCņĮö0=Colors provinces that belong to States in green, and provinces that belong to Territories in yellow. The capital State is colored bright green.
MAPMODE_STATES_EDICTSņĮö0=State Edicts
MAPMODE_STATES_EDICTS_DESCņĮö0=Color provinces depending on which Edict they currently have.
