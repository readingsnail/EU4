human_descņĮö0=The ┬¦Y$ADJ$┬¦! ruler is a Human player.
ai_capitalist_descņĮö0=The ┬¦Y$ADJ$┬¦! ruler is an Administrator. They will seek to improve their economy by any means available, but are less prone towards war unless it furthers their trade interests.
ai_diplomat_descņĮö0=The ┬¦Y$ADJ$┬¦! ruler is a Diplomat. They will seek out powerful friends and attempt to expand diplomatically, but are far less likely to go to war unless they are reclaiming lost territory.
ai_militarist_descņĮö0=The ┬¦Y$ADJ$┬¦! ruler is a Militarist. They will seek to expand aggressively at the expense of their neighbors and are far more likely to go to war.
ai_balanced_descņĮö0=The ┬¦Y$ADJ$┬¦! ruler has a Balanced personality. They will try to strike a balance between war, diplomacy and trade, and cannot be counted on to behave in any one particular way.
ai_colonialist_descņĮö0=The ┬¦Y$ADJ$┬¦! ruler is a Colonialist. Their interests lie in overseas expansion and they will prefer to maintain good relations with their neighbors at home.
