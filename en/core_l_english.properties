attitude_unknown_descņĮö0=┬¦Y$COUNTRY$┬¦! has no knowledge of ┬¦Y$TARGET$┬¦!.
attitude_human_descņĮö0=┬¦Y$COUNTRY$┬¦! is a Human player. Their attitude towards ┬¦Y$TARGET$┬¦! is entirely up to them.
attitude_hostile_descņĮö1=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! with open hostility due to their ambitions to conquer some or all of their provinces. Diplomacy with a hostile nation is almost always futile.
attitude_rivalry_descņĮö0=┬¦Y$COUNTRY$┬¦! have made ┬¦Y$TARGET$┬¦! their rival and seek to excel them in all things. Countries tend to choose nearby nations of similar strength to be their rivals. Diplomacy with a rival country is almost always futile.
attitude_defensive_descņĮö1=┬¦Y$COUNTRY$┬¦! view ┬¦Y$TARGET$┬¦! as their ally in a Defensive alliance. They are unlikely to join in any wars of aggression started by them.
attitude_outraged_descņĮö0=┬¦Y$COUNTRY$┬¦! view ┬¦Y$TARGET$┬¦! as an aggressive conqueror and seek to cut them down to size. They may form the backbone of a coalition against them.
attitude_friendly_descņĮö1=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as a natural ally against other nations who threaten them. They are likely to seek an alliance with them.
attitude_protective_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as a part of their sphere of influence and will seek to protect them from aggressors by guaranteeing them or making them their vassal.
attitude_overlord_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as their subject nation.
attitude_loyal_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as their suzerain overlord.
attitude_disloyal_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as an oppressive overlord. They are not likely to offer much help in wars.
attitude_rebellious_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as an unjust tyrant. They are likely to declare an independence war.
attitude_domineering_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as their future subject and will not be shy about declaring war to force them into vassalage.
attitude_threatened_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as a threat to their independence. They will seek to ally them for their own safety, but may seek strong allies elsewhere if this fails.
attitude_neutral_descņĮö1=┬¦Y$COUNTRY$┬¦! has no particular view of ┬¦Y$TARGET$┬¦! either due to distance or lack of shared interests. Diplomacy with a neutral nation is slightly more difficult.
attitude_allied_descņĮö0=┬¦Y$COUNTRY$┬¦! views ┬¦Y$TARGET$┬¦! as a valuable ally.
WAR_ENTHUSIASM_HIGHņĮö0=┬¦GHigh┬¦!
