LANDING_dlc016_FLAVOR_TEXTмЅ”0=This unit pack includes new unit graphics for English and French units stationed in the New World.
LANDING_dlc017_TEXTмЅ”0=Main Features:\n- 21 new advisor portraits added for Muslim countries
LANDING_dlc017_FLAVOR_TEXTмЅ”0=Enjoy an enhanced experience as a Muslim country with the Muslim Advisor Portraits pack. This pack adds 21 new advisor portraits to the game, adding to a distinctive look and feel for those playing as Muslim countries.
