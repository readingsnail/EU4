LANDING_dlc020_FLAVOR_TEXTмЅ”0=Enhance your Europa Universalis IV experience with the Trade Nations Unit Pack. This content pack adds unique unit graphics for Aragon, Genoa, LГјbeck, and Novgorod.
LANDING_dlc024_TEXTмЅ”0=Main Features:\n- 12 new unit models for Bengal, Vijayanagar, and for Hindu and Muslim nations in India
LANDING_dlc024_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with unique unit models for nations in India, including Bengal and Vijayanagar.
