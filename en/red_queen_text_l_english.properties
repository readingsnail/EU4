LANDING_dlc013_FLAVOR_TEXTмЅ”1=This music pack contains 3 tracks composed by Andreas Waldetoft for nearly 11 minutes of additional music, meant to enhance the New World experience.
LANDING_dlc014_TEXTмЅ”0=Main Features:\n- 1 special track that plays during the month of December to add some festive cheer
LANDING_dlc014_FLAVOR_TEXTмЅ”0=This music pack provides one special track composed by Andreas Waldetoft, based on 'Deck the Halls' and 'Joy to the World'.
LANDING_dlc015_TEXTмЅ”0=Main Features:\n- 10 new unit models for Native American nations, including Fox, Navajo and Ojibwe
