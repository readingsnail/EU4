LANDING_dlc063_FLAVOR_TEXTмЅ”0=The Songs of Regency music pack introduces four new songs unique to the Rights of Man experience. Composed by and produced by talented Yannick SГјГџ and Robin Birner (Audinity).
LANDING_dlc064_TEXTмЅ”0=Main Features:\n- 15 tracks when playing as a Scandinavian nation
LANDING_dlc064_FLAVOR_TEXTмЅ”2=Play as a Scandinavian superpower and let the music of your people become the anthem of the world with this collection of traditional Swedish songs from the 18th Century.\n\n15 songs from Fredman's Epistles, composed by Swedish poet and songwriter Carl Michael Bellman, have been arranged by composer Tobias Gustavsson and performed by Mikael Samuelson, Swedish singer and actor.
LANDING_dlc065_TEXTмЅ”0=Main Features:\n- 15 tracks when playing as a Scandinavian nation
LANDING_dlc065_FLAVOR_TEXTмЅ”2=Play as a Scandinavian superpower and let the music of your people become the anthem of the world with this collection of traditional Swedish songs from the 18th Century.\n\n15 songs from Fredman's Epistles, composed by Swedish poet and songwriter Carl Michael Bellman, have been arranged by composer Tobias Gustavsson and performed by Mikael Samuelson, Swedish singer and actor.
LANDING_dlc067_TEXTмЅ”0=Main Features:\n- 12 new tier 1 unit models for Japanese daimyos, including Date, Imagawa, and Uesugi
LANDING_dlc067_FLAVOR_TEXTмЅ”0=The armies of the east get a shiny new look in the new Content Pack for Europa Universalis IV: Mandate of Heaven. ParadoxвЂ™s artists have dipped into their history books for a fresh take on the uniforms and weaponry of China, Japan and their neighbors during the early modern era.\n\nThis unit pack adds 12 new tier 1 unit models for some of the great daimyo realms of Japan.
LANDING_dlc068_TEXTмЅ”0=Main Features:\n- 16 new unit models for Japan, Korea, Ming and Qing
