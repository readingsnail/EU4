LANDING_dlc025_FLAVOR_TEXTмЅ”0=These ships will enhance the visual appeal of Europa Universalis IV.
LANDING_dlc026_TEXTмЅ”0=Main Features:\n- 5 new tracks
LANDING_dlc026_FLAVOR_TEXTмЅ”0=We have recorded new sessions with an orchestra, and this Music Pack now adds that music to enhance the Europa Universalis IV soundtrack.\n\nThe new tracks, totaling about 26 minutes of music masterfully composed by Andreas Waldetoft, are partly remixes from EU2, and partly new and original works.
LANDING_dlc028_TEXTмЅ”0=Main Features:\n- 12 new tier 2 unit models for European states, including the Netherlands, France, England, and Hesse
LANDING_dlc028_FLAVOR_TEXTмЅ”0=This unit pack adds distinctive visual flavor to the European Reformation and Thirty Years War by adding unique unit models for Western and Central European states that were historically at the center of these conflicts.
LANDING_dlc029_TEXTмЅ”0=Main Features:\n- 12 new tier 2 unit models for European states, including Spain, the Papal State, Austria, and Ulm
LANDING_dlc029_FLAVOR_TEXTмЅ”0=This unit pack adds distinctive visual flavor to the European Reformation and Thirty Years War by adding unique unit models for Western and Central European states that were historically at the center of these conflicts.
LANDING_dlc030_TEXTмЅ”0=Main Features:\n- 5 tracks that play during wartime
LANDING_dlc030_FLAVOR_TEXTмЅ”0=We have recorded new sessions with an orchestra, and this Music Pack now adds that music to enhance the Europa Universalis IV soundtrack.\n\nThe new tracks, totaling about 29 minutes of music masterfully composed by Andreas Waldetoft, are partially remixes of EU2 tracks, and partially new and original.
LANDING_dlc031_TEXTмЅ”1=Main Features:\n- 5 new tracks, including one metal remix of the intro theme and 4 tracks that will play during wartime
LANDING_dlc031_FLAVOR_TEXTмЅ”0=This music pack features tracks composed by Tobias Gustafsson, enhancing the game with metal remixes of some of the game's most prominent tracks.
LANDING_dlc034_TEXTмЅ”0=Main Features:\n- 12 new unit models for South American and Andean natives, including Inca, Mapuche, and Tupinamba
LANDING_dlc034_FLAVOR_TEXTмЅ”0=This unit pack enhances the visual diversity of several South American native nations' units, including the Inca, Mapuche and Tupinamba.
LANDING_dlc035_TEXTмЅ”0=Main Features:\n- 12 new unit models for Mesoamerican natives, including Aztec, Maya, and Mixtec
LANDING_dlc035_FLAVOR_TEXTмЅ”0=This unit pack adds unique unit models for several Mesoamerican native nations, including the Aztec, Maya and Mixtec.
LANDING_dlc036_TEXTмЅ”0=Main Features:\n- 5 new tracks that play during peacetime while colonizing
LANDING_dlc036_FLAVOR_TEXTмЅ”0=This music pack adds five new songs, inspired by the Age of Exploration. These new songs will play during peacetime as colonies are established in the newly discovered lands.
LANDING_dlc037_TEXTмЅ”0=Main Features:\n- 5 new metal remixes
LANDING_dlc037_FLAVOR_TEXTмЅ”2=Europa Universalis IV: Guns, Drums and Steel Volume 2 is the second installment of metal inspired remixes featuring music from the Europa Universalis franchise. This volume includes five remixed songs that up the tempo and crank up the bass.\n\nThe new metal tracks are based on music from Europa Universalis IV.
LANDING_dlc038_TEXTмЅ”1=Main Features:\n- Focuses on important women throughout history, through the addition of:\n- 100 new historical and dynamic events\n- 4 themed event pictures\n- 22 generic female advisor portraits
LANDING_dlc038_FLAVOR_TEXTмЅ”0=Women in History enhances the historical feel of Europa Universalis IV by providing a variety of historical events and advisors to the game, encompassing all corners of the map and in all historical periods.
LANDING_dlc040_TEXTмЅ”0=Main Features:\n- 16 new unit models for theocratic nations, including the Teutonic Order, the Papal State, and the Knights
LANDING_dlc040_FLAVOR_TEXTмЅ”0=Enhance the Europa Universalis IV experience with these unique unit models for theocratic nations.
LANDING_dlc041_TEXTмЅ”1=Main Features:\n- 16 new unit models for certain Buddhist nations, including Kandy, Dai Viet, and Tibet
LANDING_dlc041_FLAVOR_TEXTмЅ”1=This unit pack enhances the Europa Universalis IV experience with new unit models for Buddhist nations such as Kandy, Dai Viet, and Tibet.
LANDING_dlc042_TEXTмЅ”0=Main Features:\n- 17 new unit models for European and Eurasian nations, including England, the Netherlands, the Ottomans, and Russia
LANDING_dlc042_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with new unit models for some of the historical great nations of the period.
LANDING_dlc043_TEXTмЅ”0=Main Features:\n- 15 new unit models for Central European cities, including Frankfurt, Hamburg, and Ulm
LANDING_dlc043_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with new unit models for some of the most prominent Free Cities of the Holy Roman Empire.
LANDING_dlc044_TEXTмЅ”0=Main Features:\n- 5 new tracks composed by Kairi 'Blodeuyn' Sawler, inspired by Asian melodies
LANDING_dlc044_FLAVOR_TEXTмЅ”2=Taking inspiration from the rich tapestry of Europa Universalis, this music pack breaks new ground by being the first ever community-produced music pack for the award-winning franchise.\n\nComposed by avid Europa Universalis fan Kairi Sawler, this collection of songs is inspired by traditional East Asian melodies.
LANDING_dlc047_TEXTмЅ”0=Main Features:\n- 32 new unit models for Circassia, Crimea, Theodoro, and Zaporozhie
LANDING_dlc047_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with new unit models for four countries bordering the Black Sea.
LANDING_dlc048_TEXTмЅ”0=Main Features:\n- 32 new unit models for Golden Horde, Nogai, Timurids, and Uzbek
LANDING_dlc048_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with new unit models for four prominent realms on the Eurasian Steppe.
LANDING_dlc049_TEXTмЅ”0=Main Features:\n- 12 new cavalry models for England, France, and Spain
LANDING_dlc049_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with new cavalry models for some of the most prominent countries in Western Europe.
LANDING_dlc050_TEXTмЅ”0=Main Features:\n- 18 new fort models for Western, Muslim, Asian, Indian, African, and South and North American cultures
LANDING_dlc050_FLAVOR_TEXTмЅ”0=Enhance the Europa Universalis IV experience with new models for all civilizations' fortifications.
LANDING_dlc052_TEXTмЅ”0=Main Features:\n- 5 new tracks composed by Sabaton
LANDING_dlc052_FLAVOR_TEXTмЅ”0=When power projection meets power metal, every game of Europa Universalis IV feels like an epic in motion! The latest Music Pack adds five tracks from the Swedish power metal band Sabaton, with songs about the art of war and the never-ending battles of mankind. Hardcore historical music alongside the deepest historical simulator in the world-- it's a match made in Sweden!
LANDING_dlc053_TEXTмЅ”0=Main Features:\n- 9 new unit models for Austria, Poland, and Spain
LANDING_dlc053_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with 9 more unique unit models for three countries: Austria, Spain, and Poland.
LANDING_dlc054_TEXTмЅ”0=Main Features:\n- 8 new unit models for France, Prussia, and Sweden
LANDING_dlc054_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with 8 more unique unit models for three countries: France, Prussia, and Sweden.
LANDING_dlc056_TEXTмЅ”0=Main Features:\n- 16 new unit models for Florence, Milan, Naples, and Venice
LANDING_dlc056_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with 16 more unique unit models for four countries: Florence, Milan, Naples, and Venice.
LANDING_dlc057_TEXTмЅ”0=Main Features:\n- 16 new unit models for Ethiopia and for Nubian, Somali, and Swahili nations
LANDING_dlc057_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with new unit models for countries in East Africa.
LANDING_dlc058_TEXTмЅ”0=Main Features:\n- 16 new unit models for Algiers, Morocco, the Mamluks, and Tunis
LANDING_dlc058_FLAVOR_TEXTмЅ”0=This unit pack enhances the Europa Universalis IV experience with 16 new unit models for Algiers, Morocco, the Mamluks, and Tunis.
LANDING_dlc059_TEXTмЅ”0=Main Features:\n- 5 tracks composed by Kairi 'Blodeuyn' Sawler, inspired by the regions of the Far East
LANDING_dlc059_FLAVOR_TEXTмЅ”1=Add new variety and inspiration to Europa Universalis IV with the second soundtrack composed by the avid Europa Universalis fan Kairi Sawler! Invoke the sounds of history with music inspired by the regions of the Far East, from the grasslands of the Khanate to the shores of the South Seas.
LANDING_dlc061_TEXTмЅ”0=Main Features:\n- 24 new tier 1 and tier 3 unit models for German principalities, including Bavaria, Hanover, and Saxony
LANDING_dlc061_FLAVOR_TEXTмЅ”1=This unit pack enhances the Europa Universalis IV experience with 24 new tier 1 and tier 3 unit models for some of the great principalities of Central Europe.
