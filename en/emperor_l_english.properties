# Revolution
CENTER_OF_REVOLUTION_INSTANTžĹĒ0=$PROVINCE|Y$ is a Center of Revolution.
CENTER_OF_REVOLUTION_DELAYEDžĹĒ0=A Center of Revolution is home to dangerous reactionaries that spread vile propaganda against kings, bishops and doges alike. Unless they are stopped, they will spread their ideas to nearby provinces and incite loyal subjects to take up arms against their rulers.
CENTER_OF_REVOLUTION_DELAYED_REVžĹĒ0=A Center of Revolution houses great thinkers and friends of the people who rightfully took up arms against oppression. Given time, the tale of their success will spread to nearby provinces and inspire their inhabitants to raise the bloody standard against tyranny.
PROVINCE_HAS_REVOLUTION_INSTANTžĹĒ0=The Revolution has spread to $PROVINCE|Y$.
PROVINCE_HAS_REVOLUTION_INSTANT_2žĹĒ0=\nWith $ABSOLUTISM|Y$ absolutism in $OWNER|Y$, it has the following effects:\n\n$MODIFIERS$
PROVINCE_HAS_REVOLUTION_DELAYEDžĹĒ1=Revolutionary ideas spread over time to provinces nearby a Center of Revolution. Once the Revolution takes over a province, the autonomy will rise depending on how Absolutist the country is.
PROVINCE_HAS_REVOLUTION_DELAYED_REVžĹĒ1=Revolutionary ideas spread over time to provinces nearby a Center of Revolution. Spreading the Revolution to other countries will increase our own Revolutionary Zeal.
PROVINCE_REVOLUTION_SPREAD_INSTANTžĹĒ0=The Revolution is spreading from $CENTER|Y$ to $PROVINCE|Y$. It has spread by $PROGRESS|Y$% so far.
PROVINCE_REVOLUTIONARY_ZEALžĹĒ0=$COUNTRY|Y$ has embraced the Revolution and currently has $ZEAL|Y$ Revolutionary Zeal.
PROVINCE_REVOLUTION_MODIFIERžĹĒ0=Revolution
LIBERTY_DESIRE_FROM_REVOLUTIONžĹĒ0=Revolutionary ideas spread to ¬ßY$SPREAD$%¬ß! of subject development: $VAL$
MAPMODE_REVOLUTIONžĹĒ0=Revolution
MAPMODE_REVOLUTION_DESCžĹĒ1=This displays the spread and impact of the Revolution.  Revolution Target is displayed in purple, other revolutionary countries are green, yellow to red are non-revolutionary countries, showing how badly their provinces are affected by the Revolution.
COUNTRY_CAN_EMBRACE_REVOLUTIONžĹĒ0=We can embrace the Revolution! Aux armes, citoyens!
COUNTRY_CANNOT_EMBRACE_REVOLUTION_IS_REVOLUTIONARYžĹĒ0=We are already Revolutionary. Death to kings!
COUNTRY_CANNOT_EMBRACE_REVOLUTION_MIN_DEVžĹĒ1=$COUNTRY|Y$ is too weak to claim the mantle of the Revolution. We need at least $MINDEV|Y$ Development and we only have $DEV|Y$.
COUNTRY_CANNOT_EMBRACE_REVOLUTION_NO_SPREADžĹĒ0=Revolutionary ideas are not widespread enough in $COUNTRY|Y$ to embrace them. We need ¬ßY$REQUIRED$%¬ß! and only have ¬ßY$SPREAD$%¬ß!.
COUNTRY_CANNOT_EMBRACE_REVOLUTION_NOT_AGAINžĹĒ0=The Revolution has left deep scars in our country. We shall not embrace it again.
COUNTRY_CANNOT_EMBRACE_REVOLUTION_CELESTIAL_EMPIREžĹĒ0=The Revolution goes against everything the Mandate of Heaven stands for. The Emperor of China would never embrace it.
COUNTRY_CANNOT_EMBRACE_REVOLUTION_PAPAL_STATESžĹĒ0=The Holy See will never embrace the Revolution.
COUNTRY_CANNOT_EMBRACE_REVOLUTION_HAS_DISASTERžĹĒ0=We cannot embrace the Revolution while in a disaster.
EMBRACE_REVOL_HAS_EFFEžĹĒ0=\nThis will have the following effect on our country:\n$EFFECT$
COUNTRY_EMBRACE_REVOLUTION_DELAYEDžĹĒ1=Should the Revolution come to a tragic end, another great power can embrace the cause as its own and become Revolutionary.\nRevolutionary ideas must have spread to at least ¬ßY$REQUIRED$%¬ß! of its development and it must not have been a Revolutionary nation in the past.
COUNTRY_REVOLUTION_SPREAD_INSTANTžĹĒ0=The Revolution has spread to $PROGRESS$ of $COUNTRY|Y$.
COUNTRY_REVOLUTION_SPREAD_DELAYEDžĹĒ0=Revolutionary ideas spread from a nearby Center of Revolution, converting provinces to its cause and enticing their people to revolt against absolutism. The more absolutist a country is, the worse the impact of the Revolution will be on its provinces. Only by bringing the Revolution to an end will the spread stop and order be eventually restored.
COUNTRY_REVOLUTION_SPREAD_DELAYED_NO_TARGETžĹĒ0=The Revolution has been put to an end, for now at least. As long as revolutionary ideas remain present in provinces, the people will still dream about bringing absolutism to a violent end. That fervor will eventually disappear, unless another country decides to embrace the cause.
PROVINCE_REVOLUTION_SPREAD_HINTžĹĒ0=The locals will now oppose our absolutist tendencies.
PROVINCE_REVOLUTION_SPREAD_HINT_REVžĹĒ0=The support for the Revolution in our country grows stronger.
alert_can_embrace_revolution_instantžĹĒ0=¬ßYWe can embrace the Revolution¬ß!
alert_can_embrace_revolution_delayedžĹĒ0=Revolutionary ideas have spread enough in our country that our citizens are ready to take up arms against kings and tyrants. We can embrace the Revolution now!
