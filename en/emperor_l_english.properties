SPREAD_REVOLUTION_TREATY_DESCžĹĒ0=Revolutionary ideas will spread to all $GIVER_ADJECTIVE|Y$ provinces in $CONTINENT|Y$. $TAKER|Y$ will gain $POWER|G$ of each monarch power and $GIVER|Y$ will lose $POWER|R$ of each monarch power.
PEACE_OPTION_ONLY_REV_TARGETžĹĒ1=Only The Home of the Revolution, the Revolutionary Target can demand this peace option. Only they can spread the true revolution!
PEACE_OPTION_REQUIRES_PROVINCES_TO_SPREADžĹĒ0=There is no province left to which the Revolution can be spread to.
