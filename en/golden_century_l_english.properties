pirates.2.tņĮö0=The Pirate Republic
pirates.2.dņĮö0=Nassau has fallen! The pirates of New Providence have become so emboldened by the absence of civilized government in the Bahamas that they have overrun the fort and proclaimed a Republic of Pirates.\n\nChief among them is the pirate captain Benjamin Hornigold. Hornigold maintains a tenuous leadership over the traitors and criminals of the island; the ruthless lieutenants under his command watch him closely for signs of weakness.\n\nThis ŌĆśRepublic of PiratesŌĆÖ is not only a violation of our sovereignty over the Bahamas, but an affront to all civilized peoples. Anarchy reigns in New Providence.
pirates.2.aņĮö0=A pirate's life for me!
pirates.2.bņĮö0=They will hang for this!
pirates.3.tņĮö0=Libertatia
pirates.3.dņĮö1=An unlikely alliance between the pirate captains Misson and Tew, as well as the Dominican priest Caraccioli, have united the pirates of Madagascar into a single community. Naming their colony ŌĆśLibertatiaŌĆÖ, the pirates appear to follow a utopian doctrine of radical liberty and communalism. The pirates consider slavery and statecraft to be anathema to their ideals. They govern through majority voting and bolster their ranks by recruiting liberated slaves from Angola.\n\nWhile this ragtag republic will surely draw the ire of the European colonial powers, whose merchant vessels they mark as prey, this unruly crew of idealists may thrive under our protection.
pirates.3.aņĮö0=A pirate's life for me!
pirates.3.bņĮö0=They are welcome to settle on our shores.
pirates.4.tņĮö0=The Republic of Sal├®
pirates.4.dņĮö0=The zealous Spanish Inquisition continues to ruthlessly purge and deport the Moriscos, the descendents of converts whom they suspect of hiding their Muslim faith. A large group of wealthy Moriscos from the province of [218.GetName] have fled [218.Owner.GetName] in anticipation of further oppression.\n\nThey have settled in Sal├®, where they have abandoned their former lives and adopted a new profession; high seas piracy. Joined by a host of piratical slavers, the newly formed Republic of Sal├® is led by the Dutch pirate Jan Janszoon, now calling himself by his Muslim name Murat Reis.\n\nWe should take these ambitious refugees under our wing. After all, the enemy of our enemy is our friend.
pirates.4.aņĮö0=A pirate's life for me!
pirates.4.bņĮö0=Let us make friends of these pirates.
pirates.5.tņĮö0=The Pirate Queen of T├®touan
pirates.5.aņĮö0=A pirate's life for me!
pirates.5.bņĮö0=Let her reign from T├®touan.
pirates.6.tņĮö0=The Pirates of Port Royal
pirates.6.dņĮö0=We have awarded a great number of letters of marque to enterprising privateers in the Caribbean with the goal of harassing [spanish_main_country.GetAdjective] shipping. These privateers have made their home in the town of Port Royal on [487.GetName], where they have found great opportunity for plunder.\n\nThe willingness of Port RoyalŌĆÖs authorities to deal in stolen goods has also attracted a less savory sort; pirates who bear no letter of marque and recognize no sovereign have begun to make their bases on the island. The appeals of lawlessness have not been lost on our privateers; several have already abandoned their commissions and turned pirate. The gossip in [Root.Capital.GetCapitalName] is that Port Royal has become a pirate utopia, a Sodom of the New World.
pirates.6.aņĮö0=A pirate's life for me!
pirates.6.bņĮö0=We must restore order in Port Royal.
pirates.7.tņĮö0=The Brethren of the Coast
pirates.7.dņĮö0=On the island of Tortuga, off the coast of Haiti, a clandestine gathering of pirates and privateers convenes for what will be the first of many such meetings. The assembled captains enter a makeshift cabin begin to draft an agreement.\n\nSome hours later, the captains emerge from their conference and present to their crews the Pirate Code of the Brethren. With these Articles the Brethren of the Coast is founded and united by a code of conduct to be shared, with some modifications, among all crews.\n\nThe Brethren have made Tortuga their base of operations. From here they will set out under black sails to terrorize the Caribbean.
pirates.7.aņĮö0=A pirate's life for me!
pirates.7.bņĮö0=We will eradicate these criminals.
pirates.8.tņĮö0=Piracy in Palembang
pirates.8.dņĮö1=Palembang has fallen far from its time as capital of the great Srivijaya empire. The city has been abandoned by the collapsed Majapahit kingdom and for decades has been plagued by Chinese pirates who use the port as a base for their smuggling operations. When Admiral Zheng He weighed anchor in the city during his expeditions, he drove out the pirates and appointed Shi Jinqing to rule the city. But Zheng He and Shi Jinqing are now dead, and the pirates have to begun to gather once again. Left unchecked they will surely attempt to retake seize the city.
pirates.8.aņĮö0=A pirate's life for me!
pirates.8.bņĮö0=They will no longer find refuge in Palembang.
pirates.9.tņĮö0=The Lin Daoqian Band
pirates.9.dņĮö0=The notorious Chinese pirate Lin Daoqian and his ruthless band of cutthroats have made port in Pattani, where he seeks an audience with [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Lin is renowned for his brutality. It is said that in Taiwan he massacred the native people and used their blood as caulk to seal a leak in his ship.\n\nHe states that his purpose in Pattani is to offer his services to the [Root.Monarch.GetTitle] in exchange for sanctuary from Chinese authorities. By his reputation and the size of his fleet however, it is likely that his true ambitions in the city extend beyond what he claims.
pirates.9.aņĮö0=A pirate's life for me!
pirates.9.bņĮö0=They will find no refuge in our city.
pirates.9.cņĮö0=Send him back to the sea. May he suffer death by drowning.
pirates.10.tņĮö0=Sunken Treasure
pirates.10.dņĮö0=Rumors abound that the location of a sunken treasure fleet has been discovered. Wrecked by a raging hurricane, the lost galleon is said to have taken some one thousand sailors and millions of [sunken_ship_country.GetAdjective] dollars to its watery grave.\n\nNow that its purported location is widely know it is sure to attract opportunistic salvagers and perhaps even the [sunken_ship_country.GetAdjective] authorities seeking to recover their gold.
pirates.10.aņĮö0=Arrange an ambush for would-be salvagers.
pirates.10.bņĮö0=Lower the diving bell. The gold will be ours!
pirates.11.tņĮö0=The Tyranny of Captain [Root.captain_name.GetName]
pirates.11.dņĮö0=When a pirate captain flies the black flag he must invoke terror in the hearts of all who lay eyes upon it. But he must also command the respect of his crew, and at least in theory commands the ship with their consent.\n\nCaptain [Root.captain_name.GetName] of the [Root.GetRandomShipName] has gained for themselves a cruel and tyrannical reputation. The punishments they mete out for even the most minor and unsubstantiated offenses are excessive even by the standards of lawless men. Unrest is growing, and it is only a matter of time before the crew take matters into their own hands.
pirates.11.aņĮö0=Mutiny!
pirates.11.bņĮö0=The captain's word is law.
pirates.12.tņĮö0=Division of Plunder
pirates.12.dņĮö0=Our latest prize turned out to be carrying a much more valuable cargo than expected. This fact has not yet been revealed to the crews, who would expect and demand that the additional plunder be added to their share. The captains of the involved ships wish sequester the money to refit their ships and purchase additional cannon, while the fenceŌĆÖs representative argues that it is best spent on bribing officials in legitimate ports. As an argument breaks out, a drunken crewman stumbles into the room and hears too much.
pirates.12.aņĮö0=Divide it evenly amongst the crew.
pirates.12.bņĮö0=The fence will take their cut.
pirates.12.cņĮö0=The Captain will receive an extra share.
pirates.13.tņĮö0=Forged Shipping Manifests
pirates.13.dņĮö0=Piracy is a dangerous business, but smuggling can carry just as much risk if the proper precautions are not taken. Our smugglers make their profits by purchasing stolen goods from pirate crews and selling them on for profit in legitimate markets. To sell these illegally acquired goods the smugglers must bribe port officials to ignore their origin or else present passable documents that proclaim their legitimacy.\n\n[Root.skilled_forger.GetName], a skilled forger, has recently entered our service and procured for us a number of documents that should be accepted in almost any port, ensuring that our operations will continue to run smoothly.
pirates.13.aņĮö0=This is good for business.
pirates.14.tņĮö0=Privateer Defects
pirates.14.dņĮö0=The privateer Captain [Root.defecting_privateer.GetName] has made quite a name for himself in the service of the [privateer_origin_country.GetAdjective] Navy. The payment he has been receiving for his prizes however is much less than the full value of the prizes themselves. Like many savvy privateers, [Root.defecting_privateer.GetName] has realized that he could make a greater profit by turning pirate. He has tossed his Letter of Marque overboard and made port in [Root.Capital.GetCapitalName]. As a pirate of [Root.GetName] he will be free to plunder to his heartŌĆÖs content and keep the spoils he has rightfully stolen.
pirates.14.aņĮö0=To profit and plunder!
pirates.15.tņĮö0=Slave Ship Captured
pirates.15.dņĮö0=After boarding our latest prize we discovered the cargo holds to be packed with captive slaves. Many among our crews have experienced the horrors of slavery for themselves, and naturally their first instinct was to demand that the slaves be freed and incorporated into the crew.\n\nThe less scrupulous crewmen with a particular lust for gold would prefer to instead treat these people as cargo and sell them on to the fence as such. There will be nothing in the way of moneyed compensation for their efforts to take this prize, they argue, if we refuse to profit from trading in slaves.
pirates.15.aņĮö0=Liberate them! Let them live free in [Root.GetName].
pirates.15.bņĮö0=They are just cargo to be sold for profit.
pirates.16.tņĮö0=Careening
pirates.16.dņĮö0=It is time once again to careen the ships. This arduous process requires the crews to drag the ships onto a secure beach at high tide and safely lower them onto their sides to expose the hull for repairs. It is a task dreaded by every pirate, not only because the risk of damage to the ship and injury to the crew is high but because of the backbreaking labor they must perform to see the job done right. Several advocates among the crew feel that a more relaxed approach should be taken to careening, despite the captainŌĆÖs insistence that failing to make the proper repairs will cause far more problems down the line.
pirates.16.aņĮö0=Ensure the crews do a thorough job.
pirates.16.bņĮö0=Let the crews relax.
pirates.17.tņĮö0=Smugglers Struggling
pirates.17.dņĮö0=Even at the best of times there it is difficult to smuggle contraband into foreign ports. These are most certainly not the best of times. Many of our smugglers are returning to [Root.Capital.GetCapitalName] having had their goods confiscated. Some do not return at all and await the gallows.
pirates.17.aņĮö0=Unfortunate.
pirates.18.tņĮö0=Electing a Quartermaster
pirates.18.dņĮö0=As the previous quartermaster of the [Root.GetFlagshipName] appears to have taken a long walk off a short plank, we find ourselves in need of a new candidate for the role. A quartermaster has a unique position on a pirate ship. Elected by the crew, he is expected to be their representative and to champion their needs against the often arbitrary authority of the captain.\n\nTwo candidates immediately present themselves. [Root.crew_representative.GetName] is a true advocate for the crew; he has both the humility to listen to their concerns and the fortitude to stand up to the captain. Meanwhile [Root.captains_puppet.GetName] is firmly in the CaptainŌĆÖs pocket; he is skilled at manipulating the crew into believing that the CaptainŌĆÖs wishes are also their own. Who will win the hearts and minds of the assembled pirates?
pirates.18.aņĮö0=[Root.crew_representative.GetName], a voice for the crew.
pirates.18.bņĮö0=[Root.captains_puppet.GetName], the Captain's puppet.
pirates.19.tņĮö0=Crew Blacklisted
pirates.19.dņĮö0=The crew of the [Root.GetRandomShipName] are a menace. Though they have an excellent record of delivering prizes, as soon as they make port their drunkenness and violence cause so much damage and disruption in [Root.Capital.GetCapitalName] that many wonder if they are worth the trouble they cause.\n\n After a particularly destructive episode, the local smuggling consortium has decided to blacklist the entire crew, making them unable to sell their plunder anywhere in [Root.GetName]. This has caused upset among the pirates that call the island home; they believe their natural rights to live as they please are being violated, and several rabble-rousers compare the smugglers to snobbish aristocrats.
pirates.19.aņĮö0=Maintain the ban.
pirates.19.bņĮö0=Lift the ban.
pirates.20.tņĮö0=The Golden Age of Piracy
pirates.20.dņĮö0=Wars between colonial powers are bloody affairs that leave a legacy of devastation and villainy in their wake. Piracy has become rampant in the Caribbean. Former privateers have raised the black flag as they discover that peacetime is bad for profits, while naval captains disenfranchised by the outcome of the wars disavow their former sovereigns. The conflict between great powers has thus inadvertently ushered in a Golden Age of piracy.
pirates.20.aņĮö0=A great annoyance. Or perhaps a great opportunity?
golden_age_of_piracy_tooltipņĮö0=The ┬¦YGolden Age of Piracy┬¦! triggered modifier will be available for the next 50 years.
golden_age_of_piracyņĮö0=Golden Age of Piracy
desc_golden_age_of_piracyņĮö0=Piracy has become rampant in the Caribbean. Any merchant vessel traversing these waters puts it self at the mercy of pirates and privateers.
become_pirates_decision_titleņĮö0=Hoist the Black Flag
become_pirates_decision_descņĮö0=How can laws and civilization compete with freedom and the promise of treasure? ItŌĆÖs time to hoist the black flag and declare a Pirate Republic!
MODIFIER_TREASURE_FLEET_INCOMEņĮö0=Treasure Fleet income
TREASURE_FLEET_INCOME_MODIFIED_BYņĮö0=Amount affected by: 
grand_armadaņĮö0=Grand Armada
grand_armada_descņĮö0=A grand convoy shall accompany the treasure fleets that bring the wealth of the Americas into our home ports.
portuguese_marinesņĮö0=Portuguese Marines
portuguese_marines_descņĮö0=To establish a truly global empire we must be skilled at launching assaults on enemy forts from the sea.
CAN_ESTABLISH_ORDERņĮö0=Can establish a Holy Order in $LOCATION|Y$.
CAN_NOT_ESTABLISH_ORDERņĮö1=Cannot establish a Holy Order in $LOCATION|Y$.
