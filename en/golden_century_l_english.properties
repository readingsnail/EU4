flavor_tun.EVTNAME1ņĮö0=Hayreddin Barbarossa
flavor_tun.EVTDESC1ņĮö0=The notorious pirate and admiral Hayreddin Barbarossa has arrived in Algiers seeking to establish a base from which to mercilessly raid the Mediterranean sea. Nominally a subject of the Turkish Sultan, the feared captain is willing to consider entering our service if we support him in his war against the Christians.
flavor_tun.EVTOPTA1ņĮö0=Let him rule over Algiers.
flavor_tun.EVTOPTB1ņĮö0=Appoint him as our Grand Admiral.
more_flavor_por.EVTNAME1ņĮö0=The Portuguese in Macau
more_flavor_por.EVTDESC1ņĮö0=Smuggling and piracy are a perpetual annoyance in the Guangzhou Bay, but the increased presence of [From.GetName] merchant and naval vessels in the South China Sea has done much to combat this unlawful activity. Seeking to leverage this to their advantage, representatives of the Portuguese government have requested permission to settle in Macau to establish a trading community. They are willing to pay handsomely in silver for the privilege.
more_flavor_por.EVTOPTA1ņĮö0=Allow them sovereignty over Macau.
more_flavor_por.EVTOPTB1ņĮö0=These foreigners cannot be trusted.
more_flavor_por.EVTNAME2ņĮö0=The Purchase of Macau
more_flavor_por.EVTDESC2ņĮö0=Impressed by our efforts to combat piracy in the South China Sea, the [From.Monarch.GetTitle] of [From.GetName] has graciously allowed [Root.GetAdjective] merchants to settle in Macau in exchange for a suitable payment of silver taels. The rare opportunity to trade openly in China is sure to be immensely profitable.
more_flavor_por.EVTOPTA2ņĮö0=At last, a foothold in China!
more_flavor_por.EVTNAME3ņĮö0=The Portuguese in Nagasaki
more_flavor_por.EVTDESC3ņĮö0=We are no strangers to Nanban merchants attempting to ply their trade in our ports. It has been our typical policy to send them on their way empty handed. These [From.GetAdjective] Jesuits however make a unique and compelling case; as [From.GetAdjective] have access to the restrictive ports of China, they would be able to act as intermediaries for trade between China and Japan. In exchange we would have to allow their priests and merchants to establish a permanent community at Nagasaki, a proposition that could give them unsettling influence over Japanese affairs.
more_flavor_por.EVTOPTA3ņĮö0=Allow them to trade in Nagasaki.
more_flavor_por.EVTOPTB3ņĮö0=We should not trust these Nanban.
more_flavor_por.EVTNAME4ņĮö0=Portuguese Nagasaki
more_flavor_por.EVTDESC4ņĮö1=The missionaries we sent to Japan have brought us good news; they have convinced the [From.Monarch.GetTitle] of [From.GetName] to grant the port of Nagasaki to the Society of Jesus. Due to our long-standing agreement with the Church, this means that de facto control of the port falls to [Root.GetName]. We will now have unprecedented access to Japanese trade, and a potential military foothold should we decide that our Japanese friends have outlived their usefulness.
more_flavor_por.EVTOPTA4ņĮö1=Send the Black Ships.
more_flavor_por.EVTNAME5ņĮö0=Excommunication of Were-Tigers
more_flavor_por.EVTDESC5ņĮö0=Following the capture of Malacca, we have discovered that the Indies as well as Europe is plagued with demonic skinchangers. In the case of the Malays, Satan grants the beast the ability to wear the skin of a man, and thus wander through his towns unnoticed except by the vigilant faithful. The priests we have brought with us to Malacca have promptly excommunicated these creatures, making it clear to all that Portugal will not tolerate demons posing as men.
more_flavor_por.EVTOPTA5ņĮö0=Foul spawn of Satan!
jesuit_orderņĮö0=Jesuits
jesuit_order_descņĮö0=Among the dedicated Christian evangelists, the missionaries of the Society of Jesus are determined to spread the word of God to the four corners of the world.
dominican_orderņĮö0=Dominicans
dominican_order_descņĮö0=The Dominican Order are firm advocates for the natural rights of all mankind. Abhorring slavery and mistreatment, they seek to change the world through compassionate deeds.
franciscan_orderņĮö0=Franciscans
franciscan_order_descņĮö0=The successors of Saint Francis of Assisi seek to implore the faithful to righteous acts through example. To those not of the faith they are strict disciplinarians who will do what is necessary to impose God's law.
