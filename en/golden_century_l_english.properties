BUILD_FLAGSHIP_DETAILSņĮö0=┬¦GBuild a Flagship┬¦!\nOpens the Flagship Designer to add Modifications.\nMaintenance cost will depend on the class of the Flagship and the applied Modifications.\nWe will lose Prestige if our Flagship is sunk or captured.\n\nIn addition to the Modifications, a Flagship has the following perks:\n$MODIFIER$
BUILD_FLAGSHIP_FLAVORņĮö0=The Flagship is the pride of the navy. Our Flagship should be designed with the foremost needs of the nation in mind whether they be protecting our maritime trade, dominating the seas in naval battles, or orchestrating invasions between landmasses.
tortoise.1.tņĮö0=Tortoise Herding
tortoise.1.dņĮö0=A few of the settlers on the Galapagos Islands have taken to eating the giant tortoises native there. These immobile and defenseless giants make perfect livestock; it has become a commodity among passing whalers and has become the colony's only significant source of income.\n\nIt is said that after once tasting the Galapagos tortoise, demand for every other animal food falls off greatly. The meat of is the easiest of digestion, and a quantity of it, exceeding that of any other food, can be eaten without experiencing the slightest of inconvenience.
tortoise.1.aņĮö0=Delicious Tortoises...
