mechanic_generals_become_rulers_yesņĮö0=A General becomes ruler when the current ruler dies.
mechanic_generals_become_rulers_noņĮö0=" # deliberately blank
manufacturing_centerņĮö0=Manufacturing Center of an Empire
manufacturing_center_descņĮö0=Our citizens are the power base of our overlord's trade empire. Foreign goods are delivered to us which we then mold into finished products.
council_of_the_indies_reformņĮö0=Council of the Indies
council_of_the_indies_reform_descņĮö0=Our vast colonial territories must have a central administration that reports directly to the Crown. Though individual Viceroys will govern their respective territories, the Council will be the supreme colonial authority, and its courts will extend our law to the farthest reaches of the New World.
council_of_captains_reformņĮö0=Council of Captains
council_of_captains_reform_descņĮö0=The Pirate Republic should be governed by the will of its greatest captains. It is their alliance that holds our nation together, and so their decisions must take precedence over any other authority.
articles_of_agreement_reformņĮö0=Articles of Agreement
articles_of_agreement_reform_descņĮö0=The Articles of Agreement are the cornerstone of the social order on board a pirate ship. They guarantee that every crewman has an equal vote in all matters and an equal share of all plunder. Articles such as these should be established for the Republic itself, so that the liberty and equality of all pirates is secured.
smugglers_haven_reformņĮö0=Smugglers Haven
smugglers_haven_reform_descņĮö0=A pirate enterprise cannot function without a way to sell their stolen goods. We must ensure that conditions in the Republic are favorable for smuggling operations.
pirate_king_reformņĮö0=Pirate King
pirate_king_reform_descņĮö0=Every great empire stands in opposition to us. To stand any chance of survival we must rally behind our own Pirate King, and the King's word will be law.
war_against_the_world_doctrine_reformņĮö0=War Against the World Doctrine
war_against_the_world_doctrine_reform_descņĮö0=The tyrants of the world must be unseated! We can no longer tolerate kings and despots making slaves of our fellow man. And so we shall adopt a new doctrine: war against the world!
black_market_consortium_reformņĮö0=Black Market Consortium
black_market_consortium_reform_descņĮö1=The pirates that run amok in the Republic cannot be trusted to bathe themselves, let alone to govern a nation whose future hands on the edge of a cutlass. A Consortium formed of the most influential black market merchants shall be established as its true governors. Profit must come before liberty.
pirates_become_republic_reformņĮö0=Lower the Black Flag
pirates_become_republic_reform_descņĮö0=The time has come to end our lives of piracy and settle down to establish a more stable Republic.
PIRATE_WAR_NAMEņĮö0=$ORDER$$FIRST$ Piratical War against $SECOND$
cb_war_against_the_worldņĮö0=War Against the World
cb_war_against_the_world_descņĮö0=All the world brands us monsters; we will fight them all to protect our liberty!
pirate_king_decision_titleņĮö0=Enthrone a Pirate King
pirate_king_decision_descņĮö0=Every great empire stands in opposition to us. To stand any chance of survival we must rally behind our own Pirate King, and the King's word will be law.
black_market_consortium_decision_titleņĮö0=Establish a Black Market Consortium
black_market_consortium_decision_descņĮö0=The pirates that run amok in the Republic cannot be trusted to bathe themselves, let alone to govern a nation whose future hands on the edge of a cutlass. A Consortium formed of the most influential black market merchants shall be established as its true governors. Profit must come before liberty.
war_against_the_world_decision_titleņĮö0=Enact War Against the World Doctrine
war_against_the_world_decision_descņĮö0=The tyrants of the world must be unseated! We can no longer tolerate kings and despots making slaves of our fellow man. And so we shall adopt a new doctrine: war against the world!
pirate_kingdomņĮö0=Pirate Kingdom
pirate_kingdom_descņĮö0=Every great empire stands in opposition to us. To survive we have rallied behind our own Pirate King, and the King's word is law. Only the strongest among us must be allowed to rule.
war_against_the_world_governmentņĮö0=Liberi Government
war_against_the_world_government_descņĮö0=The tyrants of the world must be unseated! We can no longer tolerate kings and despots making slaves of our fellow man. And so we shall adopt a new doctrine: war against the world!
black_market_consortium_governmentņĮö0=Black Market Consortium
