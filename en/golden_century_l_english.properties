MODIFIER_MOVEMENT_SPEED_ONTO_OFF_BOATņĮö0=Movement Speed On and Off Ships
portuguese_corps_of_fusiliersņĮö0=Portuguese Fusiliers
portuguese_corps_of_fusiliers_descņĮö0=Our fusiliers must be ready to attack from a ship as if it was land, because Portugal's fleet is an extension of the country itself.
integrated_marinesņĮö0=Integrated Marines
integrated_marines_descņĮö0=Every soldier who gets on a ship can't be a marine, but there can be enough on our flagship to make a difference.
MODIFIER_MONTHLY_CHANCE_ADMIRAL_GAINING_SKILLņĮö0=Monthly Chance of Admiral Skill Gain on Mission
scandinavian_flag_officersņĮö0=Scandinavian Flag Officers
scandinavian_flag_officers_descņĮö0=With our dependency and access to the trade that flows through The Sound we have a great source of seasoned seamen to recruit as professional officers to make up the core of our navy.
flag_officersņĮö0=Flag Officers
flag_officers_descņĮö0=Flying a flag marking your rank on a flagship is a great source of pride for many officers, encouraging bravery and ambition.
