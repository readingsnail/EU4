command_aftercastleņĮö0=Command Aftercastle
command_aftercastle_descņĮö0=Outfitting the ship with an aftercastle will provide better accommodations for our captain and the valued members of the crew.
improved_crows_nestņĮö0=Improved Crow's Nest
improved_crows_nest_descņĮö0=With a flagship like ours, the enemy will see us coming. We just have to make sure we see them first.
mortarsņĮö0=Mortars
mortars_descņĮö0=Long-distance siege weapons won't be very efficient against other ships, but they will greatly boost the threat we pose to land structures.
standardized_signal_bookņĮö0=Standardized Signal Book
standardized_signal_book_descņĮö0=Coordinating a fleet is no easy task, but established standards for communication is a first step to doing it flawlessly.
hull_sheatingņĮö0=Hull Sheathing
hull_sheating_descņĮö0=Even the greatest ship is eventually done in not only by war, but by the ocean itself. A metal sheath will ensure our flagship lasts.
portuguese_navigatorsņĮö0=Portuguese Navigators
portuguese_navigators_descņĮö0=A Portuguese navigator will not only get you to the most distant undiscovered shore, but also, if the winds will it, get you back.
portuguese_bombardierņĮö0=Portuguese Bombardier
portuguese_bombardier_descņĮö0=Naval barrages are a special art form, and no one masters is better than our bombardiers.
portuguese_trade_route_mapņĮö0=Portuguese Trade Route Map
portuguese_trade_route_map_descņĮö0=The shortest distance between to points on a map is a straight line, but a Portuguese trade route is a close second.
