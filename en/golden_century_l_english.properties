HOLY_ORDER_ALREADY_ESTABLISHEDņĮö0=┬¦RA Holy Order is already established in this state.┬¦!
privateeringņĮö0=Privateering
flagship_events.1.tņĮö0=Flagship Captured by [From.GetName]!
flagship_events.1.dņĮö0=[Root.GetLostFlagshipName], the pride of [Root.GetName], was recently embroiled in a fierce battle against the [From.GetAdjective] armada. Despite putting up valiant resistance, it fell into the hands of the enemy. Our fleet is left without a flagship and worse yet, having to endure [Root.GetLostFlagshipName] possibly being used against us.
flagship_events.1.aņĮö0=The humiliation!
flagship_events.2.tņĮö0=[captured_flagship_country.GetAdjective] Flagship Captured!
flagship_events.2.dņĮö0=During a battle against the [captured_flagship_country.GetAdjective] fleet, we managed to capture [captured_flagship_country.GetLostFlagshipName], the flagship they have prided themselves on so much in the past. While it is certainly an impressive ship, we did not only defeat it, but managed to bring it back more or less in one piece. Hopefully this will teach them the folly of testing our might on the oceans of the world.
flagship_events.2.aņĮö0=The [Root.GetAdjective] flag shall fly proudly over it!
flagship_events.3.tņĮö0=Flagship Sunk by [From.GetName]!
flagship_events.3.dņĮö0=[Root.GetLostFlagshipName], the jewel of the [Root.GetAdjective] fleet, was tragically lost at sea today as it battled the [From.GetAdjective] menace. Despite a valiant last stand, our flagship is now at the bottom of the ocean.
flagship_events.3.aņĮö0=Stories shall be told of its days on the seas!
flagship_events.4.tņĮö0=[sunk_flagship_country.GetAdjective] Flagship Sunk!
flagship_events.4.dņĮö0=Of all the ships in the [sunk_flagship_country.GetAdjective] navy, none was more highly regarded than [sunk_flagship_country.GetLostFlagshipName]. Knowing this, we have been prepared for this ship, and today our preparations paid off. [sunk_flagship_country.GetLostFlagshipName] was sunk in a battle today, dealing a significant blow to [sunk_flagship_country.GetAdjective] morale and reminding them that no ship, legend or not, is unsinkable.
flagship_events.4.aņĮö0=Good riddance.
flavor_pap.EVTNAME9ņĮö0=Sublimis Deus
flavor_pap.EVTDESC9ņĮö0=The Pope decrees that the native peoples of the Americas shall not be made into slaves. The belief that they are lesser brutes incapable of receiving GodŌĆÖs grace, he writes, is a vile lie spread by the the enemy of the human race himself. Instead, His Holiness insists that like all ensouled human beings these people yearn for GodŌĆÖs light, and that therefore all pious princes should make haste to spread the Catholic faith among them.
flavor_pap.9.aņĮö0=Enforce the Pope's will.
flavor_pap.9.bņĮö0=What the Pope does not know cannot hurt him.
IS_EXPELLING_FROMņĮö0=Minorities are being expelled from $SOURCE|Y$.
IS_NOT_EXPELLING_FROMņĮö0=Minorities are not being expelled from $SOURCE|Y$.
expel_minority_events.1.tņĮö0=A Haven for the [expelling_province.Religion.GetName]
expel_minority_events.1.dņĮö0=Our attempts to expel the [expelling_province.Religion.GetName] population of [expelling_province.GetName] to [expelling_colony.GetName] have not exactly been interpreted as well-meaning by the people who are leaving their homes behind, but some of those who have left see some merit in their new home. The colony, at least in these early stages, is somewhat more permissive regarding religious practices, with some preachers regarding it as a better place for practicing the [expelling_province.Religion.GetName] faith. These news have now reached [expelling_province.GetName], softening the resistance to the project somewhat.
expel_minority_events.1.aņĮö0=Let them believe that if it warms them to the idea.
expel_minority_events.2.tņĮö0=[expelling_province.Religion.GetName] Solidarity
expel_minority_events.2.dņĮö0=Our expulsion of the heathens in [expelling_province.GetName] was never meant to go beyond the borders of the province, but religious communities are not so clearly delineated in their geography. Families, friends and other people with ties to those leaving in the neighboring province of [heathen_neighbors_moving.GetName] are now moving as well, trying to keep the community intact even as they are forced out of [Root.GetName]. This migration was not part of the plan, but it may serve our interests.
expel_minority_events.2.aņĮö0=Let them leave. This was our goal from the start.
expel_minority_events.2.bņĮö0=Stop this. We need them where they are.
expel_minority_events.3.tņĮö0=The Last [expelling_province.Culture.GetName] in [Root.GetName]
expel_minority_events.3.dņĮö0=The [expelling_province.Religion.GetName] [expelling_province.Culture.GetName] people of [expelling_province.GetName] have long felt singled out in [Root.GetAdjective] society, being both a cultural and a religious minority. Now, they are being cast out of the only place they have left - [expelling_province.GetName].\n\nSeeing no future in [expelling_province.GetName], their presence here is increasingly threatened. Many now fear the repercussions of staying too long in such a hostile environment. Rather than the controlled migration we had hoped for, they are leaving rapidly, no one wanting to be the last ones left here.
expel_minority_events.3.aņĮö0=Not quite how we had planned this.
expel_minority_events.4.tņĮö0=[expelling_province.Culture.GetName] Refugees Flee [expelling_province.GetName]
expel_minority_events.4.dņĮö0=While most of the [expelling_province.Culture.GetName] population is complying with our efforts to move them to our colony in [expelling_colony.GetName], some have been searching for a way out of this situation. Fleeing to neighboring province is one way, since [expelling_province.GetName] is the primary target of our efforts.\n\nWhile this is clearly an attempt to interfere with our plan, trying to stop people from settling nearby will not mean that they comply with the original plan. More likely, they will scatter elsewhere, bringing the situation even further from our control.
expel_minority_events.4.aņĮö0=At least this way, we know where they are going.
expel_minority_events.4.bņĮö0=Such attempts at defiance will not be tolerated!
expel_minority_events.5.tņĮö0=Administrative Officials Expelled
expel_minority_events.5.dņĮö0=The people being moved to our colony in [expelling_colony.GetName] from [expelling_province.GetName] are not only commonfolk. Many of them have served important roles in administering [expelling_province.GetName], sometimes as a bridge between [Root.GetAdjective] leaders and the locals. Now that they are being expelled, the province will be more difficult to manage, forcing us to make some concessions. Either we take a more off-hands approach to administering [expelling_province.GetName] until the positions can be filled, or we hurry along our plans to have less people to manage.
expel_minority_events.5.aņĮö0=The positions will have to be vacant for the time being.
expel_minority_events.5.bņĮö0=We'll simply have to send people abroad at a faster rate.
