shadhili_order_descņĮö0=A Sufi order founded in Morocco, focusing on intellectual pursuits, such as literature and poetry.
qadiri_orderņĮö0=Qadiri
qadiri_order_descņĮö0=Originally founded in Iran, the Quadiri Order is one of the branches of Sufism, encompassing a variety of different interpretations around the world.
aissawa_orderņĮö0=Aissawa
aissawa_order_descņĮö0=A younger branch of Sufism whose heritage of psalms and prayers developed into rituals featuring music and dance.
order_piety_tooltipņĮö0=Move ┬¦Y2┬¦! towards Mysticism for ┬¦Yevery province in the state.┬¦!
