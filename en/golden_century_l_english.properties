MODIFIER_MISSIONARY_MAINTENANCE_COSTņĮö0=Missionary Maintenance Cost
MODIFIER_NAVAL_TRADITION_FROM_TRADEņĮö2=Navy Tradition from Protecting Trade
MODIFIER_ADMIRAL_COSTņĮö0=Admiral Cost
MODIFIER_EXPEL_MINORITIES_COSTņĮö0=Expel Minorities Cost
